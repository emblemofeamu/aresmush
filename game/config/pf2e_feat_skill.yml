---
pf2e_feats:
  # Level 1 Feats
  Acrobatic Performer:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: You're an incredible acrobat, evoking wonder and enrapturing audiences with your prowess. You can roll an Acrobatics check instead of a Performance check when using the Perform action. If you are trained in both Acrobatics and Performance, you gain a +1 circumstances bonus on Acrobatics checks made to Perform.
    prereq:
      level: 1
      skill: Acrobatics/trained
  Additional Lore:
    feat_type:
      - Skill
      - General
    shortdesc: "Your knowledge has expanded to encompass a new field. Choose a Lore skill subcategory. You become trained in it. At 3rd, 7th, and 15th levels, you gain an additional skill increase you can apply only to the chosen Lore subcategory.%r%r**Special** You can select this feat more than once. Each time you must select a new subcategory of Lore and you gain the additional skill increases to that subcategory for the listed levels."
    prereq:
      level: 1
  Alchemical Crafting:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: You can use the Craft activity to create alchemical items. When you select this feat, you immediately add the formulas for four common 1st-level alchemical items to your formula book.
    prereq:
      level: 1
      skill: Crafting/trained
  Arcane Sense:
    feat_type:
      - Skill
      - General
    assoc_skill: Arcana
    shortdesc: Your study of magic allows you to instinctively sense its presence. You can cast 1st-rank *detect magic* at will as an arcane innate spell. If you're a master in Arcana, the spell is heightened to 3rd rank; if you're legendary, it is heightened to 4th rank.
    prereq:
      level: 1
      skill: Arcana/trained
  Armor Assist:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Athletics
      - Warfare Lore
    shortdesc: "After your service aiding armored combatants, you are practiced in helping yourself and others don heavy gear.%r%rYou can attempt an Athletics or Warfare Lore check with a DC determined by the GM (but usually 15 for common armor, DC 20 for uncommon armor, and DC 25 for rare armor) to halve the time you take to don armor.%r%rYou can halve an ally's time to don armor by working with them to don the armor and succeeding at an Athletics or Warfare Lore check against the same DC."
    prereq:
      level: 1
      orskill:
        - Athletics/trained
        - Warfare Lore/trained
  Assurance:
    feat_type:
      - Skill
      - General
    traits:
      - Fortune
    shortdesc: "Even in the worst circumstances, you can perform basic tasks. Choose a skill you're trained in. You can forgo rolling a skill check for that skill to instead receive a result of 10 + your proficiency bonus (do not apply any other bonuses, penalties, or modifiers).%r%r**Special** You can select this feat multiple times. Each time, choose a different skill and gain the benefits for that skill."
    prereq:
      level: 1
      misc:
        - trained in at least one skill
  Battle Medicine:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    traits:
      - Healing
      - Manipulate
    shortdesc: You can patch up wounds, even in combat. Attempt a Medicine check with the same DC as for Treat Wounds and restore the corresponding amount of HP; this doesn't remove the wounded condition. As with Treat Wounds, you can attempt checks against higher DCs if you have the minimum proficiency rank. The target is then immune to your Battle Medicine for 1 day. This does not make them immune to, or otherwise count as, Treat Wounds.
    prereq:
      level: 1
      skill: Medicine/trained
  Bon Mot:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    traits:
      - Auditory
      - Concentrate
      - Emotion
      - Linguistic
      - Mental
    shortdesc: "You launch an insightful quip at a foe, distracting them. Choose a foe within 30 feet and roll a Diplomacy check against the target's Will DC.%r%r**Critical Success** The target is distracted and takes a –3 status penalty to Perception and Will saves for 1 minute.%r%rThe target can end the effect early with a retort to your Bon Mot. This can either be a single action that has the concentrate trait or an appropriate skill action to frame their retort. The GM determines which skill actions qualify, though they must take at least 1 action. Typically, the retort needs to use a linguistic Charisma-based skill action.%r%r**Success** As critical success, but the penalty is –2.%r**Critical Failure** Your quip is atrocious. You take the same penalty an enemy would take had you succeeded. This ends after 1 minute or if you issue another Bon Mot and succeed."
    prereq:
      level: 1
      skill: Diplomacy/trained
  Cat Fall:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: Your catlike aerial acrobatics allow you to cushion your falls. Treat falls as 10 feet shorter. If you're an expert in Acrobatics, treat falls as 25 feet shorter and 50 feet if you're a master. If you're legendary in Acrobatics, you always land on your feet and don't take damage, regardless of the distance of the fall.
    prereq:
      level: 1
      skill: Acrobatics/trained
  Charming Liar:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: Your charm allows you to win over those you lie to. When you get a critical success using the Lie action, the target's attitude toward you improves by one step, as though you'd succeeded at using Diplomacy to Make an Impression. This works only once per conversation, and if you critically succeed against multiple targets using the same result, you choose one creature's attitude to improve. You must be lying to impart seemingly important information, inflate your status, or ingratiate yourself, which trivial or irrelevant lies can't achieve.
    prereq:
      level: 1
      skill: Deception/trained
  Combat Climber:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: Your techniques allow you to fight as you climb. You're not off-guard while Climbing and can Climb with a hand occupied. You must still use another hand and both legs to Climb.
    prereq:
      level: 1
      skill: Athletics/trained
  Concealing Legerdemain:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: "Rather than hide an object somewhere the inspectors won't search, you're skilled at keeping the object on the move so it's never where they look.%r%rWhen you Conceal an Object of light Bulk or less, you can use Thievery instead of Stealth for your checks and for the DC of an active searcher's Perception check. You roll the check only once, but you must continue to use actions to Conceal an Object throughout the process."
    prereq:
      level: 1
      skill: Thievery/trained
  Courtly Graces:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You were raised among the nobility or have learned proper etiquette and bearing, allowing you to present yourself as a noble and play games of influence and politics. Unless you are intentionally presenting yourself differently, anyone who speaks with you will assume you are a noble or closely associated with the nobility (such as a prominent servant). You can use Society to Make an Impression on a noble, as well as with Impersonate to pretend to be a type of noble or a specific individual noble. If you use the normal skills in those situations, you receive a +1 circumstance bonus to the check instead.
    prereq:
      level: 1
      skill: Society/trained
  Crafter's Appraisal:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: Your knowledge of items' construction allows you to discern their magical effects as well. You can use Crafting instead of a skill associated with a magic tradition to Identify Magic on magic items, though not on any other sorts of magic.
    prereq:
      level: 1
      skill: Crafting/trained
  Deceptive Worship:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    shortdesc: Members of your cult frequently pass themselves off as worshippers of other religions. You can use Occultism instead of Deception to Impersonate a typical worshipper of another faith or to Lie specifically to claim you are a member of the faith you are Impersonating. You still need to use the Deception skill to Impersonate a specific worshipper or to perform other deceptive actions, such as attempting to Lie about any other matter.
    prereq:
      level: 1
      skill: Occultism/trained
  Dirty Trick:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    traits:
      - Attack
      - Manipulate
    shortdesc: "You hook a foe's bootlaces together, pull their hat over their eyes, loosen their belt, or otherwise confound their mobility through an underhanded tactic. Attempt a Thievery check against the target's Reflex DC.%r%r**Critical Success** The target is clumsy 1 until they use an Interact action to end the impediment%r**Success** As critical success, but the condition ends automatically after 1 round.%r**Critical Failure** You fall prone as your attempt backfires."
    prereq:
      level: 1
      skill: Thievery/trained
  Dubious Knowledge:
    feat_type:
      - Skill
      - General
    assoc_skill: A Skill With The Recall Knowledge Action
    shortdesc: You're a treasure trove of information, but not all of it comes from reputable sources. When you fail (but don't critically fail) a Recall Knowledge check using any skill, you learn the correct answer and an erroneous answer, but you don't have any way to differentiate which is which. This can occur as knowing something is significant, but not whether it's good or bad.
    prereq:
      level: 1
      skill: A Skill With The Recall Knowledge Action/trained
  Experienced Smuggler:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: You often smuggle things past the authorities. When the GM rolls your Stealth check to see if a passive observer notices a small item you've concealed, the GM uses the number rolled or 10—whichever is higher—as the result of your die roll, adding it to your Stealth modifier to determine your Stealth check result. If you're a master in Stealth, the GM uses the number rolled or 15, and if you're legendary in Stealth, you automatically succeed at hiding a small concealed item from passive observers. This provides no benefits when a creature attempts a Perception check while actively searching you for hidden items.
    prereq:
      level: 1
      skill: Stealth/trained
  Experienced Tracker:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: Tracking is second nature to you, and when necessary you can follow a trail without pause. You can Track while moving at full Speed by taking a –5 penalty to your Survival check. If you're a master in Survival, you don't take the –5 penalty. If you're legendary in Survival, you no longer need to roll a new Survival check every hour when tracking, though you still need to roll whenever there are significant changes in the trail.
    prereq:
      level: 1
      skill: Survival/trained
  Express Rider:
    feat_type:
      - Skill
      - General
    assoc_skill: Nature
    traits:
      - Exploration
    shortdesc: You can encourage your mount to cover ground quickly. When calculating your travel Speed for the day while mounted, you can attempt a Nature check to Command an Animal to increase your mount's travel Speed. The DC is determined by the GM, but is typically based on the mount's level or the difficulty of the environment, whichever is harder. On a success, increase your mount's travel Speed by half. This has no effect on your mount's movement in encounters. This benefit extends to up to six other allies traveling with you, as long as all such allies are also mounted, or are quadrupeds with a Speed of at least 30 feet.
    prereq:
      level: 1
      skill: Nature/trained
  Eye for Numbers:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: "You've learned to quickly estimate the number of items in a group with relative accuracy at only a glance. You immediately learn the number of visually similar items in a group you can see, rounded to the first digit in the total number. For example, you could look at a case of potion vials and learn that it held about 30 vials, but you wouldn't know that it was exactly 33 vials, how many different types of potions there were, or how many of which type. Similarly, you could look at a pile of 2,805 coins and know that there were about 3,000 coins in all. You can use this ability only on items that can typically be counted, so you can't use it on grains of sand or stars in the sky, for example.%r%rIf you count a specific number of items possessed by an enemy, such as the number of coins or pieces of equipment they're carrying, you can use this information the next time you Feint or Create a Diversion against that target within 1 minute. If you do, you gain a +1 circumstance bonus to your check and can use Society instead of Deception for the check.%r%rYou can use this action during an attempt to Decipher Writing that is primarily numerical or mathematical to gain a +2 circumstance bonus to your check."
    prereq:
      level: 1
      skill: Society/trained
  Fascinating Performance:
    feat_type:
      - Skill
      - General
    assoc_skill: Performance
    shortdesc: "When you Perform, compare your result to the Will DC of one observer. If you succeed, the target is Fascinated by you for 1 round. If the observer is in a situation that demands immediate attention, such as combat, you must critically succeed to fascinate it and the Perform action gains the incapacitation trait. You must choose which creature you're trying to fascinate before you roll your check, and the target is then temporarily immune for 1 hour.%r%rIf you're an expert in Performance, you can fascinate up to four observers; if you're a master, you can fascinate up to 10 observers; and if you're legendary, you can fascinate any number of observers at the same time."
    prereq:
      level: 1
      skill: Performance/trained
  Forager:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: "While using Survival to Subsist, if you roll any result worse than a success, you get a success. On a success, you can provide subsistence living for yourself and four additional creatures, and on a critical success, you can take care of twice as many additional creatures. You can choose to support half the number of creatures with a comfortable living.%r%rIncrease the number of additional creatures you feed on a success to eight if you're an expert in Survival, 16 if you're a master, and 32 if you're legendary."
    prereq:
      level: 1
      skill: Survival/trained
  Forensic Acumen:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: "You understand the principles of forensic medicine, making you better at examining a body to determine the cause of death or injury.%r%rYou can perform a forensic examination on a body, as described under Recall Knowledge in the Medicine skill, in half the normal amount of time it would take (to a minimum of 5 minutes).%r%rIf you succeed at your check, you can attempt an immediate check to Recall Knowledge to follow up on something you found, with a +2 circumstance bonus.%r%rThis check is usually related to the cause of injury or death, such as a Crafting check to identify a poison or weapon that was used or an additional Medicine check to identify a specific disease. If you prefer, you can instead attempt to Recall Knowledge about the type of creature whose body you were examining, using the appropriate skill and gaining the same circumstance bonus.%r%rThe circumstance bonus increases to +3 if you have master proficiency in Medicine and +4 if you have legendary proficiency."
    prereq:
      level: 1
      skill: Medicine/trained
  Glean Contents:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You are adept at quickly scanning loose papers and carefully discerning the contents of sealed letters without damaging the seal. You can attempt Society checks to Decipher Writing on a message that is only partially glimpsed, upside down or reversed from your perspective, and gain a +1 circumstance bonus to the check when doing so. You can also use this feat to decipher sealed letters, adding the manipulate trait to your attempt to Decipher Writing. This doesn't prevent witnesses from noticing your efforts; you might need to attempt Deception or Stealth checks to avoid being noticed. In either use of this feat, the recipient is made aware of your efforts on a critical failure (for instance, you might be caught rubbernecking or you might disturb the papers in a way their owner notices).
    prereq:
      level: 1
      skill: Society/trained
  Group Coercion:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: "You can strong-arm people effectively, even when you don't have them isolated. When you Coerce, you can compare your Intimidation check result to the Will DCs of up to five targets instead of one.%r%rIt's possible to get a different degree of success for each target. The number of targets you can Coerce in a single action increases to 10 if you're an expert, 25 if you're a master, and 50 if you're legendary."
    prereq:
      level: 1
      skill: Intimidation/trained
  Group Impression:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    shortdesc: When you Make an Impression, you can compare your Diplomacy check result to the Will DCs of up to 10 targets you conversed with, with no penalty. The number of targets increases to 20 if you're an expert, 50 if you're a master, and 100 if you're legendary.
    prereq:
      level: 1
      skill: Diplomacy/trained
  Hefty Hauler:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You can carry more than your frame implies. Increase your maximum and encumbered Bulk limits by 2.
    prereq:
      level: 1
      skill: Athletics/trained
  Hobnobber:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    shortdesc: You are skilled at learning information through conversation. The Gather Information exploration activity takes you half as long as normal (typically reducing the time to 1 hour). If you're a master in Diplomacy and roll a critical failure to Gather Information, you get a failure instead. There is still no guarantee that a rumor you learn with Gather Information is accurate.
    prereq:
      level: 1
      skill: Diplomacy/trained
  Impressive Performance:
    feat_type:
      - Skill
      - General
    assoc_skill: Performance
    shortdesc: Your performances inspire admiration and win you fans. You can Make an Impression using Performance instead of Diplomacy. If you spend at least 10 minutes performing in front of an audience, you can Make an Impression targeting up to 10 members of the audience who were there for the whole performance, without taking the normal penalty. The number of targets increases to 20 for a 1-hour performance and 50 for a 2-hour performance.
    prereq:
      level: 1
      skill: Performance/trained
  Improvise Tool:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: "You can jury-rig solutions when you don't have the proper tools on hand. You can attempt to Repair damaged items without a repair kit.%r%rIf you have the raw materials available, you can Craft a basic caltrop set, *candle*, *compass*, *crowbar*, *fishing tackle*, *flint and steel*, *hammer*, ladder, *piton*, *rope*, *ten-foot pole*, replacement thieves picks, long tool or short tool, or *torch* as if you had their formulas."
    prereq:
      level: 1
      skill: Crafting/trained
  Inoculation:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    traits:
      - Healing
    shortdesc: "You have practice combating plague, and your patients are less likely to succumb to the same disease again for a time.%r%rWhen you successfully Treat a Disease on someone and they fully recover from the disease, they gain a +2 circumstance bonus to saving throws against that same disease for 1 week."
    prereq:
      level: 1
      skill: Medicine/trained
  Intimidating Glare:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: You can Demoralize with a mere glare. When you do, Demoralize loses the auditory trait and gains the visual trait, and you don't take a penalty if the creature doesn't understand your language.
    prereq:
      level: 1
      skill: Intimidation/trained
  Lengthy Diversion:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: When you critically succeed to Create a Diversion, you continue to remain hidden after the end of your turn. This effect lasts for an amount of time that depends on the diversion and situation, as determined by the GM (minimum 1 additional round).
    prereq:
      level: 1
      skill: Deception/trained
  Lie to Me:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: You can use Deception to weave traps to trip up anyone trying to deceive you. If you can engage in conversation with someone trying to Lie to you, use your Deception DC if it is higher than your Perception DC to determine whether they succeed. This doesn't apply if you don't have a back-and-forth dialogue, such as when someone attempts to Lie during a long speech.
    prereq:
      level: 1
      skill: Deception/trained
  Multilingual:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: "You easily pick up new languages. You learn two new languages, chosen from common languages, uncommon languages, and any others you have access to. You learn an additional language if you are or become a master in Society and again if you are or become legendary.%r%r**Special** You can select this feat multiple times. Each time, you learn additional languages."
    prereq:
      level: 1
      skill: Society/trained
  Natural Medicine:
    feat_type:
      - Skill
      - General
    assoc_skill: Nature
    shortdesc: "You can apply natural cures to heal your allies. You can use Nature instead of Medicine to Treat Wounds, including higher Nature proficiency letting you attempt more difficult checks. It doesn't replace Medicine for uses of the skill other than Treat Wounds or for feat prerequisites.%r%rIf you're in the wilderness, you might have easier access to fresh ingredients, allowing you to gain a +2 circumstance bonus to your check to Treat Wounds using Nature, subject to the GM's determination."
    prereq:
      level: 1
      skill: Nature/trained
  No Cause for Alarm:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    traits:
      - Auditory
      - Concentrate
      - Emotion
      - Linguistic
      - Mental
    shortdesc: "You attempt to reduce panic. Attempt a Diplomacy check, comparing it to the Will DC of creatures in a 10-ft emanation around you who are frightened. Each of them is temporarily immune for 1 hour.%r%r**Critical Success** Reduce the creature's frightened value by 2.%r**Success** Reduce the creature's frightened value by 1."
    prereq:
      level: 1
      skill: Diplomacy/trained
  Oddity Identification:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    shortdesc: When you become aware of a magical effect or see a spell being cast, you can immediately determine if it twists minds (with the mental trait), fights against fortune (with the fortune or misfortune trait), or reveals secrets (with the detection, prediction, revelation, or scrying traits). At the GM's discretion, similar effects can also fall into these categories. When you Identify Magic or Recall Knowledge to learn more about these effects, you can always use Occultism without penalty and gain a +2 circumstance bonus.
    prereq:
      level: 1
      skill: Occultism/trained
  Pickpocket:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: You can Steal or Palm an Object that's closely guarded, such as in a pocket, without taking the –5 penalty. You can't steal objects that would be extremely noticeable or time consuming to remove (like worn shoes or armor or actively wielded objects). If you're a master in Thievery, you can attempt to Steal from a creature in combat or otherwise on guard. When doing so, Stealing requires 2 actions instead of 1, and you take a –5 penalty.
    prereq:
      level: 1
      skill: Thievery/trained
  Pilgrim's Token:
    feat_type:
      - Skill
      - General
    assoc_skill: Religion
    shortdesc: "You carry a small token of protection from a site holy to your faith. You gain a wooden religious symbol for your deity for free. As long as this religious symbol is in your possession, when you tie an adversary's initiative roll, you go first.%r%rIf you lose this religious symbol, you must purchase or Craft a replacement and attune it. Such a token usually costs at least 1 sp, and the attunement takes 10 minutes of prayer. You can also attune a different religious symbol with the same amount of time, but you lose the benefit of the previous religious symbol."
    prereq:
      level: 1
      misc:
        - follower of a specific religion
      skill: Religion/trained
  Quick Coercion:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: You can bully others with just a few choice implications. You can Coerce a creature after 1 round of conversation instead of 1 minute. You still can't Coerce a creature in the midst of combat, or without engaging in a conversation.
    prereq:
      level: 1
      skill: Intimidation/trained
  Quick Identification:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Arcana
      - Nature
      - Occultism
      - Religion
    shortdesc: You can Identify Magic swiftly. You take only 1 minute when using Identify Magic to determine the properties of an item, ongoing effect, or location, rather than 10 minutes. If you're a master, it takes a 3-action activity, and if you're legendary, it takes 1 action.
    prereq:
      level: 1
      orskill:
        - Arcana/trained
        - Nature/trained
        - Occultism/trained
        - Religion/trained
  Quick Jump:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You can use High Jump and Long Jump as a single action instead of 2 actions. If you do, you don't perform the initial Stride (nor do you fail if you don't Stride 10 feet).
    prereq:
      level: 1
      skill: Athletics/trained
  Quick Repair:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: For you, the Repair activity loses the exploration trait and takes 1 minute instead of 10 minutes. If you're a master in Crafting, it takes 3 actions. If you're legendary, it takes 1 action.
    prereq:
      level: 1
      skill: Crafting/trained
  Quick Squeeze:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: You Squeeze 5 feet per round (10 feet on a critical success). If you're legendary in Acrobatics, you Squeeze at full Speed.
    prereq:
      level: 1
      skill: Acrobatics/trained
  Read Lips:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You can read lips of others nearby who you can clearly see. The language read must be one that you know. When you're at your leisure, you can do this automatically. In encounter mode or when attempting a more difficult feat of lipreading, you're Fascinated and off-guard during each round in which you focus on lip movements, and you must succeed at a Society check (DC determined by the GM) to successfully read someone's lips.
    prereq:
      level: 1
      skill: Society/trained
  Recognize Spell:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Arcana
      - Nature
      - Occultism
      - Religion
    traits:
      - Secret
    shortdesc: "If you are trained in the appropriate skill for the spell's tradition and it's a common spell of 2nd rank or lower, you automatically identify it (you still roll to attempt to get a critical success, but can't get a worse result than success). The highest rank of spell you automatically identify increases to 4 if you're an expert, 6 if you're a master, and 10 if you're legendary. The GM rolls a secret Arcana, Nature, Occultism, or Religion check, whichever corresponds to the tradition of the spell being cast. If you're not trained in the skill, you can't get a result better than failure.%r%r**Critical Success** You correctly recognize the spell and gain a +1 circumstance bonus to your saving throw or your AC against it.%r**Success** You correctly recognize the spell.%r**Failure** You fail to recognize the spell.%r**Critical Failure** You misidentify the spell as another spell entirely, of the GM's choice."
    prereq:
      level: 1
      orskill:
        - Arcana/trained
        - Nature/trained
        - Occultism/trained
        - Religion/trained
  Risky Surgery:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: "Your surgery can bring a patient back from the brink of death, but might push them over the edge. When you Treat Wounds, you can deal 1d8 slashing damage to your patient just before applying the effects of Treat Wounds.%r%rIf you do, you gain a +2 circumstance bonus to your Medicine check to Treat Wounds, and if you roll a success, you get a critical success instead."
    prereq:
      level: 1
      skill: Medicine/trained
  Root Magic:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    shortdesc: Your talismans ward against foul magic. During your daily preparations, you can assemble a small pouch with bits of herbs, hair, sacred oils, and other ritual ingredients, which you give to one ally; the ally cannot be yourself. The first time that day the ally attempts a saving throw against a spell or haunt, they gain a +1 circumstance bonus to the roll. This bonus increases to +2 if you're an expert in Occultism or +3 if you're legendary.
    prereq:
      level: 1
      skill: Occultism/trained
  Schooled in Secrets:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    shortdesc: "You notice the signs and symbols that members of mystery cults and other secret societies use to declare their affiliation to fellow members. You can use Occultism in place of Diplomacy to Gather Information about such groups and in place of Deception to Impersonate a member of these groups.%r%rIf you belong to a secret cult, lodge, sect, or similar organization, you automatically recognize members of your group unless they are specifically attempting to conceal their presence from you. They also recognize your standing unless you are specifically concealing it."
    prereq:
      level: 1
      skill: Occultism/trained
  Seasoned:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Alcohol Lore
      - Cooking Lore
      - Crafting
    shortdesc: You've mastered the preparation of many types of food and drink. You gain a +1 circumstance bonus to checks to Craft food and drink, including elixirs if you have Alchemical Crafting and potions if you have Magical Crafting. If you are a master in one of the prerequisite skills, this bonus increases to +2.
    prereq:
      level: 1
      orskill:
        - Alcohol Lore/trained
        - Cooking Lore/trained
        - Crafting/trained
  Sign Language:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: "You learn the sign languages associated with the languages you know, allowing you to sign and understand signs. Sign languages typically require both hands to convey more complex concepts, and they are visual rather than auditory.%r%rSign language is difficult to understand during combat due to the level of attention needed, unlike basic gestures like pointing at a foe to suggest a target. Sign language is hard to use in areas of low visibility, just like speech is difficult in a noisy environment."
    prereq:
      level: 1
      skill: Society/trained
  Skill Training:
    feat_type:
      - Skill
      - General
    grants:
      skill:
        - choice
    shortdesc: "You become trained in the skill of your choice.%r%r**Special** You can select this feat multiple times, choosing a new skill to become trained in each time."
    prereq:
      level: 1
      ability:
        - Intelligence/12
  Snare Crafting:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: You can use the Craft activity to create snares. When you select this feat, you add the formulas for four common 1st-level snares to your formula book.
    prereq:
      level: 1
      skill: Crafting/trained
  Specialty Crafting:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: "Your training focused on Crafting one particular kind of item. Select one of the specialties listed below; you gain a +1 circumstance bonus to Crafting checks to Craft items of that type. If you are a master in Crafting, this bonus increases to +2. If it's unclear whether the specialty applies, the GM decides. Some specialties might apply only partially. For example, if you were making a morningstar and had specialty in woodworking, the GM might give you half your bonus because the item requires both blacksmithing and woodworking.%r%rFor more information, see the wiki."
    prereq:
      level: 1
      skill: Crafting/trained
  Steady Balance:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: You can keep your balance easily, even in adverse conditions. Whenever you roll a success using the Balance action, you get a critical success instead. You're not off-guard while attempting to Balance on narrow surfaces and uneven ground.
    prereq:
      level: 1
      skill: Acrobatics/trained
  Streetwise:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You know about life on the streets and feel the pulse of your local settlement. You can use your Society modifier instead of your Diplomacy modifier to Gather Information. In any settlement you frequent regularly, you can use the Recall Knowledge action with Society to know the same sorts of information that you could discover with Diplomacy to Gather Information. The DC is usually significantly higher, but you know the information without spending time gathering it. If you fail to recall the information, you can still subsequently attempt to Gather Information normally.
    prereq:
      level: 1
      skill: Society/trained
  Student of the Canon:
    feat_type:
      - Skill
      - General
    assoc_skill: Religion
    shortdesc: You've researched many faiths enough to recognize notions about them that are unlikely to be true. If you roll a critical failure at a Religion check to Decipher Writing of a religious nature or to Recall Knowledge about the tenets of faiths, you get a failure instead. When attempting to Recall Knowledge about the tenets of your own faith, if you roll a failure, you get a success instead, and if you roll a success, you get a critical success instead.
    prereq:
      level: 1
      skill: Religion/trained
  Subtle Theft:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: When you successfully Steal something, observers (creatures other than the creature you stole from) take a –2 circumstance penalty to their Perception DCs to detect your theft. Additionally, if you first Create a Diversion using Deception, taking a single Palm an Object or Steal action doesn't end your undetected condition.
    prereq:
      level: 1
      skill: Thievery/trained
  Survey Wildlife:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: You can study details in the wilderness to determine the presence of nearby creatures. You can spend 10 minutes assessing the area around you to find out what creatures are nearby, based on nests, scat, and marks on vegetation. Attempt a Survival check against a DC determined by the GM based on how obvious the signs are. On a success, you can attempt a Recall Knowledge check with a –2 penalty to learn more about the creatures just from these signs. If you're a master in Survival, you don't take the penalty.
    prereq:
      level: 1
      skill: Survival/trained
  Terrain Expertise:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: "Your experience in navigating a certain type of terrain makes you supremely confident while doing so. You gain a +1 circumstance bonus to Survival checks in one of the following types of terrain, chosen when you select this feat: aquatic, arctic, desert, forest, mountain, plains, sky, swamp, or underground.%r%r**Special** You can select this feat more than once, choosing a different type of terrain each time."
    prereq:
      level: 1
      skill: Survival/trained
  Terrain Stalker:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: "Select one type of difficult terrain from the following list: rubble, snow, or underbrush. While undetected by all non-allies in that type of terrain, you can Sneak without attempting a Stealth check as long as you move no more than 5 feet and do not pass within 10 feet of an enemy during your movement.%r%rDuring exploration, this also allows you to automatically approach within 15 feet of other creatures while Avoiding their Notice, as long as they aren't actively Searching or on guard.%r%r**Special** You can select this feat multiple times. Each time, choose a different type of terrain."
    prereq:
      level: 1
      skill: Stealth/trained
  Titan Wrestler:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You can attempt to Disarm, Grapple, Reposition, Shove, or Trip creatures up to two sizes larger than you, or up to three sizes larger than you if you're legendary in Athletics.
    prereq:
      level: 1
      skill: Athletics/trained
  Train Animal:
    feat_type:
      - Skill
      - General
    assoc_skill: Nature
    traits:
      - Downtime
      - Manipulate
    shortdesc: "You spend time teaching an animal to do a certain action. You can either select a basic action the animal already knows how to do (typically those listed in the Command an Animal action) or attempt to teach the animal a new basic action. The GM determines the DC of any check required and the amount of time the training takes (usually at least a week). It's usually impossible to teach an animal a trick that uses critical thinking. If you're expert, master, or legendary in Nature, you might be able to train more unusual creatures, at the GM's discretion.%r%r**Success** The animal learns the action. If it was an action the animal already knew, you can Command the Animal to take that action without attempting a Nature check. If it was a new basic action, add that action to the actions the animal can take when Commanded, but you must still roll.%r**Failure** The animal doesn't learn the trick."
    prereq:
      level: 1
      skill: Nature/trained
  Trick Magic Item:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Arcana
      - Nature
      - Occultism
      - Religion
    traits:
      - Manipulate
    shortdesc: "You examine a magic item you normally couldn't use in an effort to fool it and activate it temporarily. For example, this might allow a fighter to cast a spell from a wand or allow a wizard to cast a spell that's not on the arcane list using a scroll. You must know what activating the item does, or you can't attempt to trick it.%r%rAttempt a check using the skill matching the item's magic tradition, or matching a tradition that has the spell on its list, if you're trying to cast a spell from the item. The relevant skills are Arcana for arcane, Nature for primal, Occultism for occult, Religion for divine, or any of the four for an item that has the magical trait and not a tradition trait. The GM determines the DC based on the item's level (possibly adjusted depending on the item or situation).%r%rIf you activate a magic item that requires a spell attack modifier or spell DC and you don't have proficiency in the relevant statistic, use your level as your proficiency bonus and the highest of your Intelligence, Wisdom, or Charisma modifiers. If you're a master in the appropriate skill for the item's tradition, you instead use the trained proficiency bonus; if you're legendary, you instead use the expert proficiency bonus.%r%r**Success** For the rest of the current turn, you can spend actions to activate the item as if you could normally use it.%r**Failure** You can't use the item or try to trick it again this turn, but you can try again on subsequent turns.%r**Critical Failure** You can't use the item, and you can't try to trick it again until your next daily preparations."
    prereq:
      level: 1
      orskill:
        - Arcana/trained
        - Nature/trained
        - Occultism/trained
        - Religion/trained
  Underwater Marauder:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You've learned to fight underwater. You are not off-guard while in water, and you don't take the usual penalties for using a bludgeoning or slashing melee weapon in water.
    prereq:
      level: 1
      skill: Athletics/trained
  Virtuosic Performer:
    feat_type:
      - Skill
      - General
    assoc_skill: Performance
    shortdesc: "You have exceptional talent with one type of performance. You gain a +1 circumstance bonus when making a certain type of performance. If you are a master in Performance, this bonus increases to +2. Select one of the following specialties and apply the bonus when attempting Performance checks of that type. If it's unclear whether the specialty applies, the GM decides.%r%rFor more information, see the wiki."
    prereq:
      level: 1
      skill: Performance/trained
  # Level 2 Feats
  Armored Stealth:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: "You have learned techniques to adjust and modify your armor and movements to reduce the noise you make.%r%rWhen you wear non-noisy armor with which you are trained, your penalty to Stealth checks is reduced by 1 (to a minimum penalty of 0). If you're a master in Stealth, reduce the penalty by 2, and if you're legendary, reduce the penalty by 3.%r%rIf your armor has the noisy trait, instead of reducing the penalty to Stealth checks, you ignore the effects of the noisy trait, enabling you to remove the penalty with a sufficient Strength score as normal."
    prereq:
      level: 2
      skill: Stealth/expert
  Assured Identification:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Arcana
      - Nature
      - Occultism
      - Religion
    shortdesc: You rarely misidentify an item. When using Arcana, Nature, Occultism, or Religion checks to Identify Magic, if you roll a critical failure, you get a failure instead. If you would misidentify a cursed item because you roll a success but not a critical success, you simply can't identify it instead.
    prereq:
      level: 2
      orskill:
        - Arcana/expert
        - Nature/expert
        - Occultism/expert
        - Religion/expert
  Automatic Knowledge:
    feat_type:
      - Skill
      - General
    assoc_skill: A Skill With The Recall Knowledge Action
    shortdesc: "You know basic facts off the top of your head. Choose a skill you're an expert in that has the Recall Knowledge action and for which you have the Assurance feat. You can use the Recall Knowledge action with that skill as a free action once per round. If you do, you must use Assurance on the skill check.%r%r**Special** You can select this feat multiple times, choosing a different skill each time. You can use Automatic Knowledge with any skills you have chosen, but you can still use Automatic Knowledge only once per round."
    prereq:
      level: 2
      feat:
        - Assurance in that skill
      skill: A Skill With The Recall Knowledge Action/expert
  Backup Disguise:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: You have a specific disguise that you keep at the ready, worn underneath your outer garment. You can change into this disguise to Impersonate as a 3-action activity. If you are a master in Deception, it is instead a 2-action activity, and if you are legendary in Deception, it is a single action. You can create a new backup disguise by spending the normal amount of time it takes you to Impersonate, but you can have only one backup disguise at a time. Having a backup disguise doesn't allow you to remove your armor or any other complex piece of clothing any more quickly, but once you have those off, the disguise is readily available. Because you have the backup disguise at the ready, it's possible that a thorough search might reveal some elements of the disguise (see Conceal an Object in the Stealth skill).
    prereq:
      level: 2
      skill: Deception/expert
  Battle Planner:
    feat_type:
      - Skill
      - General
    assoc_skill: Warfare Lore
    shortdesc: "You are constantly drawing up plans and battle scenarios, assembling strategies and gathered intelligence for later use. When you scout an enemy's position or receive a detailed report from an ally who scouted the enemy's position, if you have a clear indication of the number, position, and identities of your potential foes, you can spend 1 minute to come up with a battle plan that takes such potential factors into account and reduces the role luck plays in the equation.%r%rRoll a Warfare Lore check. As long as the information was accurate and remains accurate when you roll initiative against those enemies, you can use the Warfare Lore result you previously rolled for your initiative roll; if you do, this is a fortune effect."
    prereq:
      level: 2
      skill: Warfare Lore/expert
  Bonded Animal:
    feat_type:
      - Skill
      - General
    assoc_skill: Nature
    traits:
      - Downtime
    shortdesc: "You forge strong connections with animals. You can spend 7 days of downtime regularly interacting with a normal animal (not a companion or other special animal) that is friendly or helpful to you. After this duration, attempt a Nature check against the animal's Will DC. If successful, you bond with the animal. The animal is permanently bonded to you until you form a bond with a different animal or do something egregious to break your bond.%r%rA helpful animal is easier to direct. If your bonded animal is level –1, it gains the minion trait, allowing you to command it more efficiently. The maximum level of creature that can be your minion increases to 3 if you're a master in Nature and to 11 if you're legendary.%r%r**Special** You can't have both a bonded animal and an animal companion (though you can have both a bonded animal and a pet or familiar)."
    prereq:
      level: 2
      skill: Nature/expert
  Confabulator:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: Even when caught in falsehoods, you pile lie upon lie. Reduce the circumstance bonus a target gains for your previous attempts to Create a Diversion or Lie to it from +4 to +2. If you're a master in Deception, reduce the bonus to +1, and if you're legendary, your targets don't get these bonuses at all.
    prereq:
      level: 2
      skill: Deception/expert
  Continual Recovery:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: You zealously monitor a patient's progress to administer treatment faster. When you Treat Wounds, your patient becomes immune for only 10 minutes instead of 1 hour. This applies only to your Treat Wounds activities, not any other the patient receives.
    prereq:
      level: 2
      skill: Medicine/expert
  Discreet Inquiry:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Deception
      - Diplomacy
    shortdesc: "You are subtle in your efforts to learn the things you need to know.%r%rWhen Gather Information, you can hide the true subject of your inquiry among other topics of little interest to you without increasing the difficulty of the check or taking more time to Gather Information.%r%rAnyone trying to Gather Information to determine if someone else was asking around about the topic in question must exceed your Deception DC or the normal DC to Gather Information about your inquiries, whichever is higher, or else they don't learn of your efforts."
    prereq:
      level: 2
      orskill:
        - Deception/expert
        - Diplomacy/expert
  Distracting Performance:
    feat_type:
      - Skill
      - General
    assoc_skill: Performance
    shortdesc: Your performances are especially distracting, allowing your allies to Sneak away with ease. You Create a Diversion, except you roll a Performance check instead of Deception, and the benefits of successful checks apply to an ally of your choice instead of you. The effects of a success last until the end of that ally's turn, and can end early based on the ally's actions. You don't need to be observing your ally or know where they are, but you need to know they're present to choose them.
    prereq:
      level: 2
      skill: Performance/expert
  Exhort the Faithful:
    feat_type:
      - Skill
      - General
    assoc_skill: Religion
    shortdesc: "Your knowledge of the tenets of your faith gives you insight into the best ways to get others of your faith to help you or to follow your directions.%r%rWhen you Request something of or Coerce members of your own faith, you can attempt a Religion check instead of Diplomacy or Intimidation, and you gain a +2 circumstance bonus to the check. On a critically failed attempt to make a Request, the target's attitude toward you doesn't worsen."
    prereq:
      level: 2
      misc:
        - follower of a specific religion
      skill: Religion/expert
  Eyes of the City:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Diplomacy
      - Society
    shortdesc: You can track down targets with the help of locals. You can use Diplomacy or Society, whichever you're trained in, to Track creatures in settlements. You chat with locals to help follow the trail of creatures you Track. At the GM's discretion, there might not be enough people to speak with to keep following the trail.
    prereq:
      level: 2
      orskill:
        - Diplomacy/trained
        - Society/trained
  Glad-Hand:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    shortdesc: First impressions are your strong suit. When you meet someone in a casual or social situation, you can immediately attempt a Diplomacy check to Make an Impression on that creature rather than needing to converse for 1 minute. If you fail, you can engage in 1 minute of conversation and attempt a new check at the end of that time rather than accepting the failure or critical failure result.
    prereq:
      level: 2
      skill: Diplomacy/expert
  Intimidating Prowess:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: In situations where you can physically menace the target when you Coerce or Demoralize, you gain a +1 circumstance bonus to your Intimidation check and you ignore the penalty for not sharing a language. If your Strength modifier is +5 or higher and you are a master in Intimidation, this bonus increases to +2.
    prereq:
      level: 2
      ability:
        - Strength/16
      skill: Intimidation/expert
  Lasting Coercion:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: When you successfully Coerce someone, the maximum time they comply increases to a week, still determined by the GM. If you're legendary, the maximum increases to a month.
    prereq:
      level: 2
      skill: Intimidation/expert
  Lead Climber:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: When climbing, you can prepare routes for others to follow, and you can pull your allies up to avoid disaster. When your allies attempt to Climb a route you set using the Follow the Expert exploration activity, if any of them critically fail their checks to Climb, you can attempt an Athletics check against the same DC. If you succeed, your ally only fails instead of critically failing. If you also critically fail, you both experience the consequences of the critical failure.
    prereq:
      level: 2
      skill: Athletics/expert
  Leverage Connections:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You know the right people who can get things done for you in certain circles. Once per week, when you're in an area that has an established group of influential nobles, mercantile elites, or the like (if you have Courtly Graces), or a network of unsavory characters such as a thieves' guild (if you have Streetwise), you can use Society to Request a favor or aid from those people as if they were friendly to you. Your request must make sense for the type of people you contact. For instance, a member of the royal court could secure you a proper invitation to a fancy ball, while a local burglar could point out a way to stealthily infiltrate that same party. If you critically succeed this check, your connection gives a piece of helpful advice or lets you in on a small secret, granting you or a member of your party a +2 circumstance bonus to the first skill check you attempt when acting on the favor. If you critically fail this check, you might have to perform some service for your connection to get back in their good graces, as determined by the GM.
    prereq:
      level: 2
      orfeat:
        - Courtly Graces
        - Streetwise
      skill: Society/expert
    uncommon: True
  Magical Crafting:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: You can Craft magic items, though some have other requirements. When you select this feat, you gain formulas for four common magic items of 2nd level or lower.
    prereq:
      level: 2
      skill: Crafting/expert
  Nimble Crawl:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: You can Crawl incredibly swiftly—up to half your Speed, rather than 5 feet. If you're a master in Acrobatics, you can Crawl at full Speed, and if you're legendary, you aren't off-guard while prone.
    prereq:
      level: 2
      skill: Acrobatics/expert
  Powerful Leap:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You can jump 5 feet up with a vertical Leap without making a High Jump. You also increase the horizontal distance when you Leap, including as part of a High Jump or Long Jump, by 5 feet.
    prereq:
      level: 2
      skill: Athletics/expert
  Quick Disguise:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: You can set up a disguise in one-tenth the usual time (generally 1 minute). If you're a master in Deception, you can create a full disguise and Impersonate as a 3-action activity. If you're legendary, it takes a single action.
    prereq:
      level: 2
      skill: Deception/expert
  Quiet Allies:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: You're skilled at moving with a group. When you are Avoiding Notice and your allies Follow the Expert, you and those allies can roll a single Stealth check, using the lowest modifier, instead of rolling separately. This doesn't apply for initiative rolls.
    prereq:
      level: 2
      skill: Stealth/expert
  Rapid Mantel:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You easily pull yourself onto ledges. When you Grab an Edge, you can pull yourself onto that surface and stand. You can use Athletics instead of a Reflex save to Grab an Edge. If you Climb or Leap to within 5 feet beneath the top of an edge, you can pull yourself onto the surface and stand as part of that action.
    prereq:
      level: 2
      skill: Athletics/expert
  Robust Recovery:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: You learned folk medicine to help recover from diseases and poison, and using it diligently has made you especially resilient. When you Treat a Disease or a Poison, or someone else uses one of these actions on you, increase the circumstance bonus granted on a success to +4, and if the result of the patient's saving throw is a success, the patient gets a critical success.
    prereq:
      level: 2
      skill: Medicine/expert
  Rolling Landing:
    feat_type:
      - Skill
      - General
    shortdesc: You land with quick rolls that help you keep your momentum. If you fall more than 5 feet and don't take damage (usually due to treating the fall as a shorter distance), you can use your reaction to immediately enter a short roll when you land and Step. If you are an expert in Acrobatics, you can use your reaction to Step or Stride up to half your Speed. If you're a master in Acrobatics, you can use your reaction to Step or Stride up to your full Speed. If you're legendary in Acrobatics, you don't trigger reactions triggered by movement when you Stride in this way.
    prereq:
      level: 2
      feat:
        - Cat Fall
  Sanctify Water:
    feat_type:
      - Skill
      - General
    assoc_skill: Religion
    shortdesc: You imbue water with your deity's blessing. Choose a container of water with light Bulk possessed by you or an ally within your reach. Until the end of your next turn, it becomes holy water or unholy water. You can choose holy water if your deity allows holy sanctification, unholy water if your deity allows unholy sanctification, or either if your deity allows both sanctifications. This is a temporary effect and doesn't impart monetary value or allow the water to be used for costs of rituals or the like. If you're a master in Religion, you can sanctify two containers when you take this action, and if you're legendary, you can sanctify three.
    prereq:
      level: 2
      misc:
        - must worship a deity that lists "holy" or "unholy" in their sanctification
      skill: Religion/expert
  Shadow Mark:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: "You have learned special tricks that help you follow individuals without them noticing you.%r%rWhen you attempt a Stealth check to Avoid Notice while following a specific target, the target takes a -2 circumstance penalty to their Perception DC. If you have master proficiency in Stealth, the penalty is -3 or -4 if you're legendary.%r%rIf you start an encounter with the target while shadowing them, the target takes this penalty to their initiative roll and to their Perception DC to determine if they notice you, as normal for Sneak."
    prereq:
      level: 2
      skill: Stealth/expert
  Slippery Prey:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Acrobatics
      - Athletics
    shortdesc: You're able to escape bonds more easily than others. When you attempt to Escape using Acrobatics or Athletics, you reduce the multiple attack penalty for repeated attempts to –4 and –8 if you're trained in the skill. The penalty becomes –3 and –6 if you're a master in the appropriate skill. If you're legendary in the skill, you don't take penalties for multiple Escape attempts in the same turn. Regardless of your training, your attempts to Escape still have the attack trait and incur a multiple attack penalty with other actions.
    prereq:
      level: 2
      orskill:
        - Acrobatics/trained
        - Athletics/trained
  Terrifying Resistance:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: The spells of those you have Demoralize are less effective on you. If you succeed in Demoralizing a creature, for the next 24 hours you gain a +1 circumstance bonus to saving throws against that creature's spells.
    prereq:
      level: 2
      skill: Intimidation/expert
  Tumbling Teamwork:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: Your tumbling distracts a foe enough to create an advantage for one of your allies. When you successfully Tumble Through an enemy's space, an ally who is adjacent to that enemy can Step as a reaction, but they must remain adjacent to that enemy.
    prereq:
      level: 2
      skill: Acrobatics/expert
  Underground Network:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: "You're connected to groups that know what's going on in the streets, and you can get information out of them quickly. When you use Society to Gather Information in an area where you have a network (typically a settlement where you've spent at least a week or spent a day of downtime to build a network faster), you can contact a member of these groups to get information directly from them. This usually takes about an hour, and it doesn't draw as much attention as Gathering Information in public might. The check and information gained otherwise follow the normal rules for Gather Information.%r%rIn addition, if you have successfully consulted the underground network, you get a +1 circumstance bonus to the next check to Recall Knowledge you attempt about the subject you were Gathering Information on, or a +2 circumstance bonus if you're using Underworld Lore for the check. The GM might change the Lore skill related to the network depending on your location or the specifics of the network you're tapping into."
    prereq:
      level: 2
      feat:
        - Streetwise
      skill: Society/expert
    uncommon: True
  Unmistakable Lore:
    feat_type:
      - Skill
      - General
    assoc_skill: Lore
    shortdesc: You never get information about your areas of expertise wrong. When you Recall Knowledge using any Lore subcategory in which you're trained, if you roll a critical failure, you get a failure instead. If you're a master in a Lore subcategory, on a critical success, you gain even more information or context than usual.
    prereq:
      level: 2
      skill: Lore/expert
  Unusual Treatment:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: Your medical training extends to less obvious conditions. When you succeed against a DC 20 check to Treat Wounds, you can also reduce the value of one clumsy, enfeebled, or stupefied condition on the patient by 1. If you're able to treat more than one creature at once, choose only one to gain this benefit. A creature can benefit from Unusual Treatment only once per day. If the condition results from an affliction, the affliction isn't cured, though the condition is reduced as long as the affliction remains at that stage. If you are a master in Medicine, add the drained condition to the list of conditions you can remove if you succeed at a DC 30 check. If you are legendary in Medicine, you reduce the chosen condition by 2 instead of by 1.
    prereq:
      level: 2
      skill: Medicine/expert
  Ward Medic:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: You've studied in large medical wards, treating several patients at once and tending to all their needs. When you use Treat Disease or Treat Wounds, you can treat up to two targets. If you're a master in Medicine, you can treat up to four targets, and if you're legendary, you can treat up to eight targets.
    prereq:
      level: 2
      skill: Medicine/expert
  Wary Disarmament:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: If you trigger a device or set off a trap while disarming it, you gain a +2 circumstance bonus to your AC or saving throw against the device or trap. This applies only to attacks or effects triggered by your failed attempt, not to any later ones, such as additional attacks from a complex trap.
    prereq:
      level: 2
      skill: Thievery/expert
  # Level 7 Feats
  Advanced First Aid:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    traits:
      - Healing
      - Manipulate
    shortdesc: You use your medical training to ameliorate sickness or assuage fears. When you use Medicine to Administer First Aid, instead of Stabilizing a character or Stopping Bleeding, you can reduce an ally's frightened or sickened condition by 2, or remove either of those conditions entirely on a critical success. You can remove only one condition at a time. The DC for the Medicine check is usually the DC of the effect that caused the condition.
    prereq:
      level: 7
      skill: Medicine/master
  Aerobatics Mastery:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: "You move with grace in flight and can perform amazing aerial stunts.%r%rYou gain a +2 circumstance bonus to Acrobatics checks to Maneuver in Flight and can combine two maneuvers into a single action, such as reversing direction while making a steep ascent or descent or hovering in gale-force winds. The DC of the Acrobatics check is equal to the DC of the most difficult maneuver + 5.%r%rIf you're legendary in Acrobatics, you can combine three such maneuvers into a single action; the DC of the Acrobatics check is equal to the DC of the most difficult maneuver + 10. Regardless of the combination, these maneuvers rarely allow you to move farther than your Fly Speed."
    prereq:
      level: 7
      skill: Acrobatics/master
  Battle Cry:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: When you roll initiative, you can yell a mighty battle cry and Demoralize an observed foe as a free action. If you're legendary in Intimidation, you can use a reaction to Demoralize your foe when you critically succeed at an attack roll.
    prereq:
      level: 7
      skill: Intimidation/master
  Biographical Eye:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    traits:
      - Secret
    shortdesc: "In even a brief conversation or social interaction, you pick up on subtle social and visual cues to learn a great deal about a person's origin and history. You might notice bits of green under the person's fingernails and determine they're an herbalist, spy a pin indicating their membership in a secret society, or something similar. You pick up on only details that have to do with their societal role, so you might learn the city district where a vampire lives, but wouldn't learn any of their weaknesses, nor necessarily even that they are a vampire. Spend 1 minute in the presence of someone you haven't met before, or haven't met since you first gained Biographical Eye, then attempt a DC 30 Society check. You gain a +1 circumstance bonus to the check if you engaged the person in conversation during this time. If the person is deliberately trying to conceal their nature or present a false identity, you learn about their false biography rather than their true one unless the result of your Society check exceeds their Will DC.%r%r**Critical Success** You learn the creature's profession, their specialty within that profession, and a major accomplishment or controversy from their career. You also learn the nation and settlement where they live, as well as the district in a city large enough to have districts. In addition, you learn the nation or settlement where they spent their formative years.%r**Success** You learn the creature's profession and specialty within that profession. You learn the nation or settlement where they normally live.%r**Failure** You learn the creature's profession and the region of the world they hail from, but no more.%r**Critical Failure** You learn a piece of erroneous information about the creature."
    prereq:
      level: 7
      skill: Society/master
  Bizarre Magic:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    shortdesc: You can draw upon strange variations in your spellcasting, whether or not you can cast occult spells. The DCs to Recognize Spells you cast and Identify Magic you use increase by 5.
    prereq:
      level: 7
      skill: Occultism/master
  Break Curse:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Occultism
      - Religion
    traits:
      - Concentrate
      - Exploration
      - Healing
    shortdesc: You spend 8 hours praying or performing occult rites over the target, weakening a curse's power over them. Attempt to counteract the curse, using Occult or Religion for your counteract check and half your level rounded up for the counteract rank. Break Curse only takes 10 minutes of prayer and rites if you are legendary in Occultism or Religion.
    prereq:
      level: 7
      orskill:
        - Occultism/master
        - Religion/master
  Consult the Spirits:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Nature
      - Occultism
      - Religion
    traits:
      - Secret
    shortdesc: "You have learned rites or meditations that enable you to perceive minor, invisible spirits within a place. Choose Nature, Occultism, or Religion when you select this feat. Nature allows you to contact the spirits of nature that form leshies, who are born of pure life essence rather than spiritual energy and can answer questions about natural features like the location of nearby water or plant life. Religion reveals the presence of angelic, demonic, or other spirits in service to divine beings, who provide information about sources of powerful life energy or energy from the Void; sacred or profane influences; or the presence of undead. Occultism allows you to contact lingering spirits, psychic echoes of the departed dead, and spirits from beyond reality, who tell you about things like strange auras, effects, or the presence of unnatural occult beings. Spend 10 minutes and attempt a check to Recall Knowledge with the chosen skill; the DC is determined by the GM (usually a very high DC for the level of the highest-level creature you might encounter in the area). If you're legendary in the chosen skill, you can use this feat once per hour, instead of only once per day, but you can't use it again on any area that overlaps a previous area.%r%r**Critical Success** The spirits reveal themselves to you and have a helpful attitude toward you. Only you can perceive these spirits. They answer three simple questions about the environment within 100 feet of you, depending on the skill you chose and thus the type of spirits you contact. Their answers are almost always a single word, and their knowledge is limited to within their area of interest.%r**Success** As with a critical success, but the spirits are indifferent to you and answer only one question.%r**Failure** You are unable to contact the spirits of this place.%r**Critical Failure** You contact one or more malevolent spirits. They are hostile toward you, though they may not immediately appear so. They answer up to three questions but give you information that is harmful to you in some way, as determined by the GM.%r%r**Special** You can select this feat multiple times, each time picking a different skill in which you have the master proficiency rank. You can use this feat with each skill once per day (or once per hour, if you're legendary)."
    prereq:
      level: 7
      orskill:
        - Nature/master
        - Occultism/master
        - Religion/master
  Disturbing Knowledge:
    feat_type:
      - Skill
      - General
    assoc_skill: Occultism
    traits:
      - Emotion
      - Fear
      - Mental
    shortdesc: "You utter a litany of dreadful names, prophecies, and descriptions of realms beyond mortal comprehension, drawn from your study of forbidden tomes and scrolls. Even those who don't understand your language are unsettled by these dire secrets.%r%rAttempt an Occultism check and compare the result to the Will DC of an enemy within 30 feet, or to the Will DCs of any number of enemies within 30 feet if you are legendary in Occultism. Those creatures are temporarily immune for 24 hours.%r%r**Critical Success** The target becomes confused for 1 round and frightened 1.%r**Success** The target becomes frightened 1.%r**Failure** The target is unaffected.%r**Critical Failure** You get overly caught up in your own words and become frightened 1."
    prereq:
      level: 7
      skill: Occultism/master
  Doublespeak:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: "You are skilled at saying one thing while meaning something different. You disguise your true meaning behind other words and phrases, relying on subtle emphasis and shared experience to convey meaning that only your allies understand.%r%rAny allies who have traveled alongside you for at least 1 full week automatically discern your meaning. Other observers must succeed at a Perception check against your Deception DC to realize you are passing a secret message, and they must critically succeed to understand the message itself."
    prereq:
      level: 7
      skill: Deception/master
  Environmental Guide:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: You can rapidly adapt to climates and help others do the same. After an hour in an environment, you and up to five allies can treat the natural temperature effects of an environment as one step less severe (treat extreme cold as severe cold or extreme heat as severe heat, for instance). This reduction in severity is cumulative with any equipment (such as cold-weather gear) or spells (such as environmental endurance). If you're legendary in Survival, you may protect yourself and up to five allies, and you treat temperature effects as two steps less severe.
    prereq:
      level: 7
      skill: Survival/master
  Evangelize:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    traits:
      - Auditory
      - Linguistic
      - Mental
    shortdesc: "You point out a detail that incontrovertibly supports your faith, causing a listener's mind to whirl. Attempt a Diplomacy check and compare the result to the Will DC of a single target that can hear you and understands your language; that target is then temporarily immune to Evangelize with respect to your deity or philosophy for 1 day. A creature that already agrees with you is unaffected, and at the GM's discretion, a target that genuinely changes its perspective to support your faith as a result of the argument is also otherwise unaffected.%r%r**Critical Success** The target is stupefied 2 for 1 round.%r**Success** The target is stupefied 1 for 1 round.%r**Failure** The target is unaffected."
    prereq:
      level: 7
      misc:
        - follower of a specific religion or philosophy
      skill: Diplomacy/master
  Foil Senses:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: You are adept at foiling creatures' special senses and cautious enough to safeguard against them at all times. Whenever you use the Avoid Notice, Hide, or Sneak actions, you are always considered to be taking precautions against special senses.
    prereq:
      level: 7
      skill: Stealth/master
  Influence Nature:
    feat_type:
      - Skill
      - General
    assoc_skill: Nature
    traits:
      - Downtime
    shortdesc: "With patience and time, you can make bird calls, leave game trails, and ultimately influence the behavior of a certain type of animals in the region to favor and even aid you in the days to come.%r%rThe GM determines the DC of any check required and the amount of time your work requires (usually at least a day or two of downtime). While you can't directly control how you've influenced nature, you can hope for certain effects, such as easier hunts or birds falling silent whenever danger is approaching.%r%rIf you're legendary in Nature, you can elicit these same adjustments to animal behavior in the area by spending only 10 minutes."
    prereq:
      level: 7
      skill: Nature/master
  Kip Up:
    feat_type:
      - Skill
      - General
    assoc_skill: Acrobatics
    shortdesc: You stand up. This movement doesn't trigger reactions.
    prereq:
      level: 7
      skill: Acrobatics/master
  Planar Survival:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: You can Subsist using Survival on different planes, even those without resources or natural phenomena you normally need. For instance, you can forage for food without penalty even if the plane lacks food that could normally sustain you. A success on your check to Subsist also prevents damage done by the plane to you and anyone else you support with Subsist. This applies only to damage dealt by the general conditions of the plane, not smaller hazards.
    prereq:
      level: 7
      skill: Survival/master
  Quick Climb:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: When Climbing, you move 5 more feet on a success and 10 more feet on a critical success, up to your Speed. If you're legendary in Athletics, you gain a climb Speed equal to your Speed.
    prereq:
      level: 7
      skill: Athletics/master
  Quick Recognition:
    feat_type:
      - Skill
      - General
    assoc_skill:
      - Arcana
      - Nature
      - Occultism
      - Religion
    shortdesc: You Recognize Spells swiftly. Once per round, you can Recognize a Spell using a skill in which you're a master as a free action.
    prereq:
      level: 7
      feat:
        - Recognize Spell
      orskill:
        - Arcana/master
        - Nature/master
        - Occultism/master
        - Religion/master
  Quick Swim:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: You Swim 5 feet farther on a success and 10 feet farther on a critical success, to a maximum of your Speed. If you're legendary in Athletics, you gain a swim Speed equal to your Speed.
    prereq:
      level: 7
      skill: Athletics/master
  Quick Unlock:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: You can Pick a Lock using 1 action instead of 2.
    prereq:
      level: 7
      skill: Thievery/master
  Rapid Affixture:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: You take only 1 minute to Affix a Talisman. If you're legendary in Crafting, you can Affix a Talisman as a 3-action activity.
    prereq:
      level: 7
      skill: Crafting/master
  Shameless Request:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    shortdesc: You can downplay the consequences or outrageousness of your requests using sheer brazenness and charm. When you Request something, you reduce any DC increases for making an outrageous request by 2, and if you roll a critical failure for your Request, you get a failure instead. While this means you can never cause your target to reduce their attitude toward you by making a Request, they eventually tire of requests, even though they still have a positive attitude toward you.
    prereq:
      level: 7
      skill: Diplomacy/master
  Slippery Secrets:
    feat_type:
      - Skill
      - General
    assoc_skill: Deception
    shortdesc: You elude and evade attempts to uncover your true nature or intentions. When a spell or magical effect tries to read your mind, detect whether you are lying, or reveal your identity, you can attempt a Deception check against the spell or effect's DC. If you succeed, the effect reveals nothing.
    prereq:
      level: 7
      skill: Deception/master
  Swift Sneak:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: You can move your full Speed when you Sneak. You can use Swift Sneak while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type.
    prereq:
      level: 7
      skill: Stealth/master
  Terrified Retreat:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    shortdesc: When you critically succeed at the Demoralize action, if the target's level is lower than yours, the target is fleeing for 1 round.
    prereq:
      level: 7
      skill: Intimidation/master
  Tumbling Theft:
    feat_type:
      - Skill
      - General
    assoc_skill: 
      - Acrobatics 
      - Thievery
    shortdesc: You reach for an opponent's item as you move past a foe. If you critically succeed at your check to Tumble Through an enemy's space, you can attempt to Steal something from the enemy as a reaction. You gain a +1 circumstance bonus to your Thievery check to Steal as your tumbling make it difficult for your enemy to keep track of your movement. You can Steal any immediately accessible item of light or negligible Bulk on the enemy's person, such as a potion or coin purse hanging from a belt, but not anything inside a container or anything the enemy is holding. The GM has final say on what you can Steal.
    prereq:
      level: 7
      skill: 
      - Acrobatics/expert
      - Thievery/expert
  Wall Jump:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: "You can use your momentum from a jump to propel yourself off a wall. If you're adjacent to a wall at the end of a jump (whether performing a High Jump, Long Jump, or Leap), you don't fall as long as your next action is another jump. Your previous jump gives you momentum, letting you use High Jump or Long Jump as a single action, but you don't get to Stride as part of the activity.%r%rYou can use Wall Jump only once in a turn, unless you're legendary in Athletics, in which case you can use it as many times as you can use consecutive jump actions in that turn."
    prereq:
      level: 7
      skill: Athletics/master
  Water Sprint:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: "Experience and training have taught you that water has just enough surface tension for a master sprinter to traverse the surface.%r%rWhen you Stride in a straight line, if you move at least half your Speed over ground, you can move any amount of the remaining distance across a level body of water. If you don't end your Stride on solid ground, you fall into the water.%r%rIf you're legendary in Athletics, as long as you start on solid ground, any part of your Stride can cross the water's surface, even if you aren't moving a straight line, though you still fall into the water if you don't end your movement on solid ground."
    prereq:
      level: 7
      skill: Athletics/master
  # Level 15 Feats
  Cloud Jump:
    feat_type:
      - Skill
      - General
    assoc_skill: Athletics
    shortdesc: "Your unparalleled athletic skill allows you to jump impossible distances. Triple the distance you jump on a successful Long Jump (so you could jump 90 feet with an Athletics result of 30). When you successfully High Jump, use the distance jumped and distance limit for a Long Jump but don't triple the distance.%r%rYou can jump a distance greater than your Speed by spending additional actions when you Long Jump or High Jump. For each additional action spent, add your Speed to the distance limit."
    prereq:
      level: 15
      skill: Athletics/legendary
  Craft Anything:
    feat_type:
      - Skill
      - General
    assoc_skill: Crafting
    shortdesc: You can find ways to craft just about anything, despite restrictions. As long as you have the appropriate Crafting skill feat (such as Magical Crafting for magic items) and meet the item's level and proficiency requirements, you ignore just about any other requirement, such as being of a specific ancestry or providing spells. If a requirement adds to the item's cost, you must still pay it (including castings of spells that themselves have a cost). You can't ignore requirements of special items that have exclusive means of access and Crafting, such as artifacts. The GM decides whether you can ignore a requirement.
    prereq:
      level: 15
      skill: Crafting/legendary
  Divine Guidance:
    feat_type:
      - Skill
      - General
    assoc_skill: Religion
    shortdesc: You're so immersed in divine scripture that you find meaning and guidance for any situation in your texts. Spend 10 minutes Deciphering Writing on religious scriptures of your deity or philosophy while thinking about a particular problem or conundrum you face, and then attempt a Religion check (DC determined by the GM). If you succeed, you unearth a relevant passage, parable, or aphorism that can help you move forward or change your thinking to help solve your conundrum.
    prereq:
      level: 15
      skill: Religion/legendary
  Legendary Codebreaker:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: Your skill with languages and codes is so great that you can decipher information with little more than a quick read through a text. You can Decipher Writing using Society while reading at normal speed. If you slow down and spend the full amount of time that's ordinarily required and roll a success, you get a critical success; if you critically succeed while spending the normal amount of time, you gain a nearly word-for-word understanding of the document.
    prereq:
      level: 15
      skill: Society/legendary
  Legendary Guide:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: "You know the wilderness so well that you can help your party travel through it with ease.%r%rWhen you are setting the path for your party through wilderness terrain, your party gains a +10-foot circumstance bonus to its Speed for the purpose of calculating the party's travel speed, your party's travel speed doesn't decrease in difficult terrain, and greater difficult terrain halves your party's travel speed instead of reducing it to a third.%r%rThis doesn't increase your party's Speed during an encounter or allow your party to ignore difficult terrain during an encounter."
    prereq:
      level: 15
      skill: Survival/legendary
  Legendary Linguist:
    feat_type:
      - Skill
      - General
    assoc_skill: Society
    shortdesc: You're so skilled with languages you can create a pidgin instantly. You can always talk to any creature that has a language—even a language you don't know—by creating a new pidgin language that uses simplified terms and conveys basic concepts. To do so, you must first understand at least what medium of communication the creature uses (speech, sign language, and so on).
    prereq:
      level: 15
      feat:
        - Multilingual
      skill: Society/legendary
  Legendary Medic:
    feat_type:
      - Skill
      - General
    assoc_skill: Medicine
    shortdesc: You've discovered medical breakthroughs or techniques that achieve miraculous results. Once per day for each target, you can spend 1 hour treating that target and attempt a Medicine check to remove a disease or the blinded, deafened, doomed, or drained condition. Use the DC of the disease or of the spell or effect that created the condition. If the effect's source is an artifact, above 20th level, or similarly powerful, increase the DC by 10.
    prereq:
      level: 15
      skill: Medicine/legendary
  Legendary Negotiation:
    feat_type:
      - Skill
      - General
    assoc_skill: Diplomacy
    shortdesc: You can negotiate incredibly quickly in adverse situations. You attempt to Make an Impression and then Request your opponent cease their current activity and engage in negotiations. You take a –5 penalty to your Diplomacy check. Generally, the DC of this check is the creature's Will DC, although your GM may modify it based on the situation. Some creatures may be unable to stop regardless of their personal desires, and even those who agree to parley might ultimately find your arguments lacking and return to violence.
    prereq:
      level: 15
      skill: Diplomacy/legendary
  Legendary Performer:
    feat_type:
      - Skill
      - General
    assoc_skill: Performance
    shortdesc: Your fame has spread throughout the lands. Creatures who have any listed skill in Society have heard of you and usually have an attitude toward you one step better than normal, depending on your reputation and the creature's disposition. For instance, if you're well-known for cruel and demanding behavior, creatures might be intimidated by you, rather than be friendly toward you.
    prereq:
      level: 15
      feat:
        - Virtuosic Performer
      skill: Performance/legendary
  Legendary Sneak:
    feat_type:
      - Skill
      - General
    assoc_skill: Stealth
    shortdesc: You're always sneaking unless you choose to be seen, even when there's nowhere to hide. You can Hide and Sneak even without cover or being concealed. When you employ an exploration tactic other than Avoiding Notice, you also gain the benefits of Avoiding Notice unless you choose not to.
    prereq:
      level: 15
      feat:
        - Swift Sneak
      skill: Stealth/legendary
  Legendary Survivalist:
    feat_type:
      - Skill
      - General
    assoc_skill: Survival
    shortdesc: You can survive indefinitely without food or water and can endure severe, extreme, and incredible cold and heat without taking damage from doing so.
    prereq:
      level: 15
      skill: Survival/legendary
  Legendary Thief:
    feat_type:
      - Skill
      - General
    assoc_skill: Thievery
    shortdesc: Your ability to Steal defies belief. You can attempt to Steal something that is actively wielded or that would be extremely noticeable or time consuming to remove (like worn shoes or armor). You must do so slowly and carefully, spending at least 1 minute (and significantly longer for items that are normally time consuming to remove, like armor). Throughout this duration you must have some means of staying hidden, such as the cover of darkness or a bustling crowd. Even if you succeed, if the item is extremely prominent—like a suit of full plate armor—onlookers will quickly notice it's gone after you steal it.
    prereq:
      level: 15
      feat:
        - Pickpocket
      skill: Thievery/legendary
  Scare to Death:
    feat_type:
      - Skill
      - General
    assoc_skill: Intimidation
    traits:
      - Emotion
      - Fear
      - Incapacitation
    shortdesc: "You can frighten foes so much, they might die. Attempt an Intimidation check against the Will DC of a living creature within 30 feet of you that you sense or observe and who can sense or observe you. If the target can't hear you or doesn't understand the language you are speaking, you take a –4 circumstance penalty. The creature is temporarily immune for 1 minute.%r%r**Critical Success** The target must attempt a Fortitude save against your Intimidation DC. On a critical failure, it dies. On any other result, it becomes frightened 2 and is fleeing for 1 round. The critical failure effect has the death trait.%r**Success** The target becomes frightened 2.%r**Failure** The target becomes frightened 1.%r**Critical Failure** The target is unaffected."
    prereq:
      level: 15
      skill: Intimidation/legendary
  Unified Theory:
    feat_type:
      - Skill
      - General
    assoc_skill: Arcana
    shortdesc: You understand the common underpinnings of the four traditions of magic and magical essences, allowing you to understand them all through an arcane lens. Whenever you use a skill action or a skill feat that requires a Nature, Occultism, or Religion check, depending on the magic tradition, you can use Arcana instead. If you would normally take a penalty or have a higher DC for using Arcana on other magic (such as when using Identify Magic), you no longer do so.
