      - concentrate
      - fighter
      - press
  Inspirational Focus:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your connection to your muse has granted you unusual focus. Whenever you Refocus, completely refill your focus pool.
