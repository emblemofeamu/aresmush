    traits:
      - rage
  Dragon Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You enter the stance of a dragon and make powerful leg strikes like a lashing dragon's tail. You can make dragon tail attacks that deal 1d10 bludgeoning damage. They are in the brawling group and have the backswing, nonlethal, and unarmed traits.%r%rWhile in Dragon Stance, you can ignore the first square of difficult terrain while Striding.
    traits:
