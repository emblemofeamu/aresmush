---
pf2e_feats:
# Level 1 Class Feats
  Acute Vision:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: When you are raging, your visual senses improve, granting you darkvision.
    traits: []
  Adrenaline Rush:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: In the heat of battle, you are capable of amazing feats of strength. While you are raging, increase your encumbered and maximum Bulk limits by 2; you also gain a +1 status bonus to Athletics checks to lift heavy objects, Escape, and Force Open.
    traits:
      - rage
  Alchemical Familiar:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have used alchemy to create life, a simple creature formed from alchemical materials, reagents, and a bit of your own blood. This alchemical familiar appears to be a small creature of flesh and blood, though it might have some unusual or distinguishing aspects depending on your creative process. Like other familiars, your alchemical familiar assists you in your laboratory and on adventures. The familiar uses your Intelligence modifier to determine its Perception, Acrobatics, and Stealth modifiers.
    traits: []
  Alchemical Savant:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Crafting/trained
    shortdesc: You can identify alchemical items quickly. When using the Crafting skill to Identify Alchemy on an alchemical item you hold, you can do so as a single action, which has the concentrate and manipulate traits, instead of spending 10 minutes. If you have the formula for the item you are attempting to identify, you gain a +2 circumstance bonus to your check, and if you roll a critical failure, you get a failure instead.
    traits: []
  Ancestral Blood Magic:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: The magic of your bloodline mixes with that of your ancestry. You gain your blood magic effect when you cast a non-cantrip spell you gained from a heritage or an ancestry feat, in addition to the normal circumstances that trigger your blood magic.
    traits: []
  Animal Companion (Druid):
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: animal
    shortdesc: You gain the service of a young animal companion that travels with you on your adventures and obeys any simple commands you give it to the best of its abilities. See Animal Companions for more information.
    traits: []
  Animal Companion (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You gain the service of a young animal companion that travels with you on your adventures and obeys any simple commands you give it to the best of its abilities. See Animal Companions for more information.%r%r**Ranger:** When you Hunt Prey, your animal companion gains the action's benefits and your hunter's edge benefit if you have one.
    traits: []
  Bardic Lore:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: enigma
    shortdesc: Your studies make you informed on every subject. You are trained in Bardic Lore, a special Lore skill that can be used only to Recall Knowledge, but on any topic. If you have legendary proficiency in Occultism, you gain expert proficiency in Bardic Lore, but you can't increase your proficiency rank in Bardic Lore by any other means.
    traits: []
  Cackle:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You can extend one of your spells with a quick burst of laughter. You learn the cackle hex. Increase the number of Focus Points in your focus pool by 1.
    traits: []
    init_magic: true
  Cauldron:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You can use the Craft activity to create oils and potions. You immediately gain the formulas for four common 1st-level oils or potions. At 4th level and every 2 levels beyond that, you gain the formula for a common oil or potion of that level or lower (a 4th-level potion if you're 4th level, a 6th-level potion if you're 6th level, and so on). If you have a familiar, you can have your familiar learn these formulas rather than storing them in a formula book. Your familiar can learn new formulas in the same way it learns new spells, and these formulas are transferred from a slain familiar to a new familiar in the same way spells are.%r%rYou can brew a great deal of magic within your cauldron. When you Craft a batch of oils or potions, you can make up to six in a batch instead of the usual four per batch.
    traits: []
  Combat Assessment:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You make a telegraphed attack to learn about your foe. Make a melee Strike. On a hit, you can immediately attempt a check to Recall Knowledge about the target. On a critical hit, you gain a +2 circumstance bonus to the check to Recall Knowledge. The target is temporarily immune to Combat Assessment for 1 day.
    traits: []
  Counterspell:
    assoc_charclass:
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
      - School
    prereq:
      level: 1
    shortdesc: When a foe Casts a Spell and you can see its manifestations, you can use your own magic to counter it.%r%r**[Witch, Wizard]** You expend a prepared spell to counter the triggering creature's casting of that same spell. You lose your spell slot as if you had cast the triggering spell. You then attempt to counteract the triggering spell.%r%r**[Sorcerer]** You expend one of your spell slots to counter the triggering creature's casting of a spell that you have in your repertoire. You lose your spell slot as if you had cast the triggering spell. You then attempt to counteract the triggering spell.%r%r**Special** [Sorcerer] This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, occult, or primal).
    traits:
      - abjuration
      - arcane
  Crane Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You enter the stance of a crane, holding your arms in an imitation of a crane's wings and using flowing, defensive motions. You gain a +1 circumstance bonus to AC, but the only Strikes you can make are crane wing attacks. These deal 1d6 bludgeoning damage; are in the brawling group; and have the agile, finesse, nonlethal, and unarmed traits.%r%rWhile in Crane Stance, reduce the DC for High Jump and Long Jump by 5, and when you Leap, you can move an additional 5 feet horizontally or 2 feet vertically.
    traits:
      - stance
  Crossbow Ace:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have a deep understanding of the crossbow. When you're wielding a crossbow and use Hunt Prey or use Interact to reload your crossbow, you gain a +2 circumstance bonus to the damage roll on your next Strike with that crossbow. If the crossbow is a simple crossbow, also increase the damage die size for that attack by one step. You must make the attack before the end of your next turn or these benefits are lost.
    traits: []
  Dangerous Sorcery:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your legacy grants you great destructive power. When you Cast a Spell from your spell slots, if the spell deals damage and doesn't have a duration, you gain a status bonus to that spell's damage equal to the spell's level.
    traits: []
  Deadly Simplicity:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
      ordeity:
        - Animus
        - Navos
    shortdesc: Your deity's weapon is especially powerful in your hands. When you are wielding your deity's favored weapon, increase the damage die size of that weapon by one step. If your deity's favored weapon is an unarmed attack (such as a fist, if you worship Navos) and its damage die is smaller than d6, instead increase its damage die size to d6.
    traits: []
  Deity's Domain:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You embody an aspect of your deity. Choose one of your deity's domains. You gain the domain's initial domain spell as a devotion spell.
    traits: []
    init_magic: true
    grants:
      gated_feat: Deity's Domain
  Desperate Prayer: # Frequency # Trigger
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You call out to your deity in a plea for their aid. You instantly recover 1 Focus Point.
    traits: []
  Domain Initiate:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your deity bestows a special spell related to their powers. Select one domain—a subject of particular interest to you within your religion—from your deity's list. You gain an initial domain spell for that domain, a spell unique to the domain and not available to other clerics. Each domain's theme and domain spells can be found here.%r%rDomain spells are a type of focus spell. It costs 1 Focus Point to cast a focus spell, and you start with a focus pool of 1 Focus Point. You refill your focus pool during your daily preparations, and you can regain 1 Focus Point by spending 10 minutes using the Refocus activity to pray to your deity or do service toward their causes.%r%rFocus spells are automatically heightened to half your level rounded up. Focus spells don't require spell slots, nor can you cast them using spell slots. Certain feats can give you more focus spells and increase the size of your focus pool, though your focus pool can never hold more than 3 Focus Points. The full rules for focus spells appear here.%r%r**Special** You can select this feat multiple times, selecting a different domain each time and gaining its domain spell.
    traits: []
    init_magic: true
  Double Slice:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You lash out at your foe with both weapons. Make two Strikes, one with each of your two melee weapons, each using your current multiple attack penalty. Both Strikes must have the same target. If the second Strike is made with a weapon that doesn't have the agile trait, it takes a –2 penalty.%r%rIf both attacks hit, combine their damage, and then add any other applicable effects from both weapons. You add any precision damage only once, to the attack of your choice. Combine the damage from both Strikes and apply resistances and weaknesses only once. This counts as two attacks when calculating your multiple attack penalty.
    traits: []
  Draconic Arrogance:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
