    init_magic: true
  Just as Planned:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Frequency** once per hour%r%rIn the blink of an eye, you calculate your enemy's movements and know exactly where to aim your next blow. If your next action is to Devise a Stratagem, you can roll the d20 twice and take the higher result."
