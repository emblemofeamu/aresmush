---
pf2e_feats:
# Level 1 Class Feats
  Acute Vision:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: When you are raging, your visual senses improve, granting you darkvision.
    traits:
      - barbarian
  Adrenaline Rush:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "In the heat of battle, you are capable of amazing feats of strength.%r%rWhile you are Raging, increase your encumbered and maximum Bulk limits by 2; you also gain a +1 status bonus to Athletics checks to lift heavy objects, Escape, and Force Open."
    traits:
      - barbarian
      - rage
  Alchemical Assessment:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Crafting/trained
    shortdesc: You can identify alchemical items quickly. When using the Crafting skill to Identify Alchemy on an alchemical item you hold, you can do so as a single action, rather than spending 10 minutes.
    traits:
      - alchemist
  Alchemical Familiar:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have used alchemy to create life, a simple creature formed from alchemical materials, reagents, and a bit of your own blood. You gain a familiar, which has the construct familiar ability; this is permanent, doesn't require the familiar to have the tough familiar ability, and doesn't count against your usual limit of familiar abilities (typically 2). The familiar uses your Intelligence modifier to determine its Perception, Acrobatics, and Stealth modifiers.
    traits:
      - alchemist
  Animal Companion:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: animal
    shortdesc: You gain the service of a young animal companion that travels with you on your adventures and obeys any simple commands you give it to the best of its abilities.
    traits:
      - druid
  Animal Companion (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You gain the service of a young animal companion that travels with you and obeys simple commands. When you Hunt Prey, your animal companion gains the action's benefits and your hunter's edge benefit if you have one.
    traits:
      - ranger
  Animal Empathy:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have a connection to the creatures of the natural world that allows you to communicate with them on a rudimentary level. You can ask questions of, receive answers from, and use the Diplomacy skill with animals. In most cases, wild animals will give you time to make your case.
    traits:
      - druid
  Bardic Lore:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: enigma
    shortdesc: Your studies make you informed on every subject. You are trained in Bardic Lore, a special Lore skill that can be used only to Recall Knowledge, but on any topic. If you have legendary proficiency in Occultism, you gain expert proficiency in Bardic Lore, but you can't increase your proficiency rank in Bardic Lore by any other means.
    traits:
      - bard
  Blood Rising:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** A creature targets you with a spell of the same tradition as your bloodline.%r%rThe magic in your blood surges in response to your foe's spell. You generate a blood magic effect you know, even if you are already under the effects of blood magic. The target must be either you or the creature that triggered Blood Rising. If the blood magic effect grants you a bonus to AC or the appropriate saving throw, that bonus applies against the triggering spell. If the effect has a duration, it instead lasts until the beginning of your next turn.%r%r**Special** This feat has the trait corresponding to the tradition of your bloodline."
    traits:
      - sorcerer
  Blowgun Poisoner:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You can capably deliver toxins with a blowgun. Your blowgun Strikes can apply injury poisons even if they deal no damage due to a creature's resistance. If you critically succeed at a blowgun Strike using a poisoned dart, the target's initial save against the poison is one degree of success worse than the creature rolls; this is a misfortune effect.%r%rIn addition, if you make a blowgun Strike while hidden or undetected, you don't automatically become observed. Instead, immediately attempt a Stealth check against the Perception DC of the target. If you succeed, you don't become observed, and are hidden (if you were undetected, you still become hidden rather than remaining undetected)."
    traits:
      - alchemist
  Brilliant Flash:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: beacon
    shortdesc: Your light cleanses souls of fear. When you use Flash of Grandeur, the attacker is also off-guard for 1 round.
    traits:
      - champion
  Cackle:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your patron's power fills you with confidence, letting you sustain a magical working even as a quick burst of laughter leaves your lips. You learn the *cackle* hex.
    traits:
      - witch
    init_magic: true
  Cauldron:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You can brew magic in your cauldron, creating useful magical concoctions. You can use the Craft activity to create oils and potions. You immediately gain the formulas for four common 1st-level oils or potions. At 4th level and every 2 levels beyond that, you gain the formula for a common oil or potion of that level or lower (a 4th-level potion if you're 4th level, a 6th-level potion if you're 6th level, and so on). If you have a familiar, you can have your familiar learn these formulas rather than storing them in a formula book. Your familiar can learn new formulas in the same way it learns new spells, and these formulas are transferred from a slain familiar to a new familiar in the same way spells are.%r%rDuring your daily preparations, you can create one temporary oil or potion using a formula you know. If you have master proficiency in spell DC, you can create a batch of two temporary oils or potions during your daily preparations, and if you have legendary proficiency, you can create a batch of three. Any items you create this way become inert bottles of liquid the next time you make your daily preparations, and any remaining effects of the temporary items end. A temporary oil or potion has no value."
    traits:
      - witch
  Combat Assessment:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You make a telegraphed attack to learn about your foe. Make a melee Strike. On a hit, you can immediately attempt a check to Recall Knowledge about the target. On a critical hit, you gain a +2 circumstance bonus to the check to Recall Knowledge. The target is temporarily immune to Combat Assessment for 1 day.
    traits:
      - fighter
  Counterspell:
    assoc_charclass:
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** A creature Casts a Spell that you have prepared%r%rWhen a foe Casts a Spell and you can see its manifestations, you can use your magic to disrupt it. You expend a prepared spell to counter the triggering creature's casting of that same spell. You lose your spell slot as if you had cast the triggering spell. You then attempt to counteract the triggering spell.%r%r**Special** This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, primal, or occult)."
    traits:
      - witch
      - wizard
  Crane Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored%r%rYour arms flutter like a crane's wings.%r%rYou gain a +1 circumstance bonus to AC, but the only Strikes you can make are crane wing attacks. These deal 1d6 bludgeoning damage; are in the brawling group; and have the agile, finesse, nonlethal, and unarmed traits.%r%rWhile in Crane Stance, reduce the DC for High Jump and Long Jump by 5, and when you Leap, you can move an additional 5 feet horizontally or 2 feet vertically."
    traits:
      - monk
      - stance
  Crossbow Ace:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding a crossbow with reload 1 or higher.%r%rYour deep understanding of the crossbow allows you to reload efficiently while moving yourself out of the line of return fire. Either Create a Diversion or Take Cover, then Interact to reload. As normal, you must meet the requirements to Take Cover; you must be prone, benefiting from cover, or near a feature that allows you to Take Cover."
    traits:
      - ranger
  Deadly Simplicity:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
      ordeity:
        - Navos
        - Animus
    shortdesc: "When you are wielding your deity's favored weapon, increase the damage die size of that weapon by one step.%r%rIf your deity's favored weapon is an unarmed attack (such as a fist, if you worship Navos) and its damage die is smaller than d6, instead increase its damage die size to d6."
    traits:
      - cleric
  Defensive Advance:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "With the protection of your shield, you dive into battle! You Raise your Shield and Stride. If you end your movement within melee reach of at least one enemy, you can make a melee Strike against that enemy.%r%rYou can use Defensive Advance while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type."
    traits:
      - champion
      - flourish
  Deity's Domain:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You embody an aspect of your deity. Choose one of your deity's domains. You gain the domain's initial domain spell as a devotion spell.
    traits:
      - champion
  Desperate Prayer:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Frequency** once per day%r%r**Trigger** You begin your turn and have no Focus Points.%r%rYou call out to your deity in a plea for their aid. You gain 1 Focus Point, which you can spend only to cast a devotion spell. If you don't spend this Focus Point by the end of this turn, it is lost"
    traits:
      - champion
  Disarming Flair:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You knock weapons from the hands of your foes with style. When you Disarm, the action gains the bravado trait.
    traits:
      - swashbuckler
  Divine Castigation:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your deity's grace doesn't extend to your sworn enemies. When you cast a *harm* or *heal* spell, you can add your holy or unholy trait to it. If you do, the spell deals damage to creatures with the opposing trait, even if it wouldn't normally damage them. The spell deals spirit damage when used this way. For example, if you are holy, you could add the holy trait to a *heal* spell and deal spirit damage to a fiend that has the unholy trait.
    traits:
      - cleric
  Domain Initiate:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "Your deity bestows a special spell related to their powers. Select one domain—a subject of particular interest to you within your religion—from your deity's list. You gain an initial domain spell for that domain, a spell unique to the domain and not available to other clerics.%r%rDomain spells are a type of focus spell. It costs 1 Focus Point to cast a focus spell, and you start with a focus pool of 1 Focus Point. You refill your focus pool during your daily preparations, and you can regain 1 Focus Point by spending 10 minutes using the Refocus activity to pray to your deity or do service toward their causes.%r%rFocus spells are automatically heightened to half your level rounded up, much like cantrips. Focus spells don't require spell slots, and can't be cast using spell slots. Your focus pool can hold one Focus Point for each focus spell you have, up to 3 points.%r%r**Special** You can select this feat multiple times, selecting a different domain each time and gaining its domain spell."
    traits:
      - cleric
    init_magic: true
  Double Slice:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYou lash out at your foe with both weapons. Make two Strikes, one with each of your two melee weapons, each using your current multiple attack penalty. Both Strikes must have the same target. If the second Strike is made with a weapon that doesn't have the agile trait, it takes a –2 penalty.%r%rIf both attacks hit, combine their damage, and then add any other applicable effects from both weapons. You add any precision damage only once, to the attack of your choice. Combine the damage from both Strikes and apply resistances and weaknesses only once. This counts as two attacks when calculating your multiple attack penalty."
    traits:
      - fighter
  Draconic Arrogance:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: dragon
    shortdesc: Few can sway you from your goals while the fury of combat fills you. While raging, you gain a +2 status bonus to saving throws against emotion effects.
    traits:
      - barbarian
      - rage
  Dragon Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored%r%rYou enter the stance of a dragon and make powerful leg strikes like a lashing dragon's tail. You can make dragon tail attacks that deal 1d10 bludgeoning damage. They are in the brawling group and have the backswing, nonlethal, and unarmed traits.%r%rWhile in Dragon Stance, you can ignore the first square of difficult terrain while Striding."
    traits:
      - monk
      - stance
  Elegant Buckler:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You've learned a flexible way to position your Buckler to provide more protection. When you Raise a Shield to gain a circumstance bonus to AC from a buckler, increase the bonus from +1 to +2.%r%rWhile you have a buckler raised, if a creature critically misses you with a Strike, you gain panache until the end of your next turn."
    traits:
      - swashbuckler
  Eliminate Red Herrings:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have a keen sense for avoiding spurious lines of inquiry. When you roll a critical failure on a skill check to Recall Knowledge related to a question about one of your active investigations, you get a failure instead.
    traits:
      - investigator
  Exacting Strike:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You make a controlled follow-up attack, fully accounting for your momentum. Make a Strike. The Strike gains the following failure effect.%r%r**Failure** This attack doesn't count toward your multiple attack penalty."
    traits:
      - fighter
      - press
  Extravagant Parry:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You're wielding one or more one-handed weapons%r%rYou use one-handed weapons to parry with style. You gain a +1 circumstance bonus to AC until the start of your next turn, or a +2 circumstance bonus if you have a free hand or are wielding a weapon with the parry trait. You lose this circumstance bonus if you no longer meet this feat's requirement. If a creature misses you with a Strike while you have this bonus, you gain panache until the end of your next turn."
    traits:
      - swashbuckler
  Faithful Steed:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You gain the service of a young animal companion as a mount. See Animal Companions. If you have the holy or unholy trait, your mount gains it as well, as do the mount's Strikes. Typically, the steed is an animal companion with the mount ability (such as a horse).
    traits:
      - champion
  Familiar:
    assoc_charclass:
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You make a pact with a creature that serves you and assists your spellcasting. You gain a familiar."
    traits:
      - sorcerer
      - wizard
  Far Lobber:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You've learned how to throw a longer distance. When you throw an alchemical bomb, it has a range increment of 30 feet instead of the usual 20 feet.
    traits:
      - alchemist
  Flashy Dodge:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** A creature you can see targets you with an attack.%r%r**Requirements** You aren't encumbered.%r%rYou deftly dodge out of the way, gaining a +2 circumstance bonus to AC against the triggering attack. If the Strike misses, you gain panache until the end of your next turn."
    traits:
      - swashbuckler
  Flexible Studies:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You've collected a cross-section of information on various disciplines you can refer to when preparing for various tasks. During your daily preparations, you can cram on a certain subject to become temporarily trained in one skill of your choice. This proficiency lasts until you prepare again. As this proficiency is temporary, you can't use it as a prerequisite for a permanent character option like a skill increase or a feat.
    traits:
      - investigator
  Flying Blade:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You apply your flashy techniques to thrown weapons as easily as melee attacks. You apply your precise strike damage on ranged Strikes you make with a thrown weapon within that weapon's first range increment. The thrown weapon must be an agile or finesse weapon. This also allows you to make a thrown weapon ranged Strike for Confident Finisher and any other finisher that includes a Strike that can benefit from your precise strike.
    traits:
      - swashbuckler
  Focused Fascination:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
      feat:
        - Fascinating Performance
    shortdesc: When you use Fascinating Performance in a combat encounter, you need only a success, rather than a critical success, to Fascinate your target. This works only if you're attempting to fascinate one target. For example, if you were an expert in Performance, you could choose to target multiple creatures normally or target one creature and fascinate it on a success.
    traits:
      - swashbuckler
  Foretell Harm:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Frequency** once per round%r%r**Requirements** Your previous action was to Cast a non-cantrip Spell that dealt damage.%r%rYour magic echoes ominously as you glimpse injury in the target's future. At the beginning of your target's next turn, it takes damage equal to twice the triggering spell's rank as a seemingly random and minor misfortune finds it. The damage and type of misfortune is of a type matching the spell; for instance, if you dealt fire damage, a flame might spontaneous ignite on them or they might burn a hand on their torch. The target is then temporarily immune to Foretell Harm for 24 hours."
    traits:
      - cursebound
      - divine
      - oracle
  Glean Lore:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You tap into the collected lore of the divine, accessing a variety of potentially useful information.%r%rAttempt a Religion check to understand the information you gain. The GM sets the DC (similar to the DC to Recall Knowledge), potentially adjusting the DC of the check for topics far removed from your mystery.%r%r**Critical Success** You comprehend the lore accurately or gain a useful clue from the divine about your situation.%r**Success** You learn two pieces of information about the topic, one true and one erroneous, but you don't know which is which.%r**Failure** You recall incorrect information or gain an erroneous or misleading clue.%r**Critical Failure** You recall two pieces of incorrect information or gain two erroneous or misleading clues."
    traits:
      - divine
      - oracle
      - secret
  Goading Feint:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Deception/trained
    shortdesc: "Your tricks make foes overextend their attacks. On a Feint, you can use the following success and critical success effects instead of any other effects you would gain when you Feint; if you do, other abilities that adjust the normal effects of your Feint no longer apply. You can choose whether to use the Goading Feint benefits or the normal benefits each time you Feint a given foe.%r%r**Critical Success** The target takes a –2 circumstance penalty to all attack rolls against you before the end of its next turn.%r**Success** The target takes a –2 circumstance penalty to its next attack roll against you before the end of its next turn."
    traits:
      - swashbuckler
  Harming Hands:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
      divine_font: harm
    shortdesc: The mordant power of your void energy grows. When you cast *harm*, you roll d10s instead of d8s.
    traits:
      - cleric
  Healing Hands:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
      divine_font: heal
    shortdesc: Your vitality is even more vibrant and restorative. When you cast *heal*, you roll d10s instead of d8s.
    traits:
      - cleric
  Hunted Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding a ranged weapon with reload 0.%r%rYou take two quick shots against the one you hunt. Make two Strikes against your hunted prey with the required weapon. If both hit the same creature, combine their damage for the purpose of resistances and weaknesses. Apply your multiple attack penalty to each Strike normally."
    traits:
      - flourish
      - ranger
  Hymn of Healing:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You learn the *hymn of healing* composition spell, which imbues your music with rich melodies that help your allies recover from harm.
    traits:
      - bard
    init_magic: true
  Initiate Warden:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You've trained with one of the ranger sects known as wardens, who practice a specialized type of primal magic. You gain your choice of one warden spell from these initial warden spells (or another you have access to): *gravity weapon*, *heal companion*, *magic hide*.%r%r**Special** You can take this feat multiple times, choosing a different initial warden spell each time."
    traits:
      - ranger
  Known Weaknesses:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Whenever you Devise a Stratagem, you can also attempt a check to Recall Knowledge as part of that action before rolling the d20. If you critically succeed at the Recall Knowledge check, you notice a weakness and can convey the information to allies to grant each of them a +1 circumstance bonus to their next attack roll against the subject, as long as their attack is made before the beginning of your next turn. If you choose an attack stratagem, this bonus applies to that attack roll too.
    traits:
      - investigator
  Leshy Familiar:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: leaf
    shortdesc: You call a minor spirit of nature into a plant body, creating a leshy companion to aid you in your spellcasting. You gain a familiar, which has your choice of either the plant or fungus familiar ability; this doesn't count against your usual limit of familiar abilities (typically 2). The spirit you call has a more tenuous connection to its plant body than fully independent leshies, so it is Tiny in size like other familiars.
    traits:
      - druid
  Lingering Composition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: maestro
    shortdesc: By adding a flourish, you make your compositions last longer. You learn the *lingering composition* focus spell.
    traits:
      - bard
    init_magic: true
  Martial Performance:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: warrior
    shortdesc: "Your muse has taught you how to handle a wider variety of weapons than most bards, empowering you to effortlessly blend your performance into combat tools. When you have a *courageous anthem* composition cantrip active, and you damage an enemy with a Strike, the spell's duration is extended by 1 round. You can extend an individual casting only once in this way.%r%rIf you gain the *rallying anthem* or *song of strength* composition cantrips, you can apply this benefit to those cantrips as well."
    traits:
      - bard
  Moment of Clarity:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You push back your rage for a moment in order to think clearly. Until the end of this turn, you can use actions with the concentrate trait even if those actions don't have the rage trait.
    traits:
      - barbarian
      - concentrate
      - rage
  Monastic Archer Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored and wielding a longbow, shortbow, or a bow with the monk trait.%r%rYou enter a specialized stance for a unique martial art centered around the use of a bow. While in this stance, the only Strikes you can make are those using longbows, shortbows, or bows with the monk trait.%r%rYou can use Flurry of Blows with these bows. You can use your other monk feats or monk abilities that normally require unarmed attacks with these bows when attacking within half the first range increment (normally 50 feet for a longbow and 30 feet for a shortbow), so long as the feat or ability doesn't require a single, specific Strike.%r%r**Special** When you select this feat, you become trained in the longbow, shortbow, and any simple and martial bows with the monk trait. If you gain the expert strikes class feature, your proficiency rank for these weapons increases to expert, and if you gain the master strikes class feature, your proficiency rank for these weapons increases to master."
    traits:
      - monk
      - stance
  Monastic Weaponry:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have trained with the weaponry of your monastery or school. You gain access to uncommon weapons with the monk trait and become trained in simple and martial monk weapons. When your proficiency for unarmed attacks increases to expert or master, your proficiency rank for these weapons increases to expert or master as well. If you have familiarity with an agile or finesse weapon (such as from the Sildanyari Weapon Familiarity feat), that weapon also gains the monk trait for you. You can use melee monk weapons with any of your monk feats or monk abilities that normally require unarmed attacks, though not if the feat or ability requires you to use a single specific type of attack, such as Crane Stance. If you gain the critical specialization benefit for unarmed attacks—with the expert strikes class feature, for example—you also gain it with monk weapons.
    traits:
      - monk
  Monster Hunter:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You quickly assess your prey and apply what you know. As part of the action used to Hunt your Prey, you can attempt a check to Recall Knowledge about your prey. When you critically succeed at identifying your hunted prey with Recall Knowledge, you note a weakness in the creature's defenses in addition to any other benefits. You gain a +1 circumstance bonus to your next attack roll against that prey, and any ally you tell gains the same benefit. You can give bonuses from Monster Hunter only once per day against a particular creature.
    traits:
      - ranger
  Mountain Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored and touching the ground%r%rYou enter the stance of an implacable mountain, allowing you to strike with the weight of an avalanche and block blows with your garments. The only Strikes you can make are falling stone unarmed attacks. These deal 1d8 bludgeoning damage; are in the brawling group; and have the forceful, nonlethal, and unarmed traits.%r%rWhile in Mountain Stance, you gain a +4 item bonus to AC and a +2 circumstance bonus to any defenses against Reposition, Shove, Trip, and other forced movement effects. You have a Dexterity modifier cap to your AC of +0, meaning you don't add your Dexterity to your AC, and your Speeds are all reduced by 5 feet. The item bonus to AC from Mountain Stance is cumulative with *armor potency* runes on your explorer's clothing, *mystic armor*, and *bands of force*."
    traits:
      - monk
      - stance
  Nimble Dodge:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** A creature targets you with an attack and you can see the attacker.%r%r**Requirements** You are not encumbered.%r%rYou deftly dodge out of the way, gaining a +2 circumstance bonus to AC against the triggering attack."
    traits:
      - rogue
  Nimble Reprisal:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: justiciar
    shortdesc: "You can use Retributive Strike at greater distance. You can use a ranged weapon to make a ranged Strike instead of a melee Strike for Retributive Strike. The enemy needs to be in range, but not in reach, and it must still be in your champion's aura.%r%rYou can also make melee Strikes against enemies a bit farther away. If the enemy that triggered your reaction is outside your reach but is within 5 feet of your reach, as part of your reaction you can Step to put the enemy in your reach before making a melee Retributive Strike."
    traits:
      - champion
  Nudge the Scales:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You lay a finger on the scales of life and death to heal a creature, regardless of whether it's living or undead. You restore Hit Points equal to 2 + double your level to one creature within 30 feet.%r%rIn addition, you can mediate during your daily preparations to place yourself on one side of the scales. Choose life or death. If you align yourself with life, you can be targeted and healed by vitality healing effects, as normal for most living creatures; if you align yourself with death, you gain the void healing ability, and can instead be targeted and healed by void effects and other effects that restore Hit Points to undead creatures.."
    traits:
      - cursebound
      - divine
      - healing
      - oracle
      - spirit
  One for All:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Diplomacy/trained
    shortdesc: With precisely the right words of encouragement, you bolster an ally's efforts. Designate an ally within 30 feet; this action counts as sufficient preparation to Aid that ally. When you use the Aid reaction to help that ally, you can roll Diplomacy in place of the usual check and the action gains the bravado trait.
    traits:
      - auditory
      - concentrate
      - emotion
      - linguistic
      - mental
      - swashbuckler
  Oracular Warning:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** You are about to roll initiative.%r%rYou have a premonition about impending danger that you use to warn your allies. Each ally within 20 feet gains a +2 status bonus to their initiative roll and gains temporary Hit Points equal to half your level, which last for 1 minute. If you are cursebound 2 when you use Oracular Warning, the bonus increases to +3, and if you are cursebound 3, the bonus increases to +4."
    traits:
      - auditory
      - cursebound
      - divine
      - emotion
      - mental
      - oracle
  Overextending Feint:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Deception/trained
    shortdesc: "You goad a foe into overextending. On a successful Feint, you can use the following success and critical success effects instead of any other effects that would occur when you Feint.%r%r**Critical Success** The target takes a –2 circumstance penalty to all attack rolls against you before the end of its next turn.%r**Success** The target takes a –2 circumstance penalty to its next attack roll against you before the end of its next turn."
    traits:
      - rogue
  Plant Empathy:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have a connection to flora that allows you to communicate with them on a rudimentary level. You can ask questions of, receive answers from, and use the Diplomacy skill with plants and fungus.
    traits:
      - druid
  Plant Evidence:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
      feat:
        - Pickpocket
    shortdesc: You can put a single item you're holding of light or negligible Bulk onto a person without them noticing by succeeding at a Thievery check against their Perception DC. If you have the ruffian racket, you can do this as a free action when you successfully Shove a target.
    traits:
      - rogue
  Plummeting Roll:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Acrobatics/trained
    grants:
      feat:
        - Cat Fall
    shortdesc: Through nimble movements, a graceful landing, and a bit of luck, you can manage to fall from spectacular heights without a scratch. You gain the Cat Fall skill feat and the Plummeting Roll reaction.
    traits:
      - swashbuckler
  Point Blank Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding a ranged weapon.%r%rYou take aim to pick off nearby enemies quickly. When using a ranged volley weapon while you are in this stance, you don't take the penalty to your attack rolls from the volley trait. When using a ranged weapon that doesn't have the volley trait, you gain a +2 circumstance bonus to damage rolls on attacks against targets within the weapon's first range increment."
    traits:
      - fighter
      - stance
  Premonition of Avoidance:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** You are about to roll a saving throw against a hazard.%r%rYour deity grants you a moment's foresight. You gain a +2 circumstance bonus to the triggering saving throw."
    traits:
      - cleric
  Qi Spells:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You have cultivated your qi to produce magical effects. You gain *inner upheaval*, *qi rush*, or another 1st-rank monk qi spell you have access to.%r%r**Special** You can select this feat more than once, choosing a different spell each time."
    traits:
      - monk
  Quick Bomber:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You keep your bombs and bomb-related reagents in easy-to-reach pouches from which you draw without thinking. You Interact to draw a bomb, draw a versatile vial, or use Quick Alchemy to create a bomb, then Strike with the bomb. If you have the ability to create more than one bomb at a time with Quick Alchemy (such as from the double brew class feature), you can Strike with only one of the bombs you create with this action.
    traits:
      - alchemist
  Raging Intimidation:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your fury fills your foes with fear. While you are raging, your Demoralize and Scare to Death actions (from the Intimidation skill and an Intimidation skill feat, respectively) gain the rage trait, allowing you to use them while raging. As soon as you meet the prerequisites for the skill feats Intimidating Glare and Scare to Death, you gain these feats.
    traits:
      - barbarian
  Raging Thrower:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Thrown weapons become especially deadly in your fury. You apply the additional damage from Rage to your thrown weapon attacks. If you have the Brutal Critical feat or the devastator class feature, apply their benefits to thrown weapon attacks.
    traits:
      - barbarian
  Reach Spell:
    assoc_charclass:
      - Bard
      - Cleric
      - Druid
      - Oracle
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You can extend your spells' range. If the next action you use is to Cast a Spell that has a range, increase that spell's range by 30 feet. As is standard for increasing spell ranges, if the spell normally has a range of touch, you extend its range to 30 feet.
    traits:
      - bard
      - cleric
      - concentrate
      - druid
      - oracle
      - sorcerer
      - spellshape
      - witch
      - wizard
  Reactive Shield:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Trigger** An enemy hits you with a melee Strike.%r%r**Requirements** You are wielding a shield.%r%rYou can snap your shield into place just as you would take a blow, avoiding the hit at the last second. You immediately use the Raise a Shield action and gain your shield's bonus to AC. The circumstance bonus from the shield applies to your AC when you're determining the outcome of the triggering attack."
    traits:
      - fighter
  Snagging Strike:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You have one hand free, and your target is within reach of that hand.%r%rYou combine an attack with quick grappling moves to throw an enemy off balance as long as it stays in your reach. Make a Strike while keeping one hand free. If this Strike hits, the target is off-guard until the start of your next turn or until it's no longer within the reach of your hand, whichever comes first."
    traits:
      - fighter
  Soothing Vials:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: chirurgeon
    shortdesc: The healing chemicals in your versatile vials also help calm a patient's mind. When a living creature affected by a mental effect regains Hit Points from one of your versatile vials, it can immediately attempt a new Will saving throw to end one mental effect of its choice. It gains a +1 item bonus to the saving throw.
    traits:
      - alchemist
  Storm Born:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: storm
    shortdesc: You are at home out in the elements, reveling in the power of nature unleashed. You do not take circumstance penalties to ranged spell attacks or Perception checks caused by weather, and your targeted spells don't require a flat check to succeed against a target concealed by weather (such as fog).
    traits:
      - druid
  Stumbling Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Deception/trained
    shortdesc: "You enter a seemingly unfocused stance that mimics the movements of the inebriated-bobbing, weaving, leaving false openings, and distracting your enemies from your true movements.%r%rWhile in this stance, you gain a +1 circumstance bonus to Deception checks to Feint. The only Strikes you can make are stumbling swing unarmed attacks. These deal 1d8 bludgeoning damage; are in the brawling group; and have the agile, backstabber, finesse, nonlethal, and unarmed traits.%r%rIf an enemy hits you with a melee Strike while in this stance, it becomes off-guard against the next stumbling swing Strike you make against it before the end of your next turn."
    traits:
      - monk
      - stance
  Sudden Charge:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: With a quick sprint, you dash up to your foe and swing. Stride twice. If you end your movement within melee reach of at least one enemy, you can make a melee Strike against that enemy. You can use Sudden Charge while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type.
    traits:
      - barbarian
      - fighter
      - flourish
  Takedown Expert:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You've mastered combat practices that let you get up close and bring down perpetrators alive. You can use your Intelligence modifier on attack rolls for an attack stratagem if you're using a weapon of the club group in one hand (like a club or staff), in addition to the usual weapons, and those Strikes qualify for your strategic strike. Additionally, you can make any of your Strikes nonlethal without taking the normal –2 penalty.
    traits:
      - investigator
  Tap into Blood:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are benefiting from a blood magic effect%r%rThe power in your blood allows you to perform minor feats of magic. You can perform one of the following actions depending on the tradition of your bloodline."
    traits:
      - concentrate
      - sorcerer
  That's Odd:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "When you enter a new location, such as a room or corridor, you immediately notice one thing out of the ordinary. The GM determines what it is, or whether there's nothing reasonable to pick up, skipping obvious clues that can be easily noticed without a check or specifically looking for them. You learn only that an area or object is suspicious, but not why it's suspicious. For example, if you entered a study with a large bloodstain on the ground, the bloodstain is so obviously suspicious it's evident to you already, so the GM might note that there's something suspicious about the desk drawer instead. You would then need to investigate the drawer further to find out what specifically is out of the ordinary. If you wish, you can Pursue a Lead concerning this detail even if you have Pursued a Lead less than 10 minutes ago.%r%rThat's Odd doesn't reveal whether creatures are suspicious. You don't typically get any benefit when you leave and come back to a place, though if a major change has happened there and time has passed, the GM might determine that you do."
    traits:
      - investigator
  Tiger Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored%r%rYou enter the stance of a tiger and can make tiger claw attacks. These deal 1d8 slashing damage; are in the brawling group; and have the agile, finesse, nonlethal, and unarmed traits.%r%rOn a critical success with your tiger claws, if you deal damage, the target takes 1d4 persistent bleed damage.%r%rAs long as your Speed is at least 20 feet while in Tiger Stance, you can Step 10 feet."
    traits:
      - monk
      - stance
  Trap Finder:
    assoc_charclass:
      - Investigator
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You have an intuitive sense that alerts you to the dangers and presence of traps. You gain a +1 circumstance bonus to Perception checks to find traps, to AC against attacks made by traps, and to saves against traps. Even if you aren't Searching, you get a check to find traps that normally require you to be Searching. You still need to meet any other requirements to find the trap. You can disable traps that require a proficiency rank of master in Thievery. If you have master proficiency in Thievery, you can disable traps that require a proficiency rank of legendary instead, and your circumstance bonuses against traps increase to +2.
    traits:
      - investigator
      - rogue
  Tumble Behind (Rogue):
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You tumble under and behind your foe, your rapid movement letting you catch them off guard. When you successfully Tumble Through, the foe whose space you passed through is off-guard against the next attack you make before the end of your turn.
    traits:
      - rogue
  Twin Feint:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYou use an attack with one weapon to distract your foe from a second attack coming at a different angle. Make one Strike with each of your two melee weapons, both against the same target. The target is automatically off-guard against the second attack. Apply your multiple attack penalty to the Strikes normally."
    traits:
      - rogue
  Twin Takedown:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYou swiftly attack your hunted prey with each of your weapons, potentially combining their damage into a single devastating attack. Make two Strikes against your hunted prey, one with each of the required weapons. If both hit the same hunted prey, combine their damage for the purpose of its resistances and weaknesses. Apply your multiple attack penalty to each Strike normally."
    traits:
      - flourish
      - ranger
  Underworld Investigator:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Your work as an investigator makes you familiar with the criminal element. You might be a criminal yourself, or you might have gained an understanding of how they operate from the outside. You become trained in Underworld Lore, and you gain your Pursue a Lead investigation bonus to Thievery checks to investigate a case (such as checks to Steal a clue from a suspect or Pick a Lock to open a safe with damning documents).
    traits:
      - investigator
  Unimpeded Step:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: liberator
    shortdesc: With a burst of divine liberation, your ally's movement from your Liberating Step is unaffected by difficult terrain, greater difficult terrain, narrow surfaces, and uneven ground. If you have the exalted reaction benefit, this applies to everyone who Steps.
    traits:
      - champion
  Untamed Form:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: untamed
    shortdesc: You are one with the wild, always changing and adapting to meet any challenge. You gain the *untamed form* order spell, which lets you transform into a variety of shapes that you can expand with druid feats.
    traits:
      - druid
    init_magic: true
  Verdant Weapon:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "You cultivate a seed that can sprout into a wooden staff, vine whip, or another weapon. You spend 10 minutes focusing primal energy into a seed, imprinting it with the potential of a single level 0 weapon you are trained with and that has no mechanical parts or metal components. When holding the imprinted seed, you can use an Interact action to cause it to immediately grow into that weapon; a second Interact action returns it to seed form. The verdant weapon can be etched with runes or affixed with talismans as normal, which are suppressed when the weapon is in seed form.%r%rYou can have only one verdant seed at a time. If you prepare a second, your first verdant seed immediately becomes a mundane seed; any runes on the previous seed transfer to the new seed at no cost, but inapplicable runes are suppressed."
    traits:
      - druid
      - exploration
  Versatile Performance:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: polymath
    shortdesc: "You can rely on the grandeur of your performances rather than ordinary social skills. You can use Performance instead of Diplomacy to Make an Impression and instead of Intimidation to Demoralize. You can also use an acting Performance instead of Deception to Impersonate.%r%rIn addition, you can use your proficiency rank in Performance to meet the prerequisites of skill feats that require a particular proficiency rank in Deception, Diplomacy, or Intimidation."
    traits:
      - bard
  Vicious Swing:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You unleash a particularly powerful attack that clobbers your foe but leaves you a bit unsteady. Make a melee Strike. This counts as two attacks when calculating your multiple attack penalty. If this Strike hits, you deal an extra die of weapon damage. If you're at least 10th level, increase this to two extra dice, and if you're at least 18th level, increase it to three extra dice.
    traits:
      - fighter
      - flourish
  Weight of Guilt:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 1
      specialize: redeemer
    shortdesc: Guilt clouds the minds of those who ignore your Glimpse of Redemption. Instead of making the triggering creature enfeebled 2, you can make it stupefied 2 for the same duration.
    traits:
      - champion
  Well-Versed:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You're resilient to performative influences that aren't your own. You gain a +1 circumstance bonus to saving throws against effects with the auditory, illusion, linguistic, sonic, or visual traits.
    traits:
      - bard
  Whispers of Weakness:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: Voices whisper to you how to best lay a creature low. You target one creature within 60 feet; if it has any weaknesses, you learn them, as well as which of its saving throw modifiers is lowest. You also come to understand its movements, gaining a +2 status bonus to your next attack roll (or skill check made as part of an attack action) against that foe before the end of your turn. The target is then temporarily immune for 1 day.
    traits:
      - cursebound
      - divine
      - oracle
  Widen Spell:
    assoc_charclass:
      - Druid
      - Oracle
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: You manipulate the energy of your spell, causing it to spread out and affect a wider area. If the next action you use is to Cast a Spell that has an area of a burst, cone, or line and does not have a duration, increase the area of that spell. Add 5 feet to the radius of a burst that normally has a radius of at least 10 feet (a burst with a smaller radius is not affected). Add 5 feet to the length of a cone or line that is normally 15 feet long or smaller, and add 10 feet to the length of a larger cone or line.
    traits:
      - druid
      - manipulate
      - oracle
      - sorcerer
      - spellshape
      - witch
      - wizard
  Witch's Armaments:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "Your patron's power changes your body to ensure you are never defenseless. You gain one of the following unarmed attacks.%r%r**Special** You can take this feat more than once, gaining a different unarmed attack each time."
    traits:
      - witch
  Wolf Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 1
    shortdesc: "**Requirements** You are unarmored%r%rYou enter the stance of a wolf, low to the ground with your hands held like fangs. You can make wolf jaw unarmed attacks. These deal 1d8 piercing damage; are in the brawling group; and have the agile, backstabber, finesse, nonlethal, and unarmed traits.%r%rIf you're flanking a target while in Wolf Stance, your wolf jaw unarmed attacks also gain the trip trait."
    traits:
      - monk
      - stance
  You're Next:
    assoc_charclass:
      - Rogue
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 1
      skill: Intimidation/trained
    shortdesc: "**Trigger** You reduce an enemy to 0 Hit Points.%r%rAfter downing a foe, you menace another. Attempt to Demoralize a creature within 60 feet, with a +2 circumstance bonus. If you have legendary proficiency in Intimidation, you can use this as a free action with the same trigger."
    traits:
      - emotion
      - fear
      - mental
      - rogue
      - swashbuckler
# Level 2 Class Feats
  Acute Scent:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: When your anger is heightened, your sense of smell improves. While you're raging, you gain imprecise scent with a range of 30 feet.
    traits:
      - barbarian
  After You:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** You're about to roll initiative.%r%rYou allow your foes to make the first move in a show of incredible confidence. You don't roll initiative; instead you voluntarily go last. You gain panache. If more than one character uses this ability or another ability to go last, use the normal rules for resolving a tie: NPCs and monsters act before PCs, and within those groups, the creatures can choose whichever order they want."
    traits:
      - swashbuckler
  Aggressive Block:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** You use the Shield Block reaction, and the opponent that triggered Shield Block is adjacent to you and is your size or smaller.%r%rYou push back as you block, knocking your foe away or off balance. You use your shield to push the triggering creature, either automatically Shoving it 5 feet or causing it to become off-guard until the start of your next turn. The triggering creature chooses whether to be moved or become off-guard. If it chooses to be moved, you choose the direction. If the Shove would cause it to hit a solid object, enter a square of difficult terrain, or enter another creature's space, it must become off-guard instead of being moved."
    traits:
      - fighter
  Animal Empathy (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You have a connection to the creatures of the natural world that allows you to communicate with them on a rudimentary level. You can use Diplomacy to Make an Impression on animals and to make very simple Requests of them. In most cases, wild animals will give you time to make your case.
    traits:
      - ranger
  Anoint Ally:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You forge a mystical connection with an ally using your body as a focus, allowing them to benefit from your magic.%r%rYou place a blood rune on an adjacent ally that lasts for 1 minute. When you would gain a blood magic effect, you can forgo it, granting it to your ally instead.%r%rYou can anoint only one ally at a time; if you place another rune, your previous designation ends."
    traits:
      - manipulate
      - sorcerer
  Antagonize:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Your taunts and threats earn your foes' ire. When you successfully Demoralize a creature, its frightened condition can't decrease to less than 1 at the end of its turn until it either uses a hostile action against you or can no longer observe or sense you for at least 1 round.
    traits:
      - swashbuckler
  Assisting Shot:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a ranged weapon.%r%rUsing your last shot to gauge your accuracy, you can fire off a quick shot to interfere with a foe in combat. Make a Strike with a ranged weapon. If the Strike hits, the next creature other than you to attack the same target before the start of your next turn gains a +1 circumstance bonus to their roll, or a +2 circumstance bonus if your Strike was a critical hit."
    traits:
      - fighter
      - press
  Athletic Strategist:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
      skill: Athletics/trained
    shortdesc: "You know how to calculatedly manipulate joints and body weight. In addition to using an attack stratagem's roll substitution for a Strike, you can use it to modify a Disarm, Grapple, Reposition, Shove, or Trip attempt, substituting your Devise a Stratagem roll for the Athletics check. You must apply the substitution to the first eligible attack you make, whether it's a Strike or one of the Athletics actions.%r%rYou can also use your Intelligence modifier instead of Strength for the Athletics check when you substitute your Devise a Stratagem roll, unless you're using a weapon for the maneuver and the weapon doesn't fit the restrictions for using Intelligence with a stratagem."
    traits:
      - investigator
  Bashing Charge:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
      skill: Athletics/trained
    shortdesc: "You smash, bust, and charge through solid obstacles without hesitation.%r%rStride twice. Once during your movement, if your movement passes through or ends adjacent to a door, window, fence, wall, or similar obstacle, you can attempt an Athletics check to Force Open the obstacle with a +1 circumstance bonus to the roll; on a failure, your movement ends at that obstacle."
    traits:
      - barbarian
      - flourish
  Basic Lesson:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Your patron grants you a special lesson, revealing a hidden facet of its nature. Choose a basic lesson. You gain its associated hex, and your familiar learns the associated spell.
    traits:
      - witch
    init_magic: true
  Blade Brake:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** You would be moved by a forced movement effect.%r%r**Requirements** You are wielding a melee weapon and are within reach of a hard surface.%r%rYou plow your weapon into a floor, wall, or another sturdy surface, anchoring yourself in place. If you would be moved 20 feet or more, you are moved only 5 feet. Otherwise, you don't move at all."
    traits:
      - fighter
      - manipulate
  Bleed Out:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** Your most recent action was to cast a non-cantrip spell that granted you a blood magic effect.%r%rYou channel the residual energy from the last spell you cast into a ranged bloodletting. Make a ranged spell attack roll against the AC of a target within 60 feet. This attack deals persistent bleed damage equal to the rank of the spell you just cast."
    traits:
      - attack
      - sorcerer
  Brandishing Draw:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You draw and attack with the same motion. You Interact to draw a weapon, then either Strike or use a one-action finisher. You must still meet any other requirements to use a finisher, and any Strike you make must be made with the weapon you drew.
    traits:
      - swashbuckler
  Brawling Focus:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You know how to make the most of your attacks when fighting hand-to-hand. You gain access to the critical specialization effects of unarmed strikes in the brawling group and weapons in the brawling group. If you have Monastic Weaponry, you also gain the critical specialization effects of all monk weapons in which you are trained.
    traits:
      - monk
  Brutal Beating:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: ruffian
    shortdesc: Your critical hits shakes your foes' confidence. Whenever your Strike is a critical hit and deals damage, the target is frightened 1.
    traits:
      - emotion
      - fear
      - mental
      - rogue
  Brutish Shove:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a two-handed melee weapon.%r%rUsing the momentum of your last attack to throw your weight into another, you make your opponent stumble back. Make a Strike with a two-handed melee weapon. If you hit a target that is your size or smaller, that creature is off-guard until the end of your current turn, and you can automatically Shove it, with the same benefits as the Shove action (including the critical success effect, if your Strike was a critical hit). If you move to follow the target, your movement doesn't trigger reactions.%r%rThis Strike has the following failure effect.%r%r**Failure** The target becomes off-guard until the end of your current turn."
    traits:
      - fighter
      - press
  Call of the Wild:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You call upon the creatures of nature to come to your aid. You can spend 10 minutes in concert with nature to replace a spell you've prepared in one of your druid spell slots with a *summon animal* or *summon plant or fungus* spell of the same rank.
    traits:
      - druid
  Cantrip Expansion:
    assoc_charclass:
      - Bard
      - Cleric
      - Oracle
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Bard, Oracle, Sorcerer** Study broadens your range of simple spells.%r%r**Cleric** You study a wider range of simple spells.%r%r**Wizard** Dedicated study allows you to prepare a wider range of simple spells for every situation.%r%r**Witch** Your patron recognizes your need for flexibility and versatility, and grants you the power to prepare a wider range of simple spells.%r%r**Prepared** You can prepare two additional cantrips each day.%r%r**Spontaneous** Add two additional cantrips from your spell list to your repertoire."
    traits:
      - bard
      - cleric
      - oracle
      - sorcerer
      - witch
      - wizard
  Certain Stratagem:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You know exactly where to strike a foe to target their weak spots. When you make a Strike that you're adding your Intelligence modifier to due to Devising a Stratagem and miss, you deal half of your strategic strike damage to the target. This damage type is that of the weapon or unarmed attack you used for the Strike.
    traits:
      - investigator
  Charmed Life:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
      ability:
        - Charisma/14
    shortdesc: "**Trigger** You attempt a saving throw, but you haven't rolled yet.%r%rWhen danger calls, you have a strange knack for coming out on top. You gain a +2 circumstance bonus to the triggering save. If you succeed on the triggering saving throw, you gain panache until the end of your next turn."
    traits:
      - swashbuckler
  Clever Gambit:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: mastermind
    shortdesc: "**Trigger** Your Strike critically hits and deals damage to a creature you've identified with Recall Knowledge.%r%rYour battle tactics are aided by assessing your foe's capabilities and range. You Step or Stride; this movement doesn't trigger reactions from the triggering creature."
    traits:
      - rogue
  Clotting Elixirs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Your restorative concoctions have a clotting effect on the drinker's blood. When a living creature drinks an infused elixir with the healing trait that you have created, it can immediately attempt a DC 10 flat check to remove any persistent bleed damage.
    traits:
      - alchemist
  Combat Grab:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You have one hand free, and your target is within reach of that hand.%r%rUsing your prior attack to shift your opponent's guard, you take another swing and grab them. Make a melee Strike while keeping one hand free. If the Strike hits, you grab the target using your free hand. The creature remains grabbed until the end of your next turn or until it Escapes, whichever comes first."
    traits:
      - fighter
      - press
  Communal Healing:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You're an exceptional conduit for vitality and, as you channel it through you, you can divert some to heal yourself or another creature. When you cast the *heal* spell to heal a single creature, choose another willing living creature within range of your *heal* to regain Hit Points equal to the *heal* spell's rank.
    traits:
      - cleric
      - healing
      - vitality
  Conceal Spell:
    assoc_charclass:
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Through sheer mental effort, you can simplify the incantations and gestures needed to spellcast, leaving them barely noticeable. If the next action you use is to Cast a Spell, the spell gains the subtle trait, hiding the shining runes, sparks of magic, and other manifestations that would usually give away your spellcasting. The trait hides only the spell's spellcasting actions and manifestations, not its effects, so an observer might still see a ray streak out from you or see you vanish into thin air."
    traits:
      - concentrate
      - spellshape
      - witch
      - wizard
  Crushing Grab:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Like a powerful constrictor, you crush targets in your unyielding grasp. When you successfully Grapple a creature, you can deal bludgeoning damage to that creature equal to your Strength modifier. You can make this attack nonlethal with no penalty.
    traits:
      - monk
  Dancing Leaf:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You are as light as a leaf whirling in the breeze. When you Leap or succeed at a High Jump or Long Jump, increase the distance you jump by 5 feet. When calculating the damage you take from falling, don't count any distance fallen while you are adjacent to a wall.
    traits:
      - monk
  Directed Audience:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You can shape the area of your composition spells. Whenever you cast a composition spell whose area is an emanation, you can change the spell's area to a cone 10 feet larger, to a maximum of twice the original area. For example, you could modify a composition spell that affects a 30-ft emanation to affect a 40-ft cone, but a 5-ft emanation could only become a 10-ft cone.
    traits:
      - bard
  Distracting Feint:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: scoundrel
    shortdesc: Your Feints are far more distracting than normal. While a creature is off-guard by your Feint, it also takes a –2 circumstance penalty to Perception checks and Reflex saves.
    traits:
      - rogue
  Divine Aegis:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** You attempt a saving throw against a magical effect, but you haven't rolled yet.%r%rA barrier offers protection against other magic but leaves you exposed to divine energy. Until the beginning of your next turn, you gain a +1 circumstance bonus to saving throws against nondivine magical effects, but you also take a –1 circumstance penalty to saves against divine effects"
    traits:
      - divine
      - oracle
  Divine Grace:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** You attempt a save against a spell, but you haven't rolled yet.%r%rYou call upon your deity's grace, gaining a +2 circumstance bonus to the save."
    traits:
      - champion
  Divine Health:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Your faith makes you resistant to disease, protecting you as you offer succor to the ill. You gain a +2 status bonus to saves against diseases and poisons and to flat checks to recover from persistent poison damage. Allies in your champion's aura get this benefit, but their bonus is +1.%r%rIn addition, if you roll a success on a save against a disease or poison, you get a critical success instead. (Your allies don't share this benefit.) If you have the sacred body class feature, when you roll a critical failure on a save against a disease or poison, you get a failure instead."
    traits:
      - champion
  Domain Acumen:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Every oracle's mystery touches on a divine domain of the deities that fuel it; you can access that power. Choose one of the domains associated with your mystery for which you don't already have an initial domain spell. You gain an initial domain spell from that domain, which you cast as a revelation spell.%r%r**Special** You can select this feat multiple times, selecting a different domain each time and gaining its domain spell as a revelation spell."
    traits:
      - oracle
  Dueling Parry:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rYou can parry attacks against you with your one-handed weapon. You gain a +2 circumstance bonus to AC until the start of your next turn as long as you continue to meet the requirements."
    traits:
      - fighter
  Elemental Fist:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
      focus_spell:
        - Inner Upheaval
    shortdesc: "You can color your qi in bright elemental energy. When you cast *inner upheaval*, in addition to the damage types normally available, you can deliver the extra damage with elemental magic, adding the element's trait and changing the damage type to the listed one: **air** electricity (sparking gust), **earth** bludgeoning (chunk of stone), **fire** fire (flickering flame), **metal** slashing (flying metal shards), **water** cold (wave of frigid water), or **wood** bludgeoning (pummeling pine cones)."
    traits:
      - monk
  Emblazon Armament:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Carefully etching a sacred image into a physical object, you steel yourself for battle. You can spend 10 minutes emblazoning a symbol of your deity upon a weapon or shield. The symbol doesn't fade until 1 year has passed, but if you Emblazon an Armament, any symbol you previously emblazoned, and any symbol already emblazoned on that item instantly disappears.%r%rThe emblazoned item is a religious symbol of your deity in addition to its normal purpose, and it gains another benefit determined by the type of item. The benefit applies only to followers of the deity the symbol represents, but others can use the item normally."
    traits:
      - cleric
      - exploration
  Emotional Push:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** An enemy you're aware of fails its save against an emotion spell.%r%rYou prepare to take advantage of your enemy's sudden change in emotions. The target is off-guard against your next attack before the end of your next turn."
    traits:
      - bard
      - concentrate
  Energy Ablation:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: As you direct destructive energy at a foe, you can divert some of its power into a protective barrier that shields you from harm. If your next action is to Cast a Spell that deals at least one type of energy damage (acid, cold, electricity, fire, force, sonic, vitality, or void), you gain resistance to an energy damage type of your choice equal to the spell's rank. The resistance lasts until the end of your next turn. You get the resistance regardless of whether or not your spell dealt damage.
    traits:
      - spellshape
      - wizard
  Enhanced Familiar:
    assoc_charclass:
      - Druid
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 2
      orfeat:
        - Familiar
        - Leshy Familiar
    shortdesc: "You infuse your familiar with additional magical energy. You can select four familiar or master abilities each day, instead of two.%r%r**Special** [Witch] Add the bonus familiar abilities you gain for being a witch to this amount. [Wizard] If your arcane thesis is improved familiar attunement, your familiar's base number of familiar abilities, before adding any extra abilities from the arcane thesis, is four."
    traits:
      - druid
      - sorcerer
      - witch
      - wizard
  Enjoy the Show:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You address an ally or any onlookers to your combat, flaunting to your foes how little attention they require. When you Perform, you can choose single creature within 30 feet and use the following success, critical success, and critical failure effects instead of the normal results; if you do, Perform gains the bravado trait, as well as the auditory and linguistic trait as normal for oration.%r%r**Critical Success** The target takes a –2 circumstance penalty to attack rolls against creatures other than you until the end of its next turn.%r**Success** The target takes a –1 circumstance penalty to attack rolls against creatures other then you until the end of its next turn.%r**Critical Failure** The target gains a +1 circumstance bonus to attack rolls targeting you until the end of its next turn."
    traits:
      - swashbuckler
  Esoteric Polymath:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: polymath
    shortdesc: "You keep a book of occult spells, similar to a wizard's spellbook, and can use its spells to supplement your spell repertoire. Add all the spells in your repertoire to this book for free. You can use the Occultism skill to Learn Spells and add them to your spellbook by paying the appropriate cost.%r%rDuring your daily preparations, choose any one spell from your book of occult spells. If that spell is already in your spell repertoire, you can treat it as an additional signature spell that day. If it isn't in your repertoire, treat it as though it were until your next daily preparations."
    traits:
      - bard
  Exploit Blunder:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** A creature you Devised a Stratagem against on your most recent turn fails or critically fails a Strike against you.%r%rBy watching your foes closely, you can make the most out of their mistakes. You Step."
    traits:
      - investigator
  Familiar's Language:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You've learned to speak with your familiar and other creatures like it. You can ask questions of, receive answers from, and use the Diplomacy skill with creatures of the same family of animals as your familiar. For example, if your familiar were a cat, you could gain the effects of *speak with animals* for any felines (including leopards, lions, and tigers, among others). This ability doesn't make them more friendly than normal. If your familiar ever changes to a different creature, you can't use this ability for 1 week while you absorb your new familiar's language.%r%r**Special** This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, occult, or primal)."
    traits:
      - witch
  Favored Terrain:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You have studied a specific terrain to overcome its challenges. Choose aquatic, arctic, desert, forest, mountain, plains, sky, swamp, or underground as your favored terrain. When in that terrain, you can ignore the effects of non-magical difficult terrain. If you have the unimpeded journey class feature, you gain a second benefit while in your favored terrain, depending on your choice. See the wiki for more information.
    traits:
      - ranger
  Finishing Follow-Through:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Finishing a foe maintains your swagger. You gain panache whenever your finisher brings a target to 0 HP.
    traits:
      - swashbuckler
  Furious Finish:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Desperate to finish the fight, you pour all your rage into one final blow. Make a Strike. If it hits, you gain a circumstance bonus to damage equal to the number of rounds remaining in your Rage (maximum 10). After this Strike, your Rage immediately ends, and you are fatigued until you rest for at least 10 minutes.
    traits:
      - barbarian
      - rage
  Hunter's Aim:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: When you focus on aiming, your attack becomes particularly accurate. Make a ranged weapon Strike against your hunted prey. On this Strike, you gain a +2 circumstance bonus to the attack roll and ignore your prey's concealed condition and any lesser cover.
    traits:
      - concentrate
      - ranger
  Improvise Admixture:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Frequency** once per day%r%r**Requirements** You have fewer than your maximum number of versatile vials, and you're either holding or wearing an alchemist's toolkit.%r%rYou scrounge together enough ingredients from what's left in your alchemist's toolkit to produce a few more versatile vials on the fly. Attempt a Crafting check. The DC is usually a standard-difficulty DC for your level, but the GM can assign a different DC based on the circumstances. The number of vials you regain depends on the result of your check (up to your maximum).%r%r**Critical Success** You regain 3 versatile vials.%r**Success** You regain 2 versatile vials.%r**Failure** You regain 1 versatile vial.%r**Critical Failure** You don't regain any versatile vials."
    traits:
      - alchemist
      - concentrate
      - manipulate
  Intimidating Strike:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Your blow not only wounds creatures but also shatters their confidence. Make a melee Strike. If you hit and deal damage, the target is frightened 1, or frightened 2 on a critical hit.
    traits:
      - barbarian
      - emotion
      - fear
      - fighter
      - mental
  Lightning Swap:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You have practiced quickly switching between combat styles and the equipment needed for them. You Interact to stow any number of items from your hands, then draw up to two weapons or a shield and a weapon.
    traits:
      - fighter
      - flourish
  Loremaster's Etude:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: enigma
    shortdesc: You magically unlock memories, making them easier to recall. You learn the *loremaster's etude* composition spell.
    traits:
      - bard
      - fortune
    init_magic: true
  Lunge:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a melee weapon.%r%rYou attack an enemy at the edge of your reach. Make a Strike with a melee weapon, increasing your reach by 5 feet for that Strike. If the weapon has the disarm, shove, or trip trait, you can use the corresponding action instead of a Strike."
    traits:
      - fighter
  Meddling Futures:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You open yourself to the guidance of whatever spirits or powers deign to help you. Roll 1d4 to see what type of spirit is drawn to you. Your next action must be the type of action the spirit prefers, but you also gain the listed benefit for the action as the spirit guides you. If you attempt to use a different action, you must succeed at a DC 6 flat check or the action is lost.%r%r**1 Warrior** You must attempt a Strike. You gain a +1 status bonus to your attack roll and a +2 status bonus to damage, or a +6 status bonus to damage if you are at least cursebound 3.%r%r**2 Adept** You must attempt a Perception check or a skill action. You gain a +1 status bonus to the check, or a +2 status bonus if you are cursebound 3.%r%r**3 Sage** You must attempt to Cast a Spell. You gain a status bonus to the spell's damage or healing equal to the spell's rank, or equal to the spell's rank + 3 if you are at least cursebound 3.%r%r**4 Wanderer** You must attempt a Stride action, or a Fly, Climb, or Burrow action if you have the relevant speed. You gain a +10-foot status bonus to your Speed for the action, or a +20-foot status bonus if you are at least cursebound 3."
    traits:
      - cursebound
      - divine
      - oracle
  Mobility:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You move without leaving an opening. When you Stride and move half your Speed or less, that movement does not trigger reactions. You can use Mobility when Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type.
    traits:
      - rogue
  Monster Warden:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 2
      feat:
        - Monster Hunter
    shortdesc: You understand how to defend against your prey. When you grant bonuses from Monster Hunter, each creature who benefits also gains a +2 circumstance bonus either to their AC the next time the creature attacks them or to their next saving throw against an effect from that particular creature (whichever comes first.)
    traits:
      - ranger
  Multifarious Muse:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Your muse doesn't fall into a single label. Choose a type of muse other than that of your own. You gain a 1st-level feat that requires that muse, and your muse is now also a muse of that type, allowing you to take feats with the other muse as a prerequisite. You don't gain any of the other effects of the muse you chose.%r%r**Special** You can take this feat multiple times. Each time you do, you must choose a different type of muse other than that of your own."
    traits:
      - bard
  No Escape:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** An enemy within reach attempts to move away from you.%r%rYou keep pace with a retreating foe. Stride up to your Speed, following the enemy and keeping it in reach throughout its movement until it stops moving or you've moved your full Speed. You can use No Escape to Burrow, Climb, Fly, or Swim instead of Stride if you have the corresponding movement type."
    traits:
      - barbarian
      - rage
  Nonlethal Spell:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You can alter offensive spells to be less deadly. If your next action is to Cast a Spell that deals damage and doesn't have the death or void trait, that spell gains the nonlethal trait.
    traits:
      - manipulate
      - spellshape
      - wizard
  Order Explorer:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You have learned the secrets of another druidic order, passing whatever rites of initiation that order requires and gaining access to its secrets. Choose an order other than your own. You gain a 1st-level feat that lists that order as a prerequisite, and you are now a member of that order for the purpose of meeting feat prerequisites. If you commit acts anathema to your new order, you lose all feats and abilities requiring that order but retain your other druid feats and abilities. You don't gain any of the other benefits of the order you chose.%r%r**Special** You can take this feat multiple times. Each time you do, you must choose a different order other than your own."
    traits:
      - druid
  Panic the Dead:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Vitality strikes terror in the undead. When you use a *heal* spell to damage undead, any undead that fails its saving throw is also frightened 1. If it critically failed, the creature also gains the fleeing condition until the start of your next turn. Mindless undead are not immune to this effect due to being mindless.
    traits:
      - cleric
      - emotion
      - fear
      - mental
  Pernicious Poison:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You can add a toxic additive to an alchemical poison to make it splash poison on its target. A poison with this additive deals an amount of poison damage equal to the poison's level if the target succeeds at its initial saving throw against it. A target that critically succeeds at its saving throw against this poison still takes no damage.
    traits:
      - additive
      - alchemist
  Person of Interest:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Frequency** once per 10 minutes%r%rSometimes, you need to follow the leads as they come in the middle of an investigation. Choose a creature that you can see who isn't, to your knowledge, tied to any of your current investigations. For the next minute, you can Devise a Stratagem against that creature as a free action."
    traits:
      - investigator
  Poison Resistance:
    assoc_charclass:
      - Alchemist
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Your affinity for the natural world grants you protection against some of its dangers. You gain poison resistance equal to half your level, and you gain a +1 status bonus to saving throws against poisons."
    traits:
      - alchemist
      - druid
  Propelling Sorcery:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "The force of your magic can be used to propel yourself or another. You know the following blood magic effect.%r%r**Blood Magic—Propelling Sorcery** You channel your magic outward into a rush of movement. Either you Step as a free action or move the target 5 feet in a direction of your choice."
    traits:
      - sorcerer
  Quick Draw:
    assoc_charclass:
      - Ranger
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You draw your weapon and attack with the same motion. You Interact to draw a weapon, then Strike with that weapon.
    traits:
      - ranger
      - rogue
  Rapid Response:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Trigger** An ally is reduced to 0 Hit Points.%r%rYou work quickly and efficiently in times of danger to deliver needed assistance. You Stride towards the triggering ally. You gain a +10-foot circumstance bonus to your Speed during this movement."
    traits:
      - cleric
  Rebounding Toss:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a thrown weapon.%r%rYou bounce your weapon off one foe to strike another. Make a ranged Strike with a thrown weapon. If this Strike hits, the weapon rebounds toward an enemy within 10 feet of the original target. Make an additional Strike against this second target. Both attacks count toward your multiple attack penalty, but the penalty doesn't increase until after you've made both attacks."
    traits:
      - fighter
      - flourish
  Retreating Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "You make a calculated attack without letting down your guard. Make a melee Strike with the following failure effect.%r%r**Failure** You Step as a free action."
    traits:
      - finisher
      - swashbuckler
  Revivifying Mutagen:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are under the effects of a mutagen.%r%rYou metabolize a mutagen to heal yourself. You regain 1d6 Hit Points for every 2 levels you have, but the mutagen's duration immediately ends."
    traits:
      - alchemist
      - concentrate
  Sap Life:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You draw the life force out of your enemies. When you cast a *harm* spell and damage at least one living creature, you regain Hit Points equal to the spell rank of your *harm* spell. If you aren't a living creature, you gain no benefit from this feat.
    traits:
      - cleric
      - healing
  Second Wind:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You can enter a second rage, but afterward you need to catch your breath. When you Rage, you can choose to gain temporary HP from the Rage even if 1 minute hasn't passed (or a full turn if you have the revitalizing rage class feature). If you do, once this Rage ends you become fatigued until you rest for 10 minutes.
    traits:
      - barbarian
  Shake it Off:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You concentrate on your rage, overcoming fear and fighting back sickness. Reduce your frightened condition value by 1, and attempt a Fortitude save to recover from the sickened condition as if you had spent an action retching; you reduce your sickened condition value by 1 on a failure (but not on a critical failure), by 2 on a success, or by 3 on a critical success.
    traits:
      - barbarian
      - concentrate
      - rage
  Shared Stratagem:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: The plans you make include your allies as well as yourself. When you hit a creature with an attack on which you substituted your attack roll due to Devising a Stratagem, designate one ally. The creature you hit is off-guard to that ally on the next attack that ally makes against that creature before the start of your next turn.
    traits:
      - investigator
  Shooting Stars Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
      feat:
        - Monastic Weaponry
    shortdesc: "You enter a stance that lets you throw shuriken with lightning speed. While in this stance, you can use your monk feats or monk abilities that normally require unarmed attacks with shuriken instead."
    traits:
      - monk
      - stance
  Sleek Reposition:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "**Requirements** You are wielding a finesse weapon or polearm.%r%rWhile your opponent is still recovering from your prior attack, you snag its armor, clothing, or flesh to move it as you please. Make a melee Strike with a finesse weapon or polearm. If you hit a target that is your size or smaller, you can automatically Reposition it, with the same benefits as the Reposition action (including the critical success effect, if your Strike was a critical hit). If you used a weapon with reach, use the weapon's reach for this Reposition. If you're wielding a polearm, you can ignore Reposition's requirement that you have a hand free.%r%rThis Strike has the following failure effect.%r%r**Failure** The target becomes off-guard until the end of your current turn."
    traits:
      - fighter
      - press
  Smoke Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You can add a tarry additive to an alchemical bomb to make it emit smoke. When thrown, in addition to its normal effects, the bomb creates a cloud of smoke in a 10-ft burst. You choose which corner of the target's space (or the space in which the bomb lands) the cloud is centered on. Creatures within that area have the concealed condition, and all other creatures are concealed to them. The smoke lasts for 1 minute or until dissipated by a strong wind.
    traits:
      - additive
      - alchemist
  Solid Lead:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: "Sometimes your case splinters into smaller mysteries, but you never lose sight of the big picture. Once per day when you give up on the subject of a lead due to using Pursue a Lead again, you can designate the lead you stopped pursuing as your solid lead for the day. Even though you stopped following the solid lead, you can change back to your solid lead any number of times by using a single action, which has the concentrate trait. Doing so ends one of your current leads as normal.%r%rDuring your next daily preparations, you can maintain your solid lead or you can remove it; removing it allows you to designate a new solid lead later that day."
    traits:
      - investigator
  Song of Strength:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: warrior
    shortdesc: Your performances inspire strength in your allies to aid them at physical tasks. You learn the *song of strength* composition cantrip.
    traits:
      - bard
    init_magic: true
  Strong Arm:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: When you Strike with a thrown weapon, the weapon's range increment increases by 10 feet.
    traits:
      - rogue
  Stunning Blows:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: The focused power of your flurry threatens to overwhelm your opponent. When you target the same creature with two Strikes from your Flurry of Blows, you can try to stun the creature. If either Strike hits and deals damage, the target must succeed at a Fortitude save against your class DC or be stunned 1 (or stunned 3 on a critical failure). This is an incapacitation effect.
    traits:
      - monk
  Tumble Behind (Swashbuckler):
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: Your tumbling puts your foes on the back foot. When you Tumble Through successfully, the foe you Tumbled Through is off-guard against the next attack you make before the end of your turn.
    traits:
      - swashbuckler
  Unbalancing Blow:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: thief
    shortdesc: Interweaving attacks, you unbalance your foes. Whenever your Strike is a critical hit and deals damage, the target is off-guard against your attacks until the end of your next turn.
    traits:
      - rogue
  Unbalancing Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You attack with a flashy assault that leaves your target off balance. Make a melee Strike. If you hit and deal damage, the target is off-guard until the end of your next turn.
    traits:
      - finisher
      - swashbuckler
  Underhanded Assault:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 2
      skill: Stealth/trained
    shortdesc: You capitalize on the distraction provided by an ally. You Sneak up to a foe adjacent to one of your allies. You can roll against the foe you're Sneaking up on, even if it's currently observing you, as though you were hidden. You take a –2 penalty on your Stealth check. If your Stealth check against the chosen foe succeeds, you can make a melee Strike against that foe at the end of your Sneak.
    traits:
      - rogue
  Uplifting Overture:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: maestro
    shortdesc: You learn the *uplifting overture* composition cantrip, which aids your allies' skills with the inspiring nature of your performance.
    traits:
      - bard
    init_magic: true
  Versatile Font:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
      ordeity:
        - Angoron
        - Animus
        - Ceinara
        - Dana
        - Deimos
        - Gilead
        - Rada
        - Reos
        - Serriel
        - Vardama
    shortdesc: As you explore your deity's aspects, you move beyond restrictions on healing or harming. You can prepare either *harm* or *heal* in the spell slots gained from the harmful font or healing font.
    traits:
      - cleric
  Warpriest's Armor:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 2
      specialize: warpriest
    shortdesc: Your training has helped you adapt to ever-heavier armor. You are trained in heavy armor. Whenever you gain a class feature that grants you expert or greater proficiency in medium armor, you also gain that proficiency in heavy armor. You treat armor you wear of 2 Bulk or higher as though it were 1 Bulk lighter (to a minimum of 1 Bulk).
    traits:
      - cleric
# Level 4 Class Feats
  Advanced Warden:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Initiate Warden
    shortdesc: "You unlock more powerful primal spells. You gain your choice of one warden spell from the advanced warden spells.%r%r*animal feature*%r%r*enlarge companion*%r%r*hunter's luck*%r%r*soothing mist*%r%r**Special** You can take this feat multiple times, choosing a different advanced warden spell each time."
    traits:
      - ranger
  Alchemical Discoveries:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: alchemical sciences
    shortdesc: You've devoted extra time in the lab to improve your knowledge of alchemy. You learn the formulas for two alchemical items each time you level up instead of one; these must still be elixirs or tools. The number of versatile vials you can create each day increases by one if you're an expert in Crafting, two if you're a master, or three if you're legendary.
    traits:
      - investigator
  Anthropomorphic Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Untamed Form
    shortdesc: Humanoids' supposed place apart from animals is folly—taking on their forms just requires some extra practice. You add the shapes listed in *humanoid form* to your *untamed form* list.
    traits:
      - druid
  Arcane Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - draconic
        - imperial
    shortdesc: "Your arcane legacy allows you to perceive how magic affects everything. You become trained in one skill of your choice.%r%rAdditionally, you can use arcane arts to tinker with your selection of spells. During your daily preparations, you can choose one spell in your spell repertoire to be a signature spell that day.%r%rYou can use the Learn a Spell activity to add more arcane spells to the list you choose from, but if you prepare a spell that isn't in your repertoire, you temporarily add it to your repertoire at the spell rank of your choice instead of making it a signature spell."
    traits:
      - arcane
      - sorcerer
  Aura of Courage:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You stand strong in the face of danger and inspire your allies to do the same. Whenever you become frightened, reduce the condition value by 1 (to a minimum of 0). At the end of your turn, each ally in your champion's aura reduces its frightened value by 1.
    traits:
      - champion
  Barreling Charge:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Athletics/trained
    shortdesc: You rush forward, moving enemies aside to reach your foe. You Stride, attempting to move through your enemies' spaces. Roll an Athletics check and compare the result to the Fortitude DC of each creature whose space you attempt to move through during your Stride, moving through its space on a success but ending your movement before entering its space on a failure. You can then Strike, regardless of how your Stride ended. You can use Barreling Charge to Burrow, Climb, Fly, or Swim instead of Stride if you have the corresponding movement type.
    traits:
      - barbarian
      - fighter
      - flourish
  Bespell Strikes:
    assoc_charclass:
      - Oracle
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Frequency** once per turn%r%r**Requirements** Your most recent action was to cast a non-cantrip spell.%r%r**Oracle** You siphon spell energy into one weapon you're wielding, or into one of your unarmed attacks, such as a fist. Until the end of your turn, the weapon or unarmed attack deals an extra 1d6 force damage and gains the divine trait if it didn't have it already. If the spell dealt a different type of damage, the Strike deals this type of damage instead (or one type of your choice if the spell could deal multiple types of damage).%r%r**Sorcerer** You siphon spell energy into one weapon you're wielding or into one of your unarmed attacks, such as a fist. Until the end of your turn, the weapon or unarmed attack deals an extra 1d6 force damage and gains the trait of your bloodline's magical tradition if it didn't have it already. If the spell dealt a different type of damage, the Strike deals this type of damage instead (or one type of your choice if the spell could deal multiple types of damage).%r%r**Wizard** You siphon spell energy into one weapon you're wielding, or into one of your unarmed attacks, such as a fist. Until the end of your turn, the weapon or unarmed attack deals an extra 1d6 force damage and gains the arcane trait if it didn't have it already. If the spell dealt a different type of damage, the Strike deals this type of damage instead (or one type of your choice if the spell could deal multiple types of damage)."
    traits:
      - oracle
      - sorcerer
      - wizard
  Call Wizardly Tools:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You're mystically connected to your wizardly tools, ensuring you can always find them when you've misplaced them. You teleport your bonded item or spellbook to you. It arrives in your hand if you have a free hand or at your feet if you don't. The item must be within 1 mile and have 1 Bulk or less.
    traits:
      - concentrate
      - teleportation
      - wizard
  Channel Smite:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Cost** Expend a *harm* or *heal* spell.%r%rYou siphon the energies of life and death through a melee attack and into your foe. Make a melee Strike. On a hit, you cast the 1-action version of the expended spell to damage the target, in addition to the normal damage from your Strike. The target automatically gets a failure on its save (or a critical failure if your Strike was a critical hit). The spell doesn't have the manipulate trait when cast this way.%r%rThe spell is expended with no effect if your Strike fails or hits a creature that isn't damaged by that energy type (such as if you hit a non-undead creature with a *heal* spell)."
    traits:
      - cleric
      - divine
  Cobra Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You enter a tight stance, coiled up like a lashing cobra with your hands poised as venomous fangs.%r%rWhile in this stance, the only Strikes you can make are cobra fang unarmed attacks. These deal 1d4 piercing damage; are in the brawling group; and have the agile, deadly d10, finesse, unarmed, and venomous traits.%r%rWhile in Cobra Stance, you gain a +1 circumstance bonus to Fortitude saves and your Fortitude DC, and you gain poison resistance equal to half your level."
    traits:
      - monk
      - stance
  Combat Reading:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You use a performer's cold reading techniques, aura reading, and other tricks to discover your foe's strengths and weaknesses. The GM rolls a secret Occultism check for you against the Deception or Stealth DC (whichever is higher) of an enemy of your choice who is not concealed from you, hidden from you, or undetected by you, and who is engaged in combat. The GM might apply a penalty for the distance between you and the enemy. The enemy is then temporarily immune to your Combat Reading for 1 day.%r%r**Critical Success** The GM chooses and tells you two of the following pieces of information about the enemy: which of the enemy's weaknesses is highest, which of the enemy's saving throws has the lowest modifier, one immunity the enemy has, or which of the enemy's resistances is highest. In the event of a tie, the GM should pick one at random.%r**Success** The GM chooses one piece of information from the above list to tell you about the enemy.%r**Critical Failure** The GM gives you false information (the GM makes up the information)."
    traits:
      - bard
      - secret
  Companion's Cry:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Animal Companion (Ranger)
    shortdesc: You can urge your companion to do its utmost. You can spend 2 actions to Command an Animal instead of 1 when commanding your animal companion. If you do, your animal companion uses an additional action.
    traits:
      - ranger
  Courageous Advance:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: warrior
    shortdesc: With a rousing call, you exhort an ally to advance. If your next action is to cast the *courageous anthem* composition cantrip, one ally of your choice who gains a status bonus from the spell can immediately use their reaction to Stride.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
    init_magic: true
  Dastardly Dash:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You dash past an opponent, confounding them with underhanded tactics. Stride up to half your speed. You can attempt a Trip or a Dirty Trick (if you have that action) against one opponent you pass within range of at any point during your movement.
    traits:
      - flourish
      - swashbuckler
  Deflect Projectile:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** You are the target of a physical ranged attack.%r%r**Requirements** You're aware of the attack, are not off-guard against it, and have a hand free.%r%rYou gain a +4 circumstance bonus to AC against the triggering attack. If the attack misses, you have deflected it. You cannot use this feat to deflect unusually massive ranged projectiles (such as boulders or ballista bolts)."
    traits:
      - monk
  Detective's Readiness:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: When you're on a case, you stay watchful and resolute to avoid tricks your suspect might pull. You gain your investigation bonus from Pursue a Lead on saving throws (and their DCs, as normal) against creatures or effects that are related to the question at the heart of an open investigation, and you can use Clue In to assist an ally's saving throw against that creature or effect.
    traits:
      - investigator
  Directed Channel:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You can shape the energy you channel in a single direction. When you cast a version of *harm* or *heal* that has an area, you can make its area a 60-ft cone instead of a 30-ft emanation.
    traits:
      - cleric
  Disrupt Prey:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** Your hunted prey is within your reach, and it uses a manipulate action, uses a move action, or leaves a square during a move action it's using.%r%rMake a melee Strike against your prey. If the attack is a critical hit, you disrupt the triggering action."
    traits:
      - ranger
  Divine Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - angelic
        - demonic
        - diabolic
        - draconic
        - undead
    shortdesc: The divine might provided by your bloodline flows through you. You gain an additional spell slot of your highest level, which you can use only to cast your choice of *heal* or *harm*. You can cast either of these spells using that spell slot, even if they aren't in your spell repertoire.
    traits:
      - divine
      - sorcerer
  Divine Infusion:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You pour energy into the subject of your healing to empower its attacks. If the next action you use is to cast *harm* or *heal* to restore Hit Points to a single creature, the target then deals an additional 1d6 damage with its melee weapons and unarmed attacks until the end of its next turn. The damage type is void if you cast *harm* and vitality if you cast *heal*.%r%rIf the spell cast is at least 5th rank, this damage increases to 2d6, and if the spell is at least 8th rank, the damage increases to 3d6."
    traits:
      - cleric
      - concentrate
      - spellshape
  Double Shot:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding a ranged weapon with reload 0.%r%rYou shoot twice in blindingly fast succession. Make two Strikes, each against a separate target and with a –2 penalty. Both attacks count toward your multiple attack penalty, but the penalty doesn't increase until after you've made both of them."
    traits:
      - fighter
      - flourish
  Dread Striker:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You capitalize on your enemies' fear to slip past their defenses. Any creature that has the frightened condition is also off-guard against your attacks.
    traits:
      - rogue
  Dual-Handed Assault:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding a one-handed melee weapon and have a free hand.%r%rYou snap your free hand over to grip your weapon just long enough to add momentum and deliver a more powerful blow to your opponent. Make a Strike with the required weapon. You quickly switch your grip during the Strike in order to make the attack with two hands. If the weapon doesn't normally have the two-hand trait, increase its weapon damage die by one step for this attack. If the weapon has the two-hand trait, you gain the benefit of that trait and a circumstance bonus to damage equal to the weapon's number of damage dice. When the Strike is complete, you resume gripping the weapon with only one hand. This action doesn't end any stance or fighter feat effect that requires you to have one hand free."
    traits:
      - fighter
      - flourish
  Efficient Alchemy (Alchemist):
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "Thanks to the time you've spent studying and experimenting, you know how to scale your formulas into larger batches that don't require any additional attention. Increase the number of items you can create each day with Advanced Alchemy to 6 + your Intelligence modifier.%r%rIn addition, when you Craft alchemical consumables during downtime, you can produce twice as many alchemical items in a single batch without spending additional preparatory time. For instance, if you are creating elixirs of life, you can craft up to eight elixirs in a single batch using downtime, rather than four. This doesn't change the amount of alchemical reagents or other ingredients required to craft each item, nor does it change your rate of progress for days past the base downtime spent."
    traits:
      - alchemist
  Elemental Summons:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You can call the elements to you. You can spend 10 minutes in concert with nature to replace a spell you've prepared in one of your druid spell slots with a *summon elemental* spell of the same rank.
    traits:
      - druid
  Enduring Alchemy:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You've learned how to make your personal energy last just a little bit longer when quickly brewing ad hoc concoctions. When using Quick Alchemy to create an alchemical tool or elixir, that tool or elixir remains potent until the end of your next turn, instead of losing its potency at the start of your next turn.
    traits:
      - alchemist
  Even the Odds:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Frequency** once per 10 minutes%r%r**Trigger** Your turn begins.%r%r**Requirements** You are being flanked.%r%rYou shine brightest in desperate moments. You flash a confident smile or pose, and you gain panache until the end of your turn."
    traits:
      - swashbuckler
  Far Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: Your experience in the field has taught you how to focus your aim at a distance, increasing your accuracy. Double your weapons' range increments.
    traits:
      - ranger
  Favored Prey:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You have studied a specific type of wild creature and can hunt it more easily. When you gain this feat, choose animals, beasts, dragons, or both fungi and plants as your favored prey. When you roll initiative and can see an enemy that belongs to the chosen category, you can Hunt Prey as a free action, designating that enemy.%r%rYou can use this free action even if you haven't identified the creature yet with Recall Knowledge. The benefit doesn't apply against favored enemies disguised as other creatures, and the GM determines whether it applies against a creature disguised as a favored prey."
    traits:
      - ranger
  Flamboyant Athlete:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Athletics/expert
    shortdesc: "Your Panache allows you to perform incredible feats: climbing, swimming, and leaping far beyond your normal capacity. While you have panache, you gain the following benefits."
    traits:
      - swashbuckler
  Flurry of Maneuvers:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Athletics/expert
    shortdesc: You flurry is a combination of maneuvers. You can replace one or both of your attacks during a Flurry of Blows with Grapples, Repositions, Shoves, or Trips.
    traits:
      - monk
  Flying Kick:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You launch yourself at a foe. Make a Leap or attempt a High Jump or Long Jump.%r%rAt the end of the jump, if you're adjacent to a foe, you can immediately Strike that foe with an unarmed attack, even if the foe is in midair. You fall to the ground after the Strike. If the distance you fall is no more than the height of your jump, you land upright and take no damage."
    traits:
      - monk
  Forest Passage:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: leaf
    shortdesc: You can always find a path, almost as if foliage parted before you. You ignore any difficult terrain caused by plants and fungi, such as bushes, vines, and undergrowth.
    traits:
      - druid
  Form Control:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Untamed Form
    shortdesc: With additional care and effort, you can take on an alternate shape for a longer period of time. If your next action is to cast untamed form, the spell's rank is 2 lower than normal (minimum 1st rank), but you can remain transformed for up to 1 hour or the listed duration (whichever is longer). You can still Dismiss untamed form as normal.
    traits:
      - druid
      - manipulate
      - spellshape
  Guarded Movement:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: Your guard is up, even while moving. You gain a +4 circumstance bonus to AC against reactions triggered by your movement.
    traits:
      - monk
  Guardian's Deflection (Swashbuckler):
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** An ally within your melee reach is hit by an attack, you can see the attacker, and a +2 circumstance bonus to AC would turn the critical hit into a hit or the hit into a miss.%r%r**Requirements** You are wielding a single one-handed melee weapon and have your other hand or hands free.%r%rYou use your weapon to deflect the attack against your ally, granting a +2 circumstance bonus to their AC against the triggering attack. This turns the triggering critical hit into a hit, or the triggering hit into a miss. You gain panache until the end of your next turn."
    traits:
      - swashbuckler
  Harmonize Self:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Qi Spells
    shortdesc: You can restore your health by tapping into your qi. You gain the *harmonize self* qi spell.
    traits:
      - monk
    init_magic: true
  Head Stomp:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: Make an unarmed melee Strike against a prone target. If it hits, until the end of your next turn the target is stupefied 1 (or stupefied 2 on a critical hit) and off-guard.
    traits:
      - rogue
  Healing Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You can add a foamy catalyst to an elixir of life to turn it into a topical projectile. You can throw the elixir at a creature within 20 feet as an Interact action to heal that creature and those near it. The target is affected as though it drank the elixir, and each living creature adjacent to it regains HP from the bomb equal to the elixir's number of damage dice (3 HP for a lesser elixir of life, for example).
    traits:
      - additive
      - alchemist
  Impaling Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You stab two foes with a single thrust or bash them together with one punch.%r%rMake a bludgeoning or piercing melee Strike and compare the attack roll result against the AC of up to two foes. One foe must be adjacent to you, and the other foe must be adjacent to and directly behind the first foe, in a straight line from your space.%r%rRoll damage once and apply it to each creature you hit. An Impaling Finisher counts as two attacks when calculating your multiple attack penalty."
    traits:
      - finisher
      - swashbuckler
  In Tune:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: maestro
    shortdesc: "You attune your great skill in performing to another, granting them a small measure of your skill as though anyone could do it. If your next action is casting a composition spell with an emanation area, its area spreads from a willing ally of your choice within 60 feet instead of you.%r%rIf you have Directed Audience, you can have that cone originate from the ally instead."
    traits:
      - bard
      - concentrate
      - spellshape
    init_magic: true
  Invigorating Elixir:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You can mix an aromatic salve into an elixir with the healing trait to soothe physical maladies. In addition to its normal effects, the elixir can be imbibed by a creature prevented from doing so (such as a sickened creature).%r%rIn addition to its other effects, the elixir attempts to counteract an effect imposing one of the following conditions of the imbiber's choice: clumsy, enfeebled, sickened, or stupefied. Use half your level rounded up for the counteract rank and your class DC – 10 for the counteract modifier. The imbiber is then temporarily immune to the effects of this additive for 10 minutes. The additive can't counteract curses, diseases, or conditions that are part of the creature's normal state."
    traits:
      - additive
      - alchemist
  Knowledge of Shapes:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 4
      orfeat:
        - Reach Spell
        - Widen Spell
    shortdesc: Inspiration lets you surpass your preconceptions of your spells' limits. You use Reach Spell or Widen Spell as a free action.
    traits:
      - cursebound
      - oracle
      - spellshape
  Leading Dance:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Performance/trained
    shortdesc: "**Requirements** You are adjacent to an enemy.%r%rYou sweep your foe into your dance. Attempt a Performance check against an adjacent enemy's Will DC.%r%r**Critical Success** Your foe is swept up in your dance. You both move up to 10 feet in the same direction, remaining adjacent to one another. Your movement doesn't trigger reactions from the target (and the target's movement doesn't trigger reactions because it's forced movement).%r**Success** As critical success, but you both move only 5 feet.%r**Failure** The foe doesn't follow your steps. You can move 5 feet if you choose, but this movement triggers reactions normally.%r**Critical Failure** You stumble, falling prone in your space."
    traits:
      - bravado
      - move
      - swashbuckler
  Leshy Familiar Secrets:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: leaf
    shortdesc: The leaf order's secrets allow your familiar to take advantage of its leshy form. You can select one additional familiar ability each day, which must be one of the following leshy familiar abilities. You can't select more than one ability from this feat at a time.
    traits:
      - druid
  Lie Detector:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - empiricism
        - interrogation
    shortdesc: "You're adept at noticing the tells of a liar—sweat, flushing, a quavering voice, a quickening pulse. You gain a +1 circumstance bonus to Perception checks to Sense Motive and to Perception DCs against attempts to Lie to you. When you determine someone is lying to you, you can use their deceit to your advantage to gain a +1 circumstance bonus to the next Deception, Diplomacy, Intimidation, or Performance check you attempt against that creature within the next minute.%r%rIf you would gain your Pursue a Lead investigation bonus to any of the above checks, that bonus increases by 1 instead of you gaining the +1 bonus listed."
    traits:
      - investigator
  Linked Focus:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - mana syntaxia
        - accordant conjury
        - urban thaumaturgy
        - defensive cerebralism
        - mutable modification
        - null's purview
    shortdesc: You have linked your bonded item to the well of energy that powers your school spells. Once per day when you Drain your Bonded Item to cast one of your arcane school's curriculum spells, you also regain 1 Focus Point.
    traits:
      - wizard
  Mature Animal Companion (Druid):
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Animal Companion (Druid)
    shortdesc: "Your animal companion has grown up over the course of your adventures, becoming a mature animal companion and gaining additional capabilities.%r%rYour animal companion has greater independence. During an encounter, even if you don't use the Command an Animal action, your animal companion can still use 1 action that round on your turn to Strike or Stride (or Burrow, Climb, Fly, or Swim if it has that Speed). It can do this at any point during your turn, as long as you aren't currently taking an action. If it does, that's all the actions it gets that round—you can't Command it later."
    traits:
      - druid
  Melodious Spell:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You subtly weave your spellcasting into a performance. If the next action you use is to Cast a Spell, the spell gains the subtle trait, hiding the shining runes, sparks of magic, and other manifestations that would usually give away your spellcasting. The trait hides only the spell's spellcasting actions and manifestations, not its effects, so an observer might still see a ray streak out from you or see you vanish into thin air.%r%rAs part of using Melodious Spell, you can choose to Create a Diversion, Demoralize, Perform, or Request. If you do so, the spell you cast must have the auditory, emotion, sonic, or visual trait to gain the subtle trait."
    traits:
      - bard
      - concentrate
      - manipulate
      - spellshape
  Mercy:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 4
      focus_spell:
        - Lay on Hands
    shortdesc: "Your touch soothes the body or mind. You can cast lay on hands targeting a living creature using 2 actions instead of 1. If you do, you can attempt to counteract one condition of your choice affecting the target. When you select this feat, choose one of the following options, which determines the conditions you can choose:%r%r**Mercy of the Body** blinded, dazzled, deafened, enfeebled, sickened;%r%r**Mercy of Grace** clumsy, grabbed, paralyzed;%r%r**Mercy of the Mind** fleeing, frightened, stupefied.%r%r**Special** You can select this feat up to three times. Each time, choose a different type of mercy and add its options to those you can choose when you cast a 2-action lay on hands."
    traits:
      - champion
  Mug:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You make a quick attack and rob your foe in the process. Make a melee Strike against an adjacent enemy. If you hit and deal sneak attack damage, you can also attempt to Steal from the target, even if the target is in combat.
    traits:
      - rogue
  Occult Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - aberrant
        - draconic
        - hag
    grants:
      skill:
        - open
    shortdesc: Glimpses of the obscure secrets of the universe loan you power. You become trained in one skill of your choice. Additionally, once per day, you can spend 1 minute to choose one mental occult spell you don't know and add it to your spell repertoire. You lose this temporary spell the next time you make your daily preparations (though you can use this ability to add it again later).
    traits:
      - occult
      - sorcerer
  Ongoing Investigation:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You're always investigating what's around you, even as you perform other activities. You can move at full Speed while using the Investigate exploration activity, and you can use another exploration activity while Investigating.
    traits:
      - investigator
  Order Magic:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Order Explorer
    shortdesc: "You have delved deeper into the teaching of a new order, gaining access to a coveted order spell. Choose an order you have selected with Order Explorer. You gain the initial order spell from that order.%r%r**Special** You can take this feat multiple times. Each time you do, you must choose a different order you have selected with Order Explorer."
    traits:
      - druid
  Oversized Throw:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You have one or more hands free.%r%rWith a great heave, you seize a piece of your surroundings, such as a boulder, log, table, wagon, or chunk of earth, and hurl it at your foes. The object must be your size or one size smaller than you, and it must not have too much Bulk for you to lift it in the first place. Make a ranged Strike with the object; regardless of the result, the object takes the same amount of damage it would deal on a success.%r%rThe object is a simple ranged weapon that deals 1d10 bludgeoning damage, has a range increment of 20 feet, and has the thrown weapon trait. The damage increases to 2d10 bludgeoning damage if you have weapon specialization in simple weapons, or 3d10 bludgeoning if you have greater weapon specialization."
    traits:
      - barbarian
      - rage
  Parting Shot:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding a loaded ranged weapon or a ranged weapon with reload 0.%r%rYou jump back and make a quick shot that catches your opponent by surprise. You Step and then make a ranged Strike with the required weapon. Your target is off-guard against the attack."
    traits:
      - fighter
  Poison Weapon:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding a weapon.%r%rYou apply a contact poison or injury poison to the required weapon; if you have a free hand, you can Interact to draw a poison as part of this action. This poison can be one of the simple injury poisons you can create due to this feat, or another contact or injury poison you've acquired.%r%r**Special** During your daily preparations, you can prepare a number of simple injury poisons equal to your level. These follow the rules for injury poisons, except that they deal 1d4 poison damage with no saving throw. Only you can apply these poisons properly, and they expire the next time you prepare."
    traits:
      - manipulate
      - rogue
  Powerful Shove:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
      orfeat:
        - Aggressive Block
        - Brutish Shove
    shortdesc: "You can push larger foes around with your attack. You can use Aggressive Block or Brutish Shove against a creature up to two sizes larger than you.%r%rWhen a creature you Shove or knock back with a shield, polearm, or club's critical specialization effect has to stop moving because it would hit an object, it takes damage equal to your Strength modifier (minimum 1)."
    traits:
      - fighter
  Predictable!:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "By observing an opponent, you can get a sense of their next move and prepare to counter or resist it. Choose one target and attempt a Perception check to Sense Motive against the foe's Deception DC or a hard DC of the foe's level, whichever is higher.%r%r**Critical Success** You precisely discern the target's strategy, gaining a +2 circumstance bonus to AC against the creature until the start of your next turn and a +2 circumstance bonus to your next saving throw against the creature before the start of your next turn.%r**Success** You deduce the gist of the target's strategy; as critical success, except the circumstance bonus is only +1.%r**Failure** You fail to discern the target's strategy and gain no benefit.%r**Critical Failure** You misinterpret the target's strategy and take a –1 circumstance penalty to AC against the creature until the start of your next turn, and a –1 circumstance penalty to your next saving throw against the creature before the start of your next turn."
    traits:
      - rogue
  Primal Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 4
      orspecialize:
        - draconic
        - elemental
        - fey
    shortdesc: You can call upon the creatures of the wild for aid. You gain an additional spell slot of your highest rank, which you can use only to cast *summon animal* or *summon plant or fungus*. You can cast either of these spells using that spell slot, even if it they aren't in your spell repertoire.
    traits:
      - primal
      - sorcerer
  Quick Reversal:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are flanked by at least two enemies.%r%rYou turn your foes' flanking against them with a quick reverse. Make a melee Strike against one of the flanking enemies and make a second Strike with the same weapon or unarmed attack against a different enemy that is flanking you. This second Strike has the same multiple attack penalty of the initial attack and doesn't count toward your multiple attack penalty."
    traits:
      - fighter
      - flourish
      - press
  Raging Athlete:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Athletics/expert
    shortdesc: Physical obstacles can't hold back your fury. While you are raging, you gain a climb Speed and swim Speed equal to your land Speed, the DC of your High Jumps and Long Jumps decreases by 10, and you increase your distance on a successful Long Jump by 10 feet. Your distance for a vertical Leap increases to 5 feet vertically, and your distance for a horizontal Leap increases to 15 feet if your Speed is at least 15 feet, and to 20 feet if your Speed is at least 30 feet.
    traits:
      - barbarian
  Raise Symbol:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding a religious symbol.%r%rYou present your religious symbol emphatically. You gain a +2 circumstance bonus to saving throws until the start of your next turn. While it's raised, if you roll a success at a saving throw against a vitality or void effect, you get a critical success instead. If the religious symbol you're raising is a shield, such as with Emblazon Armament, you gain the effects of Raise a Shield when you use this action and the effects of this action when you Raise a Shield."
    traits:
      - cleric
  Rallying Anthem:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You learn the *rallying anthem* composition cantrip, which protects you and allies.
    traits:
      - bard
    init_magic: true
  Reactive Pursuit:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** An adjacent foe moves away from you, and you can reach at least one space adjacent to the foe with a Stride action.%r%rYou keep pace with a retreating foe. You Stride, but you must end your movement adjacent to the triggering enemy. Your move does not trigger reactions from the triggering enemy. You can use Reactive Pursuit to Burrow, Climb, Fly, or Swim instead of Stride if you have the corresponding movement type."
    traits:
      - rogue
  Regurgitate Mutagen:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are under the effects of a mutagen.%r%rYou redirect a mutagen within your body to spit a stream of stomach acid at a foe. A creature within 30 feet takes 1d6 acid damage for every 2 levels you have, with a basic Reflex save against your class DC. On a failure, the creature is also sickened 1 (or sickened 2 on a critical failure). The mutagen's duration immediately ends."
    traits:
      - alchemist
      - manipulate
  Restorative Strike:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You have a *harm* or *heal* spell you can cast.%r%rYou balance both sides of the scales, restoring yourself while striking a foe. Cast a 1-action *harm* or *heal* spell to heal yourself, expending the spell normally. It loses the manipulate trait when cast this way. Then make a melee Strike. If you make this Strike with your deity's favored weapon, you gain a +1 status bonus to the attack roll.%r%rIf the Strike hits, you can target a second willing creature to heal the same amount from the spell. This creature can be outside of the spell's range, provided it's adjacent to the enemy you hit."
    traits:
      - cleric
  Rites of Convocation:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: Your patron grants you the power to summon other creatures to aid you. Choose one summon spell (such as *summon animal*, *summon construct* and so forth) that appears on the spell list of your spellcasting tradition. You can spend 10 minutes in communion with your familiar to replace one spell you've prepared in one of your witch spell slots with the spell you chose, heightened to the same rank. The spell you replaced must be of at least the summon spell's minimum spell rank.
    traits:
      - witch
  Ritual Researcher:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: enigma
      skill: Occultism/expert
    shortdesc: Careful research into the art of rituals has made you better at performing them. You gain a +2 circumstance bonus to all primary and secondary checks you attempt as part of casting a ritual.
    traits:
      - bard
      - uncommon
  Sabotage:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You have a free hand.%r%rYou subtly damage others' equipment. Choose one item that a creature within your reach wields or carries. The item must have moving parts that you could possibly sabotage (a shortbow could be sabotaged, but a longsword could not). Attempt a Thievery check against the Reflex DC of the creature. Damage dealt by Sabotage can't take the item below its Broken Threshold.%r%r**Critical Success** You deal damage equal to 4 x your Thievery proficiency bonus.%r**Success** You deal damage equal to double your Thievery proficiency bonus.%r**Critical Failure** The item is temporarily immune to your Sabotage for 1 day."
    traits:
      - incapacitation
      - rogue
  Sacred Ground:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Frequency** once per 10 minutes%r%rYou pray continuously for 1 minute to call a subtle shadow of your deity's realm over a 30-ft burst centered on you. It lasts for 10 minutes, and a creature that remains in the area for the entire 10 minutes regains Hit Points equal to your level. If you have a healing font, this activity has the healing and vitality traits and heals living creatures. If you have a harmful font, this activity has the healing and void traits and heals undead creatures (or other creatures with void healing). Clerics with Versatile Font can choose either or both. It can't damage creatures in any case."
    traits:
      - cleric
      - consecration
      - divine
      - exploration
  Scalpel's Point:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: forensic medicine
    shortdesc: Your stratagems benefit from your precise knowledge of anatomy. When you critically hit with an attack on which you substituted your attack roll due to Devising a Stratagem, if your attack dealt piercing or slashing damage, you also deal 1d6 persistent bleed damage to your target.
    traits:
      - investigator
  Scars of Steel:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: fury
    shortdesc: "**Frequency** once per day%r%r**Trigger** An opponent critically hits you with an attack that deals physical damage.%r%rWhen you are struck with the mightiest of blows, you can flex your muscles to turn aside some of the damage. You gain resistance to the triggering attack equal to your Constitution modifier plus half your level."
    traits:
      - barbarian
      - rage
  Scoundrel's Surprise:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You drop your disguise at the right moment and surprise your target. After you Impersonate someone else using a disguise kit, you can remove your disguise with a dramatic gesture. Any creatures that previously failed to see through your disguise are off-guard against the next attack you make before the end of your turn.
    traits:
      - rogue
  Scout's Warning:
    assoc_charclass:
      - Ranger
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** You are about to roll a Perception, Stealth, or Survival check for initiative.%r%rYou visually or audibly warn your allies of danger, granting them each a +1 circumstance bonus to their initiative rolls, or a +2 circumstance bonus if you're using the Scout exploration activity. Depending on whether you use gestures or call out, this action gains either the visual or the auditory trait, respectively."
    traits:
      - ranger
      - rogue
  Security:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 4
      focus_spell:
        - shields of the spirit
    shortdesc: Those you shield can benefit from your lasting protection. You can cast *shields of the spirit* using 2 actions instead of 1. If you do, you can choose one ally in your champion's aura to gain a spirit shield that accompanies it. For 1 minute, that ally gains the benefits of *shields of the spirit*, even while the ally isn't in your champion's aura and even if your shield isn't raised. If you create another companion shield, any previous one ends.
    traits:
      - champion
  Shielded Stride:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: When your shield is up, your enemies' blows can't touch you. When you have your shield raised, you can Stride to move half your Speed without triggering reactions that are triggered by your movement (such as Reactive Strikes). You can use Shielded Stride while Flying or Swimming instead of Striding if you have the corresponding movement type.
    traits:
      - fighter
  Slam Down:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
      skill: Athletics/trained
    shortdesc: You make an attack to knock a foe off balance, then follow up immediately with a sweep to topple them. Make a melee Strike. If it hits and deals damage, you can attempt an Athletics check to Trip the creature you hit. If you're wielding a two-handed melee weapon, you can ignore Trip's requirement that you have a hand free. Both attacks count toward your multiple attack penalty, but the penalty doesn't increase until after you've made both of them.
    traits:
      - fighter
      - flourish
  Snowdrift Spell:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: storm
    shortdesc: The howling wind and precipitation of your magic turn to thick snow. If your next action is to Cast a Spell that has the air, water, or cold trait, and that does not have the fire trait, select one creature affected by the spell on the ground. Each square on the ground under or adjacent to the creature fills with ankle-deep snow. Those squares are difficult terrain until the beginning of your next turn. A creature can Interact to clear a square of snow, and the snow in a square melts if that square is exposed to a fire effect.
    traits:
      - cold
      - druid
      - manipulate
      - spellshape
  Spell Protection Array:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You inscribe a circle of arcane runes that dampen enemies' magic. You create a glowing magic circle in a 5-ft burst within 30 feet. Creatures in the circle gain a +1 status bonus to saving throws against magic. The circle lasts until the end of your next turn, and you can Sustain it, to a maximum duration of 1 minute.
    traits:
      - arcane
      - manipulate
      - wizard
  Spiritual Guides:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: spirit
    shortdesc: "**Frequency** once per day%r%r**Trigger** You fail, but don't critically fail, a Perception check or a skill check.%r%rThough no one sees them and only you can hear them, the spirits around you constantly chatter, save when you are raging. Sometimes they're even helpful, and their guidance can even cut through the haze of your rage. Reroll the triggering check, using the second result even if it's worse."
    traits:
      - barbarian
      - concentrate
      - fortune
  Split Shot:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You fragment a ranged spell. If your next action is to Cast a Spell without a duration that requires an attack roll against a single target, you can choose a second target within range. You roll a single attack roll and compare the result to the AC of both targets.%r%rThis counts as one attack for your multiple attack penalty. To the second target, the spell deals half the amount of damage it would normally deal and has no effects beyond the spell's initial damage (such as imposing conditions or penalties)."
    traits:
      - concentrate
      - sorcerer
      - spellshape
  Stand Still:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** A creature within your reach uses a move action or leaves a square during a move action it's using%r%rYou strike out when your foe tries to flee. Make a melee Strike against the triggering creature. If the attack is a critical hit and the trigger was a move action, you disrupt that action."
    traits:
      - monk
  Strategic Assessment:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You learn your foes' strengths and weaknesses by watching them move. When you hit a creature with a Strike on which you substituted your attack roll due to Devising a Stratagem, the GM chooses one of the following pieces of information about the enemy to tell you.%r%rThe GM can choose deliberately or at random, but they can't choose information that doesn't apply (such as choosing an immunity for an enemy that has no immunities). This applies only the first time you hit a given creature."
    traits:
      - investigator
  Supernatural Senses:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Acute Scent
    shortdesc: Your scent is preternaturally sharp, and you can always rely on your sense of smell to help guide you when your vision is compromised. When you target a concealed or hidden opponent while you are raging, you reduce the DC of the flat check to 3 for a concealed target or to 9 for a hidden one.
    traits:
      - barbarian
      - rage
  Swaggering Initiative:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** You are about to roll initiative.%r%rYou swagger readily into any fight. You gain a +2 circumstance bonus to your initiative roll and can Interact to draw a weapon. If you are the first to act in combat, you gain panache."
    traits:
      - swashbuckler
  Swipe:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "You make a wide, arcing swing. Make a single melee Strike and compare the attack roll result to the ACs of up to two enemies, each of whom must be within your melee reach and adjacent to the other. Roll damage only once and apply it to each creature you hit. A Swipe counts as two attacks for your multiple attack penalty.%r%rIf you're using a weapon with the sweep trait, its modifier applies to all your Swipe attacks."
    traits:
      - barbarian
      - fighter
      - flourish
  Sympathetic Strike:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Witch's Armaments
    shortdesc: "**Frequency** once per round%r%rYou collect your patron's magic into one of your witch armaments, causing them to shine with runes, light, or another signifier of your patron.%r%rMake an unarmed Strike with one with your witch's armaments. If you hit, you establish a sympathetic link with the target, making it easier for your patron to affect them. Until the beginning of your next turn, the target takes a –1 circumstance penalty to its saves against your hexes, or a –2 penalty if the triggering Strike was a critical hit."
    traits:
      - witch
    init_magic: true
  Tenacious Toxins:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: Your victims tend to expire long before your poisons, since the latter have been specifically formulated to last longer. The maximum duration of any poison you create increases by an amount equal to the poison's stage 1 interval, to a maximum of twice the poison's maximum duration.
    traits:
      - alchemist
  The Harder They Fall:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You make your foes fall painfully when you trip them. When you successfully Trip an off-guard foe, your target takes 1d6 bludgeoning damage. On a critical success, the target takes 1d6 bludgeoning damage plus your sneak attack damage.
    traits:
      - rogue
  Thousand Visions:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You open your senses to numerous visions of the immediate future. The visions grant you subtle details of your immediate surroundings within 30 feet. Within this range, you don't need to succeed at a flat check to target a concealed creature, you're not off-guard to creatures that are hidden from you (unless you're off-guard to them for reasons other than the hidden condition), and you need only a successful DC 5 flat check to target a hidden creature. Beyond 30 feet, the visions become overwhelmed with too many possible futures, making all of your senses imprecise beyond this range. The visions persist for 1 minute.
    traits:
      - cursebound
      - oracle
      - prediction
  Triple Time:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: You learn the *triple time* composition cantrip, which speeds up you and your allies for a round.
    traits:
      - bard
    init_magic: true
  Twin Distraction:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Twin Feint
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYour movements with two weapons are so swift and disorienting that they befuddle your opponent. When using Twin Feint, if both your Strikes deal damage to a targeted creature, the target must succeed at a Will saving throw against your class DC or become stupefied 1 until the end of your next turn."
    traits:
      - rogue
  Twin Parry:
    assoc_charclass:
      - Fighter
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Requirements** You are wielding two melee weapons, one in each hand.%r%rYou use your two weapons to parry attacks. You gain a +1 circumstance bonus to AC until the start of your next turn, or a +2 circumstance bonus if either weapon has the parry trait. You lose this circumstance bonus if you no longer meet this feat's requirement."
    traits:
      - fighter
      - ranger
  Twirling Throw:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 4
      feat:
        - Flying Blade
    shortdesc: Your thrown weapons seem to defy physics as they soar through the air and spin back to you after a strike. Make a thrown weapon strike, ignoring the penalty for making ranged attacks within the second and third range increment. The weapon returns to your hand after the attack unless you critically failed on the attack roll.
    traits:
      - finisher
      - swashbuckler
  Versatile Signature:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 4
      specialize: polymath
    shortdesc: While most bards are known for certain signature performances and spells, you're always tweaking your available repertoire. When you make your daily preparations, you can change one of your signature spells to a different spell of that rank from your repertoire.
    traits:
      - bard
  Wounded Rage:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 4
    shortdesc: "**Trigger** You take damage and are capable of entering a rage%r%rYou roar in pain, awakening the rage within you. You Rage."
    traits:
      - barbarian
# Level 6 Class Feats
  Additional Recollection:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** You succeed or critically succeed at a check to Recall Knowledge on your hunted prey.%r%rYou scan the battlefield quickly, remembering critical details about multiple opponents you face. You immediately attempt a check to Recall Knowledge about a different creature you can perceive."
    traits:
      - ranger
  Advanced Bloodline:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You draw more power from your bloodline. You gain the advanced bloodline spell associated with your bloodline.
    traits:
      - sorcerer
  Advanced Monastic Weaponry:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Monastic Weaponry
    shortdesc: Your rigorous training regimen allows you to wield complex weaponry with ease. For the purposes of proficiency, you treat advanced monk weapons as if they were martial monk weapons.
    traits:
      - monk
  Advanced Qi Spells:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Qi Spells
    shortdesc: "Your talent at controlling your qi has reached new heights. You gain *qi blast*, *shrink the span*, or another 3rd-rank qi spell you have access to.%r%r**Special** You can select this feat more than once, choosing a different spell each time."
    traits:
      - monk
  Advanced Revelation:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Divine power reveals greater mysteries to you. You learn the advanced revelation spell associated with your mystery.
    traits:
      - oracle
    init_magic: true
  Advanced Weapon Training:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You've studied the art of wielding an advanced weapon. Choose a weapon group. You gain proficiency with all advanced weapons in that group as if they were martial weapons of their weapon group.
    traits:
      - fighter
  Advantageous Assault:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "After compromising your enemy's movement, you deliver a more deadly blow. Make a Strike against a creature that is grabbed, prone, or restrained. You gain a circumstance bonus to damage on this Strike equal to the number of weapon damage dice, or that number + 2 if you're wielding the weapon in two hands. The Strike gains the following failure effect.%r%r**Failure** You deal damage to the target equal to the number of weapon damage dice, or that number + 2 if you're wielding the weapon in two hands. This damage has the same damage type as the weapon."
    traits:
      - fighter
      - press
  Agile Maneuvers:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Athletics/expert
    shortdesc: Your easily maneuver against your foes. Your Disarm, Grapple, Reposition, Shove, and Trip actions have a lower multiple attack penalty. Even if your weapon or unarmed attack doesn't have the agile trait, the penalty is –4 if the action is your second attack on your turn, or –8 if it's your third or subsequent attack. If your weapon or unarmed attack is agile and you have panache, the penalty is reduced further, to –3 if it's the second attack on your turn or –6 if it's the third or subsequent.
    traits:
      - swashbuckler
  Align Qi:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Qi Spells
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You Cast a Spell that has the monk trait.%r%rThe power of your qi soothes your wounds and energizes you for battle. You regain Hit Points equal to your level plus your Wisdom modifier."
    traits:
      - monk
  Analyze Weakness:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** You have identified a creature with Recall Knowledge.%r%rYour knowledge of a creature's physiology helps you attack with pinpoint accuracy. You carefully study a creature that you've identified to scope out particularly weak points in its positioning or physical form. The next time you deal sneak attack damage to the chosen creature with a Strike before the end of your turn, add an additional 2d6 precision damage.%r%rAt 11th level, the additional damage becomes 3d6, and at 17th level it becomes 4d6."
    traits:
      - rogue
  Animal Skin:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: animal
    shortdesc: Your proficiency in unarmored defense increases to expert. When you are raging and unarmored, your skin transforms into a thick hide. You gain a +2 item bonus to AC (+3 if you have the greater juggernaut class feature). The thickness of your hide gives you a Dexterity modifier cap to your AC of +3. This item bonus to AC is cumulative with *armor potency* runes on your explorer's clothing, *mystic armor*, and *bands of force*.
    traits:
      - barbarian
      - morph
      - primal
  Anticipate Ambush:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Stealth/expert
    shortdesc: You keep watch for any hidden creatures or dangerous sites, moving at half your travel Speed. If you're Anticipating an Ambush at the start of an encounter, you roll a Perception check for initiative, and all enemies rolling Stealth for initiative take a –2 circumstance penalty to their Stealth checks.
    traits:
      - exploration
      - rogue
  Assured Knowledge:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: enigma
    shortdesc: "You can procure information with confidence. Whenever you Recall Knowledge using any skill (including Bardic Lore), you can forgo rolling your check to instead receive a result of 10 + your proficiency bonus (don't apply any other bonuses, penalties, or modifiers).%r%rAs long as you are an expert in a skill, you meet the prerequisites for the Automatic Knowledge skill feat in that skill, even if you don't have Assurance in that skill."
    traits:
      - bard
  Brutal Bully:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Athletics/expert
    shortdesc: You push your foes around and leave bruises. While raging, when you successfully Disarm, Grapple, Reposition, Shove, or Trip an enemy, you deal that enemy bludgeoning damage equal to your Strength modifier; add this to the damage from a critical success to Trip.
    traits:
      - barbarian
  Cast Down:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: The sheer force of your faith can bring a foe crashing down. If the next action you use is to cast *harm* or *heal* to damage one creature, the target is knocked prone if it takes any damage from the spell. If the target critically fails its save against the spell, it also takes a –10-foot status penalty to its Speed for 1 minute.
    traits:
      - cleric
      - concentrate
      - spellshape
  Ceremonial Knife:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You have prepared a special knife to direct energies when spellcasting. During your daily preparations, you and your familiar can perform a short ritual over a weapon in the knife group—typically a dagger. This causes the knife to function as a magic wand, containing any one 1st-rank spell your familiar knows. You, and only you, can Activate the knife to Cast the Spell within it, as normal for a wand. You can attempt to overcharge the knife, and this can break or destroy the knife as normal. You can have only one ceremonial knife at a time.%r%rAt 8th level, and every 2 levels thereafter, the maximum rank of spell your ceremonial knife can hold increases by 1."
    traits:
      - witch
  Cleave:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** Your melee Strike reduces an enemy to 0 Hit Points, and another enemy is adjacent to that creature.%r%rYou swing clear through one foe and into another. Make a melee Strike against the second enemy."
    traits:
      - barbarian
      - rage
  Combination Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You combine a series of attacks with a powerful finishing blow. Your finishers' Strikes have a lower multiple attack penalty: -4 (or -3 with an agile weapon) if it's the second attack on your turn, or -8 (or -6 with an agile weapon) if it's the third or subsequent attack on your turn, instead of -5 and -10, respectively."
    traits:
      - swashbuckler
  Combine Elixirs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can add the full ingredients of a second elixir to an elixir you make to create a hybrid concoction. You must expend an additional versatile vial to make this combined elixir, and the ingredients must be for an elixir of the same level or lower that you could create with Quick Alchemy. When this combination elixir is consumed, both the constituent elixirs take effect. For example, you can combine two lesser elixirs of life to create a combined elixir that heals twice the normal amount, or you can combine a lesser darkvision elixir with a lesser eagle-eye elixir to both gain darkvision and find secret doors.
    traits:
      - additive
      - alchemist
  Connect the Dots:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "Ephemeral connections between people, places, and concepts are invisible to most, but seeing them is your stock and trade. Choose an ally and a non-allied creature. You must be able to see both of them. You briefly study the way they both move and attempt a Perception check against the higher of the non-allied creature's Deception DC or Will DC. Both targets are then temporarily immune to Connect the Dots for 10 minutes.%r%r**Critical Success** You spot a way for your ally to take advantage of the other target's flaws and let them know about it. Your ally gains your Pursue a Lead investigation bonus as a circumstance bonus to all its Strikes or skill checks against the creature until the start of your next turn.%r**Success** As critical success, but your ally gains the bonus only for their next Strike or skill check against the creature.%r**Failure** You fail to make a connection.%r**Critical Failure** You misconstrue a vital piece of information, which temporarily disconcerts you. You are stupefied 1 until the end of your next turn."
    traits:
      - auditory
      - concentrate
      - investigator
      - linguistic
  Convincing Illusion:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Deception/expert
    shortdesc: "**Trigger** A creature succeeded, but didn't critically succeed, at a Perception check or Will save to disbelieve an illusion from a spell that you cast.%r%r**Requirements** You are within 30 feet of the observer and the illusion.%r%rYou use your deceptive skills to make your illusions seem even more real. Attempt a Deception check against the target's Perception DC. If you succeed, the target fails to disbelieve the illusion."
    traits:
      - wizard
  Crane Flutter:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Crane Stance
    shortdesc: "**Trigger** You are targeted with an attack by an observed attacker.%r%r**Requirements** You are in Crane Stance.%r%rYou interpose your arm between yourself and your opponent. Your circumstance bonus to AC from Crane Stance increases to +3 against the triggering attack. If the attack misses you and the attacker is within your reach, you can immediately make a crane wing Strike against the attacker at a -2 penalty."
    traits:
      - monk
  Current Spell:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: As you use your magic to manipulate air or water, you spin off some of its currents to form a barrier around you. If your next action is to Cast a Spell with the air or water trait, until the start of your next turn, you gain a +1 circumstance bonus to AC or a +2 circumstance bonus against ranged attacks. This effect has the air or water trait, or both, depending on the traits of the spell you cast. You also gain a +1 circumstance bonus to all saves against effects with the air trait, water trait, or both until the start of your next turn, depending on the spell's traits.
    traits:
      - concentrate
      - druid
      - spellshape
  Dazing Blow:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** You have a creature grabbed.%r%rYou pummel a held foe, hoping to stagger them. Make a melee Strike against a creature you have grabbed. The weapon damage from this Strike is bludgeoning damage. If the Strike hits, the creature must attempt a Fortitude save against your class DC; this is an incapacitation effect.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature is stunned 1.%r**Failure** The creature is stunned 2.%r**Critical Failure** The creature is stunned 3."
    traits:
      - fighter
      - press
  Debilitating Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can add a crystalline additive to an alchemical bomb to have it undermine your enemy. Choose dazzled, deafened, off-guard, or a –5-foot status penalty to Speeds. If the attack with the bomb hits, in addition to the bomb's normal effects, the target must succeed at a Fortitude saving throw or take that effect until the start of your next turn. Use your class DC for this saving throw, even if someone else throws the bomb.
    traits:
      - additive
      - alchemist
  Defensive Coordination:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: warrior
      feat: 
        - Rallying Anthem
    shortdesc: Like the storied heroes who persist in the face of overwhelming odds, you and your allies will hold the line. If your next action is to cast the *rallying anthem* composition cantrip, you can Raise a Shield, and one ally of your choice who gains a status bonus from the spell can immediately use their reaction to Raise a Shield.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
  Directional Bombs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You can lob bombs with great force and a precise trajectory to angle the splash in a cone that sprays in a single direction, potentially allowing you to avoid allies and splash deeper into enemy lines. When throwing an alchemical bomb with the splash trait, instead of splashing all squares adjacent to the target, you can create a splash in a 15-ft cone. You choose the cone's direction, but its first square must be a square in the target's space.%r%r**Special** If you have the Expanded Splash feat or another ability that increases the radius of splash damage, you can have the splash damage be a 20-ft cone."
    traits:
      - alchemist
  Dirge of Doom:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You learn the *dirge of doom* composition cantrip, which frightens your enemies and keeps them from fully recovering from their fear.
    traits:
      - bard
  Disarming Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Athletics/trained
    shortdesc: "**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rYou adopt a fencing stance that improves your control over your weapon. While you are in this stance, you gain a +1 circumstance bonus to Athletics checks to Disarm and a +2 circumstance bonus to your Reflex DC when defending against checks to Disarm you. In addition, you can attempt to Disarm creatures up to two sizes larger than you."
    traits:
      - fighter
      - stance
  Diverting Vortex:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** Your most recent action was to cast a non-cantrip spell.%r%rYou transfer vestiges of magical energy to the air around you, creating a vortex that deflects ranged attacks. Until the start of your next turn, you gain a +1 status bonus to AC against ranged weapon attacks and physical ranged unarmed attacks."
    traits:
      - sorcerer
  Divine Rebuttal:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** Your ally is about to roll a saving throw against a magical ability of a creature you're adjacent to.%r%r**Requirements** You are wielding your deity's favored weapon.%r%rYou strive against magical threats physically and spiritually. You can Strike the adjacent creature with your deity's favored weapon. If you are holy or unholy, the Strike gains that trait. If your Strike hits, all your allies gain a +2 circumstance bonus to the triggering saving throw (or a +3 circumstance bonus on a critical hit)."
    traits:
      - cleric
      - divine
  Divine Weapon:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Frequency** once per turn%r%r**Trigger** You finish Casting a Spell using one of your divine spell slots on your turn.%r%rYou siphon residual spell energy into a weapon you're wielding. Until the end of your turn, the weapon deals an additional 1d4 spirit damage. If you are holy or unholy, Strikes with the weapon also gain that trait, and the additional damage increases to 2d4 against creatures of the opposing trait."
    traits:
      - cleric
  Dragon Roar:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Dragon Stance
    shortdesc: "**Requirements** You are in Dragon Stance%r%rYou bellow, instilling fear in your enemies. Enemies within a 15-ft emanation must succeed at a Will save against your Intimidation DC or be frightened 1 (frightened 2 on a critical failure). When a creature frightened by the roar begins its turn adjacent to you, it can't reduce its frightened value below 1 on that turn.%r%rYour first attack that hits a frightened creature after you roar and before the end of your next turn gains a +4 circumstance bonus to damage.%r%rAfter you use Dragon Roar, you can't use it again for 1d4 rounds. Its effects end immediately if you leave Dragon Stance. Creatures in the area are then temporarily immune for 1 minute."
    traits:
      - auditory
      - emotion
      - fear
      - mental
      - monk
  Dragon's Rage Breath:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: dragon
    shortdesc: "**Frequency** once per 10 minutes%r%rYou breathe deeply and exhale powerful energy in a 30-ft cone, dealing 1d6 damage per level to each creature in the area with a basic Reflex save against your class DC. The damage type matches your instinct's dragon breath, and this action gains the trait of your dragon instinct's tradition."
    traits:
      - barbarian
      - concentrate
      - rage
  Educate Allies:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Well-Versed
    shortdesc: "**Trigger** An ally benefiting from one of your composition spells is subject to an effect with the auditory, illusion, linguistic, sonic, or visual trait.%r%rYou tweak the properties of your composition spell to convey a bit of your defensive knowledge. All allies affected by your composition spell gain your +1 circumstance bonus from Well-Versed until the start of your next turn. Teaching your allies also bolsters your own skills; your personal circumstance bonus from Well-Versed also increases to +2 until the start of your next turn."
    traits:
      - bard
      - concentrate
  Energy Ward:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Frequency** once per turn%r%r**Requirements** Your most recent action was to cast a non-cantrip spell that dealt energy damage.%r%rYou convert energy from the last spell you cast into a protective ward. Until the start of your next turn, you gain resistance to one type of energy (acid, cold, electricity, fire, force, sonic, vitality, or void) equal to 4 + the rank of the spell."
    traits:
      - sorcerer
  Expand Aura:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You focus your divine power to extend your influence and protection. Expand the radius of your champion's aura to 30 feet until the start of your next turn. At 10th level, the expansion lasts for 1 minute, and at 16th level, it lasts until you Dismiss it.
    traits:
      - champion
      - concentrate
  Explosive Arrival:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Your summoned creature appears in a detonation of arcane runes. If your next action is to Cast a Spell with the summon trait, all creatures in a 10-ft emanation around the creature you summoned take 1d4 fire damage per spell rank. If the creature summoned has the acid, cold, electricity, sonic, or spirit trait, you can deal damage of that type instead.
    traits:
      - concentrate
      - manipulate
      - spellshape
      - wizard
  Far Throw:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: When you Strike with a thrown weapon, you take only a –1 penalty for each additional range increment between you and the target, rather than a –2 penalty.
    traits:
      - rogue
  Fortified Elixirs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Your treatments for diseases and poisons can be very efficacious, though they tend not to last as long. A creature that is under the effect of an infused antidote or antiplague that you created can choose to reroll a failed Fortitude saving throw against an appropriate affliction (poison for antidote and disease for antiplague). The creature doesn't gain the elixir's usual item bonus to the reroll, and after the reroll, the elixir's duration immediately ends. This is a fortune effect.
    traits:
      - alchemist
  Furious Focus:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Vicious Swing
    shortdesc: You've learned to maintain your balance even when swinging furiously. When you make a Vicious Swing with a melee weapon you're wielding in two hands, it counts as one attack toward your multiple attack penalty instead of two.
    traits:
      - fighter
  Gang Up:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You and your allies harry an opponent in concert. You can flank an enemy if it's within reach of both of you and an ally—you and your ally don't have to be on opposite sides. This benefits your allies as well as you, but only if they're flanking with you, not each other. The other requirements for flanking must still be met.
    traits:
      - rogue
  Giant's Stature:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: giant
    shortdesc: "**Requirements** You are Medium or smaller.%r%rYou grow to incredible size. You become Large, increasing your reach by 5 feet and gaining the clumsy 1 condition until you stop raging. Your equipment grows with you."
    traits:
      - barbarian
      - polymorph
      - primal
      - rage
  Gifted Power:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "Your mystery grants you additional magic. You have an extra spell slot of your highest rank, which you can use only to cast one of your mystery's granted spells, heightened to this rank.%r%r**Special** If you have the divine access class feature or Mysterious Repertoire feat, you can cast spells that you learned from those abilities using the additional spell slot from Gifted Power."
    traits:
      - oracle
  Greater Lesson:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Your patron grants you greater knowledge. Choose a greater or basic lesson. You gain its associated hex, and your familiar learns the associated spell.
    traits:
      - witch
    init_magic: true
  Green Empathy:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: leaf
    shortdesc: "You can communicate with plants and fungi on a basic level and use Diplomacy to Make an Impression on them and to make very simple Requests of them. Non-creature plants and fungi typically can't fulfill most requests you might ask of them unless you have access to other magic such as *speak with plants*.%r%rBecause of your affiliation with the leaf order, plants and fungi have a sense that you support them, so you gain a +2 circumstance bonus on your check to Make a Request of a plant or fungus using Green Empathy."
    traits:
      - druid
  Grown of Oak:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: leaf
    shortdesc: You can make your skin take on the woody endurance of an ancient tree and have your familiar follow suit. You can cast *oaken resilience* at will as an innate primal spell with a spell rank one lower than the highest rank of spells you can cast. This spell targets you, as well as your leshy familiar if it's within 30 feet of you.
    traits:
      - druid
  Guardian's Deflection (Fighter):
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** An ally within your melee reach is hit by an attack, you can see the attacker, and the ally gaining a +2 circumstance bonus to AC would turn the critical hit into a hit or the hit into a miss.%r%r**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rYou use your weapon to deflect the attack against your ally, granting a +2 circumstance bonus to their Armor Class against the triggering attack. This turns the triggering critical hit into a hit, or the triggering hit into a miss."
    traits:
      - fighter
  Harmonize:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: maestro
    shortdesc: You can perform multiple compositions simultaneously, typically by performing in multiple ways at the same time, using special vocal techniques to double your voice, or creating occult magic that replicates your song or speech. If your next action is to cast a composition, it becomes a harmonized composition. Unlike a normal composition, a harmonized composition doesn't end if you cast another composition, and you can cast another composition on the same turn as a harmonized one. Casting another harmonized composition ends any harmonized composition you already have in effect.
    traits:
      - bard
      - concentrate
      - manipulate
      - spellshape
  Inner Strength:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: spirit
    shortdesc: "Your strength is part of your rage. As long as your anger remains, you can gather your strength and rage to overcome any sort of enfeeblement.%r%rYou reduce your enfeebled condition's value by 1."
    traits:
      - barbarian
      - concentrate
      - rage
  Insect Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Untamed Form
    shortdesc: Your understanding of life expands, allowing you to mimic a wider range of creatures. Add the shapes in *insect form* to your *untamed form* list. Whenever you use *untamed form* to polymorph into the non-flying insect shapes listed in pest form, the duration is 24 hours instead of 10 minutes.
    traits:
      - druid
  Instinctive Support:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Animal Companion
    shortdesc: "**Trigger** You Cast a non-cantrip spell that targets only your animal companion.%r%rWhen you support your animal companion, your companion supports you in turn. After your spell takes place, your companion gains its actions for the turn, as if you Commanded it, and one of the actions must be Support. If the companion has used any other actions already, it can't Support you, as normal."
    traits:
      - druid
  Irresistible Magic:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You've studied ways of overcoming the innate defenses against magic that dragons, otherworldly beings, and certain other powerful creatures have. Any creature that has a status bonus to saving throws against magic reduces that bonus by 1 against your spells.
    traits:
      - wizard
  Ki Cutting Sight:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Inner Upheaval
    shortdesc: Everything is connected—all is part of the whole, and the whole is distributed throughout the infinite parts. Find where to add your qi and you can break the whole. You gain the *ki cutting sight* qi spell. Increase the number of Focus Points in your focus pool by 1.
    traits:
      - monk
      - rare
    init_magic: true
  Light Step:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You aren't bothered by tricky footing. When you Stride or Step, you can ignore difficult terrain.
    traits:
      - rogue
  Loyal Warhorse:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Faithful Steed
    shortdesc: The loyalty you and your mount share is unbreakable. The mount you gained with Faithful Steed is now a mature animal companion. In addition, your mount never attacks you, even if it is magically compelled to do so.
    traits:
      - champion
  Mage Hunter:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: superstition
    shortdesc: "**Requirements** You've seen the target Cast a Spell%r%rYou use your hatred of magic to lash out at a known spellcaster. Make a melee Strike against the required creature. If you hit and deal damage, the target is stupefied 1, or stupefied 2 on a critical hit, until the beginning of your next turn."
    traits:
      - barbarian
      - rage
  Magic Hands:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Healing Hands
    shortdesc: The blessing of your deity heightens your healing ability, integrating magical healing with the mundane. When you succeed at a Medicine check to Treat Wounds, you can roll d10s instead of d8s for the healing and add a status bonus to the healing equal to your level.
    traits:
      - cleric
  Masterful Warden:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Initiate Warden
    shortdesc: "Your mastery of warden magic increases. You gain your choice of one warden spell from the master warden spells.%r%r*ephemeral tracking*%r%r*ranger's bramble*%r%r**Special** You can take this feat multiple times, choosing a different master warden spell each time."
    traits:
      - ranger
  Mature Animal Companion (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Animal Companion
    shortdesc: "Your animal companion becomes a mature animal companion and gains additional capabilities.%r%rYour animal companion has greater independence.During an encounter, even if you don't use the Command an Animal action, your animal companion can still use 1 action that round on your turn to Strike or Stride (or Burrow, Climb, Fly, or Swim if it has that Speed). It can do this at any point during your turn, as long as you aren't currently taking an action. If it does, that's all the actions it gets that round—you can't Command it later."
    traits:
      - ranger
  Mountain Stronghold:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Mountain Stance
    shortdesc: "**Requirements** You are in Mountain Stance%r%rYou focus on your connection to the earth and call upon the mountain to block attacks against you. You gain a +2 circumstance bonus to AC until the beginning of your next turn.%r%r**Special** If you have this feat, the Dexterity modifier cap to your AC while you're in Mountain Stance increases from +0 to +1."
    traits:
      - monk
  Nocturnal Senses:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      orfeat:
        - low-light vision
        - scent
    shortdesc: Your senses gain even greater clarity. While raging, if you have low-light vision you gain darkvision, and if you have scent the range of your imprecise scent increases to 60 feet.
    traits:
      - barbarian
      - rage
  One-Inch Punch:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You put all your force into a single mighty, carefully controlled blow. Make an unarmed Strike. If you spend two actions and this Strike hits, you deal an extra die of weapon damage. You can instead spend 3 actions to perform an even more powerful attack, dealing a second additional die of weapon damage on a hit.%r%rIf you're at least 10th level, the number of additional dice you add from this feat doubles, for a total of 2 additional dice if you spend 2 actions or 4 additional dice if you spend 3 actions.%r%rIf you're at least 18th level, the number of additional dice you add from this feat triples, for a total of 3 additional dice if you spend 2 actions or 6 additional dice if you spend 3 actions."
    traits:
      - monk
  Precise Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Even when your foe avoids your Confident Finisher, you can still hit a vital spot. On a failure with Confident Finisher, you apply your full precise strike damage instead of half.
    traits:
      - swashbuckler
  Predictive Purchase (Investigator):
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You have just the thing for the situation. You gain the Prescient Planner and Prescient Consumable feats.%r%rWhen using Prescient Planner, you can pull out the item as a 2-action activity to remove your backpack (or a similar container) and draw the item, rather than taking 1 minute."
    traits:
      - investigator
    grants:
      feat:
        - Prescient Consumable
        - Prescient Planner
  Reactive Strike:
    assoc_charclass:
      - Barbarian
      - Champion
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** A creature within your reach uses a manipulate action or a move action, makes a ranged attack, or leaves a square during a move action it's using.%r%rYou swat a foe that leaves an opening. Make a melee Strike against the triggering creature. If your attack is a critical hit and the trigger was a manipulate action, you disrupt that action. This Strike doesn't count toward your multiple attack penalty, and your multiple attack penalty doesn't apply to this Strike."
    traits:
      - barbarian
      - champion
      - swashbuckler
  Reflexive Shield:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You can use your shield to fend off explosions and the like. When you Raise your Shield, you gain your shield's circumstance bonus to Reflex saves.%r%r**Special** If you have the Shield Block reaction, damage you take as a result of a Reflex save can trigger that reaction, even if the damage isn't physical damage."
    traits:
      - fighter
  Return Fire:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Deflect Projectile
        - Monastic Archer Stance
    shortdesc: "**Requirements** You are in Monastic Archer Stance, are wielding a bow, and have a free hand.%r%rSnatching an arrow out of the air, you instantly put it to your bow and return fire. When you successfully Deflect Projectile that's an arrow, as part of that reaction you can immediately make a ranged bow Strike from your own bow by firing the arrow you deflected."
    traits:
      - monk
  Revealing Stab:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** You are wielding a melee weapon that can deal piercing damage.%r%rYou drive your piercing weapon into an imperceptible foe, revealing its location to your allies. Make a Strike with a piercing melee weapon. If the target is concealed, you don't need to attempt a flat check to target it, and if it's hidden, the DC of the flat check to target it is 5. If you hit and deal damage, you can drive the weapon you attacked with into the target (if it's corporeal), revealing its current position. You Release the weapon, and it becomes lodged in the target. If the target is concealed, no flat check is needed to target it, and if it's hidden, the DC of the flat check to target it is 5, and the creature can't become undetected. These benefits apply only for observers who can see your weapon stuck in the target. If the target is invisible, the weapon remains visible while lodged in it.%r%rThis benefit lasts until the weapon is removed from the creature. An adjacent creature or the target can remove the weapon with two Interact actions."
    traits:
      - fighter
  Ricochet Stance (Fighter):
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You adopt a stance to rebound your thrown weapons toward you. While you are in this stance, any thrown weapons you use as part of a ranged Strike to deal bludgeoning or slashing damage immediately return to your hand, enabling you to use them for additional Strikes. You must be within the weapon's listed range increment and have a hand free to catch the weapon. If you make a ranged Strike with a thrown weapon outside of its listed range increment, it instead flies back toward you a number of feet equal to its listed range increment and then falls to the ground.
    traits:
      - fighter
      - stance
  Safeguard Spell:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You are inured to the effects of your own spells. If the next action you take is to Cast a Spell with an area, you aren't affected by the spell even if you are within the area.
    traits:
      - concentrate
      - sorcerer
      - spellshape
  Scouring Rage:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      orspecialize:
        - dragon
        - spirit
    shortdesc: "**Trigger** You Rage.%r%rYou emit a powerful surge of instinctual energy when you unleash your anger. Each enemy within 20 feet takes damage equal to your level (basic Fortitude save against your class DC) of the same type as your additional damage during that Rage."
    traits:
      - barbarian
  Selective Energy:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: As you call down divine power, you can prevent some enemies from benefiting or some allies from being hurt. When you cast a version of *harm* or *heal* that has an area, you can designate up to 5 creatures in the area. They are not targeted by the spell.
    traits:
      - cleric
  Shatter Defenses:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** A frightened creature is in your melee reach.%r%rYour offense exploits your enemy's fear. Make a melee Strike against a frightened creature. If you hit and deal damage, the target becomes off-guard until its frightened condition ends. If the target was already off-guard to you when you damaged it with this Strike, it can't reduce its frightened value below 1 until the start of your next turn."
    traits:
      - fighter
      - press
  Shield Warden:
    assoc_charclass:
      - Champion
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - shield block
    shortdesc: When you have a shield raised, you can use your Shield Block reaction when an attack is made against an ally adjacent to you. If you do, the shield prevents that ally from taking damage instead of preventing you from taking damage, following the normal rules for Shield Block.
    traits:
      - champion
      - fighter
  Shove Down:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Athletics/trained
    shortdesc: "**Requirements** Your last action was a successful Shove.%r%rYou leverage your weight to topple foes that you move. You attempt to Trip the target, even if the target is no longer in your reach."
    traits:
      - rogue
  Skirmish Strike:
    assoc_charclass:
      - Ranger
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Your feet and weapon move in tandem. Either Step and then Strike, or Strike and then Step.
    traits:
      - flourish
      - ranger
      - rogue
  Sly Disarm:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can Disarm a creature through sleight of hand rather than brute force. You can use Thievery instead of Athletics when you attempt a Disarm. When you use Thievery to attempt a Disarm and succeed, the target is off-guard against the next attack you make before the end of your turn.
    traits:
      - rogue
  Smite:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You single out one enemy to destroy in your deity's name. Designate one enemy you can see. Until the start of your next turn, your Strikes against that enemy gain a +3 status bonus to damage, increasing to +4 if you have master proficiency with the weapon or unarmed attack you're using for the Strike. If you're holy or unholy and the target has the opposite trait, the bonus is +4 (or +6 if you're a master).%r%rIf the target takes a hostile action against you or one of your allies before the start of your next turn, the duration extends to the end of that enemy's next turn. If the enemy continues to take these hostile actions each turn, the duration continues to extend.%r%rYour current Smite ends if you use the Smite action again."
    traits:
      - champion
      - concentrate
  Snap Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can react with ranged weapons when a creature is in close quarters. You can use a reaction that normally allows you to make a melee weapon Strike to instead make a ranged weapon Strike. You must be Striking an adjacent target. If necessary for the reaction's trigger, you treat your ranged weapon as if it had a reach of 5 feet. If the reaction has other requirements, such as wielding a specific kind of weapon, Snap Shot doesn't allow you to ignore them; it allows you only to replace a melee weapon Strike with a ranged weapon Strike.
    traits:
      - ranger
  Song of Marching:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You learn the *song of marching* composition cantrip, which enables you and your allies to cross vast distances without strain.
    traits:
      - bard
  Spell Relay:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Trigger** An ally Casts a Spell and you are within that spell's range.%r%rYou open the power in your blood to your ally's spellcasting, using your magic to boost their range. Your ally can use you as the point of origin for their spell, calculating range and cover from your space instead of their own."
    traits:
      - concentrate
      - sorcerer
  Spirits' Interference:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: spirit
    shortdesc: You call forth protective spirits to ward off ranged attacks. Until your rage ends, anyone making a ranged attack against you must succeed at a DC 5 flat check or the attack misses with no effect.
    traits:
      - barbarian
      - divine
      - rage
  Spiritual Sense:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You have a vague connection to the Ethereal Plane that enables you to notice spirits. While you're exploring but not Searching, the GM rolls a secret check for you to find haunts that usually require Searching, as well as spirits, creatures on the Ethereal Plane, and beings made entirely of spiritual essence such as celestials, fiends, and monitors.%r%rYou can also potentially notice ethereal creatures and spirits inside solid objects, provided they are within 30 feet of you. This applies while Searching, while Seeking, and on the automatic secret check you gain while exploring even if you aren't Searching. You can still notice spirits only on a successful check, and you can't see them if they're more than 5 feet inside an object. When you notice a creature with this sense, you also learn its location, making it hidden to you if it had been undetected."
    traits:
      - divine
      - oracle
  Split Slot:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can prepare two spells in one slot, giving you the freedom to choose the spell when you cast it. When you prepare your spells for the day, you can choose one spell slot at least 1 rank lower than the highest-rank spell you can cast and prepare two spells in that slot. When you Cast a Spell from that slot, choose which spell to cast. Once you've chosen, the unused spell dissipates as though you hadn't prepared it at all—for example, it isn't available for use with Drain Bonded Item.
    traits:
      - wizard
  Steady Spellcasting:
    assoc_charclass:
      - Bard
      - Cleric
      - Druid
      - Oracle
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: Confident in your technique, you don't lose spells easily. If a reaction would disrupt your spellcasting action, attempt a DC 15 flat check. If you succeed, your action isn't disrupted.
    traits:
      - bard
      - cleric
      - druid
      - oracle
      - sorcerer
      - witch
      - wizard
  Sticky Poison:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "A combination of additional viscosity and careful application keeps your weapons poisoned even when suffering significant wear and tear.%r%rIf your Strike with a poisoned weapon would expend its poison without your target attempting an initial save (due to resistance or your Strike being a critical failure, for example), attempt a DC 5 flat check. On a success, your weapon remains poisoned.%r%rIf your Strike with a poisoned weapon succeeds, attempt a DC 17 flat check. On a success, your weapon remains poisoned until the end of your next turn."
    traits:
      - alchemist
  Storm Retribution:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 6
      specialize: storm
        - tempest surge order spell
    shortdesc: "**Trigger** An opponent adjacent to you critically hits you with a melee weapon or melee unarmed attack.%r%r**Requirements** You have at least 1 available Focus Point.%r%rYou lash out, directing a burst of storming fury toward a creature that has harmed you. You cast *tempest surge* on the triggering opponent and push that creature, moving it 5 feet away from you if it fails its Reflex save, or 10 feet if it critically fails. This movement is forced movement."
    traits:
      - druid
  Stumbling Feint:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Stumbling Stance
      skill: Deception/expert
    shortdesc: "**Requirements** You are in Stumbling Stance.%r%rYou lash out confusingly with what seems to be a weak move but instead allows you to unleash a dangerous flurry of blows upon your unsuspecting foe.%r%rWhen you use Flurry of Blows, you can attempt a check to Feint as a free action just before the first Strike.%r%rOn a success, instead of making the target off-guard against your next attack, they become off-guard against both attacks from the Flurry of Blows."
    traits:
      - monk
  Swift Tracker:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Experienced Tracker
      skill: Survival/expert
    shortdesc: "Your keen eyes catch signs of passage even when you're moving. You can move at your full Speed while you Track. If you have master proficiency in Survival, you don't need to attempt a new Survival check every hour while Tracking. If you have legendary proficiency in Survival, you can use another exploration activity while Tracking.%r%rIf you roll Survival for initiative while tracking your hunted prey, when you start your first turn of the encounter, you can Stride toward your hunted prey as a free action."
    traits:
      - ranger
  Thorough Research:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You have comprehensive knowledge in your fields of interest. When you succeed at a Recall Knowledge check, you gain additional information or context. When you critically succeed at a check to Recall Knowledge, you get additional information or context or can ask an additional follow-up question (the GM chooses which).
    traits:
      - investigator
  Tiger Slash:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Tiger Stance
    shortdesc: "**Requirements** You are in Tiger Stance%r%rYou make a fierce swipe with both hands. Make a tiger claw Strike. It deals two extra weapon damage dice (three extra dice if you're 14th level or higher), and you can push the target 5 feet away as if you had successfully Shoved them.%r%rIf the attack is a critical success and deals damage, add your Strength modifier to the persistent bleed damage from your tiger claw."
    traits:
      - monk
  Triple Shot:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Double Shot
    shortdesc: You can quickly fire multiple shots with greater control. When you use Double Shot, you can make the attacks against the same target. You can add an additional action to Double Shot to make three ranged Strikes instead of two. If you do, the penalty is –4. All attacks count toward your multiple attack penalty, but the penalty doesn't increase until after you've made all of them.
    traits:
      - fighter
  Twist the Knife:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** Your last action was a melee Strike that dealt sneak attack damage to an off-guard target.%r%rAfter stabbing your opponent in a weak spot, you tear the wound open. You deal persistent bleed damage to the target equal to your number of sneak attack damage dice."
    traits:
      - rogue
  Vexing Tumble:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You tumble around your foes, expertly avoiding their reactions. Stride up to half your Speed and roll an Acrobatics check. Compare the result to the Reflex DC of each enemy whose reach you began in or enter during the movement, in sequence.%r%r**Critical Success** This movement doesn't trigger reactions from the enemy, and the enemy is off-guard to you until the end of your turn%r**Success** This movement doesn't trigger reactions from the enemy.%r**Critical Failure** Your movement immediately stops when you enter the creature's reach; if you began in the creature's reach, you don't move."
    traits:
      - bravado
      - swashbuckler
  Watch Your Back:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 6
      skill: Intimidation/trained
    shortdesc: You menace the target, stoking their fears and drawing their attention. Attempt an Intimidation check against the Will DC of a target within 30 feet. If you succeed, for 1 minute, that target gains a +2 status bonus to Perception checks against you, but it takes a –2 status penalty to Will saves against fear effects.
    traits:
      - emotion
      - fear
      - mental
      - rogue
  Water Step:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: You can Stride across liquid and surfaces that don't support your weight. This benefit lasts only during your movement. If you end your movement on a surface that can't support you, you fall in or it collapses as normal.
    traits:
      - monk
  Whirling Throw:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "**Requirements** You have a creature grabbed or restrained.%r%rYou propel your enemy away. Attempt an Athletics check against the foe's Fortitude DC. You take a –2 circumstance penalty to your check if the target is one size larger than you and a –4 circumstance penalty if it's larger than that. You gain a +2 circumstance bonus to your check if the target is one size smaller than you and a +4 circumstance bonus if it's smaller than that.%r%r**Critical Success** You throw the creature any distance up to 10 feet, plus 5 feet × your Strength modifier. It takes bludgeoning damage equal to your Strength modifier plus 1d6 per 10 feet you threw it. If you threw the target at least 10 feet and into a solid obstacle, use the maximum distance you could have thrown it to calculate the damage. The creature falls prone.%r**Success** As critical success, but the creature doesn't fall prone.%r**Failure** You don't throw the creature.%r**Critical Failure** You don't throw the creature, and it's no longer grabbed or restrained by you."
    traits:
      - attack
      - monk
  Witch's Charge:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 6
    shortdesc: "You forge a magical link with another creature, granting you awareness of that creature's condition and creating a conduit for spellcasting. During your daily preparations, you can designate one willing creature as your charge. You are always aware of your charge's direction from you, its distance from you, and any conditions affecting it. In addition, you can cast spells with a range of touch on your charge from a range of 30 feet. These effects persist until your next daily preparations.%r%r**Special** This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, occult, or primal)."
    traits:
      - detection
      - witch
  Wolf Drag:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 6
      feat:
        - Wolf Stance
    shortdesc: "**Requirements** You are in Wolf Stance%r%rYou rip your enemy off their feet.%r%rMake a wolf jaw Strike. Your wolf jaw gains the fatal d12 trait for this Strike, and if the attack succeeds, you knock the target prone."
    traits:
      - monk
# Level 8 Class Feats
  Accompany:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** An ally within 30 feet Casts a Spell.%r%rYou use your performance to supplement an ally's spellcasting, providing magical energy for their spell in their stead. Attempt a Performance check, using a very high DC for the ally's level, and either spend a Focus Point (if the triggering spell is a focus spell) or expend a spell slot at least 1 rank higher than the triggering spell. If you succeed at your Performance check, your ally's spell doesn't cost the Focus Point or spell slot that ally would normally need to spend."
    traits:
      - bard
      - concentrate
      - manipulate
  Advanced Deity's Domain:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Deity's Domain
    shortdesc: Through your conviction, you have glimpsed the deeper secrets of your deity's domain. You gain an advanced domain spell from the domain you chose with Deity's Domain as a devotion spell.
    traits:
      - champion
    init_magic: true
  Advanced Domain:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Domain Initiate
    shortdesc: "Your prayers have unlocked deeper secrets of your deity's domain. You gain an advanced domain spell from one of your domains for which you have an initial domain spell.%r%r**Special** You can select this feat multiple times. Each time, you must select a different advanced domain spell."
    traits:
      - cleric
    init_magic: true
  Advanced School Spell:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You gain access to the advanced teachings of your arcane institution, learning a powerful new school spell. You gain the advanced school spell for your arcane school.
    traits:
      - wizard
    init_magic: true
  Alter Admixture:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You are holding or wearing an alchemist's toolkit.%r%rSometimes, you need to adapt your alchemical mixtures to new situations. In a process that takes 10 minutes, you change an item you created with advanced alchemy into a similar item. You can change an alchemical bomb into another type of alchemical bomb, an elixir into another type of elixir, or a poison into another type of poison. If it's unclear whether two alchemical consumables are similar, the GM decides. You must know the formula for the new item, and the new item must be of the same or lower item level than the original item. The new item still keeps the infused trait, and it remains potent as long as the original item would have."
    traits:
      - alchemist
      - exploration
  Animalistic Brutality:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: animal
    shortdesc: "You deepen the connection into your animal instincts. Your unarmed attack from bestial rage gains one of the following traits until you stop raging: backswing, forceful, parry, razing, or sweep. You can't use this ability again until the next time you Rage. You can choose a different trait each time you use Animalistic Brutality."
    traits:
      - barbarian
      - concentrate
      - morph
      - primal
      - rage
  Bleeding Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your blow inflicts profuse bleeding. Make a slashing or piercing Strike. If you hit, the target also takes persistent bleed damage equal to your precise strike finisher damage.
    traits:
      - finisher
      - swashbuckler
  Blind-Fight:
    assoc_charclass:
      - Fighter
      - Investigator
      - Ranger
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Perception/master
    shortdesc: "**Fighter, Rogue, Investigator** Your battle instincts make you more aware of concealed and invisible opponents.%r%r**Ranger** Your heightened senses allow you to instinctively detect unseen opponents.%r%rYou don't need to succeed at a flat check to target concealed creatures. You're not off-guard to creatures that are hidden from you (unless you're off-guard to them for reasons other than the hidden condition), and you need only a successful DC 5 flat check to target a hidden creature.%r%rWhile you're adjacent to an undetected creature of your level or lower, it is instead only hidden from you."
    traits:
      - fighter
      - investigator
      - ranger
      - rogue
  Bloodline Resistance:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your magical blood makes you more resistant to magic. You gain a +1 status bonus to saving throws against spells and magical effects.
    traits:
      - sorcerer
  Bond Conservation:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** The last action you used was to Cast a Spell enabled by Drain Bonded Item.%r%rBy efficiently and carefully manipulating the arcane energies unleashed by your bonded item, you can conserve just enough power to cast another spell, though this second spell is slightly weaker. You gain an extra use of Drain Bonded Item. You can use it to cast a spell 2 or more ranks lower than the previous spell, and must use it before the end of your next turn or you lose it."
    traits:
      - manipulate
      - spellshape
      - wizard
  Bullseye:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You carefully take aim to avoid your foe's concealment and cover. On your next Strike with a thrown weapon before the end of your turn, you gain a +1 circumstance bonus to your attack roll and ignore your target's concealed condition, as well as the target's lesser cover or standard cover; if the target had greater cover, they instead have only standard cover against the Strike.
    traits:
      - rogue
  Call and Response:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your composition takes the form of a call-and-response chant that lets your allies continue the effect without you. If your next action is to cast a composition cantrip with a duration of 1 round, it becomes a call. While the spell is active, one ally of your choice affected by the spell can respond to your call as a single action that has the auditory and concentrate traits to extend the spell's duration by 1 round. Only one ally can respond to a given call, and responding to the ally's response has no additional effect.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
  Clinging Shadows Initiate:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Qi Spells
    shortdesc: You learn a mystical stance that transforms your qi into sticky smoke that shrouds your limbs. You gain the *clinging shadows stance* qi spell. While entering the stance is a qi spell, the shadow grasp attacks it grants are not, so you can use them as often as you like while in the stance.
    traits:
      - monk
  Clue Them All In:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You can clue in all your allies at once. When you use the Clue In reaction, any of your allies who are attempting the same check to investigate one of your active investigations receive the circumstance bonus from Clue In. If you use this ability during an encounter, they must attempt their check within 1 round of when you Clued them In.
    traits:
      - investigator
  Cremate Undead:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your overwhelming vitality sets undead alight. When you use a *heal* spell to damage undead, each undead that takes damage also takes persistent fire damage equal to the spell's rank.
    traits:
      - cleric
  Crossblooded Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Odd interactions in your bloodline provide you with unexpected effects. Choose another bloodline. You know the blood magic effect of that bloodline. If the blood magic effect has a variable effect based on a choice you would have made at 1st level (such as the elemental bloodline's elemental influence), you make that decision when you take this feat.
    traits:
      - sorcerer
  Deadly Aim:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You aim for your prey's weak spots, making your shot more challenging but dealing more damage if you hit. Make a ranged Strike against your hunted prey at a –2 penalty. You gain a +4 circumstance bonus to damage on that Strike. This bonus increases to +6 at 11th level and +8 at 15th level.
    traits:
      - flourish
      - ranger
  Debilitating Dichotomy:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You reveal a glimpse of the impossible conflicts between the divine anathema behind your curse, forcing you to reckon with another's conflicts as well. You and one creature within 30 feet each take 9d6 damage with a basic Will save, and the target is stunned 1 if it critically fails its save. You get a degree of success one better than you rolled for your saving throw. At 10th level, and every 2 levels thereafter, the damage increases by 3d6.
    traits:
      - concentrate
      - cursebound
      - divine
      - mental
      - oracle
  Defensive Stratagem:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "By scrutinizing a foe, you learn how to better avoid its attacks. When you use Devise a Stratagem, you can choose a defensive stratagem instead of an attack or skill stratagem after you roll a d20.%r%r**Defensive Stratagem** You can't attempt to Strike the target until the start of your next turn. You gain a +1 circumstance bonus to all your defenses against effects caused by the target until the start of your next turn."
    traits:
      - investigator
  Deimatic Display:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Intimidation/trained
    shortdesc: Imitating animal threat displays, you make yourself appear larger and more imposing. Attempt an Intimidation check to Demoralize each enemy within 30 feet. This attempt has the visual trait, loses the auditory trait, and you don't take a penalty if the creature doesn't understand your language. Roll your check only once and compare it to the Will DC of each target. You gain a +2 circumstance bonus to the check against animal, fungus, and plant creatures and take a –2 circumstance penalty against other creatures. Each target is then temporarily immune for 1 minute.
    traits:
      - druid
  Delay Trap:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** A trap within your reach is triggered.%r%rYou try to jam the workings of a trap to delay its effects. Attempt a Thievery check to Disable a Device on the trap with the following results instead of the normal ones for the action.%r%r**Critical Success** You either prevent the trap from being triggered or delay the activation until the start or end of your next turn.%r**Success** As above, but the GM chooses whichever is worse for you.%r**Failure** No effect.%r**Critical Failure** You're off-guard until the start of your next turn."
    traits:
      - rogue
  Disarming Assault:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Athletics/trained
    shortdesc: You attack with enough force to knock the weapon out of your foe's hands. Make a melee Strike; if you hit, you can attempt an Athletics check to Disarm that enemy.
    traits:
      - barbarian
      - flourish
      - rage
  Disorienting Opening:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Reactive Strike
    shortdesc: You use your foes' openings to expose even greater weaknesses. When you hit a creature as part of a Reactive Strike, that creature becomes off-guard until the start of your next turn.
    traits:
      - fighter
  Distracting Toss:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You toss one weapon into the air as a distraction as you throw another. Choose a creature within 30 feet and Feint against it; you can attempt this Feint even if the target is not within melee range, and if the target becomes off-guard as a result of the Feint, this applies to your thrown weapon attacks for the duration.%r%rRegardless of the result, you can then Interact to draw a thrown weapon and make a thrown weapon Strike against the target. If you have an open hand, you then catch the weapon you originally tossed into the air unless you critically failed at your attempt to Feint, in which case it lands on the ground at your feet."
    traits:
      - bravado
      - flourish
      - swashbuckler
  Dual Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You wield two melee weapons, one in each hand.%r%rYou split your attacks. Make two melee Strikes, one with each required weapon, each against a different foe. If the second Strike is made with a non-agile weapon, it takes a -2 penalty.%r%rIncrease your multiple attack penalty only after attempting both Strikes."
    traits:
      - finisher
      - swashbuckler
  Dueling Riposte:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Dueling Parry
    shortdesc: "**Trigger** A creature within your reach critically fails a Strike against you.%r%r**Requirements** You are benefiting from Dueling Parry.%r%rYou elegantly counterattack against your flailing enemy. Make a melee Strike against or attempt to Disarm the triggering creature."
    traits:
      - fighter
  Eclectic Skill:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: polymath
      skill: Occultism/master
    shortdesc: Your broad experiences translate to a range of skills. Your proficiency bonus to untrained skill checks is equal to your level. You can attempt any skill check that normally requires you to be trained, even if you are untrained. If you have legendary proficiency in Occultism, you can attempt any skill check that normally requires you to have expert proficiency, even if untrained or trained.
    traits:
      - bard
  Emblazon Energy:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Emblazon Armament
    shortdesc: With elemental forces, you make your emblazoned symbols more potent. When you Emblazon an Armament, you can choose from the following effects instead of the effects listed in that feat. These effects have the same restrictions as the base options. See wiki for more information.
    traits:
      - cleric
  Explosion of Power:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your magic explodes. You know the following blood magic effect.%r%r**Blood Magic—Explosion of Power** Raw power explodes outward from you. Each creature within a 5-ft emanation takes 1d6 damage per rank of the spell you just cast (basic Reflex save). The type of damage depends on the tradition of your bloodline. If you cast arcane spells, you deal force damage. If you cast divine spells, you deal spirit damage. If you cast occult spells, you deal mental damage. If you cast primal spells, you deal fire damage."
    traits:
      - sorcerer
  Felling Strike:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your attack can ground an airborne foe. Make a Strike. If it hits and deals damage to a flying target, the target falls up to 120 feet. The fall is gradual enough that if it causes the target to hit the ground, the target takes no damage from the fall.%r%rIf the attack is a critical hit, the target can't Fly, Leap, levitate, or otherwise leave the ground until the end of your next turn."
    traits:
      - fighter
  Ferocious Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Untamed Form
    shortdesc: You've mastered the shape of dinosaurs. Add the shapes listed in Dinosaur Form to your untamed form list. Whenever you use *untamed form* to take a shape that grants you a specific Athletics modifier, you gain a +1 status bonus to your Athletics checks.
    traits:
      - druid
  Fey Caller:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You have learned some of the tricks the fey use to bend primal magic toward illusions and trickery. Add *illusory disguise*, *illusory object*, and *illusory scene* to your spell list, which you cast as primal spells.
    traits:
      - druid
    init_magic: true
  Flashy Roll:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Flashy Dodge
    shortdesc: "You can use Flashy Dodge before attempting a Reflex save, in addition to its original trigger. If you do, the circumstance bonus applies to your Reflex save against the triggering effect.%r%rWhen you use Flashy Dodge and the triggering attack fails or critically fails, or when you succeed or critically succeed at the saving throw, you can also Stride up to 10 feet as part of the reaction. If you do, the reaction gains the move trait. You can use Flashy Roll while Flying or Swimming instead of Striding if you have the corresponding movement type."
    traits:
      - swashbuckler
  Floral Restoration:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: leaf
    shortdesc: "**Frequency** once per day%r%rYou request that nearby plants share their vitality with you to replenish your body and magic. You regain 1 Focus Point and 4d8 Hit Points.%r%rYou must be in a location of at least 15 feet by 15 feet of healthy plant life, though this can be grass, lichen, seaweed, or any other form of naturally occurring flora. Using Floral Restoration on a given section of nature does not harm it, but it prevents that section of nature from giving its vitality to another use of Floral Restoration for 24 hours.%r%rAt 9th level, and every 2 levels thereafter, increase the healing by 1d8."
    traits:
      - druid
      - healing
      - vitality
    init_magic: true
  Follow-Up Assault:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You used your previous action to make a melee Strike that missed.%r%rEven in the face of failure you press the attack, determined to succeed. Make a Strike with the same weapon, adding the backswing and forceful weapon traits to that Strike."
    traits:
      - barbarian
      - rage
  Form Retention:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You have trained your mind and body to tolerate polymorph magic for longer periods of time, so long as you prepare for the change appropriately. When preparing a polymorph spell that lasts 1 minute and grants a battle form, you can prepare the spell in a slot 2 ranks higher than normal. This doesn't grant any of the normal benefits of heightening a spell, but the spell lasts up to 10 minutes. For example, if you prepared animal form in a 4th-rank slot with Form Retention, you would cast a 2nd-rank *animal form* that lasts for up to 10 minutes. If the spell can be Dismissed, that doesn't change.
    traits:
      - wizard
  Fortissimo Composition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: maestro
    shortdesc: Your anthems grow louder and more potent, bolstered by your muse's power. You learn the *fortissimo composition* spellshape focus spell.
    traits:
      - bard
    init_magic: true
  Friendly Toss:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You are adjacent to an ally and have one or more hands free.%r%rYou toss your friends around the battlefield. Pick up an adjacent ally of your size or smaller and throw them to an unoccupied space you can see within 30 feet. Their movement doesn't trigger reactions. Your ally ends this movement on their feet and doesn't take damage from the fall. If your ally ends this movement within melee reach of at least one enemy, they can use their reaction to make a melee Strike against such an enemy."
    traits:
      - barbarian
      - manipulate
      - rage
  Furious Bully:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Athletics/master
    shortdesc: You bully foes across the battlefield. While raging, you gain a +2 circumstance bonus to Athletics checks for attack actions.
    traits:
      - barbarian
  Greater Mercy:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Mercy
    shortdesc: "Your faith enhances your ability to remove conditions. Add the following options to the list of conditions you can counteract for any type of mercy you can grant.%r%r**Mercy of the Body** drained, slowed; if you're 16th level, add stunned%r%r**Mercy of Grace** immobilized, restrained, slowed; if you're 12th level, add petrified; if you're 16th level, add stunned%r%r**Mercy of the Mind** confused, controlled, slowed; if you're 16th level, add doomed and stunned."
    traits:
      - champion
  Greater Security:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Security
    shortdesc: Shield in hand, you offer your ally its full protection you do yourself. While the companion shield is in effect, if your shield is raised, the ally with the companion shield gets the same bonus to AC your shield grants, and you can trigger Shield Block if that ally would meet the trigger. This uses your shield's statistics and applies damage to your shield.
    traits:
      - champion
  Hazard Finder:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You have an intuitive ability to sense hazards. You gain a +1 circumstance bonus to Perception checks to find traps and hazards, to AC against their attacks, and to saves against their effects. You can find hazards that would normally require you to Search even if you aren't Searching.
    traits:
      - ranger
  Heal Mount:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Faithful Steed
        - lay on hands
    shortdesc: "Your devotion to your mount manifests as a surge of vital energy.%r%rWhen you cast *lay on hands* on your mount, instead of the normal amount, the spell restores 10 Hit Points, plus 10 for each heightened rank."
    traits:
      - champion
  Improved Invigorating Elixir:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Invigorating Elixir
    shortdesc: "Choose physical invigoration or mental invigoration, and add the listed conditions to those you can choose for an invigorating elixir you create to counteract:%r%r**Physical Invigoration** blinded, deafened, drained, paralyzed, slowed%r%r**Mental Invigoration** confused, controlled, fleeing, frightened, paralyzed, slowed.%r%r**Special** You can select this feat a second time to choose a different type of invigoration and add its options to those you can choose."
    traits:
      - alchemist
  Improved Poison Weapon:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Poison Weapon
    shortdesc: You deliver poisons in ways that maximize their harmful effects. When you apply a simple poison with Poison Weapon, the poison deals 2d4 poison damage instead of 1d4 poison damage. You don't waste a poison you apply with Poison Weapon on a critically failed attack roll.
    traits:
      - rogue
  Incredible Aim:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: By spending a moment to focus, you can ensure your attack strikes true. Make a ranged weapon Strike. On this Strike, you gain a +2 circumstance bonus to the attack roll and ignore the target's concealed condition.
    traits:
      - concentrate
      - fighter
  Incredible Companion (Druid):
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Mature Animal Companion
    shortdesc: Your animal companion continues to grow and develop. It becomes either a nimble or savage animal companion, gaining additional capabilities determined by the type.
    traits:
      - druid
  Incredible Familiar:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Enhanced Familiar
    shortdesc: "**Witch** Your familiar is imbued with even more magic than other familiars.%r%rYou can select a base of six familiar or master abilities each day, instead of four.%r%r**Special** Add the bonus familiar abilities you gain for being a witch to this amount."
    traits:
      - witch
  Inspired Stratagem:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: During your daily preparations, you can review stratagems for the day's adventures with up to five allies. Later, you can quickly advise them on your schemes using the Inspired Stratagem reaction.
    traits:
      - rogue
  Instinctive Strike:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Acute Scent
    shortdesc: You trust your instincts and your sense of smell, using all your senses to pinpoint your opponent's location. When you make a melee Strike against an opponent you're detecting using scent, ignore any flat check required due to the target being concealed or hidden.
    traits:
      - barbarian
  Invulnerable Rager:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Even the heaviest armors serve only to enhance your unbridled fury. You are trained in heavy armor. Whenever you gain a barbarian class feature that grants you expert or greater proficiency in medium armor, you also gain that proficiency in heavy armor. If you have the Quick-Tempered action, you can use it while wearing heavy armor.
    traits:
      - barbarian
  Ironblood Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You are unarmored%r%rYou enter the stance of impenetrable iron, refusing to yield to any blow. You can make iron sweep unarmed attacks. These deal 1d8 bludgeoning damage; are in the brawling group; and have the nonlethal, parry, sweep, and unarmed traits.%r%rWhile in Ironblood Stance, you gain resistance 2 to all damage. The resistance increases to 3 at 12th level, to 4 at 16th level, and to 5 at 20th level."
    traits:
      - monk
      - stance
  Knowledge is Power (Wizard):
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your academic knowledge about a creature allows you to subtly alter your magic to defeat them. When you critically succeed at a Recall Knowledge check about a creature, you can invoke your knowledge to make the creature take a –1 circumstance penalty to either AC and saves against the next attack you make against it, or the next spell you cast that it needs to defend against. The creature takes the same penalty to its attack or DC the next time it attacks against you or causes you to attempt a save against one of its effects.%r%rIf you share this information with your allies, they gain the benefits as well. If not used, the bonuses end after 1 minute."
    traits:
      - wizard
  Martyr:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You go to extreme lengths to support your allies, even when it means bringing harm to yourself. If your next action is to cast *harm* or *heal* to restore Hit Points to a single ally, you can channel your own vitality along with the spell. You lose 1d8 Hit Points per rank of the spell, which can't be reduced or mitigated in any way, and your ally regains an equal number of Hit Points.
    traits:
      - cleric
      - spellshape
  Mixed Maneuver:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Athletics/master
    shortdesc: You leverage your knowledge of martial arts to mix different maneuvers together into a single flowing combination. Choose any two of Grapple, Reposition, Shove, and Trip. Attempt both of the attacks you chose against the same or different creatures, but don't apply the multiple attack penalty until after resolving both attacks.
    traits:
      - monk
  Mobile Shot Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your shots become nimble and deadly. While you're in this stance, your ranged Strikes don't trigger Reactive Strike or other reactions that are triggered by a ranged attack.%r%r**Special** If you have Reactive Strike, you can use it with a loaded ranged weapon you're wielding. The triggering creature must be within 5 feet of you for you to do so."
    traits:
      - fighter
      - stance
  Murksight:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your vision pierces through non-magical fog, mist, rain, and snow. You don't take circumstance penalties to ranged attacks or Perception checks caused by non-magical precipitation, and your targeted attacks don't require a flat check to succeed against a target concealed only by such effects.
    traits:
      - witch
  Mutant Physique:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Basic mutagens that affect your physical form can bring out the beast within you, turn you nigh invincible, or make your body more elastic. While you're affected by one of the listed mutagens, you get an additional benefit.%r%r**Quicksilver Mutagen** You can stretch your legs and Step up to 10 feet, and you can squish and compress your body, allowing you to make it through tight spaces as if you were one size smaller, in addition to any effect from Squeezing.%r%r**Special** If you can be under the effects of multiple mutagens (with the mutagenist greater field discovery, for example), you get all relevant benefits."
    traits:
      - alchemist
  Nimble Roll:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Nimble Dodge
    shortdesc: "You throw yourself into a roll to escape imminent danger. You can use Nimble Dodge before attempting a Reflex save in addition to its original trigger. If you do, the circumstance bonus applies to your Reflex save against the triggering effect.%r%rWhen you use Nimble Dodge and the triggering attack fails or critically fails, or when you succeed or critically succeed at the saving throw, you can also Stride up to 10 feet as part of the reaction. If you do, the reaction gains the move trait. You can use Nimble Roll while Flying or Swimming instead of Striding if you have the corresponding movement type."
    traits:
      - rogue
  Opportune Backstab:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** A creature within your melee reach is hit by a melee attack from one of your allies.%r%rWhen your enemy is hit by your ally, you capitalize upon the distraction. Make a Strike against the triggering creature."
    traits:
      - rogue
  Pinning Fire:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** You use Flurry of Blows to make two ranged piercing weapon Strikes against the same target.%r%rYou target your opponent's clothing, equipment, or loose flesh with piercing projectiles to pin them to the ground or a nearby surface.%r%rIf both your attacks hit, the target must succeed at a Reflex save against your class DC or become immobilized until it or an adjacent creature succeeds at a DC 10 Athletics check to remove the pinning projectiles.%r%rThe creature doesn't become stuck if it is incorporeal, is liquid (like a water elemental or some oozes), or could otherwise escape without effort."
    traits:
      - monk
  Pinpoint Poisoner:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Unsuspecting targets are especially vulnerable to your poisons. When you successfully Strike an off-guard creature with a poisoned weapon or expose an off-guard creature to an inhaled poison, that creature takes a –2 circumstance penalty to its initial save against that poison.
    traits:
      - alchemist
  Positioning Assault:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You are wielding a two-handed melee weapon and your target is within your reach.%r%rWith punishing blows, you force your opponent into position. Make a Strike with the required weapon. If you hit, you Reposition the target 5 feet."
    traits:
      - fighter
      - flourish
  Predictive Purchase (Rogue):
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You somehow manage to have just the thing for the situation. You gain the Prescient Planner and Prescient Consumable feats. When using Prescient Planner, you can draw the item from your backpack (or a similar container) as a 2-action activity, instead of taking 1 minute to do so.
    traits:
      - rogue
    grants:
      feat:
        - Prescient Consumable
        - Prescient Planner
  Projectile Snatching:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Deflect Projectile
    shortdesc: You pluck missiles from the air and hurl them back at their source. When you successfully deflect an attack with Deflect Projectile, as part of that same reaction, you can then immediately make a ranged Strike against the attacker using the projectile you deflected. This is a thrown weapon with the same range increment and effect on a hit as the triggering attack.
    traits:
      - monk
  Quick Shield Block:
    assoc_charclass:
      - Champion
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You can bring your shield into place with hardly a thought. At the start of each of your turns, you gain an additional reaction that you can use only to Shield Block.
    traits:
      - champion
      - fighter
  Raise Menhir:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Frequency** once per hour%r%rYou raise a druidic monument, such as a standing stone or warding tree, from the ground, creating a powerful primal ward that blocks other types of magic. The monument appears in an unoccupied square on the ground within 30 feet, making that square difficult terrain. Choose arcane, divine, or occult; all creatures within 15-ft emanation of the monument gain a +2 status bonus to their saving throws against effects with that trait. The monument lasts for 1 round before crumbling back into the earth or wilting away into nothingness, but you can Sustain the monument for up to 1 minute."
    traits:
      - druid
  Read Disaster:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You spend 10 minutes and open yourself to the divine mysteries of the world, peering into the most sinister portents of the future.%r%rYou gain the effects of *augury*, except you learn only about the dangers ahead; any results of 'good' are instead 'nothing,' and results of 'mixed' are instead 'bad.' If you are legendary in Religion, you take only 1 minute to Read Disaster."
    traits:
      - exploration
      - oracle
      - prediction
  Reflexive Courage:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: warrior
    shortdesc: "**Trigger** A creature within your reach uses an auditory effect, manipulate action, or move action; makes a ranged attack; or leaves a square during its move action.%r%r**Requirements** You are affected by *courageous anthem*.%r%rYou bellow a ferocious call to arms, inspiring yourself to lash out at a foe. Make a melee Strike against the triggering creature. If the attack is a critical hit and the trigger was a manipulate action, the action is disrupted."
    traits:
      - auditory
      - bard
      - concentrate
  Renewed Vigor:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Through the haze of battle, you quickly recover your raging vigor. You gain temporary Hit Points equal to half your level plus your Constitution modifier. If you made an attack action this turn, increase the number of temporary Hit Points to your level plus your Constitution modifier. These temporary Hit Points last until the end of your rage.
    traits:
      - barbarian
      - concentrate
      - rage
  Resounding Bravery:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Even your fears serve as fuel for your fighting spirit. When you critically succeed at a Will save against a foe's ability, you gain a +1 status bonus to saves and a number of temporary Hit Points equal to half your level for 1 minute. These benefits are doubled if you critically succeed against a fear effect.
    traits:
      - fighter
  Restorative Channel:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - healing font
    shortdesc: "You can remove conditions with divine grace. You can sacrifice one *heal* spell you've prepared in your extra slots from your healing font to cast one of the following spells instead: *cleanse affliction*, *clear mind*, *sound body*, or *sure footing*. The spell is heightened to the same rank as the spell you sacrificed."
    traits:
      - cleric
  Ricochet Stance (Rogue):
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You adopt a stance to rebound your thrown weapons toward you. While you are in this stance, any thrown weapons you use as part of a ranged Strike to deal bludgeoning or slashing damage immediately return to your hand, enabling you to use them for additional Strikes. You must be within the weapon's listed range increment and have a hand free to catch the weapon. If you make a ranged Strike with a thrown weapon outside of its listed range increment, it instead flies back toward you a number of feet equal to its listed range increment and then falls to the ground.
    traits:
      - rogue
      - stance
  Sanctify Armament:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
      orfeat:
        - holy
        - unholy trait
    shortdesc: "You touch a weapon and bring it into concordance with your deity. For 1 round, that weapon gains your holy or unholy trait. It also deals an additional 2d6 spirit damage to creatures of the opposed trait. For example, if you are holy, the weapon would deal an extra 2d6 spirit damage to unholy creatures.%r%rIf you use Sanctify Armament again, any previous use of it expires."
    traits:
      - cleric
      - divine
  Second Blessing:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: Your continued service grants you another boon. Choose a second blessing of the devoted (different from your first one) and gain its benefits.
    traits:
      - champion
  Share Rage:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You haven't used this ability since you last Raged.%r%rYou stoke an ally's fury. While you are raging, one willing creature within 30 feet gains the effects of the Rage action, except it can still use concentrate actions. It doesn't get any added benefits from your instinct, feats, or the like."
    traits:
      - auditory
      - barbarian
      - rage
      - visual
  Sidestep:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** The attack roll for a Strike targeting you fails or critically fails.%r%rYou deftly step aside and gently redirect an attack. You redirect the triggering attack to a creature of your choice that is adjacent to you and within the attack's reach or maximum range. The attacker rerolls the Strike's attack roll against the new target."
    traits:
      - rogue
  Sly Striker:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your attacks deal more damage, even against creatures that aren't off-guard. When you succeed or critically succeed at a Strike against a creature that isn't off-guard, you also deal 1d6 precision damage. This applies only if you're using a weapon or unarmed attack you could deal sneak attack damage with.%r%rAt 14th level, if you would normally deal 3d6 or more sneak attack damage to off-guard creatures, you deal 2d6 precision damage to creatures that aren't off-guard."
    traits:
      - rogue
  Soaring Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Untamed Form
    shortdesc: Wings free you from the shackles of the ground below. Add the bat and bird shapes in *aerial form* to your *untamed form* list. If you have Insect Shape, you also add the wasp shape to your *untamed form* list. If you have Ferocious Shape, you also add the pterosaur shape to your *untamed form* list. Whenever you use *untamed form* to take a shape that grants you a specific Acrobatics modifier, you gain a +1 status bonus to Acrobatics checks.
    traits:
      - druid
  Soulsight (Bard):
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "Your muse has opened your senses to the world beyond. You gain spiritsense as an imprecise sense with a range of 60 feet. Spiritsense enables you to sense the spirits of creatures, including living creatures, most non-mindless undead, and haunts within the listed range. As with your hearing and other imprecise senses, you still need to Seek to locate an undetected creature.%r%rAs spiritsense detects spiritual essence, not physical bodies, it can detect spirits projected by spells such as project image or possessing otherwise soulless objects. It can't detect soulless bodies, constructs, or objects, and like most senses, it doesn't penetrate through solid objects."
    traits:
      - bard
  Spirit Familiar (Witch):
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 8
      orfeat:
        - divine
        - occult patron
    shortdesc: Your familiar can subsume its body to become pure spirit. Your familiar gains the Shed Spirit activity.
    traits:
      - witch
  Stitched Familiar:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 8
      orfeat:
        - arcane
        - primal patron
    shortdesc: Your familiar can shed its material form, becoming a mass of animated magic. Your familiar gains the Stitching Strike activity.
    traits:
      - witch
  Stunning Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You attempt a dizzying blow. Make a melee Strike. If you hit, your foe must attempt a Fortitude save against your class DC with the following results; the save has the incapacitation trait.%r%r**Critical Success** The target is unaffected.%r**Success** The target can't use reactions until its next turn.%r**Failure** The target is stunned 1.%r**Critical Failure** The target is stunned 3."
    traits:
      - finisher
      - swashbuckler
  Sudden Leap:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You make an impressive leap and swing while you soar.%r%rMake a Leap, High Jump, or Long Jump and attempt one melee Strike at any point during your jump. Immediately after the Strike, you fall to the ground if you're in the air, even if you haven't reached the maximum distance of your jump. If the distance you fall is no more than the height of your jump, you take no damage and land upright.%r%rWhen attempting a High Jump or Long Jump during a Sudden Leap, determine the jump distance using Long Jump's rules, and change your maximum distance to double your Speed.%r%r**Special** If you have Felling Strike, you can use Felling Strike instead of a normal Strike. This doesn't change the number of actions Sudden Leap takes."
    traits:
      - barbarian
      - fighter
  Surging Focus:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Frequency** once per day%r%r**Trigger** An ally you can see falls to 0 Hit Points.%r%rWhen an ally you can see falls in battle, your surge of righteous indignation allows you to draw upon untapped reserves of divine power. You instantly regain 1 Focus Point."
    traits:
      - cleric
    init_magic: true
  Surging Might:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You focus the power of your spell to overcome enemies' resistances. If the next action you use is to Cast a Spell, the spell ignores an amount of the target's resistance equal to your level against the following types of damage: spirit, vitality, and void.%r%rThis applies to all damage the spell deals, including persistent damage and damage caused by an ongoing effect of the spell. This doesn't cause the spell to ignore immunities, only resistances."
    traits:
      - manipulate
      - oracle
      - spellshape
  Swipe Souvenir:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You're grabbed or restrained by a creature.%r%rWhen you wriggle free from an enemy's grasp, you take something of theirs with you. You attempt to Escape from being grabbed or restrained by a creature. If you succeed, you can also attempt to Steal from the creature, even if the creature is in combat."
    traits:
      - rogue
  Tactical Entry:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 8
      skill: Stealth/master
    shortdesc: "**Requirements** You rolled Stealth for initiative in this encounter, and neither you nor any enemies have acted yet.%r%rYou Stride. This movement doesn't trigger any reactions."
    traits:
      - rogue
  Tangled Forest Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You are unarmored%r%rYou extend your arms like gnarled branches to interfere with your foes' movements. You can make lashing branch unarmed attacks. These deal 1d8 slashing damage; are in the brawling group; and have the agile, finesse, nonlethal, and unarmed traits.%r%rWhile you're in Tangled Forest Stance and can act, every enemy in your reach that tries to move away from you must succeed at a Reflex save, Acrobatics check, or Athletics check against your class DC or be immobilized for that action. If you prefer, you can allow the enemy to move."
    traits:
      - monk
      - stance
  Terrain Master:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Favored Terrain
      skill: Survival/master
    shortdesc: You are able to adapt to your surroundings in any natural terrain. You can spend 1 hour practicing in your current terrain in order to make it your favored terrain, replacing your current favored terrain temporarily. If you spend a full day out of the new favored terrain, your favored terrain reverts back to your original choice when you took the Favored Terrain feat.
    traits:
      - ranger
  Thrash:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You have an enemy grabbed or restrained.%r%rYou thrash your foe around. An enemy you have grabbed or restrained takes bludgeoning damage equal to your Strength modifier plus your weapon specialization damage plus your Rage damage, with a basic Fortitude save against your class DC."
    traits:
      - barbarian
      - rage
  Vivacious Bravado:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Requirements** You gained panache this turn.%r%rYour ego swells, granting you a temporary reprieve from your pain. You gain temporary Hit Points equal to your level plus your Charisma modifier that last until the start of your next turn."
    traits:
      - swashbuckler
  Void Siphon:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: The raw energy of the Void saps the essence of the living. Any living creature that critically fails its save against a *harm* spell you cast is drained 1.
    traits:
      - cleric
  Wall Run:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "You defy gravity, traversing vertical planes as easily as the ground. Stride up to your Speed. You must start your movement on a horizontal surface.%r%rDuring this movement, you can run up vertical surfaces, like walls, at your full Speed. If you end the Stride off the ground, you fall after taking your next action or when your turn ends, whichever comes first (though you can Grab an Edge, if applicable).%r%rIf you have Water Step or a similar ability, Wall Run lets you run along flimsy vertical surfaces, as well as vertical liquids, such as a waterfall."
    traits:
      - monk
  Warden's Boon:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: You point out vulnerabilities present in your hunted prey, granting the benefits listed in Hunt Prey and your hunter's edge to an ally until the end of their next turn. Depending on whether you call out or use gestures, this action gains either the auditory or visual trait.
    traits:
      - ranger
  Water Walker:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: When in the throes of your curse, your steps take on a supernatural buoyancy. When you are cursebound 1, you can Stride across liquids that don't support your weight, but you must end your movement on a surface that can support you or you fall into the liquid as normal. When you are cursebound 2 or worse, you gain the effects of water walk.
    traits:
      - oracle
  Whodunnit?:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Frequency** once per day%r%rYou carefully consider your case and narrow down some of the details. When you Pursue a Lead and learn there's a larger mystery, you can ask two questions related to your investigation when you open it. The GM must answer truthfully with 'yes' or 'no,' though if the answer would be misleading or have no practical application to your investigation, the GM can answer 'immaterial.' You can't use Whodunnit? more than once for the same lead, even across different days. Your questions must come from the following list, applying to the detail that spurred your investigation."
    traits:
      - investigator
      - uncommon
  Wild Winds Initiate:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Qi Spells
    shortdesc: "You learn a stance that lets you attack from a distance. You gain the *wild winds stance* qi spell.%r%rWhile entering the stance is a qi spell, the wind crash Strikes the stance grants are not, so you can use them as often as you like while in the stance."
    traits:
      - monk
  Wind Caller:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 8
      specialize: storm
    shortdesc: You bid the winds to aid you, carrying you through the air and allowing you passage through the strongest headwinds. You gain the *stormwind flight* order spell.
    traits:
      - druid
  Witch's Bottle:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 8
      feat:
        - Cauldron
    shortdesc: "You spend 10 minutes and 1 Focus Point brewing a special potion containing the power of one of your hexes that targets a creature. A creature that consumes this potion is targeted by the hex. If the hex has a sustained duration and you have *cackle*, you can cast *cackle* into the bottle just before you seal it. If you do, the hex's duration is extended as if you had cast cackle the round after the hex was cast (typically this extends the duration by 1 round). Your cackling laugh sounds out when the potion is unsealed.%r%rAny potion you create this way loses its power the next time you make your daily preparations. While the potion is in your possession, you can render it inert using a single action that has the concentrate trait. You can't regain the Focus Point you spent to create the potion (or the Focus Point you spent to cast cackle) until the potion is consumed or loses its magic."
    traits:
      - witch
  Zealous Rush:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 8
    shortdesc: "**Trigger** You cast a divine spell that takes 1 action or more to cast and that affects only you or your equipment.%r%rYou bless yourself on the move. Stride up to 10 feet. If the spell took 2 or more actions, you can Stride up to your full Speed instead."
    traits:
      - cleric
# Level 10 Class Feats
  Advanced Efficient Alchemy:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Efficient Alchemy
    shortdesc: You make an even-larger batch of alchemical items each morning. Increase the maximum number of items you can create with advanced alchemy to 8 + your Intelligence modifier, or to 10 + your Intelligence modifier if you're 16th level or higher.
    traits:
      - alchemist
  Agile Grace:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Your graceful moves with agile weapons are beyond compare. Your multiple attack penalty with agile weapons and agile unarmed attacks becomes –3 for your second attack and –6 for subsequent attacks (rather than –4 and –8).
    traits:
      - fighter
  Annotate Composition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "By putting composition to paper, you can create a source of stirring words or song that others can read and understand. You spend 10 minutes and 1 Focus Point to transpose a composition spell on a special scroll that you or another creature can later activate. This composition spell must take a single action to cast. If the chosen composition spell requires a Performance check as part of the casting, the GM rolls this check as a secret check when you annotate your score.%r%rIf you have *fortissimo composition* or *lingering composition*, you can also use one of those spells to modify the annotated composition, provided the annotated composition can benefit from the modification. The GM rolls the secret Performance check. If you do, you spend an additional Focus Point, even if the secret check fails.%r%rAny creature that can read the language you used when annotating your composition can Activate the Item by spending a single action, which has the concentrate trait. This produces the effects of the composition as though the activating creature had Cast the Spell.%r%rA composition you create this way loses its power the next time you make your daily preparations. While the composition is in your possession, you can render it inert using a single action that has the concentrate trait. You can't regain the Focus Points you spent to create the annotated composition until it is activated or loses its magic."
    traits:
      - bard
      - exploration
      - linguistic
  Buckler Dance:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** You are wielding a Buckler.%r%rYou spin your buckler defensively toward every attack. You constantly have your buckler raised as if you'd used Raise a Shield, as long as you meet that action's requirements."
    traits:
      - stance
      - swashbuckler
  Camouflage:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
      skill: Stealth/master
    shortdesc: You alter your appearance to blend in to the wilderness. In natural terrain, you can Hide and Sneak even without cover or being concealed.
    traits:
      - ranger
  Castigating Weapon:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Divine Castigation
    shortdesc: The force of your deity's castigation strengthens your body so you can strike down the enemy and its allies. After you deal spirit damage due to Divine Castigation, your weapon or unarmed Strikes gain your holy or unholy trait and deal additional spirit damage until the end of your turn. The spirit damage is equal to the rank of harm or heal you dealt spirit damage with, and is in addition to any spirit damage the weapon already deals (such as from a *holy* rune).
    traits:
      - cleric
  Certain Strike:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "Even when you don't hit squarely, you can still score a glancing blow. Make a melee Strike. It gains the following failure effect.%r%r**Failure** Your attack deals any damage it would have dealt on a hit, excluding all damage dice. (This removes damage dice from weapon runes, spells, and special abilities, in addition to weapon damage dice.)"
    traits:
      - fighter
      - press
  Cobra Envenom:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Cobra Stance
    shortdesc: "**Frequency** once per minute%r%r**Requirements** You are in Cobra Stance.%r%rYou slightly dislocate your joints to lash out with devious intent and the power to envenom your foe. Make a cobra fang Strike. Your reach with this Strike is 5 feet greater than normal. If this Strike hits, the persistent poison damage from your venomous trait increases to 1d4 persistent poison damage per weapon damage die.%r%r**Special** If you have this feat, the circumstance bonus to Fortitude saves and Fortitude DC granted by Cobra Stance increases from +1 to +2."
    traits:
      - monk
      - poison
  Come and Get Me:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You open yourself to attacks so you can respond in turn. Until your rage ends, you are off-guard, and damage rolls against you gain a +2 circumstance bonus. If a creature hits you, that creature is off-guard to you until the end of your next turn. If you hit it before the end of your next turn, you gain temporary Hit Points equal to your Constitution modifier, or double that on a critical hit. These temporary Hit Points last until the end of your rage.
    traits:
      - barbarian
      - concentrate
      - rage
  Courageous Assault:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: warrior
    shortdesc: With a mighty shout, you can stir an ally to attack. If your next action is to cast the *courageous anthem* composition cantrip, one ally of your choice who gains a status bonus from the spell can immediately use their reaction to make a melee Strike.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
  Crashing Slam:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Slam Down
    shortdesc: "You can dash your foe to the ground with a single blow. If the Strike you make with Slam Down hits, you can automatically get a critical success on your Trip instead of rolling a check. (Both the Strike and Trip still count toward your multiple attack penalty).%r%rIf you used a two-handed melee weapon for the Strike, you can use the weapon's damage die size instead of the regular die size for the damage from a critical Trip."
    traits:
      - fighter
  Cut From the Air:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** You are the target of a physical ranged Strike.%r%r**Requirements** You're aware of the attack, not off-guard against it, and either have a hand free or are wielding a melee weapon.%r%rYou can knock aside ranged attacks. You gain a +4 circumstance bonus to AC against the triggering attack. If the attack misses, you knocked or cut it out of the air."
    traits:
      - fighter
  Debilitating Shot:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Aiming for a weak point, you impede your foe with a precise shot. Make a ranged weapon Strike. If it hits and deals damage, the target is slowed 1 until the end of its next turn.
    traits:
      - fighter
      - flourish
  Derring-Do:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: When you compound panache with even more derring-do, it somehow tends to work out. When you already have panache, you can roll twice and use the higher result on checks to which the circumstance bonus from stylish combatant applies (Tumble Through and any skill actions with the bravado trait).
    traits:
      - fortune
      - swashbuckler
  Devoted Focus:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Your devotion is strong enough to increase your focus to incredible heights. Whenever you Refocus, completely refill your focus pool.
    traits:
      - champion
    init_magic: true
  Disarming Twist:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
      skill: Athletics/trained
    shortdesc: "**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rAfter your initial attack redirects your foe's defenses, your follow-up wrests their weapon from their grasp. Make a melee Strike with a one-handed melee weapon. In addition to its other effects, this Strike gains the success and critical success effects of the Disarm action. The Strike also has the following failure effect.%r%r**Failure** The target is off-guard until the end of your current turn.%r%r**Special** If you're in Disarming Stance, you gain a +1 circumstance bonus to the attack roll."
    traits:
      - fighter
      - press
  Disruptive Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: The slightest distraction can provoke your wrath, and you're prepared to foil enemies' actions. As long as you are in this stance, you can use Reactive Strike when a creature within your reach uses a concentrate action, in addition to manipulate and move actions. Furthermore, you disrupt a triggering concentrate or manipulate action if your Strike hits (not only if it's a critical hit).
    traits:
      - fighter
      - stance
  Double, Double:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Cauldron
    shortdesc: For each temporary oil or potion you brew during your daily preparations, you brew two copies of it. This allows you to brew two temporary oils or potions each day, four if you have master proficiency in spell DC, or six if you have legendary proficiency.
    traits:
      - witch
  Elemental Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Untamed Form
    shortdesc: You understand the fundamental elements of nature such that you can imbue them into your body and manifest as a living embodiment of those elements. Add the shapes in *elemental form* to your *untamed form* list. Whenever you're polymorphed into another shape using *untamed form*, you gain resistance 5 to fire.
    traits:
      - druid
  Energy Fusion:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "You fuse two spells together, combining their energy types. If the next action you use is to Cast a Spell that deals energy damage, select a non-cantrip spell in your spell repertoire that deals a different type of energy damage, and expend an additional spell slot of the same rank as this secondary spell.%r%rThe spell you cast deals additional damage equal to the rank of the secondary spell slot expended. The spell's total damage is divided evenly between the energy type of the spell you cast and the energy type of the secondary spell."
    traits:
      - concentrate
      - sorcerer
      - spellshape
  Expanded Splash:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You can throw bombs at just the right trajectory to create especially large and powerful explosions. When you throw an alchemical bomb and that bomb has the splash trait, you can have the splash damage affect all creatures within 10 feet of the target instead of 5 feet. If you do, you gain a status bonus to the bomb's splash damage equal to your Intelligence modifier. If you have the bomber 5th-level field discovery, this additional damage applies even if you caused your bomb to deal splash damage equal to your Intelligence modifier instead of the normal amount, allowing your bombs to deal splash damage equal to double your Intelligence modifier.
    traits:
      - alchemist
  Fearsome Brute:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "Fear makes your foes weak and more vulnerable to your attacks. You gain a circumstance bonus to damage rolls for Strikes against frightened creatures. The bonus is equal to double the target's frightened value.%r%rIf you're a master in Intimidation, increase the bonus to triple the target's frightened value."
    traits:
      - fighter
  Flinging Charge:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You throw a weapon to distract your opponent as you close the gap to begin your assault. You Stride twice; at any point during this movement, you can make a ranged Strike with a thrown weapon. If the Strike hits, the target is off-guard against the next melee attack that you attempt against it before the end of your current turn.
    traits:
      - fighter
      - flourish
  Furious Sprint:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You rush forward. Stride up to five times, or up to eight times if you used 3 actions. All this movement must be in a straight line (though the GM might allow reasonable variance). You can replace any of these Strides with a Balance action if you need to, which you attempt using an Athletics check instead of an Acrobatics check, using the same DC.
    traits:
      - barbarian
      - rage
  Great Cleave:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Cleave
    shortdesc: Your fury carries your weapon through multiple foes. When you Cleave, if your Strike also reduces its target to 0 HP, you can continue to make melee Strikes until you make a Strike that doesn't reduce a creature to 0 HP, or until there are no creatures adjacent to the most recent creature you attacked while Cleaving, whichever comes first.
    traits:
      - barbarian
      - rage
  Greater Bloodline:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You uncover the greater secrets of your bloodline. You gain the greater bloodline spell associated with your bloodline.
    traits:
      - sorcerer
    init_magic: true
  Greater Debilitating Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Debilitating Bomb
    shortdesc: "You have learned enhanced techniques and alchemical secrets that allow you to expand the range of effects you can impose with your bombs. When you use Debilitating Bomb, add the following to the list you can choose from: clumsy 1, enfeebled 1, stupefied 1, or –10-foot status penalty to Speeds."
    traits:
      - alchemist
  Healing Transformation:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You can take advantage of shapechanging magic to close wounds and patch injuries. If your next action is to cast a non-cantrip polymorph spell that targets only one creature, your polymorph spell also restores 1d6 Hit Points per spell rank to that creature. This is a healing effect.
    traits:
      - druid
      - spellshape
  Heroic Recovery:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - healing font
    shortdesc: "The restorative power of your healing invigorates the recipient. If the next action you use is to cast *heal* targeting a single living creature and the target regains Hit Points from the spell, the target also gains three bonuses until the end of its next turn: a +5-foot status bonus to its Speed, a +1 status bonus to attack rolls, and a +1 status bonus to damage rolls. In addition, if the target is prone, it can immediately Stand as a free action that doesn't trigger reactions."
    traits:
      - cleric
      - concentrate
      - spellshape
  House of Imaginary Walls:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You erect an imaginary barrier others believe to be real. You learn the *house of imaginary walls* composition cantrip.
    traits:
      - bard
  Imposing Destrier:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Loyal Warhorse
    shortdesc: "Under your care, your mount has realized its innate potential. The mount you gained with Faithful Steed is now a nimble or savage animal companion.%r%rYour animal companion has greater independence. During an encounter, even if you don't use the Command an Animal action, your animal companion can still use 1 action that round on your turn to Stride or Strike. It can do this at any point during your turn, as long as you aren't currently taking an action. If it does, that's all the actions it gets that round—you can't Command it later."
    traits:
      - champion
  Impressive Landing:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** You fall at least 10 feet and land on a solid surface.%r%rYou slam into the ground, shattering it around you. Treat the fall as 10 feet shorter. You land on your feet. The ground in a 5-ft emanation becomes difficult terrain. Any creature in the emanation when you land takes 5 bludgeoning damage as the debris hits it and is off-guard until the start of its next turn."
    traits:
      - barbarian
  Incredible Companion (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Mature Animal Companion
    shortdesc: Your animal companion continues to grow and develop. It becomes a nimble or savage animal companion (your choice), gaining additional capabilities determined by the type of companion.
    traits:
      - ranger
  Just One More Thing:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** Your most recent action was to Feint, Request, or Demoralize, and you failed but didn't critically fail.%r%rAfter your attempt to influence someone goes poorly, you add another bit of information or ask a pointed question, possibly salvaging your previous attempt. Reroll the failed check and use the new result. If the target of the failed check is involved with one of your active investigations, double your investigation bonus from Pursue a Lead on the rerolled check. That creature is temporarily immune to Just One More Thing for 1 day.%r%rYou can also use this action if you failed, but didn't critically fail, at a check to Lie, Gather Information, Make an Impression, or Coerce. In this case, rather than spending 1 action, adding Just One More Thing takes you half the amount of time you initially spent on the check, to a minimum of 1 more round."
    traits:
      - fortune
      - investigator
  Knockback:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** Your last action was a successful Strike%r%rThe weight of your swing drives your enemy back. You push the enemy back 5 feet, with the effects of a successful Shove. You can follow the enemy as normal for a successful Shove."
    traits:
      - barbarian
      - rage
  Knockback Strike:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You focus your strength into a blow powerful enough to push an enemy away from you. Make an unarmed Strike. If you hit, attempt an Athletics check to Shove the target. This attack uses the same multiple attack penalty as your Strike, and doesn't count toward your multiple attack penalty.
    traits:
      - concentrate
      - monk
  Major Lesson:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "Your patron grants you even greater secrets. Choose a major, greater, or basic lesson. You gain its associated hex, and your familiar learns the associated spell.%r%r**Special** You can select this feat a second time if you're 14th level or higher, and a third time if you're 18th level or higher. Choose a different lesson each time."
    traits:
      - witch
    init_magic: true
  Master Monster Hunter:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Monster Hunter
      skill: Nature/master
    shortdesc: You have a nearly encyclopedic knowledge of all creatures of the world. You can use Nature to Recall Knowledge to identify any creature. In addition, you gain the benefits of Monster Hunter (and Monster Warden, if you have it) on a success as well as a critical success.
    traits:
      - ranger
  Methodical Debilitations:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: mastermind
    shortdesc: You strategically craft your debilitations to lessen or negate an enemy's tactical advantages. Add the following debilitations to the list you can choose from when you use Debilitating Strike.
    traits:
      - rogue
  Mirror Shield:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** An opponent casting a spell that targets you critically fails a spell attack roll against your AC.%r%r**Requirements** You have a shield raised.%r%rYou reflect the spell back against its caster. Make a ranged attack against the attacker using your highest proficiency with a ranged weapon. If you can cast spells, you can choose to make a spell attack roll instead. If you succeed, your opponent takes the effects of a successful spell attack roll for their own spell (or the effects of a critical success if your attack roll was a critical success)."
    traits:
      - fighter
  Nimble Strike:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You're cunning enough to find an opening in an opponent's attack. When you use your Nimble Dodge reaction, you can make a melee Strike against the triggering creature. This Strike doesn't count toward your multiple attack penalty, and your multiple attack penalty doesn't apply to this Strike. If you use the Nimble Roll feat, you can make this Strike at any point during your roll.
    traits:
      - rogue
  Ode to Ouroboros:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You learn the *ode to ouroboros* composition spell, which enables you to temporarily spare your allies from death.
    traits:
      - bard
    init_magic: true
  Ongoing Strategy:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "You're constantly studying small aspects of everyone's movements, even if you don't have a stratagem in place ahead of time.%r%rOn any Strike for which you didn't Devise a Stratagem, you still deal precision damage equal to your number of strategic strike damage dice so long as the weapon or unarmed attack you used is one that would have let you use your Intelligence modifier had you Devised a Stratagem."
    traits:
      - investigator
  Overpowering Charge:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Barreling Charge
    shortdesc: You trample your foes as you charge past them. When you use Barreling Charge and successfully move through a creature's space, that creature takes bludgeoning damage equal to your Strength modifier. If you critically succeed, the creature takes double this amount of damage and becomes off-guard until the end of your next turn.
    traits:
      - barbarian
      - fighter
  Overwhelming Energy:
    assoc_charclass:
      - Druid
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Druid** With a complex gesture, you call upon the primal power of your spell to overcome enemies' resistances.%r%r**Sorcerer** You alter your spells to tear through an enemy's defenses.%r%r**Wizard** Multiple circles of runes rotate around your hand as you overcharge your spell to tear through your enemy's defenses.%r%rIf the next action you use is to Cast a Spell, the spell ignores an amount of the target's resistance to acid, cold, electricity, fire, or sonic damage equal to your level. This applies to all damage the spell deals, including persistent damage and damage caused by an ongoing effect of the spell, such as the wall created by *wall of fire*. A creature's immunities are unaffected."
    traits:
      - druid
      - manipulate
      - sorcerer
      - spellshape
      - wizard
  Peerless Warden:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Initiate Warden
    shortdesc: "Your mastery of primal magic has given you access to the greatest secrets of warden magic. You gain your choice of one warden spell from the peerless warden spells.%r%r*hunter's vision*%r%r*terrain transposition*%r%r**Special** You can take this feat multiple times, choosing a different peerless warden spell each time."
    traits:
      - ranger
  Penetrating Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** You are wielding a ranged weapon.%r%rYou shoot clear through an intervening creature to hit your prey. Choose a target that is giving lesser cover to your hunted prey. Make a single ranged Strike with the required weapon against the chosen target and your hunted prey. This attack ignores any lesser cover the chosen target provides your hunted prey. Roll damage only once, and apply it to each creature you hit. A Penetrating Shot counts as two attacks for your multiple attack penalty."
    traits:
      - ranger
  Plant Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: leaf
      feat:
        - Untamed Form
    shortdesc: "You can take the shape of a plant creature. If you don't have untamed form, you can cast *plant form* once per day, heightened to the same rank as your highest-rank druid spell slot.%r%rIf you do have Untamed Form, add the shapes listed in *plant form* to your *untamed form* list, and whenever you're polymorphed into another shape using untamed form, you gain resistance 5 to poison."
    traits:
      - druid
  Precise Debilitations:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: theif
    shortdesc: You attack with great precision. Add the following debilitations to the list you can choose from when you use Debilitating Strike.
    traits:
      - rogue
  Prevailing Position:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - at least one stance feat
    shortdesc: "**Trigger** You are targeted by an attack or attempt a Reflex saving throw against a damaging effect, and you are in a stance.%r%rYour flexibility with stances lets you sacrifice their benefits to better protect yourself. You leave the stance you were in, gaining a +4 circumstance bonus to the triggering saving throw or to your AC against the triggering attack."
    traits:
      - monk
  Primal Howl:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Incredible Companion (Druid)
    shortdesc: Your companion can let out a howl laced with your primal magic. It gains the Primal Howl advanced maneuver, in addition to any advanced maneuvers it already knows.
    traits:
      - druid
  Pristine Weapon:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Verdant Weapon
    shortdesc: Your verdant weapon can cut through the resistances of magical creatures. The weapon is treated as cold iron and silver. If you critically hit a creature that has a weakness to cold iron or silver, the target takes 1d6 persistent bleed damage as the primal energies within your weapon slow its natural healing.
    traits:
      - druid
  Quickened Casting:
    assoc_charclass:
      - Bard
      - Oracle
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Frequency** once per day%r%r**Bard** If your next action is to cast a bard cantrip or a bard spell that is at least 2 ranks lower than the highest-rank bard spell slot you have, reduce the number of actions to cast it by 1 (minimum 1 action).%r%r**Witch** You accelerate your spellcasting. If your next action is to cast a witch cantrip or a witch spell that is at least 2 ranks lower than the highest-rank witch spell slot you have, reduce the number of actions to cast it by 1 (minimum 1 action).%r%r**Wizard** Straining your mind, you collapse as much of your spell's formulas as you can, resulting in a shorter but much more complex incantation. If your next action is to cast a wizard cantrip or a wizard spell that is at least 2 ranks lower than the highest-rank wizard spell slot you have, reduce the number of actions to cast it by 1 (minimum 1 action).%r%r**Others** If your next action is to cast a class cantrip or a class spell that is at least 2 levels lower than the highest-level class spell slot you have, reduce the number of actions to cast it by 1 (minimum 1 action)."
    traits:
      - bard
      - concentrate
      - oracle
      - sorcerer
      - spellshape
      - witch
      - wizard
  Radiant Armament:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - blessed armament
    shortdesc: "Your blessed armament radiates power, further enhancing your chosen weapon. When you choose the weapon for your blessed armament during your daily preparations, add the *astral* and *brilliant* property runes to the list of effects you can choose from. If you're holy, also add the *holy* rune, and if you're unholy, also add the *unholy* rune.%r%rIn addition, you can change the rune you've selected for the day to a different rune from your list as a 10-minute activity that has the concentrate, divine, and exploration traits. Changing the rune doesn't restore abilities that can be used only a limited number of times, such as Holy Healing for the *holy* rune."
    traits:
      - champion
  Reflexive Riposte:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Opportune Riposte
    shortdesc: You can riposte almost without a thought. At the start of each of your turns when you regain your actions, you gain an additional reaction that can be used only to perform an Opportune Riposte.
    traits:
      - swashbuckler
  Replenishment of War:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Striking out against your enemies draws praise and protection from your deity. When you damage a creature with a Strike using your deity's favored weapon, you gain a number of temporary Hit Points equal to half your level, or equal to your level if the Strike was a critical hit. These temporary Hit Points last until the start of your next turn.
    traits:
      - cleric
  Resounding Blow:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** You are wielding a melee weapon that deals bludgeoning damage.%r%rYou strike your enemy in the head with such force that their ears ring. Make a melee Strike. If the Strike hits and deals damage, the target is deafened until the start of your next turn (or for 1 minute on a critical hit)."
    traits:
      - barbarian
      - rage
  Roll the Bones of Fate:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 10
      orspecialize:
        - bones
        - lore
    shortdesc: "**Frequency** once per 10 minutes%r%rYou roll a handful of bones to learn (or perhaps influence) the future course of events. Roll 1d4 and use the corresponding result below. Whenever you Roll the Bones of Fate, any effects from a previous usage immediately end.%r%r**1 Good** You or an ally within 30 feet can roll twice on your next attack roll or skill check, taking the higher result. This is a fortune effect.%r%r**2 Bad** One creature you are observing within 30 feet must succeed at a Will save against your spell DC; on a failure, the target must roll twice on their next attack roll or skill check that takes at least one action to perform, taking the lower result. This is a misfortune effect.%r%r**3 Mixed** You gain the benefits of rolling both a 1 and a 2.%r%r**4 Cursed Possibilities** Your attempts to meddle in the forces of prophecy bring dire consequences for all. Every creature within 30 feet of you when you perform the augury rolls twice on their next attack roll or skill check that takes at least one action to perform; if the highest number rolled is odd, they take the lower result, and if the highest number rolled is even, they take the higher result. If they took the lower result, this effect has the misfortune trait for them, and if they took the higher result, it has the fortune trait."
    traits:
      - cursebound
      - divine
      - oracle
      - prediction
  Scroll Adept:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 10
      skill: Crafting/expert
    shortdesc: "During your daily preparations, you can create two temporary scrolls containing arcane spells from your spellbook. Each scroll must be of a different spell rank, and both spell ranks must be 2 or more ranks lower than your highest-rank spell. Any scrolls you create this way become non-magical the next time you make your daily preparations. A temporary scroll has no value if sold. As normal for a scroll, these are consumable items of light Bulk, and someone holding the item in one hand can Cast the Spell from it if it's on their spell list, using their spell attack modifier and spell DC.%r%rIf you have master proficiency in spell DC, you can create three temporary scrolls during your daily preparations, and if you have legendary proficiency, you can create four temporary scrolls."
    traits:
      - wizard
  Shared Avoidance:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Premonition of Avoidance
    shortdesc: You can project your premonitions of danger to your allies. When you use Premonition of Avoidance, allies within 20 feet of you who are rolling the same saving throw against the same hazard also gain a +2 circumstance bonus to their saving throws.
    traits:
      - cleric
  Shield of Faith:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Domain Initiate
    shortdesc: Residual energy from your domain spells bolsters your defenses. When you spend a Focus Point to cast a domain spell, you gain a +1 status bonus to your AC until the start of your next turn.
    traits:
      - cleric
  Shield of Reckoning:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Shield Warden
    shortdesc: "**Frequency** once per round%r%r**Trigger** An enemy's attack against an ally matches the trigger for both your Shield Block reaction and your champion's reaction.%r%rWhen you shield your ally against an attack, you call upon your power to protect your ally further. You use the Shield Block reaction to prevent damage to an ally and also use your champion's reaction against the enemy that attacked your ally.%r%r**Special** If you have an ability that gives you an additional reaction you can use to Shield Block or use your champion's reaction, you can use it for Shield of Reckoning."
    traits:
      - champion
  Side by Side (Druid):
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Animal Companion
    shortdesc: You and your animal companion fight in tandem, distracting your foes and keeping them off balance. Whenever you and your animal companion are adjacent to the same foe, you are both flanking that foe with each other, regardless of your actual positions.
    traits:
      - druid
  Signature Spell Expansion:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Your innate connection to magic lets you cast more spells with greater freedom. You gain two additional signature spells, each of which must have a base rank of 3rd or lower.
    traits:
      - sorcerer
  Silencing Strike:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "A quick strike to the face or mouth silences your opponent. Make a melee Strike against an enemy. If it hits, the enemy must succeed at a Fortitude save against your class DC.%r%r**Success** The target is unaffected.%r**Failure** The target is dazed and can barely vocalize. It's stunned 1 and its speech is raspy and hard to understand. It must succeed at a DC 11 flat check to use linguistic actions or Cast a Spell, unless the spell has the subtle trait.%r**Critical Failure** As failure, but the creature is stunned 3 instead of stunned 1."
    traits:
      - barbarian
      - incapacitation
      - rage
  Sleeper Hold:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Requirements** You have a creature grabbed or restrained.%r%rYou pinch crucial points of your target's nervous system, impeding its ability to function. Attempt an Athletics check to Grapple the creature, with the following success and critical success effects instead of the usual effects.%r%r**Critical Success** The target falls unconscious for 1 minute, though it remains standing and doesn't drop what it holds.%r**Success** The target is clumsy 1 until the end of its next turn."
    traits:
      - incapacitation
      - monk
  Sneak Adept:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
      skill: Stealth/master
    shortdesc: It's almost impossible to spot you. When you roll a failure on a Sneak action, you get a success instead. You can still critically fail.
    traits:
      - rogue
  Spectral Advance:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - blessed swiftness
    shortdesc: You gain the *spectral advance* devotion spell, which lets you move to an enemy, bypassing hindrances.
    traits:
      - champion
      - concentrate
      - divine
      - teleportation
    init_magic: true
  Stumbling Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: Your excellent display of fighting prowess leaves your opponent stumbling back. Make a Strike. If you hit, the target is pushed 5 feet back (or 10 feet on a critical hit).
    traits:
      - finisher
      - swashbuckler
  Suspect of Opportunity:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Person of Interest
    shortdesc: "**Trigger** A creature who isn't, to your knowledge, tied to any of your active investigations takes a hostile action against you in combat.%r%rSometimes something intrudes upon your case unexpectedly, such as an ambush sent to bring your investigation to a close. You use Person of Interest against the triggering creature. This doesn't allow you to use Person of Interest more frequently than normal."
    traits:
      - investigator
  Switcheroo:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** You are targeted by a ranged attack.%r%r**Requirements** You are adjacent to an enemy and have panache.%r%rYou attempt to deftly swap places with an adjacent enemy to avoid the attack. Choose an adjacent enemy and attempt to Reposition it. Instead of the normal results of Reposition, use the following.%r%r**Critical Success** You swap places with the target enemy and the enemy becomes the target of the triggering attack.%r**Success** As critical success, except the target has lesser cover against the triggering attack, and you lose your panache.%r**Failure** You lose your panache.%r**Critical Failure** You become off-guard against the triggering attack, and you lose your panache."
    traits:
      - swashbuckler
  Symphony of the Unfettered Heart:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You learn the *symphony of the unfettered heart* composition spell, which enables you to protect an ally against incapacitating conditions.
    traits:
      - bard
    init_magic: true
  Tactical Debilitations:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: scoundrel
    shortdesc: You learn new debilitations that grant you tactical advantages against your foes. Add the following debilitations to the list you can choose from when you use Debilitating Strike.
    traits:
      - rogue
  Tactical Reflexes:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You are particularly swift at punishing foes who leave you openings. At the start of each of your turns when you regain your actions, you gain an additional reaction that can be used only to make a Reactive Strike.
    traits:
      - fighter
  Tangle of Battle:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** You critically hit an adjacent enemy.%r%rYour vicious strike pulls your foe closer, giving you the opportunity to grab them. Attempt to Grapple the triggering enemy."
    traits:
      - barbarian
      - rage
  Targeting Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "Your attack harms and hinders your foe. Choose a particular part of your foe from the list below and Strike.%r%rIf you hit and damage the target, apply the effect corresponding to the chosen part. This hindrance lasts until the end of your next turn. On a critical hit, you also apply a lesser effect lasting for 1 minute."
    traits:
      - finisher
      - swashbuckler
  Terrifying Howl:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "You unleash a terrifying howl. Attempt Intimidation checks to Demoralize each enemy within 30 feet: you don't take a penalty if the creature doesn't understand your language. Regardless of the results of your checks, each target is then temporarily immune to Terrifying Howl for 1 minute."
    traits:
      - auditory
      - barbarian
      - rage
  The Dead Walk:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 10
      orspecialize:
        - ancestors
        - battle
    shortdesc: You beseech warrior spirits to come forth and aid you. Two ghostly warriors manifest within a 30-ft emanation of you and each attempt a Strike against an adjacent enemy, using your spell attack modifier. The warriors' Strikes each deal 4d6 spirit damage and the warriors can flank with one another and with you and your allies. If you are cursebound 2 when you use The Dead Walk, you instead summon three warriors, and if you are cursebound 3, you instead summon four warriors. The warriors disappear at the start of your next turn.
    traits:
      - cursebound
      - divine
      - oracle
  Thunderclap Spell:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: storm
    shortdesc: Your lightning splits the air, generating a booming shock wave. If your next action is to Cast a Spell that has the electricity trait or deals electricity damage, has no duration, and requires creatures to attempt a saving throw, the force of the spell's lightning creates a thunderclap, in addition to its other effects. Each creature that failed its Reflex save against the spell is deafened for 1 round, and those who critically failed are also knocked prone.
    traits:
      - druid
      - sonic
      - spellshape
  Trial by Skyfire:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 10
      orspecialize:
        - cosmos
        - flames
    shortdesc: Your lips murmur as you portend a great disaster, one you hope you survive. A rain of blazing bolts begins to fall from the heavens in a 10-ft emanation, centered on you, that deals 2d6 fire damage to all creatures in the emanation at the end of each of your turns (basic Reflex save); you can't exclude yourself from the emanation. The skyfire persists for 1 minute; while you can't Dismiss it, you can suppress the effect for 1 round with a Sustain action. The rain of fire is suppressed if you fall unconscious. If you become cursebound 3 or 4 at any point during Trial by Skyfire's duration, the emanation increases to 15-ft emanation and the damage increases to 4d6.
    traits:
      - cursebound
      - divine
      - fire
      - oracle
  Twin Riposte:
    assoc_charclass:
      - Fighter
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Trigger** A creature within your reach critically fails to Strike you.%r%r**Requirements** You are benefiting from Twin Parry.%r%rA clever parry with one weapon leaves your opponent open to an attack with the other weapon. Make a melee Strike or Disarm action against the triggering opponent."
    traits:
      - fighter
      - ranger
  Unstable Concoction:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: You can mix a wondrous yet volatile liquid into an alchemical consumable if it has an initial effect that uses dice. You increase the size of any dice for the item's initial effect by one step. For instance, you could increase damage from a moderate alchemist's fire to 2d10 or healing from a moderate elixir of life to 5d8+12. Because this affects only initial dice, it wouldn't increase unarmed attack damage from a bestial mutagen, persistent damage from an acid flask, and the like. When this item is activated, the creature activating it must succeed at a DC 10 flat check or take acid damage equal to the item's level.
    traits:
      - additive
      - alchemist
  Unusual Composition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 10
      specailize: polymath
    shortdesc: You can translate the emotion and power of a composition to other mediums. If your next action is to cast a composition spell that is auditory or visual, you can have it affect creatures who can witness it with any sense, not just those the traits indicate, even including special senses like tremorsense. You can choose to exclude any senses you choose.
    traits:
      - bard
      - concentrate
      - manipulate
      - spellshape
  Vicious Debilitations:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 10
      specialize: ruffian
    shortdesc: The debilitations you dish out seriously impair your foes. Add the following debilitations to the list you can choose from when you use Debilitating Strike.
    traits:
      - rogue
  Warden's Step:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 10
      skill: Stealth/master
    shortdesc: You can guide your allies to move quietly through the wilderness. When you Avoid Notice during exploration in natural terrain, you can designate any number of your allies to gain the benefits as if they were using that activity during that exploration. This requires no action on their part.
    traits:
      - ranger
  Waters of Creation:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 10
      orspecialize:
        - life
        - tempest
    shortdesc: Water is the source of life, and you draw upon this primordial force to heal your allies' wounds. A gentle ring ripples out from you in a 15-ft emanation, restoring 5d6 Hit Points to creatures in the area. At 12th level and every two levels thereafter, the amount restored increases by 1d6. If you are cursebound 3 when you use Waters of Creation, the amount healed increases to d8s.
    traits:
      - cursebound
      - divine
      - healing
      - oracle
      - vitality
      - water
  Wind Jump:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Qi Spells
    shortdesc: You gather the wind beneath you, allowing you to soar as you jump. You gain the *wind jump* qi spell.
    traits:
      - monk
  Winding Flow:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 10
    shortdesc: "**Frequency** once per round%r%rAny journey consists of more than simply reaching your destination. You use two of the following actions in any order: Stand, Step, and Stride. You can't use the same action twice."
    traits:
      - monk
  Witch's Communion:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 10
      feat:
        - Witch's Charge
    shortdesc: You can keep watch over multiple charges. Each day during your preparations, you can designate a number of charges equal to your Intelligence modifier instead of just one.
    traits:
      - witch
# Level 12 Class Feats
  Affliction Mercy:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Mercy
    shortdesc: The divine grace that flows through you grants reprieve from an affliction. Add mercy of recuperation to the types of Mercy you can provide, allowing you to counteract an affliction instead of an effect causing a condition (typically an affliction is a curse, disease, or poison).
    traits:
      - champion
  Aura of Faith:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 12
      orfeat:
        - holy
        - unholy
    shortdesc: You radiate an aura of belief that imbues your attacks and those of nearby allies with divine power. Each willing ally in your champion's aura adds the holy trait to their Strikes if you're holy or adds the unholy trait to their Strikes if you're unholy.
    traits:
      - champion
  Blessed Counterstrike:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 12
      orspecialize:
        - beacon
        - justiciar
        - liberator
        - redeemer
    shortdesc: "**Requirements** An enemy triggered your champion's reaction since the end of your last turn.%r%rYou call upon divine power and make a weapon or unarmed Strike against the enemy who triggered your champion's reaction. The Strike deals one extra weapon damage die. If this Strike hits, until the start of your next turn, the target gains weakness equal to half your level to all Strikes made by you and your allies."
    traits:
      - champion
      - flourish
  Blood Sovereignty:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You wield blood magic masterfully. When you would benefit from a blood magic effect, you can choose to lose Hit Points equal to twice the spell's rank as the energy of your blood is drawn out. This takes no extra action, and you benefit from two different blood magic effects you know as a result. The two effects can have different targets.
    traits:
      - sorcerer
  Bloodline Focus:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: By listening to the beating of your heart, your focus recovers faster. Whenever you Refocus, completely refill your focus pool.
    traits:
      - sorcerer
    init_magic: true
  Bloody Debilitation:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
      skill: Medicine/trained
    shortdesc: Your attacks slice arteries and veins. Add the following debilitation to the list you can choose from when you use Debilitating Strike.
    traits:
      - rogue
  Brutal Finish:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Requirements** You are wielding a melee weapon in two hands.%r%rYour final blow can make an impact even if it rebounds off a foe's defenses. Make a Strike with a melee weapon you're wielding in two hands. After the Strike, your turn ends. The Strike deals one additional weapon damage die, or two additional weapon damage dice if you're at least 18th level. The Strike also gains the following failure effect.%r%r**Failure** You deal damage equal to one weapon damage die of the required weapon. Increase this to two dice if you're at least 18th level."
    traits:
      - fighter
      - press
  Champion's Sacrifice:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - you aren't unholy
    shortdesc: You can suffer so that others might live. You can cast the *champion's sacrifice* devotion spell.
    traits:
      - champion
  Cheat Death:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** You take damage that would reduce you to 0 Hit Points.%r%rSomehow you always escape the reaper by a hair's breadth. You avoid being knocked out or killed and remain at 1 Hit Point and gain panache, but you become doomed 1 (or increase your doomed value by 1 if you were already doomed).%r%rYou can't reduce or ignore the doomed condition from Cheating Death. The doomed condition from Cheating Death lasts for 10 minutes, though this doesn't affect the duration of any other doomed condition you have."
    traits:
      - swashbuckler
  Clever Counterspell:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Counterspell
        - Quick Recognition
    shortdesc: You creatively apply your prepared spells to Counterspell a much wider variety of your opponents' magic. Instead of being able to counter a foe's spell with Counterspell only if you have that same spell prepared, you can use Counterspell as long as you have the spell the foe is casting in your spellbook. When you use Counterspell in this way, you must still expend a prepared spell; the prepared spell you expend must share a trait with the triggering spell other than concentrate, manipulate, or its tradition trait. The GM might allow you to instead use a spell that has an opposing trait or that otherwise logically would counter the triggering spell (such as using a cold or water spell to counter *fireball* or using *clear mind* to counter a fear spell).
    traits:
      - wizard
  Coven Spell:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** An ally within 30 feet Casts a Spell.%r%rYou rhyme with your ally's incantations or echo their movements, linking your magic to empower their spell in one of two ways:%r%rIf their spell deals damage and doesn't have a duration, you grant that spell a status bonus to damage equal to its rank."
    traits:
      - spellshape
      - witch
  Critical Debilitation:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "Your debilitations are especially effective on your most powerful attacks. Whenever you critically succeed at an attack roll against an enemy and use Debilitating Strike, add the following debilitation to the list you can choose from.%r%r**Debilitation** The target attempts a Fortitude save against your class DC with the following effects.%r%r**Critical Success** The target is unaffected.%r**Success** The target is slowed 1 until the end of your next turn.%r**Failure** The target is slowed 2 until the end of your next turn.%r**Critical Failure** The target is paralyzed until the end of your next turn."
    traits:
      - incapacitation
      - rogue
  Dashing Strike:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Requirements** You are adjacent to an enemy.%r%rSpringing away from one foe, you Strike at another. Stride up to your Speed, but you must end that movement within melee reach of a different enemy. At the end of your movement, make a melee Strike against an enemy now within reach. You can use Dashing Strike while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type."
    traits:
      - fighter
      - press
  Defensive Recovery:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your faith provides temporary protection in addition to healing. If the next action you use is to cast *harm* or *heal* on a single target and the target regains Hit Points from the spell, it also gains a +2 status bonus to AC and saving throws for 1 round.
    traits:
      - cleric
      - concentrate
      - spellshape
  Disrupt Qi:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You carefully target a creature's pressure points to block its inner life force. Make an unarmed Strike. If it deals damage to a living creature, that creature takes persistent void damage and is enfeebled 1 until the persistent damage ends. If you're 18th level or higher, the persistent void damage increases to 3d6.
    traits:
      - monk
      - void
  Distracting Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: The sheer power of your attacks, or the overwhelming number of them, leaves an enemy flustered. If you critically hit your hunted prey with a ranged weapon, or hit it at least twice on the same turn with a ranged weapon, it's off-guard until the start of your next turn.
    traits:
      - ranger
  Divine Wall:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Requirements** You are wielding a shield.%r%rYou use your shield to harry your enemies, preventing them from stepping away from or around you. All spaces adjacent to you are difficult terrain for your enemies."
    traits:
      - champion
  Dodging Roll:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
      skill: Acrobatics/master
    shortdesc: "**Trigger** You take damage from an area effect that allows a Reflex save.%r%rYou dodge a blow at the last possible moment.%r%rYou Step and gain resistance to all damage equal to your level against the triggering effect. If your Step moves you out of the triggering effect's area, this resistance is instead equal to your level plus your Dexterity modifier."
    traits:
      - monk
  Domain Fluency:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Domain Acumen
    shortdesc: You command a deep understanding of the domains related to your mystery. Choose one of the domains associated with your mystery for which you have an initial domain spell. You gain an advanced domain spell from that domain, which you cast as a revelation spell.
    traits:
      - oracle
    init_magic: true
  Domain Focus:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your devotion to your deity's domains grows greater, and so does the power granted to you. Whenever you Refocus, completely refill your focus pool.
    traits:
      - cleric
    init_magic: true
  Double Prey:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You can focus on two foes at once, hunting both of them down. When you use the Hunt Prey action, you can pick two creatures as your prey.
    traits:
      - ranger
  Dragon Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Soaring Shape
    shortdesc: You can take on the shape of some of the world's most fearsome creatures. Add the shapes listed in *dragon form* to your *untamed form* list. Whenever you're polymorphed into another form using *untamed form*, you gain resistance 5 to your choice of bludgeoning or poison.
    traits:
      - druid
  Dragon's Rage Wings:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: dragon
    shortdesc: You sprout dragon wings from your back of the same color as your chosen dragon. While you are raging, you gain a fly Speed equal to your land Speed. If you are flying when your rage ends, you start to fall, but your transformation doesn't revert until the last moment, so you take no damage from the fall and land standing up. This action gains the trait of your dragon instinct's tradition.
    traits:
      - barbarian
      - morph
      - rage
  Dueling Dance (Fighter):
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Dueling Parry
    shortdesc: "**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rUsing a free hand as pivot and balance, you both attack and defend with your weapon. While you are in this stance, you constantly have the benefits of Dueling Parry."
    traits:
      - fighter
      - stance
  Eclectic Polymath:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Esoteric Polymath
    shortdesc: Your flexible mind can quickly shift from one spell to another. If you add a spell to your repertoire during your daily preparations using Esoteric Polymath, when you prepare again, you can choose to keep the new spell from Esoteric Polymath in your repertoire and instead lose access to another spell of the same rank in your repertoire.
    traits:
      - bard
  Emblazon Antimagic:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Emblazon Armament
    shortdesc: Your deity's symbol protects against offensive magic. When you Emblazon an Armament, you can choose from the following effects instead of the effects listed in that feat. These effects have the same restrictions as the base options.
    traits:
      - cleric
  Embrace the Pain:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** A creature within your reach damages you with a melee attack.%r%rIgnoring your pain, you reach out and grab the creature or weapon that caused you harm. Attempt an Athletics check to Grapple the triggering creature or to Disarm the creature of the weapon it damaged you with."
    traits:
      - barbarian
      - rage
  Empiricist's Eye:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: empiricism
    shortdesc: "Sharp and piercing, your eyes see all and convey more. Your Point Out actions lose the auditory trait, and you don't need to be heard to convey the information to your allies. In addition, a creature you Point Out is off-guard to your allies until the start of your next turn.%r%r**Special** If you have the Blind-Fight feat, your allies gain that feat's benefits against any creature that's off-guard due to Empiricist's Eye."
    traits:
      - investigator
  Enigma's Knowledge:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Assured Knowledge
    shortdesc: Your muse whispers knowledge to you at all the right times. You gain the benefits of the Automatic Knowledge skill feat with any skill you can use to Recall Knowledge. As per the special clause in the Automatic Knowledge feat, you can still only use Automatic Knowledge once per round.
    traits:
      - bard
    grants:
      feat:
        - Automatic Knowledge
  Epiphany at the Crossroads:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Frequency** once per day%r%r**Trigger** Your turn begins.%r%r**Requirements** You are unconscious and have the dying condition.%r%rThe crossroads between life and death is a place that can reveal many secrets. You gain the effects of an *augury* spell in a strange, near-death vision. Empowered by the realization, you then lose the dying condition (becoming wounded 1 or increasing your wounded value by 1, as normal), regain a number of Hit Points equal to twice your level, and can Stand."
    traits:
      - divine
      - oracle
  Extend Elixir:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Integrating your own personal energy into the elixirs you create causes them to affect you for longer. When you consume one of your alchemical items that has the elixir and infused traits and a duration of 1 minute or longer, that elixir's duration is doubled. If you created the item with Quick Alchemy, this can't cause it to exceed the 10-minute duration limit.
    traits:
      - alchemist
  Fantastic Leap:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "You launch yourself through the air at a foe. Attempt a High Jump or Long Jump. If you attempt a High Jump, determine the height of your jump as though determining the length of a Long Jump. At the end of your jump, you can make a melee Strike.%r%rAfter your Strike, you fall to the ground if you're in the air. If the distance of your fall is no more than the height of your jump, you take no damage and land upright."
    traits:
      - rogue
  Felling Shot:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "Your ranged attacks can shoot an unprepared foe right out of the air. Make a ranged Strike against an off-guard creature. If the Strike is a success and deals damage, the target must attempt a Reflex save against your class DC.%r%r**Success** The target is unaffected.%r**Failure** The target falls up to 120 feet. If it hits the ground, it takes no damage from the fall.%r**Critical Failure** As failure, and the target can't fly, jump, levitate, or otherwise leave the ground until the end of your next turn."
    traits:
      - rogue
  Flinging Shove:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 12
      orfeat:
        - Aggressive Block
        - Brutish Shove
    shortdesc: Whether you're shoving opponents with a shield or a large weapon, you've learned to push them even further. Increase the distance you Shove your opponent with Aggressive Block or Brutish Shove to 10 feet on a success or 20 feet on a critical success. When you use Aggressive Block, you can choose whether the target is off-guard or Shoved. When you make a Brutish Shove, you also Shove the target 5 feet on a failure.
    traits:
      - fighter
  Focused Shot:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Monastic Archer Stance
    shortdesc: "**Requirements** You are in Monastic Archer Stance.%r%rYou achieve a state of perfect calm before unleashing your attack, opening your mind to the minute movements of the world around you to increase your accuracy.%r%rMake a ranged weapon Strike against a target within your weapon's first range increment. This Strike ignores the target's concealed condition and all cover."
    traits:
      - concentrate
      - monk
  Forcible Energy:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You perform complex manipulations to make the energy from your spells so powerful that your enemies remain vulnerable to it afterward. If your next action is to Cast a Spell that deals acid, cold, electricity, fire, or sonic damage, you can select one target that was damaged to gain weakness 5 to that damage type until the end of your next turn. If a spell deals multiple types of energy damage, choose one that the target gains weakness to. This has no effect on creatures with resistance or immunity to the energy type you choose.
    traits:
      - manipulate
      - spellshape
      - wizard
  Foresee Danger:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** A creature targets you with an attack and you can see the attacker.%r%rYou perceive every possible way your foe's attack could land and attempt to avoid them all.%r%rThe triggering attack roll targets your Perception DC instead of your AC. Though this allows you to avoid taking penalties to your AC, it doesn't remove any conditions or other effects causing such penalties.%r%rFor example, an enemy with sneak attack would still deal extra damage to you for being off-guard, even though you wouldn't take the –2 circumstance penalty when defending against the attack."
    traits:
      - concentrate
      - investigator
  Fortunate Relief:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your god favors your attempts to remove afflictions and conditions. When you cast a healing spell that attempts to counteract an effect, you can roll the counteract check twice and take the higher value.
    traits:
      - cleric
      - fortune
  Furious Grab:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Requirements** Your last action was a successful Strike, and either you have a hand free or your Strike used a grapple weapon.%r%rYou grab your foe while it's distracted by your attack. The foe you hit becomes grabbed, as if you had succeeded at an Athletics check to Grapple the foe."
    traits:
      - barbarian
      - rage
  Garland Spell:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: leaf
    shortdesc: "If your next action is to Cast a Spell with the fungus or plant trait, a garland of plants grows in a 10-ft burst in the spell's range. The plants are difficult terrain and hazardous terrain, covered in your choice of thorns or poisonous vines. Any creature that moves into one of these squares or ends its turn in one takes 2d6 damage (piercing damage for thorns or poison damage for vines). A creature can take this damage only once per turn. You and your familiar are immune to this damage.%r%rThe plants last for 1 minute or until you cast another Garland Spell, whichever comes first.%r%rThe damage increases to 3d6 at 16th level and 4d6 at 20th level."
    traits:
      - druid
      - manipulate
      - spellshape
  Get Used to Disappointment:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 12
      skill: Intimidation/expert
    shortdesc: "**Requirements** Your turn begins, and one target within 30 feet failed an attack roll or skill check against you on its last turn.%r%rYou capitalize on an opponent's failure with smug attitude and swagger, reminding them of the gap in skill between you and your opponent. You attempt to Demoralize the opponent. Regardless of the result, the target becomes temporarily immune for 1 minute."
    traits:
      - bravado
      - swashbuckler
  Greater Physical Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 12
      orfeat:
        - Arcane Evolution
        - Primal Evolution
    shortdesc: You change form readily. Once per day, you can use a sorcerer spell slot to cast any common polymorph battle form spell of the spell slot's rank as if it were a signature spell in your repertoire. You can use the extra spell slot from Primal Evolution instead of a sorcerer spell slot.
    traits:
      - sorcerer
  Greater Revelation:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You unlock deeper revelations hidden within your mystery. You gain your mystery's greater revelation spell.
    traits:
      - oracle
    init_magic: true
  Greater Spiritual Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 12
      orfeat:
        - Divine Evolution
        - Occult Evolution
    shortdesc: Your magical blood allows your spells to be fully effective against incorporeal creatures. Your spells have the effects of a *ghost touch* property rune. They can target or affect a creature projecting its consciousness (such as via *project image*) or possessing another creature, even if its body is elsewhere, though you must know about the possession or projection and choose to do so. Your spells can affect creatures on the Ethereal Plane, though this doesn't grant you the ability to locate them.
    traits:
      - sorcerer
  Hex Focus:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your patron's teachings have allowed you to achieve a deeper focus. Whenever you Refocus, completely refill your focus pool.
