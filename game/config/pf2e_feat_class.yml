        - Knockback Strike
    shortdesc: When you successfully Shove a creature, increase both the distance you can push the creature and the distance you can move to follow along with the target by 5 feet on a success or 10 feet on a critical success. If you push the target into another creature or obstacle, they both take 1d6 bludgeoning damage per 5 feet of movement that was prevented.
    traits:
      - monk
  Incredible Ricochet:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Incredible Aim
    shortdesc: After your first shot singles out your opponent's position, you direct another that ricochets around obstacles and strikes unerringly. Make a ranged weapon Strike against a creature you previously attacked this turn. You ignore the target's concealed condition and all cover.
