      - rogue
  Sapping Symbol:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Raise Symbol
    shortdesc: "**Trigger** While you have your symbol raised, you are about to take damage from a melee attack.%r%rYour religious symbol glows with sacred energy, turning the attacker's strength to weakness. Attempt a Religion check against the triggering creature's Will DC. Regardless of the result, the creature is temporarily immune for 1 minute.%r%r**Critical Success** The creature is enfeebled 2 until it spends at least 1 action moving away from you.%r**Success** As critical success, but enfeebled 1."
    traits:
      - cleric
      - divine
  Second Sting:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYou read your prey's movements and transform them into openings, so failures with one weapon set up glancing blows with the other. Make a melee Strike with one of the required weapons against your hunted prey. The Strike gains the following failure effect.%r%r**Failure** You deal the damage the other required weapon would have dealt on a hit, excluding all damage dice. (This removes dice from weapon runes, spells, and special abilities, not just weapon damage dice.)"
    traits:
      - press
      - ranger
  Share Tincture:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: alchemical sciences
    shortdesc: You use Quick Tincture, and the item you create remains potent until the start of your next turn. Then you can Interact to pass the item to another creature. If you pass it by throwing it, your ranged attack automatically succeeds. You must have a versatile vial to use Quick Tincture, as normal.
    traits:
      - investigator
  Shared Assault:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Courageous Assault
    shortdesc: In the triumph of battle, you can share the glory with another ally. When the ally you chose for Courageous Assault critically succeeds at the Strike granted by that action, another ally affected by your *courageous anthem* composition spell can immediately use a reaction to make a melee Strike. This effect doesn't continue to a third ally, even if the second ally also critically succeeds.
    traits:
      - bard
  Shared Replenishment:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Replenishment of War
    shortdesc: When your deity blesses your warlike acts, you can extend that favor to your allies. You can grant the temporary Hit Points from Replenishment of War to an ally within 10 feet instead of gaining them yourself. You can grant these temporary Hit Points to a different ally each time, meaning you might be able to grant them to multiple creatures in a single turn.
    traits:
      - cleric
  Side by Side (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - an animal companion
    shortdesc: You and your animal companion fight in tandem. Whenever you and your animal companion are adjacent to the same foe, you are both flanking that foe with each other, regardless of your actual positions.
    traits:
      - ranger
  Spirit's Wrath:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: spirit
    shortdesc: You call forth an ephemeral spirit, typically the apparition of an ancestor or a nature spirit, which takes the form of a wisp. The wisp makes a melee wisp rush unarmed attack against an enemy within 120 feet of you. The wisp's attack modifier is equal to your proficiency bonus for martial weapons plus your Strength modifier plus a +2 item bonus, and it applies the same circumstance and status bonuses and penalties that you have. On a hit, the wisp deals spirit damage equal to 4d8 plus your Constitution modifier. Don't apply your Rage damage or your weapon specialization damage, but circumstance and status bonuses and penalties that would also affect the wisp's damage apply. On a critical hit, the wisp deals double damage and the target becomes frightened 1. This attack uses and counts toward your multiple attack penalty as if you were the one attacking.
    traits:
      - attack
      - barbarian
      - concentrate
      - rage
  Spring from the Shadows:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You leap from hiding and assail your target. You Stride up to your Speed, but you must end your movement next to an enemy you're hidden from or undetected by. You then Strike that enemy; you remain hidden from or undetected by that creature until after you Strike. You can use Spring from the Shadows while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type.
    traits:
      - flourish
      - rogue
  Sunder Spell:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: superstition
    shortdesc: "You draw upon your superstitious fury to destroy a spell. Make a melee Strike with a weapon or unarmed attack against a creature, object, or a spell manifestation (such as the wall created by *wall of fire* or the guardian from *spiritual guardian*). If you're targeting something that doesn't have an AC listed, its AC against this Strike is usually 10 for targets that are very easy to hit, like a wall, or a different AC determined by the GM. If your Strike hits, you can attempt to counteract a single spell or magical effect on the target. Your counteract rank for this attempt is equal to half your level rounded up, and you use the result of your attack roll for the counteract check.%r%rWhether or not you succeed at your Strike, the target becomes temporarily immune to your Sunder Spell for 24 hours."
    traits:
      - attack
      - barbarian
      - concentrate
      - rage
  Supreme Invigorating Elixir:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Invigorating Elixir
    shortdesc: "For the purposes of counteracting effects with invigorating elixirs, treat your level as though it were 2 higher. Add the listed conditions to those you can choose for an invigorating elixir you create to counteract: petrified, stunned. You can also choose a disease regardless of what, if any, conditions it imposes."
    traits:
      - alchemist
  Surgical Shock:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: forensic medicine
    shortdesc: "With a few well-placed jabs with your fist or weapon, you render your opponent disoriented or ungainly. Attempt a Medicine check against the Fortitude DC of a target within your reach. The result of your check determines the severity of the condition you inflict.%r%r**Critical Success** The target is either clumsy 3 or stupefied 3 until the end of your next turn. The target is then immune to Surgical Shock for 1 hour.%r**Success** As critical success, but the target is either clumsy 2 or stupefied 2.%r**Failure** The target is minorly inconvenienced. You gain a +1 circumstance bonus to the next attack action you attempt against it before the end of your turn.%r**Critical Failure** The target is unaffected and you overextend yourself, triggering reactions as if you had used a manipulate action."
    traits:
      - attack
      - investigator
  Terraforming Trickery:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "You know how to channel the transformative aspects of your blood magic to alter your surroundings. You know the following blood magic effect.%r%r**Blood Magic—Terraforming Trickery** Either each space adjacent to you becomes difficult terrain, or each space adjacent to you is no longer difficult terrain. This doesn't have any effect on greater difficult terrain and doesn't remove the damaging effects of hazardous terrain."
    traits:
      - concentrate
      - earth
      - sorcerer
  The Bigger They Are:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "With reckless speed, you dash, jump and swing around a creature to find a more vulnerable spot. Attempt to Tumble Through a creature at least one size category larger than you, using the following effects.%r%r**Critical Success** You move through the enemy's space, treating the squares in its space as difficult terrain (every 5 feet costs 10 feet of movement). If you don't have enough Speed to move all the way through its space, you get the same effect as a failure. If you successfully pass through the target's square, the target gains weakness to your precision damage equal to half your level, which lasts until the end of your turn.%r**Success** As success, but the weakness applies only against the next attack you make against the target.%r**Failure** Your movement ends, and you trigger reactions as if you had moved out of the square you started in.%r**Critical Failure** As failure, and you fall prone."
    traits:
      - bravado
      - swashbuckler
  Titan's Stature:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Giant's Stature
    shortdesc: You grow to even greater size. When using Giant's Stature, you can instead become Huge (increasing your reach by 10 feet if you were Medium or smaller).
    traits:
      - barbarian
  Unbalancing Sweep:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You make a great sweep with your weapon or fists about yourself, knocking creatures off their feet and away from you. Choose up to three enemies within your reach and choose whether to Shove or Trip all three of them. Whichever of the two options you choose, roll a separate Athletics check against each enemy, performing the same action against each enemy. Each attempt counts toward your multiple attack penalty, but don't increase your penalty until you have made all the attempts.
    traits:
      - barbarian
      - flourish
  Uncanny Bombs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Far Lobber
    shortdesc: You lob bombs unerringly, despite obstructions or distance. When you throw an alchemical item with the bomb trait, its range increment increases to 60 feet, you reduce any circumstance bonus to the target's AC from cover by 1, and you automatically succeed at the flat check when targeting a concealed creature.
    traits:
      - alchemist
  Uplifting Winds:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: storm
    shortdesc: The winds are eager to keep you aloft. When you are flying and Cast a Spell that has the air or electricity traits, you gain a +10 status bonus to your fly Speed, and you can immediately Fly up to half your Speed.
    traits:
      - druid
  Wandering Oasis:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
      skill: Survival/master
    shortdesc: You're surrounded by soothing energy. You and allies within 60 feet of you are protected from severe environmental heat and cold. If you're legendary in Survival, you and those allies are also protected from extreme environmental heat and cold.
    traits:
      - druid
  Warden's Focus:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - warden spells
    shortdesc: Your connection with your surroundings deepens and expands, allowing you to draw in more of nature's primal power as you focus. When you Refocus, you regain all your Focus Points instead of 1.
    traits:
      - ranger
    init_magic: true
  Witch's Broom:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "A broom is the only steed you need to fly through the night sky. During your daily preparations, you can anoint a single broom, staff, polearm, or similarly shaped object with a flying ointment made of special herbs and oils. Until the next time you make your daily preparations, it gains the magical trait, and you can ride on it while you're holding it with at least 1 hand. It moves at a fly Speed of 20 feet. The broom takes a –10-foot penalty to its Speed if laden with more than 20 Bulk, and crashes to the ground if it carries more than 30 Bulk. The broom can't be controlled by anyone but you. If you anoint a weapon or other held item, you can't ride the broom and wield it at the same time.%r%rYou can Craft your broomstick into a *flying broomstick* as though you had the formula for that item. If you anoint an item that's already a flying broomstick, the broom gains a +10-foot status bonus to its Speed and you can choose whether it works for anyone or only you."
    traits:
      - witch
# Level 14 Class Feats
  Allegro:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You can quicken your allies with a fast-paced performance. You learn the *allegro* composition cantrip.
    traits:
      - bard
    init_magic: true
  Aura of Determination:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your aura protects against powers that would twist the mind and body. You and all allies in your champion's aura gain a +1 status bonus to saving throws against mental, morph, and polymorph effects.
    traits:
      - champion
  Aura of Life:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your aura protects against the power of the Void. You and all allies in your champion's aura gain resistance 5 to void damage and a +1 status bonus to saves against void effects.
    traits:
      - champion
  Aura of Righteousness:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - holy
    shortdesc: Your righteous aura dampens evil's might and prevents the unholy from escaping you. You and all allies in your champion's aura gain resistance 5 to unholy spells, unholy Strikes, and other unholy effects. If a teleportation spell or effect would teleport an unholy creature out of your champion's aura, your aura attempts to counteract it, using the spell rank and DC of your devotion spells.
    traits:
      - champion
  Awesome Blow:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Knockback
    shortdesc: "Your attacks are so powerful, they can flatten your opponents. When you use Knockback, you can attempt an Athletics check against your target's Fortitude DC.%r%r**Critical Success** You gain the critical success effect of a Shove, then the critical success effect of a Trip against the target.%r**Success** You gain the success effect of a Shove, then the success effect of a Trip against the target.%r**Failure** You gain the normal effect of Knockback."
    traits:
      - barbarian
      - concentrate
      - rage
  Blood Ascendancy:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Blood Rising
    shortdesc: When you would benefit from a blood magic effect through Blood Rising, you can choose to benefit from two different blood magic effects you know. The effects follow the same rules as given in Blood Rising, and each effect can have a different target.
    traits:
      - sorcerer
  Bonded Focus:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your connection to your bonded item increases your focus pool. Whenever you Refocus while your bonded item is in your possession, you completely refill your focus pool.
    traits:
      - wizard
    init_magic: true
  Channeling Block:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Shield Block
    shortdesc: You pour divine energy into a desperate block. When you Shield Block, you can expend a *harm* or *heal* spell. Roll 1d8 for each rank of the spell, and increase the shield's Hardness by the total for this block.
    traits:
      - cleric
  Defensive Roll:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Frequency** once per 10 minutes%r%r**Trigger** A physical attack would reduce you to 0 Hit Points.%r%rDropping into a roll to disperse the force of the blow, you can partially evade a lethal attack and stay conscious. You take half damage from the triggering attack"
    traits:
      - rogue
  Deity's Protection:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Advanced Domain
    shortdesc: When you call upon your deity's power to fulfill the promise of their domain, you gain divine protection. After you cast a domain spell, you gain resistance to all damage until the start of your next turn. The amount of resistance is equal to the rank of the domain spell you cast.
    traits:
      - cleric
  Desperate Finisher:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Trigger** You complete the last action on your turn, and your turn has not ended yet.%r%rYou throw everything you have into one last, reckless press. Use a single action that you know with the press trait. You forgo the ability to use reactions until the start of your next turn. This press uses your multiple attack penalty, as normal."
    traits:
      - fighter
      - press
  Determination:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Frequency** once per day%r%rYour training allows you to shrug off your foes' spells and conditions when the need is dire. Choose a single nonpermanent condition, spell, or magical effect that is affecting you. If you chose a condition, its effect on you ends. If you chose a spell or other magical effect, attempt to counteract the spell (your counteract rank is equal to half your level, rounded up, and you attempt a Will save as your counteract check).%r%rThis doesn't remove any Hit Point damage you already took from the spell or condition, and it removes the effect from only you, not from other creatures or the environment around you. It can't remove an ongoing affliction or prevent such an affliction from inflicting conditions on you later. It can't remove conditions occurring automatically due to your situation or positioning (such as prone or flanked)."
    traits:
      - concentrate
      - fighter
  Divine Reflexes:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: At the start of each of your turns, you gain an additional reaction that you can use only for your champion's reaction.
    traits:
      - champion
  Double Poison:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You can apply two different infused injury poisons to the same weapon, though not to a piece of ammunition. Each poison's level must be 2 or more levels lower than your level. You have to apply the two poisons individually. Once you've applied both, the poisons merge into a double poison that uses the lower of the two poisons' DCs and number of stages. If the poisons require different types of saving throws (such as Fortitude and Will), choose which of them the double poison uses. This double poison is virulent only if both poisons were virulent. Combine the effects of each stage of the poison on any creature affected by it. For each stage of the poison, use the effects of both poisons and the longer interval for that stage among the two poisons.
    traits:
      - alchemist
  Earworm:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "By endlessly repeating a motif, you implant a memorable song that repeats over and over again in your allies' heads, preparing them to respond to it later. Choose a composition cantrip and spend 10 minutes repeating a melody, chant, speech, series of motions, or a similar performance that embodies that cantrip. This activity gains the traits appropriate to the type of performance. You implant the earworm within all allies who can see or hear you (as appropriate for the type of performance) for the entire activity.%r%rOnce you've created the earworm, you can attempt a Performance check as a free action to activate it. This check uses the highest Will DC of the earworm's targets present at the time of activation. On a success, you cast the cantrip on all allies who learned the earworm and can perceive your performance; on a failure, the earworm is corrupted and lost. Because it is based on the earlier repetitions, you can't use further free actions like lingering composition or fortissimo composition to modify the activated earworm. Allies forget the earworm after it is activated, if you spend 10 minutes to implant another earworm, or during your next daily preparations, whichever comes first."
    traits:
      - bard
      - exploration
  Ebb and Flow:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Versatile Font
    shortdesc: You can pull forth both vitality and the void simultaneously to harm your enemies and heal your allies. If your next action is to cast a 1-action or 2-action *heal* or *harm* spell, choose one creature in range that would be harmed by the spell, and choose another creature within range that would be healed by the spell. Your *heal* or *harm* targets both creatures.
    traits:
      - cleric
      - concentrate
      - spellshape
  Fast Channel:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
      orfeat:
        - harmful font
        - healing font
    shortdesc: "Divine power is always at your fingertips, swiftly responding to your call. When you cast *harm* or *heal* by spending 2 actions, you can get the effects of the 3-action version instead of the 2-action version.%r%rYou can do this with *harm* if you have harmful font or *heal* if you have healing font (or both if you have Versatile Font)."
    traits:
      - cleric
  Flamboyant Leap:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Flamboyant Athlete
      skill: Athletics/master
    shortdesc: "**Requirements** You are capable of using a finisher.%r%rYou stylishly leap and deliver a powerful finisher. Make a Leap, High Jump, or Long Jump and attempt one single-action finisher at any point during your jump; the finisher can't be one that includes other movement, such as Mobile Finisher. Immediately after the finisher, you fall to the ground if you're in the air, even if you haven't reached the maximum distance of your jump. If the distance you fall is no more than the height of your jump, you take no damage and land upright.%r%rWhen attempting a High Jump or Long Jump during a Flamboyant Leap, determine the DC using the Long Jump DCs, and increase the maximum distance to double your Speed, rather than just your Speed."
    traits:
      - swashbuckler
  Forestall Curse:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Frequency** once per day%r%rYou've learned to hold back your curse. If the next action you use is a cursebound ability, your cursebound value doesn't increase."
    traits:
      - concentrate
      - oracle
  Giant's Lunge:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 14
      specialize: giant
    shortdesc: You extend your body and prepare to attack foes outside your normal reach. Until your rage ends, all your melee weapons and unarmed attacks gain a reach of 10 feet. This doesn't increase the reach of any weapon or unarmed attack that already has the reach trait, but it does combine with abilities that increase your reach due to increased size, such as Giant's Stature.
    traits:
      - barbarian
      - concentrate
      - rage
  Guiding Finish:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Requirements** You are wielding a single one-handed melee weapon and hold nothing else in your hands.%r%rUsing your weapon as a lever, you force your opponent to end up right where you want them. Make a Strike with a one-handed melee weapon. If the Strike hits, you can Reposition the target up to 10 feet. You can move the target through your space during this movement. Your Strike gains the following failure effect.%r%r**Failure** You can force the creature to move as you would on a success, but you can move the target only 5 feet."
    traits:
      - fighter
      - press
  Guiding Riposte:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Dueling Riposte
    shortdesc: By shifting your weight and angling your weapon, you guide your opponent to a more favorable position. When you use Dueling Riposte to Strike and you hit, you can Reposition up to 10 feet.
    traits:
      - fighter
  Impaling Thrust:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Requirements** You are wielding a melee weapon that deals piercing damage.%r%rYou impale your enemy and hold it in place with your weapon, and leave it bleeding when it gets free. Make a melee Strike with a melee weapon that deals piercing damage. If the Strike hits and deals damage, your target is grabbed until it successfully Escapes, you attack with the weapon again, or you Release the required weapon, whichever comes first. When the target is no longer grabbed, it takes persistent bleed damage equal to the weapon's number of weapon damage dice."
    traits:
      - barbarian
      - rage
  Impossible Riposte:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Opportune Riposte
    shortdesc: "Your ripostes can deflect attacks back at their source. You can use opportune riposte with a trigger of 'A foe outside of your reach critically fails an attack roll against you' in addition to its usual trigger.%r%rWhen you use opportune riposte with this new trigger against a ranged attack, your Strike deflects some of the triggering effect back toward its source. Compare the result of your attack roll to the AC of the triggering foe.%r%rOn a hit, you deal the normal amount of damage for your Strike, but the damage type changes to that of the triggering attack. For instance, if you used opportune riposte to deflect a *blazing bolt*, your Strike would deal fire damage instead of its normal damage type."
    traits:
      - swashbuckler
  Improved Twin Riposte (Fighter):
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Twin Riposte
    shortdesc: Your weapons are a blur, blocking and biting at your foes. You can use Twin Riposte even if you aren't benefiting from Twin Parry. At the start of each of your turns, you gain an additional reaction that you can use only to make a Twin Riposte.
    traits:
      - fighter
  Instant Opening:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You distract your opponent with a few choice words or a rude gesture. Choose a target within 30 feet. It's off-guard against your attacks until the end of your next turn. Depending on the way you describe your distraction, this action gains either the auditory or visual trait.
    traits:
      - concentrate
      - rogue
  Interweave Dispel:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - dispel magic in your spell repertoire
    shortdesc: You weave dispelling energy into a spell. If your next action is to cast a single-target spell against an enemy, and you either hit the enemy with the spell attack roll or the enemy fails its saving throw, you can cast *dispel magic* on the enemy as a free action, expending a spell slot as normal and targeting one spell effect affecting the enemy.
    traits:
      - sorcerer
      - spellshape
  Ironblood Surge:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Ironblood Stance
    shortdesc: "**Requirements** You are in Ironblood Stance%r%rYou steel yourself, preparing to resist oncoming attacks and using your muscles to absorb the impact.%r%rYou gain the benefits of your iron sweep's parry trait (a +1 circumstance bonus to AC until the start of your next turn) and your resistance from Ironblood Stance increases to your Strength modifier (if it's higher) for the same duration."
    traits:
      - monk
  Lasting Armament:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Sanctify Armament
    shortdesc: When you sanctify a weapon, it remains sanctified for an extended period. The duration of Sanctify Armament is increased to 1 hour, but it still ends if you use Sanctify Armament on another weapon.
    traits:
      - cleric
  Leave an Opening:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: When you hit hard enough, you leave an opening so your ally can jump in on the action. Whenever you critically hit an off-guard opponent with a melee attack and deal damage, the target triggers a Reactive Strike reaction from one ally of your choice who has that reaction, as if the enemy had used a manipulate action.
    traits:
      - rogue
  Lighter than Air:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Water Walker
    shortdesc: Your mysterious steps become even lighter, transcending the mortal world altogether. When you have the cursebound condition, you gain the effects of *fly*. If you are cursebound 3 or greater, you gain a +10-foot status bonus to your fly Speed.
    traits:
      - divine
      - oracle
  Mountain Quake:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Mountain Stronghold
    shortdesc: "**Requirements** You are in Mountain Stance%r%rYou stomp, shaking the earth beneath you. Creatures on the ground within a 20-ft emanation take damage equal to your Strength modifier (minimum 0), with a basic Fortitude save against your class DC. On a failure, they also fall prone. After you use this action, you can't use it again for 1d4 rounds.%r%r**Special** If you have this feat, the Dexterity modifier cap to your AC while using Mountain Stance increases from +1 to +2."
    traits:
      - monk
  Mutant Innervation:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "Basic mutagens that affect your mind and thoughts can make you communicate telepathically, protect you from being detected, or let you communicate with anyone. While you're affected by one of the listed mutagens, you get an additional benefit.%r%r**Silvertongue Mutagen** Ignore circumstance penalties you would take to Deception, Diplomacy, Intimidation, and Performance checks. In addition, your words transcend linguistic barriers; everyone listening to you speak hears your words as if you were speaking in their own language (though you don't actually speak that language, nor does this ability allow you to understand any additional languages).%r%r**Special** If you can be under the effects of multiple mutagens (with the mutagenist greater field discovery, for example), you get all relevant benefits."
    traits:
      - alchemist
  Mysterious Repertoire:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "Your mystery holds unknowable depths of magic not always associated with the divine. You can have one spell in your spell repertoire not on the divine spell list, in addition to spells you've added to your spell list from abilities like divine access.%r%rYou cast that spell as a divine spell. You can swap which spell you add and from which tradition as you could any other oracle spell, but you can't use this feat to have more than one spell from another tradition in your spell repertoire at the same time."
    traits:
      - oracle
  Opening Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Trigger** You roll initiative.%r%rAt the first sign of trouble, often before you consciously realize the danger, you drop into a stance with a mere thought. Use an action that has the stance trait."
    traits:
      - fighter
  Patron's Presence:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your patron can direct its attention through your familiar, and its mere presence becomes an ominous weight on the minds of other beings to distract them and blot out their magic. Your familiar gains the Patron's Presence activity.
    traits:
      - witch
  Peerless Form:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your mastery over your body is perfect enough to hold back the ravages of time. You cease aging, though you still die when your time is up. In addition, you gain a +2 status bonus to Fortitude and Will saving throws.
    traits:
      - monk
  Perfect Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You focus your panache into an impeccable assault. Make a Strike, rolling the attack roll twice and using the better result.
    traits:
      - finisher
      - fortune
      - swashbuckler
  Plot the Future:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "You spend 10 minutes in contemplation to uncannily predict how events will play out. Choose a particular goal or activity you plan to engage in within 1 week, or an event you expect might happen within 1 week. You analyze whether it's likely to come to pass, learning whether it's highly likely, somewhat likely, somewhat unlikely, or highly unlikely. You also gain a piece of advice suggesting a course of action you or your allies could take that might make the chosen event more or less likely, whichever you prefer.%r%rThe GM determines the likeliness of the event and the piece of advice you learn."
    traits:
      - concentrate
      - investigator
      - prediction
      - uncommon
  Premonition of Clarity:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You fail a saving throw against a mental effect.%r%rYour deity sends you a vision of faith to steel you against mental attacks. Reroll the triggering saving throw with a +2 circumstance bonus. You must use the second result, even if it's worse."
    traits:
      - cleric
      - fortune
  Reactive Transformation:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Untamed Form
      orfeat:
        - Dragon Shape
        - Elemental Shape
        - Plant Shape
        - Soaring Shape
    shortdesc: "**Trigger** varies%r%rYou transform reflexively when in danger. You cast *untamed form* to transform into one shape granted by one of the prerequisite feats you have, depending on the trigger. Your shape's resistances and weaknesses apply against the triggering damage.%r%r- **Trigger** You fall 10 feet or more; **Effect** Choose a shape from *aerial form*.%r%r- **Trigger** You take bludgeoning or poison damage; **Effect** Choose a primal dragon shape from *dragon form* that resists the triggering damage.%r%r- **Trigger** You take fire damage; **Effect** Choose a fire elemental shape from *elemental form*.%r%r- **Trigger** You take poison damage; **Effect** Choose a shape from *plant form*."
    traits:
      - druid
  Reflect Harm:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "You can wrap your magic around you like a cloak that causes those who dare to target you with spells to suffer a similar fate. You know the following blood magic effect.%r%r**Blood Magic—Reflect Harm** Your blood ensures that those who harm you with magic are harmed in return. The first time you take damage from a spell before the beginning of your next turn, attempt spell attack roll against the creature who cast the triggering spell. On a hit, the creature takes the same amount and type of damage that you just took. If you critically hit, the creature takes twice the damage."
    traits:
      - sorcerer
  Reflect Spell:
    assoc_charclass:
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Counterspell
    shortdesc: When you successfully use Counterspell to counteract a spell that affects targeted creatures or an area, you can turn that spell's effect back on its caster. When reflected, the spell affects only the original caster, even if it's an area spell or it would normally affect more than one creature. The original caster can attempt a save and use other defenses against the reflected spell as normal.
    traits:
      - witch
      - wizard
  Revelation's Focus:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: The further extents of your mystery provide an endless wellspring of magic. When you Refocus, you regain all your Focus Points instead of 1.
    traits:
      - oracle
    init_magic: true
  Rites of Transfiguration:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You can adapt your patron's power to transform other creatures into forms more befitting their behavior or your whims. Your familiar learns *cursed metamorphosis*, even if *cursed metamorphosis* isn't on your tradition's spell list. By spending 10 minutes in communion with your familiar, you can replace one spell of 6th-rank or higher you've prepared in one of your witch spell slots with a *cursed metamorphosis* spell of the same rank.
    traits:
      - witch
  Secondary Detonation Array:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You divert some of your spell's energy into an unstable runic array. If your next action is to Cast a Spell that deals damage, has no duration, and affects an area, a glowing magic circle appears in a 5-ft burst within that area. At the beginning of your next turn, the circle detonates, dealing 1d6 force damage per rank of the spell to all creatures within the circle, with a basic Reflex save against your spell DC. If the spell dealt a different type of damage, the circle deals this type of damage instead (or one type of your choice if the spell could deal multiple types of damage).
    traits:
      - manipulate
      - spellshape
      - wizard
  Sense the Unseen:
    assoc_charclass:
      - Investigator
      - Ranger
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Trigger** You fail a check to Seek.%r%rWhen you look for foes, you can catch even the slightest cues, such as their minute movements or the shifting of air currents on your skin. Even though you failed at the triggering check, you automatically sense any undetected creatures in the area where you're Seeking, making them merely hidden to you."
    traits:
      - investigator
      - ranger
      - rogue
  Shadow's Web:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Clinging Shadows Initiate
    shortdesc: You can launch a wave of shadowy qi outward from your body, damaging your opponents and potentially binding them in place. You gain the *shadow's web* qi spell.
    traits:
      - monk
  Shared Prey:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Double Prey
        - Warden's Boon
    shortdesc: Hunting as a duo, you and your ally both single out your prey. When you use Hunt Prey and select only one prey, you can grant your Hunt Prey benefits and hunter's edge to an ally in addition to gaining them yourself. The ally retains these benefits until you use Hunt Prey again.
    traits:
      - ranger
  Soothing Ballad:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You soothe your allies' wounds with the power of your performance. You learn the *soothing ballad* composition spell.
    traits:
      - bard
    init_magic: true
  Sow Spell:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You fold your spell into a seed. If your next action is to Cast a Spell using 1 action or 2 actions, the spell instead plants itself in an adjacent square. You must make all decisions regarding the spell at the time you cast it. Within the next 10 minutes, you can direct your sown spell to sprout and produce the spell's effects as a reaction, which is triggered when a creature enters the sown spell's space or a square adjacent to it. You can have only one sown spell at a time, and if you don't trigger the spell within 10 minutes, it dissipates and the spell is lost. A creature can notice the sown spell with a successful Perception check against your spell DC.
    traits:
      - concentrate
      - druid
      - spellshape
  Specialized Companion (Druid):
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Incredible Companion (Druid)
    shortdesc: "Your animal companion continues to grow in power and ability. It gains one specialization of your choice%r%r**Special** You can select this feat up to three times. Each time, add a different specialization to your companion."
    traits:
      - druid
  Spell Shroud:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your spell shrouds you in a billowing cloud. If your next action is to Cast a Spell that targets you, you surround yourself in a 15-ft emanation of dense magical mist that lasts until the start of your next turn. All creatures within the cloud become concealed, and all creatures outside the cloud are concealed to creatures within it.
    traits:
      - concentrate
      - sorcerer
      - spellshape
  Stay Down!:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 14
      skill: Athletics/master
    shortdesc: "**Trigger** A prone foe within your reach Stands.%r%rYou have ways of keeping your foes down. Attempt an Athletics check against the triggering foe's Fortitude DC. On a success, the action is disrupted, causing the creature to remain prone. On a critical success, the creature also can't Stand until its next turn."
    traits:
      - rogue
  Stealthy Companion:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Animal Companion
        - Camouflage
    shortdesc: You've trained your animal companion to blend in to its surroundings. Your animal companion gains the benefit of the Camouflage feat. If your companion is a specialized ambusher, its proficiency rank for Stealth increases to master (or legendary if it was already master).
    traits:
      - ranger
  Strategic Bypass:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: Your plans account for your foes' resistances, enabling you to strike a telling blow. When you hit with a Strike on which you substituted your attack roll due to Devise a Stratagem, you ignore an amount of resistance equal to your Intelligence modifier for each resistance that applies against your attack.
    traits:
      - investigator
  Sunder Enchantment:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Sunder Spell
    shortdesc: You can focus your superstition to break the magic of an item, in addition to destroying freestanding spells and those active on creatures. When you Sunder a Spell, you can instead attempt to counteract either an unattended magic item or one of your target's magic items. If your counteract attempt succeeds, the item becomes a mundane item of its type for 10 minutes. If you target an artifact, an intelligent item, or a similarly particularly powerful item, your counteract attempt automatically fails.
    traits:
      - barbarian
  Superior Bond:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: When you draw upon your bonded item, you can leave a bit of energy within it for later use. You can use Drain Bonded Item one additional time per day, but only to cast a spell 2 or more ranks lower than your highest-rank wizard spell slot.
    traits:
      - wizard
  Swift Banishment:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Trigger** You critically hit a creature that is not on its home plane.%r%r**Requirements** You have a *banishment* spell prepared.%r%rThe force of your blow sends your victim back to its home plane. You expend a *banishment* spell you have prepared, affecting the creature you critically hit without needing to cast the spell. The creature can attempt to resist the spell as normal."
    traits:
      - cleric
  Tangled Forest Rake:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Tangled Forest Stance
    shortdesc: "**Requirements** You are in Tangled Forest Stance.%r%rYou reposition foes with raking attacks. Make a lashing branch Strike. If you hit and deal damage, you can Reposition the target up to 10 feet. You can move the target through your space during this movement."
    traits:
      - monk
  Timeless Nature:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: With primal magic sustaining you, you cease aging. The overflowing primal energy gives you a +2 status bonus to saves against diseases and primal magic.
    traits:
      - druid
  Triumphant Inspiration:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
      specialize: warrior
    shortdesc: "**Trigger** You critically hit a foe with a melee weapon Strike or a melee unarmed attack.%r%rWith a triumphant shout, you inspire your allies. You cast a composition cantrip you know that normally takes a single action to cast."
    traits:
      - bard
  True Debilitating Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Greater Debilitating Bomb
    shortdesc: "You have discovered increasingly devastating ways for your bombs to impede your foes. When you use Debilitating Bomb, add the following to the list of effects you can choose from: enfeebled 2, stupefied 2, or a –15-foot status penalty to Speeds."
    traits:
      - alchemist
  True Hypercognition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
      specialize: enigma
    shortdesc: Your mind works at an incredible pace. You instantly use up to five Recall Knowledge actions. If you have any special abilities or free actions that would normally be triggered when you Recall Knowledge, you can't use them for these actions.
    traits:
      - bard
  Two-Weapon Flurry:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: "**Requirements** You are wielding two weapons, each in a different hand.%r%rUsing the momentum of your prior attack, you lash out with both your weapons in a sudden frenzy. Strike twice, once with each weapon."
    traits:
      - fighter
      - flourish
      - press
  Vengeful Strike:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Come and Get Me
    shortdesc: "**Trigger** A creature within your reach succeeds at an attack against you.%r%r**Requirements** You're under the effect of Come and Get Me.%r%rWhen struck by an enemy, you respond in turn. Make a melee Strike against the triggering creature. If the triggering attack was a critical success, you can use Vengeful Strike as a free action instead of a reaction."
    traits:
      - barbarian
      - rage
  Verdant Metamorphosis:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 14
      specialize: leaf
    shortdesc: You have turned into a plant version of yourself, gaining the plant trait and losing traits inappropriate for your new form (typically humanoid). You also gain the Verdant Rest action. See wiki for more information.
    traits:
      - druid
  Vigorous Anthem:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You instill magical vigor in your allies when you inspire them to attack. If your next action is to cast the *courageous anthem* composition cantrip, you and all affected allies gain temporary HP equal to 3 + your Charisma modifier that last for 1 minute.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
  Warden's Guidance:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You convey your prey's location to your allies with a series of careful words or gestures. As long as your hunted prey is observed by you, all your allies who roll failures and critical failures when Seeking it get a success instead. Your allies need to be able to see or hear you to gain this benefit. You have to be able to call out or make visible gestures for your allies to get this benefit.
    traits:
      - ranger
  Whirling Blade Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Monastic Weaponry
    shortdesc: "You enter a mindful stance that creates a deep connection between you and your monk weapons, allowing you to manipulate them with your qi, even at a distance. All melee monk weapons you wield with the finesse trait gain the thrown 10 feet trait (unless they already have the thrown trait with a greater range).%r%rOnce you've made a thrown Strike with such a weapon, you can use the precision of your throw to make additional strikes with it, even from a distance. Start from the space of the previous Strike's target to determine the range increment and whether the new target has cover. At the end of your turn, the thrown weapon flies directly back to you in a straight line. If a solid barrier blocks its path, it falls to the ground after hitting the barrier."
    traits:
      - monk
      - stance
  Whirlwind Strike:
    assoc_charclass:
      - Barbarian
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 14
    shortdesc: You attack all nearby adversaries. Make a melee Strike against each enemy within your melee reach. Each attack counts toward your multiple attack penalty, but don't increase your penalty until you have made all your attacks.
    traits:
      - barbarian
      - fighter
      - flourish
  Wild Winds Gust:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 14
      feat:
        - Wild Winds Initiate
    shortdesc: "**Requirements** You are in *wild winds stance*%r%rYou build air pressure with repeated motions, before releasing an enormous crescent of rushing wind strikes. Make a wind crash Strike against each creature in your choice of a 30-ft cone or a 60-ft line. These attacks all count toward your multiple attack penalty, but the penalty doesn't increase until after you make all the attacks."
    traits:
      - air
      - concentrate
      - manipulate
      - monk
# Level 16 Class Feats
  Auspicious Mount:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Imposing Destrier
    shortdesc: "Guided by your ongoing care, your steed has developed incredible intelligence and skill. The mount you gained with Faithful Steed is now a specialized animal companion. You can select one of the usual specializations or the auspice specialization. A faithful steed with the auspice specialization gains the following benefits.%r%rIt gains wings that grant it a fly Speed equal to its land Speed."
    traits:
      - champion
  Blank Slate:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
      skill: Deception/legendary
    shortdesc: Your deceptions confound even the most powerful magic that could spy on you. Detection, revelation, and scrying effects pass right over you, your possessions, and your auras, detecting nothing unless the detecting effect has a counteract rank of 10 or higher. For example, *detect magic* would still detect other magic in the area but not any magic on you, *truesight* wouldn't reveal you, *locate* or *scrying* wouldn't find you, and so on.
    traits:
      - rogue
  Cloud Step:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
      skill: Acrobatics/legendary
    shortdesc: Using fantastic acrobatic skill, you can walk for brief stretches across insubstantial surfaces. When you Stride, you can move across water, air, and solid surfaces that can hold only limited weight as if they were normal ground. If you Stride over a trap with a weight-sensitive pressure plate, you don't trigger it. At the end of your turn, you sink, fall, break fragile surfaces, or trigger traps as normal for your current location.
    traits:
      - rogue
  Cognitive Loophole:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Trigger** Your turn ends.%r%r**Requirements** You are currently affected by a mental effect.%r%rYou can find a loophole in a mental effect to temporarily overcome it. Until the end of your next turn, you ignore a single mental effect. You can suppress a particular effect using Cognitive Loophole only once. You can't use Cognitive Loophole to suppress an effect you chose to have affect you.%r%r**Special** You can use this reaction even if the mental effect is preventing you from using reactions."
    traits:
      - rogue
  Collateral Thrash:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Thrash
    shortdesc: You smack the foe you're thrashing into someone else. When you Thrash, choose another enemy adjacent to the grabbed enemy. That enemy also takes your Thrash damage, with a basic Reflex save against your class DC.
    traits:
      - barbarian
      - rage
  Conduit of Void and Vitality:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Requirements** You have *heal* or *harm* as a signature spell and an available spell slot to cast it with.%r%rYou use the unstable energy of your curse to manipulate the most basic of divine magic. You cast a 3-action *heal* or *harm* spell, expending the slot as normal. If the spell restores Hit Points to one or more creatures, then one creature healed by this spell regains a number of additional Hit Points equal to 1d8 × your cursebound value; if the spell damages one or more creatures, then one creature harmed by this spell takes additional damage equal to 1d8 × your cursebound value."
    traits:
      - cursebound
      - divine
      - oracle
  Courageous Onslaught:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Courageous Advance
        - Courageous Assault
    shortdesc: You use your performance to orchestrate an onslaught against your enemies. If your next action is to cast the *courageous anthem* composition cantrip, one ally of your choice who gains a status bonus from the spell can immediately use their reaction to Stride and then make a melee Strike.
    traits:
      - auditory
      - bard
      - concentrate
      - spellshape
  Deadly Grace:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: Your graceful attacks are especially powerful. When you score a critical hit with an agile or finesse melee weapon that has the deadly trait, you double the number of dice from that trait. When you wield an agile or finesse melee weapon that doesn't have the deadly trait, it gains the deadly d8 trait instead.
    traits:
      - swashbuckler
  Desperate Wrath:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Trigger** Your turn begins, and your current Hit Points are at half your maximum or less.%r%rYour blood boils when you take a beating, and you throw caution to the wind to finish the fight. You get a +2 circumstance bonus to attack rolls, a –1 penalty to AC, and a –1 penalty to saves. These bonuses and penalties last until your Rage ends or until you are above half Hit Points, whichever comes first."
    traits:
      - barbarian
      - rage
  Didactic Strike:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Shared Stratagem
    shortdesc: "When you find a glaring weakness, you can set your allies up to annihilate your foe.%r%rWhen you use Shared Stratagem, you can designate up to 10 allies instead of just one. The foe is off-guard against the first attack from each designated ally before your next turn, and each ally's first attack deals an extra 2d6 precision damage to the target if it hits."
    traits:
      - investigator
  Dispelling Slice:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: Your sneak attack slices through the threads binding magic to a target. Make a Strike against an off-guard creature. If your Strike deals sneak attack damage, you attempt to counteract a single spell of your choice active on the target. Your counteract rank is equal to half your level (rounded up), and your counteract check modifier is equal to your class DC – 10.
    traits:
      - rogue
  Diverse Mystery:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Advanced Revelation
    shortdesc: "You have broadened your understanding of the divine and can tap into the wonders of a different mystery. Select one revelation spell from a mystery other than your own. You can choose only an initial revelation spell or an advanced revelation spell.%r%rThis spell gains the cursebound trait for you, and when you cast it, you gain the cursebound 1 effects of its mystery in addition to your normal curse effects. Any ability that lets you use a cursebound ability without increasing the severity of your curse also prevents you from gaining this additional curse effect.%r%rYou can't cast your chosen revelation spell if any of the following conditions are true:%r%rits mystery's curse effects directly conflict with or negate the effects of your own mystery's curse,%r%rthe curse would have no effect on you (for example, removing an ability from your original mystery that you lack),%r%ror if either of these criteria would be met once you finish Casting the Spell"
    traits:
      - oracle
    init_magic: true
    grants:
      feat:
        - Clumsy
        - Enfeebled
        - Persistent Damage
  Dragon Transformation:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Dragon's Rage Wings
    shortdesc: "You transform into a ferocious Large dragon, gaining the effects of 6th-rank *dragon form* except that you use your own AC and attack modifier, you apply your extra damage from Rage, and the Dragon Breath action uses your class DC. Add the temporary Hit Points from dragon form to any you already have from entering a rage (or any other action with the rage trait). The action to Dismiss the transformation gains the rage trait.%r%rAt 18th level, you gain a +20-foot status bonus to your fly Speed, your damage bonus with dragon Strikes increases to +12, and you gain a +14 status bonus to your Dragon Breath damage."
    traits:
      - barbarian
      - concentrate
      - polymorph
      - primal
      - rage
  Effortless Concentration:
    assoc_charclass:
      - Bard
      - Druid
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Trigger** Your turn begins.%r%rYou maintain your active spells with hardly a thought. You immediately gain the effects of a Sustain action for one of your active class spells."
    traits:
      - bard
      - druid
      - sorcerer
      - witch
      - wizard
  Eternal Bane:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - unholy
    shortdesc: Your life has made you a nexus for your deity's vile power. You're continuously surrounded by a *bane* spell, with a spell rank equal to half your level (rounded up). The radius is 15 feet, and you can't increase it. You can Dismiss the spell; if you do, it returns automatically after 1 minute.
    traits:
      - cleric
  Eternal Blessing:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - holy
    shortdesc: Your deeds have brought your deity's grace to you for all of eternity. You're continuously surrounded by a *bless* spell, with a spell rank equal to half your level (rounded up). The radius is 15 feet, and you can't increase it. You can Dismiss the spell; if you do, it returns automatically after 1 minute.
    traits:
      - cleric
  Eternal Elixir:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Extend Elixir
    shortdesc: Your body readily accepts and retains minor changes. When you drink one of your alchemical items that has the elixir and infused traits and a duration of 1 minute or more, you can make the elixir's duration indefinite. This can exceed the 10-minute limit of an item made with Quick Alchemy. You can do so only if the elixir's level is half your level or lower. If you later consume a different elixir and make it indefinite, the effect of the previous indefinite elixir ends.
    traits:
      - alchemist
  Exploitive Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: You can mix a refractile substance into an alchemical bomb to foil resistances. Choose one damage type the bomb can deal. Any damage dealt by the bomb—including initial, splash, and persistent damage—ignores an amount of that resistance equal to your level.
    traits:
      - additive
      - alchemist
  Felicitous Riposte:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "You take advantage of your foe's openings with uncanny odds.%r%rWhen you make an opportune riposte, roll twice on the attack roll and take the better result."
    traits:
      - fortune
      - swashbuckler
  Furious Vengeance:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
      specialize: fury
    shortdesc: "**Trigger** An enemy within your melee reach critically hits you with a melee Strike.%r%rYour enemy's blow fuels your rage and provokes your immediate retaliation. Make a melee Strike against the triggering enemy."
    traits:
      - barbarian
      - rage
  Fuse Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - at least two stances
    shortdesc: "You have combined two stances into a single stance all your own. When you take this feat, choose two stances you know and combine them into a single fused stance. Give your new fused stance a unique name. When you enter your fused stance, you gain all the effects of both stances, including the requirements and restrictions.%r%rIf the stances both grant special attacks, you gain all those attacks. If a stance restricts you to one particular attack (such as Crane Stance), you must abide by that restriction. If the fused stances have incompatible restrictions, the GM determines which apply, or determines you can't fuse those stances at all."
    traits:
      - monk
  Graceful Poise:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Double Slice
    shortdesc: With the right positioning, your off-hand weapon can strike like a scorpion's stinger. While you are in this stance, if you make your second Strike from Double Slice with an agile weapon, Double Slice counts as one attack when calculating your multiple attack penalty.
    traits:
      - fighter
      - stance
  Greater Distracting Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Distracting Shot
    shortdesc: Even a single missile can throw off your enemy's balance, and more powerful attacks leave it flustered for longer. If you hit your hunted prey with a ranged weapon, it's off-guard until the start of your next turn. If you critically hit your prey or hit it twice on the same turn with a ranged weapon, it's off-guard until the end of your next turn instead.
    traits:
      - ranger
  Greater Mental Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 16
      orfeat:
        - Arcane Evolution
        - Occult Evolution
    shortdesc: Your bloodline's deep connection to mental essence greatly enhances your spell repertoire. Add one spell to your spell repertoire for each spell rank you can cast.
    traits:
      - sorcerer
  Greater Vital Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 16
      orfeat:
        - Divine Evolution
        - Primal Evolution
    shortdesc: Vital power surges through you like a font of energy. Twice per day, you can cast a spell after you've run out of spell slots of the appropriate spell rank; the two spells you cast with this feat must be of different spell ranks.
    traits:
      - sorcerer
  Impaling Briars:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 16
      specialize: leaf
    shortdesc: You can fill an area with devastating briars. You gain the *impaling briars* order spell.
    traits:
      - druid
  Implausible Purchase (Investigator):
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Predictive Purchase
    shortdesc: "It seems impossible, but you've analyzed every angle and are able to just keep pulling out exactly the item you need, even in far-flung locations.%r%rYou can use Prescient Planner even if you have already used it after purchasing goods, and you can use it as a single action instead of a 2-action activity, during which you Interact to draw the item.%r%rIn addition, five times per day, you can use Prescient Planner to pull out a common consumable item up to 6 levels lower than your level."
    traits:
      - investigator
  Improved Twin Riposte (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Twin Riposte
    shortdesc: At the start of each of your turns, you gain an additional reaction that you can use only to perform a Twin Riposte. You can use Twin Riposte even if you aren't benefiting from Twin Parry (though you must be wielding two melee weapons, one in each hand).
    traits:
      - ranger
  Instrument of Zeal:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Blessed Counterstrike
      orspecialize:
        - beacon 
        - justiciar
        - liberator
        - redeemer
    shortdesc: Divine energy fills your weapon. Whenever you critically hit an enemy with Blessed Counterstrike or Retributive Strike, your attack deals an extra weapon damage die, and the target is slowed 1 on its next turn
    traits:
      - champion
  Legendary Monster Hunter:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 16
      skill:
        - Nature/legendary
        - Monster Hunter/master
    shortdesc: Your knowledge of monsters is so incredible that it reveals glaring flaws in your prey. Your bonus from Monster Hunter (and the bonus from Monster Warden if you have it) increases from +1 to +2 for you and any allies who benefit.
    traits:
      - ranger
  Master of Many Styles:
    assoc_charclass:
      - Fighter
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 16
      orfeat:
        - Opening Stance (Fighter)
        - Reflexive Stance (Monk)
    shortdesc: "**Trigger** Your turn begins.%r%rYou move fluidly between stances, using your mastery of combat to always adopt the best tactics. You use an action with the stance trait."
    traits:
      - fighter
      - monk
  Master Qi Spells:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Qi Spells
    shortdesc: "You have achieved near-total mastery of your qi. You gain *medusa's wrath*, *touch of death*, or another 8th-rank qi spell you have access to.%r%r**Special** You can select this feat more than once, choosing a different spell each time."
    traits:
      - monk
  Monstrosity Shape:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Untamed Form
    shortdesc: You can transform into a powerful magical creature. Add the cave worm and sea serpent shapes listed in *monstrosity form* to your *untamed form* list. If you have Soaring Shape, also add the phoenix shape to your *untamed form* list.
    traits:
      - druid
  Multishot Stance:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Double Shot
    shortdesc: "**Requirements** You are wielding a ranged weapon with reload 0.%r%rYou lock yourself in a stable position so you can fire swiftly and accurately. While you are in this stance, your penalty for Double Shot is reduced to –1. If you move from your position, this stance ends.%r%r**Special** If you have Triple Shot, when you use Double Shot to make three Strikes, the penalty is –2."
    traits:
      - fighter
      - stance
  One-Millimeter Punch:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - One-Inch Punch
    shortdesc: "Your punches have incredible force and control. When you damage a target using One-Inch Punch, you can focus your qi to send the foe flying. If you do, the target must attempt a Fortitude save against your class DC.%r%r**Critical Success** The target is unaffected.%r**Success** The target is pushed back 5 feet.%r**Failure** The target is pushed back 10 feet.%r**Critical Failure** The target is pushed back 10 feet for each action you spent on One-Inch Punch."
    traits:
      - monk
  Overwhelming Blow:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: You throw your weight into a powerful attack that leaves you vulnerable. Make a melee Strike. This counts as three attacks when calculating your multiple attack penalty. If this Strike hits, you get a critical hit. If you roll a critical hit, your weapon or unarmed attack also gains the deadly d12 trait (this replaces any deadly trait it already has). Whether or not you hit, you become stunned 1 and are off-guard until the start of your next turn.
    traits:
      - fighter
  Penetrating Projectile:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Requirements** You are wielding a ranged or thrown weapon that deals piercing damage.%r%rYour projectiles are unhindered by flesh and bone. Make a ranged Strike with a ranged or thrown weapon that deals piercing damage against each creature in a 30-ft line (this uses only one projectile despite the number of Strikes). These Strikes ignore all cover granted by creatures. Roll damage only once and apply it to each creature you hit. Each attack counts toward your multiple attack penalty, but don't increase your penalty until you have made all your attacks."
    traits:
      - barbarian
      - flourish
      - rage
  Perfect Distraction:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
      skill: Deception/legendary
    shortdesc: You use clever tactics to mislead your foes as you sneak away. You Sneak while leaving a decoy behind. The decoy acts as the spell *mislead*, though you aren't invisible, just undetected. You can continue to concentrate to move your decoy, as with the spell, whether or not you remain hidden throughout the duration. Once you use Perfect Distraction, you need to spend 10 minutes to set up another decoy before you can use it again.
    traits:
      - rogue
  Persistent Mutagen:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Extend Elixir
    shortdesc: You've trained your physical form to remain stable. Once per day, when you consume an alchemical item with the infused and mutagen traits, you can extend its duration to last until the next time you make your daily preparations instead of its normal duration. Unlike with the normal extension from Extend Elixir, this can exceed the duration of an item created with Quick Alchemy beyond its normal 10-minute limit.
    traits:
      - alchemist
  Portentous Spell:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "Your spellcasting is rife with strange lights, mild fumes, and other captivating effects that befuddle your foes. If the next action you use is to Cast a Spell, any creature that attempts to use a reaction triggered by your Cast a Spell activity takes a –2 circumstance penalty to attack rolls and skill checks rolled as part of the reaction.%r%rIn addition, if the spell includes a spell attack or requires a saving throw, creatures you hit or that fail their saves are Fascinated with you until the start of your next turn."
    traits:
      - manipulate
      - mental
      - oracle
      - spellshape
      - visual
  Rebounding Smite:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Channel Smite
    shortdesc: "**Trigger** You miss with your Strike during Channel Smite.%r%rThe energy from your smite persists for a moment, allowing you to pass it to a new target. Cast the 1-action version of the *harm* or *heal* spell you expended, targeting a creature other than the target of your Strike."
    traits:
      - cleric
  Reconstruct the Scene:
    assoc_charclass:
      - Investigator
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: You spend 1 minute surveying a small location (such as a single room) to get an impression of events that occurred there in the last day. This involves moving about the area and studying footprints, spilled drinks or blood, and so forth. You get an indistinct mental impression of significant events that happened there. This gives you clues and details of the past, including the overall events and their time frame, but it's not a perfect record. This also isn't enough to identify who was involved in these events if you weren't already aware the person was there. As determined by the GM, you also pick out various seemingly small details that could serve as important clues, like a memorable weapon someone used for a murder or the type of cloak someone wore when passing through.
    traits:
      - concentrate
      - investigator
      - rogue
  Remediate:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Frequency** once per hour%r%rIf your next action is to use your divine font to cast a 3-action *heal* or *harm* spell, you can harness the residual energy to counterbalance opposing forces. In addition to its normal effects, you use your *heal* or *harm* spell to attempt to counteract one divine effect in the spell's area."
    traits:
      - cleric
      - concentrate
      - spellshape
  Resounding Finale:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 16
      specialize: maestro
    shortdesc: "**Trigger** You or an ally benefiting from your composition spell would take sonic damage.%r%rYou bring your performance to a sudden, dramatic finish, drowning out other sounds. Your composition spell ends immediately, and all allies that had been benefiting from the spell's effects gain sonic resistance against the triggering damage equal to twice the composition spell's rank."
    traits:
      - bard
      - concentrate
  Resurrectionist:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: You can cause a creature you bring back from the brink of death to thrive and continue healing. When you restore Hit Points to a dying creature or bring a dead creature back to life and restore Hit Points to it, you grant that creature fast healing 5 for 1 minute. This fast healing ends if the creature is knocked unconscious.
    traits:
      - cleric
  Revitalizing Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "Your swagger instills confidence in you and your allies. Make a Strike. On a hit, you and all allies within 30 feet gain temporary Hit Points equal to half your level.%r%r**Failure** You gain temporary Hit Points equal to half your level."
    traits:
      - finisher
      - swashbuckler
  Scintillating Spell:
    assoc_charclass:
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: Your spells become a radiant display of light and color. If your next action is to Cast a Spell that doesn't have the darkness trait, has no duration, and requires creatures to attempt a Reflex save, the spell explodes in a spray of scintillating lights, in addition to its other effects. Each creature that failed its Reflex save against the spell is dazzled for 1 round, and those who critically failed are instead blinded for 1 round.
    traits:
      - concentrate
      - light
      - sorcerer
      - spellshape
      - wizard
  Shattering Blows:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: Your forceful blows shatter objects with ease. While you are raging, damage from your melee Strikes ignores the first 5 Hardness of an object. If you have the devastator class feature, the damage instead ignores the first 10 points Hardness of an object.
    traits:
      - barbarian
      - rage
  Shattering Strike (Monk):
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: The force of your considered blow shatters objects and defenses alike. Make an unarmed Strike. It bypasses the target's resistances. If the target has Hardness, the Strike treats the Hardness as if it were half its value.
    traits:
      - monk
  Shield of Grace:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Shield Warden
    shortdesc: You protect an ally with both your shield and your body. Whenever you use the Shield Block reaction to prevent damage to an ally, you can evenly split the remaining damage after the Shield Block between the ally and yourself.
    traits:
      - champion
  Siphon Power:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Frequency** once per day%r%r**Requirements** You haven't acted yet on your turn.%r%rYou draw upon the reservoir of your patron's magic that resides within your familiar. During your turn, you can cast one spell your familiar knows that was granted by your patron or lessons without spending a spell slot to do so (or even having it prepared). The spell must be at least 1 rank lower than your highest-rank witch spell slot.%r%r**Special** This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, occult, or primal)."
    traits:
      - witch
  Specialized Companion (Ranger):
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Incredible Companion (Ranger)
    shortdesc: "Your animal companion continues to grow in power and ability, and it is now cunning enough to become specialized. Your animal companion gains one specialization of your choice.%r%r**Special** You can select this feat up to three times. Each time, add a different specialization to your companion."
    traits:
      - ranger
  Spell Tinker:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "You've learned to alter choices you make when casting spells on yourself. After casting a spell on only yourself that offers several choices of effect (such as resist energy or a polymorph spell that offers several potential forms), you can alter the choice you made when Casting the Spell (for instance, choosing a different type of damage for resist energy).%r%rYou can't use this feat if the benefits of the spell have already been used up or if the effects of the first choice would persist in any way after switching (for instance, if one of the choices was to create a consumable item you already used, or to heal you), or if the feat would create an effect more powerful than that offered by the base spell. The GM is the final arbiter of what Spell Tinker can be applied to."
    traits:
      - concentrate
      - wizard
  Studious Capacity:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 16
      specialize: enigma
      skill: Occultism/legendary
    shortdesc: Your continued study of occult magic has increased your magical capacity, allowing you to cast spells even when it seems impossible. You can cast one spell each day even after you've run out of spell slots of the appropriate spell rank, but you can't use this ability to cast a spell of your highest spell rank.
    traits:
      - bard
  Swift Elusion:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 16
      skill: Acrobatics/legendary
    shortdesc: "**Trigger** A foe ends its movement adjacent to you.%r%rAttempt an Acrobatics check against the foe's Reflex DC. If you succeed, either Stride to a different space adjacent to the foe or move the foe to a different space adjacent to you."
    traits:
      - rogue
  Twinned Defense (Fighter):
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 16
      feat:
        - Twin Parry
    shortdesc: "**Requirements** You are wielding two melee weapons, one in each hand.%r%rYou're always ready to use your off-hand weapon to interfere with attacks against you. While you are in this stance, you constantly gain the benefits of the Twin Parry action."
    traits:
      - fighter
      - stance
  Warden's Reload:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 16
    shortdesc: "**Frequency** once per round%r%r**Requirements** Your last action or activity this turn was to cast a warden spell.%r%rYour mastery of magic and weapons like the crossbow allow you to wield both with equal ease. Interact to reload a weapon you are currently wielding."
    traits:
      - ranger
# Level 18 Class Feats
  All in My Head:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Trigger** You would take damage from a Strike or spell that doesn't have the death trait or otherwise cause instant death (such as *disintegrate*).%r%rUsing your occult connections and incredible powers of persuasion, you convince yourself that the triggering damage is a figment of your imagination. The damage changes from its usual damage type to mental damage, and the damaging effect gains the nonlethal trait. You can't use this reaction if you are immune to mental effects or mental damage."
    traits:
      - bard
      - illusion
      - mental
  Blaze of Revelation:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Requirements** You are cursebound 4.%r%rYour mind and body can, for a short time and with great peril, surpass the final limits of your curse. For 1 minute, you shed torrential flames, become surrounded by spirits, or otherwise overflow with divine power in a way that suits your mystery. On each of your turns during that time, you can cast one revelation spell without spending Focus Points.%r%rAt the end of the minute, the durations of any revelation spells you cast during that time end, and you must attempt a DC 40 Fortitude save.%r%r**Critical Success** You aren't otherwise affected.%r**Success** You are drained 2 and can't reduce or remove this condition until your next preparations.%r**Failure** You are drained 4 and can't reduce or remove this condition until your next preparations.%r**Critical Failure** You die."
    traits:
      - oracle
  Brutal Critical:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your critical hits are particularly devastating. On a critical hit with a melee Strike, add one extra damage die. This is in addition to any extra dice you gain if the weapon is deadly or fatal. The target also takes persistent bleed damage equal to two damage dice.
    traits:
      - barbarian
  Deep Lore:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 18
      specialize: enigma
      skill: Occultism/legendary
    shortdesc: Your repertoire is vast, containing far more spells than usual. Add one spell to your repertoire of each spell rank you can cast.
    traits:
      - bard
  Diamond Fists:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your body hardens as you combine your attacks, making your finishing blows more damaging. Your unarmed attacks gain the forceful and deadly d10 traits. Any that already had one or both of these traits increase their weapon damage dice by one step.
    traits:
      - monk
  Discordant Voice:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Courageous Anthem
    shortdesc: Your *courageous anthem* lets loose a discordant shriek that imbues your allies' attacks with powerful sonic reverberations. While your allies are affected by your *courageous anthem*, their weapon Strikes and unarmed attacks deal an additional 1d6 sonic damage.
    traits:
      - bard
      - sonic
  Divine Apex:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You can pour divine power into an item, letting the wearer exceed their limits. When you complete your daily preparations, you can touch one worn magical item that doesn't have the apex trait. It gains the apex trait until your next preparations, and you choose one of your deity's divine attributes. The item increases that attribute modifier by 1 or to +4, whichever is higher. A character can benefit from only one apex item at a time, as normal.
    traits:
      - cleric
  Divine Effusion:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "The power of your mystery surges through you like a font of divine energy, even when your own magic dwindles.%r%rTwice per day, you can cast a spell after you've run out of spell slots of the appropriate spell rank; the two spells you cast with this feat must be of different spell ranks."
    traits:
      - oracle
  Echoing Channel:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "When you pull forth vitality or void energy, you also create a smaller pocket of that energy.%r%rIf the next action you use is to cast a 2-action *harm* or *heal* to heal or damage a single creature, choose one additional creature in range. Target that creature with a 1-action version of the same spell. This spell is the same rank as the 2-action *harm* or *heal* you cast and doesn't cost another spell slot."
    traits:
      - cleric
      - concentrate
      - spellshape
  Echoing Spell:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You time the components of your spell with exacting precision, setting up a resonance that duplicates the spell's effects. If your next action is to Cast a Spell of 4th rank or lower that has no duration, the spell's energy reverberates and echoes. You can Cast the Spell a second time before the end of your next turn without expending a spell slot.
    traits:
      - concentrate
      - sorcerer
      - spellshape
  Eternal Composition:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 18
      specialize: maestro
    shortdesc: The world is a stage upon which you are always playing. You are permanently quickened; you can use your extra action only to cast a composition cantrip that requires 1 action to cast. While in exploration mode, you can declare that you are performing an eligible composition cantrip while using any exploration tactic. Even before your first turn in a combat encounter, that cantrip is active as if you had cast it on your previous turn.
    traits:
      - bard
    grants:
      feat:
        - Quickened
  Grandmaster Qi Spells:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Qi Spells
    shortdesc: "You have unlocked a qi technique achievable only by those who attain complete mastery of both their body and their spirit. You gain *embrace nothingness*, *qi form*, or another 9th-rank qi spell you have access to.%r%r**Special** You can select this feat more than once, choosing a different spell each time."
    traits:
      - monk
  Greater Crossblooded Evolution:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Crossblooded Evolution
    shortdesc: Your bloodline is extraordinarily complex. Choose up to three of the sorcerous gift spells granted by your secondary bloodline. You add these spells to your spell repertoire, heightened to the highest rank of spells you can cast or to the highest rank they can be heightened to that is lower than the highest rank of spells you can cast. You cast these spells as the tradition from your primary bloodline.
    traits:
      - sorcerer
  Implausible Infiltration:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Quick Squeeze
      skill: Acrobatics/legendary
    shortdesc: "**Requirements** You are adjacent to a floor or vertical wall.%r%rYou find tiny imperfections and somehow fit yourself through them, possibly moving directly through the wall or floor. Your movement attempt fails if the wall or floor is made of something other than wood, plaster, or stone; is thicker than 10 feet; or contains even a thin layer of metal. If you have a climb Speed, you can use this ability to attempt to move through a ceiling."
    traits:
      - magical
      - move
      - rogue
  Implausible Purchase (Rogue):
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Predictive Purchase
    shortdesc: You can use Prescient Planner even if you have already used it after purchasing goods, and you can Interact to draw the item as a single action instead of a 2-action activity. In addition, five times per day, you can use Prescient Planner to pull out a common consumable item up to 6 levels lower than your level.
    traits:
      - rogue
  Impossible Flurry:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Requirements** You are wielding two melee weapons, each in a different hand.%r%rYou forgo precision to attack at an impossible speed. Make three melee Strikes with each of the required weapons. Your first attack with each weapon takes the multiple attack penalty as though you had already made one attack this turn. All of the remaining Strikes take the maximum multiple attack penalty."
    traits:
      - flourish
      - ranger
  Impossible Polymath:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Esoteric Polymath
      orskill: 
        - Arcana/trained
        - Nature/trained
        - Religion/trained
    shortdesc: "Your esoteric formulas are so unusual that they allow you to dabble in magic from diverse traditions that other bards don't understand. As long as you're trained in Arcana, you can add arcane spells to your book from Esoteric Polymath; as long as you're trained in Nature, you can add primal spells to your book; and as long as you are trained in Religion, you can add divine spells to your book.%r%rLike your other spells in your book, you can add one of these spells from another tradition to your repertoire as an occult spell each day using Esoteric Polymath, but you can't retain any spells from another tradition when you prepare again, even if you have Eclectic Polymath."
    traits:
      - bard
  Impossible Volley:
    assoc_charclass:
      - Fighter
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Requirements** You are wielding a ranged weapon with the volley trait and reload 0.%r%rYou fire a volley at all foes in an area. Make one Strike with a –2 penalty against each enemy within a 10-ft burst centered at or beyond your weapon's volley range. Roll the damage only once for all targets.%r%rEach attack counts toward your multiple attack penalty, but do not increase your penalty until you have made all your attacks."
    traits:
      - fighter
      - flourish
      - ranger
  Improbable Elixirs:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your mastery of alchemical secrets enables you to replicate effects most believe can be achieved only via magic. Select a number of potions equal to your Intelligence modifier (minimum 1); these potions must be of 9th level or lower. You gain formulas to create these potions as alchemical consumables with the elixir trait. When making these alchemical elixirs, you can substitute alchemical reagents for an equal value of magical components, and you can use an alchemist's toolkit (for Quick Alchemy) or an alchemist's lab (for the Craft activity) instead of any other required toolkits. Other than that, the formula doesn't change. Once you've chosen the potion formulas, they can't be changed.
    traits:
      - alchemist
  Improved Swift Banishment:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Swift Banishment
    shortdesc: You easily banish creatures with your weapon. You can use Swift Banishment as long as you have a spell slot of 5th rank or higher remaining, even if you don't have *banishment* prepared. You must sacrifice a prepared spell of 5th rank or higher, and the *banishment* effect you create is heightened to the rank of that spell. The target takes a –2 circumstance penalty to its save as though you'd paid the extra cost for *banishment*.
    traits:
      - cleric
  Incredible Luck (Swashbuckler):
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Charmed Life
    shortdesc: You always seem to bounce back from the worst. When you use Charmed Life, roll the save twice (including the +2 circumstance bonus from Charmed Life) and use the better result.
    traits:
      - fortune
      - swashbuckler
  Infinite Possibilities:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You can prepare a spell slot that exists in your mind as many different possibilities at once. Once during your daily preparations, you can use a spell slot to hold that infinite potential, rather than using it to prepare a spell. You can use this spell slot to cast any spell from your spellbook that's at least 2 ranks lower than the slot you designate; the spell acts in all ways as a spell of 2 ranks lower. You don't have any particular spell prepared in that slot until you cast it.
    traits:
      - wizard
  Inviolable:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your deity punishes creatures that harm you. Creatures that hit you with an attack take 3d6 spirit damage every time they do. If you have the holy or unholy trait, you can apply it to this damage.
    traits:
      - cleric
  Invoke Disaster:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Wind Caller
    shortdesc: You can invoke nature's fury upon your foes. You gain the *storm lord* order spell.
    traits:
      - druid
  Lead Investigator:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Clue Them All In
    shortdesc: You spend 1 minute briefing up to four allies about one of your open investigations. Those allies gain the same circumstance bonus you do from Pursue a Lead to checks to investigate the question at the heart of that investigation. This bonus lasts until you cease Pursing that Lead or for 1 day, whichever comes first. This doesn't confer any other benefits of pursuing a lead, such as adding the circumstance bonus to your saves with Detective's Readiness.
    traits:
      - exploration
      - investigator
  Lethal Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "You stab your foe in a vital organ, possibly killing them outright. Make a Strike. On a success, you forego your precise strike damage from the finisher.%r%rInstead, your target takes additional precision damage based on a Fortitude save against your class DC. If your Strike was a critical hit, the target's saving throw outcome is one degree worse.%r%r**Critical Success** You deal 6 precision damage.%r**Success** You deal 6d6 precision damage.%r**Failure** You deal 12d6 precision damage.%r**Critical Failure** You deal 18d6 precision damage."
    traits:
      - death
      - finisher
      - swashbuckler
  Manifold Edge:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You've learned to leverage every possible edge. When you use Hunt Prey, you can gain a different hunter's edge benefit instead of the one you selected at 1st level. If you do, you don't gain the additional benefit from Masterful Hunter.
    traits:
      - ranger
  Masterful Companion:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Animal Companion
    shortdesc: Your animal companion shares your incredible hunting skills, allowing it to take down your shared prey with ease. When you Hunt Prey, your animal companion gains the Masterful Hunter benefit associated with your hunter's edge, rather than just your original hunter's edge benefit.
    traits:
      - ranger
  Miracle Worker:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Frequency** once every 10 minutes%r%rYour alchemical mastery can resuscitate the recently slain. You can administer a major or true elixir of life to a creature who has been dead for no more than 2 rounds. When you do, that creature is immediately returned to life with 1 Hit Point and becomes wounded 1."
    traits:
      - alchemist
  Miraculous Possibility:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your deity empowers you to perform minor miracles, allowing you to readily adapt to the fluctuating needs of your duties. Once during your daily preparations, you can use a spell slot to hold sheer divine potential, rather than using it to prepare a spell. You can use this spell slot to cast any spell you know from the divine spell list that's at least 2 ranks lower than the slot you designate. The spell acts in all ways as a spell of 2 ranks lower. You don't have any particular spell prepared in that slot until you cast it.
    traits:
      - cleric
  Parry and Riposte:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Opportune Riposte
    shortdesc: "Your parries and finishers allow you to riposte with the slightest provocation.%r%rYou can use Opportune Riposte against an enemy who fails at a Strike against you (not just critically fails), provided you have both damaged that creature with a finisher on your last turn and currently have a circumstance bonus to AC from the parry weapon trait or Extravagant Parry."
    traits:
      - swashbuckler
  Patron's Claim:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: Your patron partially manifests itself through your familiar to claim a foe's power for its own. Your familiar gains the Patron's Claim activity.
    traits:
      - witch
  Perfect Clarity:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Trigger** You fail or critically fail an attack roll or Will save.%r%rYou burn out all your rage to ensure that your attack lands and your mind remains free. Reroll the triggering attack roll or Will save with a +2 circumstance bonus, and use the better result. You then immediately stop raging."
    traits:
      - barbarian
      - concentrate
      - fortune
      - rage
  Perfect Debilitation:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You have perfected the formulas for bombs that impede your enemies. When you use Debilitating Bomb, your target avoids the condition the bomb imposes only if it critically succeeds at its saving throw.
    traits:
      - alchemist
  Perfect Form Control:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Form Control
        - Strength +4
    shortdesc: Thanks to magic and muscle memory, you can stay in your alternate shapes indefinitely. When you use Form Control, instead of lasting 1 hour, *untamed form* duration is unlimited (you can still Dismiss it).
    traits:
      - druid
  Perfect Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Requirements** You are wielding a loaded ranged weapon with reload 1 or more, and you have not reloaded your weapon since your last turn.%r%rAfter watching the motions of combat with incredible intensity and precision, you fire at your prey at the perfect moment to deliver maximum pain. Make a ranged Strike with the required weapon against your hunted prey. If you hit, the Strike deals maximum damage. After the Strike, your turn ends."
    traits:
      - flourish
      - ranger
  Powerful Sneak:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You've learned to exploit your enemies' openings. Your sneak attack damage ignores any immunity or resistance the target has to precision damage. In addition, when you Sneak, you can designate one creature you're undetected by at the end of that action. On the next attack you make against that creature before the end of your next turn, any sneak attack die you roll that's less than 3 is a 3 instead. This has no benefit if your next attack against the creature doesn't deal sneak attack damage, and if you designate a new creature you lose the benefit on any previous one.
    traits:
      - rogue
  Primal Aegis:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You surround yourself with a thick field of protective primal energy. You and allies within 30 feet of you gain resistance equal to your Wisdom modifier to acid, cold, electricity, fire, vitality, and void damage.
    traits:
      - druid
  Qi Center:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Qi Spells
      skill: Of Many Styles/master
    shortdesc: "**Frequency** once per minute%r%rYou center yourself with the universe and draw upon its vast power. You cast a single action qi spell with the stance trait, without spending a Focus Point."
    traits:
      - monk
  Rejuvenating Touch:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - lay on hands
    shortdesc: Your healing energies linger after you cast, providing continual benefits. An ally that recovers Hit Points from your *lay on hands* gains 10 temporary Hit Points immediately and at the start of their turn during each of the next 10 rounds. These temporary HP last until the start of the creature's next turn. This effect ends if the ally is knocked unconscious.
    traits:
      - champion
  Reprepare Spell:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "You've discovered how to reuse some of your spell slots over and over. You can spend 10 minutes to prepare a spell that you already cast today, regaining access to that spell slot. The spell must be of 4th rank or lower and can't have a duration. You can reprepare a spell in this way even if you've already reprepared that spell previously in the same day.%r%rIf you have the spell substitution arcane thesis, you can instead prepare a different spell in an expended slot, as long as the new spell doesn't have a duration. You can use spell substitution on that slot again, but you remain restricted to preparing only spells without a duration in that slot until the next time you make your daily preparations."
    traits:
      - wizard
  Savage Critical:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: The wounds you inflict are grievous. When you Strike with a weapon or unarmed attack for which you have legendary proficiency, you critically succeed if you roll a 19 on the die as long as that result would be a success. This has no effect on a 19 if the result would be a failure.
    traits:
      - fighter
  Second Thoughts:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Trigger** You cast a mental spell that targets one creature, and it critically succeeds at its Will save.%r%rWhen your target proves resilient to your magical deceptions, you can try them again on someone else. You can Cast the triggering Spell a second time, targeting a different creature, without expanding an additional spell slot. You can do so only until the end of your next turn, and you can't use Second Thoughts on it after the second casting of the spell."
    traits:
      - concentrate
      - mental
      - wizard
  Shadow Hunter:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Camouflage
    shortdesc: You blend in to your surroundings so well that others have trouble telling you apart from the terrain. While in natural terrain, you're always concealed from all foes if you choose to be, except for your hunted prey.
    traits:
      - ranger
  Shared Clarity:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Premonition of Clarity
    shortdesc: You can project your premonitions of clarity to your allies. When you use Premonition of Clarity, allies within 15 feet of you who failed the same saving throw against the same mental effect can also spend their reactions to reroll the failed saving throw with a +2 circumstance bonus.
    traits:
      - cleric
  Smash from the Air:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Cut From the Air
    shortdesc: Your expertise enables you to knock away spells. You can use Cut From the Air against ranged spell attacks.
    traits:
      - fighter
  Split Hex:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You siphon some of the power from an offensive hex you cast to direct it at a second target as well. If the next action you use is to Cast a Spell to cast a harmful hex with a single target, reduce its rank by 2 (making it 2 ranks lower than the maximum spell rank you can cast). If you do, you can select a second target for that hex to affect.
    traits:
      - concentrate
      - spellshape
      - witch
  Swift Retribution:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 18
      orspecialize:
        - beacon
        - justiciar
        - liberator
        - redeemer
    shortdesc: The transgressions of your enemies fuel you to retaliate with divine speed. When an enemy triggers your champion's reaction, you are quickened on your next turn. You can use the extra action to move closer to that enemy or to Strike that enemy.
    traits:
      - champion
  Swift River:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Trigger** Your turn ends and you have a status penalty to your Speed or are immobilized or slowed%r%rYou flow like water, avoiding all restraints. End one status penalty to your speed, or end one immobilized or slowed condition affecting you."
    traits:
      - monk
  Triangle Shot:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Monastic Archer Stance
        - Stunning Blows
    shortdesc: "**Requirements** You are in Monastic Archer Stance and wielding a bow usable with that stance.%r%rYou string three arrows to your bow and fire them all at once. Make three ranged Strikes against a single target with the required weapon, each using your current multiple attack penalty, and you take an additional –2 penalty. This counts as two attacks when calculating your multiple attack penalty, and you combine the attacks' damage for the purpose of resistances and weaknesses. Your Stunning Blows benefit applies to Triangle Shot, even though it isn't a Flurry of Blows. If all three Strikes hit, the target takes 3d6 persistent bleed damage."
    traits:
      - concentrate
      - fortune
      - monk
  Trickster's Ace:
    assoc_charclass:
      - Investigator
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: "**Trigger** You specify the trigger when you make your daily preparations (see Requirements below).%r%r**Requirements** When you make your daily preparations, you must specify a trigger for this reaction using the same restrictions as the triggers for the Ready action. You also choose a single spell from the arcane, divine, occult, or primal list of 4th level or lower. The spell can't have a cost, nor can its casting time be more than 10 minutes. The spell must be able to target a single creature, and you must be a valid target for it.%r%rWhether from jury-rigged magic items, deduction from the study of magical interactions, or other means, you have a contingency in your back pocket for desperate situations. When the trigger occurs, you cause the spell to come into effect. The spell targets only you, no matter how many creatures it would affect normally. If you define particularly complicated conditions, as determined by the GM, the trigger might fail. Once the contingency is triggered, the spell is expended until your next daily preparations."
    traits:
      - concentrate
      - investigator
      - rogue
  Ultimate Mercy:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Mercy
    shortdesc: Your mercy transcends the bounds of life and death. Add ultimate mercy to the types of mercy you can provide. When you use Mercy, you can target a creature that died since your last turn to return it to life. The target returns to life with 1 Hit Point and becomes wounded 1. You can't return the target to life if it died from *disintegrate* or a death effect. The creature gains the other benefits of *lay on hands* after it returns to life.
    traits:
      - champion
  Vicious Evisceration:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 18
    shortdesc: You make a vicious strike that maims your enemy. Make a melee Strike. If the Strike hits and deals damage, the target is drained 1, or drained 2 on a critical success.
    traits:
      - barbarian
      - rage
  Whirlwind Toss:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 18
      feat:
        - Collateral Thrash
    shortdesc: "You whirl a foe to smash into all nearby creatures before throwing them far away. You Thrash. During this Thrash, your Collateral Thrash feat applies to all other enemies adjacent to you. You can then throw the grabbed creature 10 feet, where they fall prone.%r%rIf the enemy you choose for Collateral Thrash is also adjacent to you, it attempts only one save and takes the damage only once."
    traits:
      - barbarian
      - rage
# Level 20 Class Feats
  Alchemical Revivification:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: If you die while under the effect of at least one elixir, the alchemical compounds in your bloodstream bring you back to life at the start of your next turn. You're affected by an elixir of rejuvenation, then a true elixir of life, then your choice of a major bestial mutagen, major juggernaut mutagen, or major quicksilver mutagen as though you just imbibed it. These automatic reactions don't get any special benefits you add when creating or using these items. Because you died, all other alchemical compounds in your bloodstream are inert. After being revived, you're temporarily immune to Alchemical Rejuvenation for 1d4 hours.
    traits:
      - alchemist
  Annihilating Swing:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You have embraced brute destructive power. You make a melee Strike that ignores any resistances the target has. If you target a solid unattended object or surface with your Strike, you might automatically destroy it without an attack roll. If you target any object or surface with Hardness 20 or less that isn't a magic item or the effect of a spell, you destroy it.%r%rIf the target object or surface is a magic item or the effect of a spell, you attempt to counteract it using your attack bonus with the Strike for the counteract check. Your counteract rank is 10th. On a successful counteract check, you destroy the object or surface unless it has Hardness greater than 20, in an artifact, or is similarly difficult to destroy.%r%rYou destroy up to a 5-foot cube of an object or surface larger than Medium."
    traits:
      - barbarian
  Archwizard's Might:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have mastered the greatest secrets of arcane magic. You gain an additional 10th-rank spell slot.
    traits:
      - wizard
  Armament Paragon:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - blessed armament
    shortdesc: "Add the following property runes to the list you can choose for your blessed armament: *animated*, *greater fearsome*, *grievous*, *keen*, and *greater vitalizing*. If you have the Radiant Armament feat, add *greater astral* and *greater brilliant* to the list as well.%r%rIn addition, you can change the rune you've selected for the day to a different rune from your list as a single action that has the concentrate and divine traits. Changing the rune doesn't restore abilities that can be used only a limited number of times."
    traits:
      - champion
  Avatar's Audience:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 20
    magic_stats:
      innate_spell:
        level: 7
        name: 
          - Interplanar Teleport
        tradition: divine
        cast_stat: Charisma
    shortdesc: Your extensive service affords you certain divine privileges. First, any creature you encounter knows instinctively that you speak for your deity. Second, if you conduct the *commune* ritual to contact your deity, you don't have to pay any cost, and you automatically get a critical success. Third, once per day, you can cast *interplanar teleport* as a divine innate spell, but only to travel to the realm of your deity. When you cast it this way, its casting time is 1 minute, your religious symbol is a sufficient planar key for this spell, and you appear exactly where you want to be. If you're in your deity's realm due to this spell, you can return to the point you left when you cast it by spending a single action, which has the concentrate and divine traits.
    traits:
      - cleric
  Avatar's Protection:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Trigger** You are critically hit by an enemy.%r%r**Requirements** You have an *avatar* spell prepared.%r%rIn moments of danger, you can call upon your god's form in an instant. You cast *avatar* from your spell slots. The triggering critical hit is reduced to a normal hit, and its damage is applied after gaining the *avatar* spell's temporary Hit Points."
    traits:
      - cleric
  Bloodline Conduit:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Frequency** once per minute%r%rYour inborn magical nature lets you redirect ambient energies to fuel your spells. If your next action is to Cast a Spell of 5th rank or lower that has no duration, you don't expend the spell's slot when you cast it."
    traits:
      - sorcerer
      - spellshape
  Bloodline Mutation:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You permanently mutate to become more like the creatures of your bloodline. You gain the appropriate trait or traits for those types of creatures (aberration for aberrant, angel and celestial for angelic, demon and fiend for demonic, and so on). You gain low-light vision or darkvision, if one is appropriate for creatures with those traits. Choose one of the following.%r%rIf creatures associated with your bloodline have a resistance or immunity to acid, cold, electricity, fire, void, or sonic, choose an energy type your bloodline is immune or resistant to and gain resistance 20 against that energy type."
    traits:
      - sorcerer
  Bloodline Perfection:
    assoc_charclass:
      - Sorcerer
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Bloodline Paragon
    shortdesc: You command the ultimate powers of your bloodline and tradition. You gain an additional 10th-rank spell slot.
    traits:
      - sorcerer
  Boundless Reprisals:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Fighter** With a sixth sense for the flow of combat, you can quickly react to any situation as required. At the start of each enemy's turn, you gain a reaction you can use only during that turn for any reaction from a fighter feat or class feature."
    traits:
      - fighter
  Contagious Rage:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Share Rage
    shortdesc: You can drive your allies into a frenzy, granting them incredible benefits. You can ignore the requirements of Share Rage, using it multiple times in a Rage. Allies affected by Share Rage can choose to gain your instinct ability and the specialization ability it gains from weapon specialization, but not greater weapon specialization. They must abide by any restrictions of your instinct if they do so (such as the anathema of the superstition instinct).
    traits:
      - auditory
      - barbarian
      - rage
      - visual
  Craft Philosopher's Stone:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your research has paid off, culminating in the legendary philosopher's stone. You learn the formula for the philosopher's stone and can add it to your formula book.
    traits:
      - alchemist
  Enduring Quickness:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You move as fast and as high as the wind itself. You're permanently quickened.%r%rYou can use your extra action to Stride or Leap, to provide one of the actions needed for a High Jump or Long Jump"
    traits:
      - monk
  Everyone's a Suspect:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You are so suspicious of everyone you meet that you keep mental notes on how to defeat them all-even your own allies.%r%rAfter interacting with a creature for at least 1 minute, you automatically Pursue a Lead with that creature as the subject. You can have any number of such leads at any given time, and when you Pursue a Lead again, you don't give up any of these automatic subjects."
    traits:
      - investigator
  Fatal Aria:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your songs overwhelm the target with unbearable emotion, potentially striking them dead on the spot. You learn the *fatal aria* composition spell.
    traits:
      - bard
    init_magic: true
  Godbreaker:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Crushing Grab
        - Whirling Throw
    shortdesc: "**Requirements** You have a creature grabbed or restrained.%r%rYou have mastered an ultimate grappling technique capable of breaking even the mightiest of foes. You hurl the creature 20 feet into the air, following behind it with a powerful jump, and then make an unarmed Strike. If the Strike is successful, you can repeat this process up to two more times, moving the creature an additional 20 feet directly up into the air with each Strike; the creature keeps the grabbed or restrained condition throughout the sequence. If you miss with any of the Strikes, Godbreaker and the grabbed or restrained condition immediately end and both you and the opponent fall, taking falling damage as normal for the total height of your jump.%r%rIf all three Strikes are successful, you immediately grab the creature and bring it crashing to the ground, dealing your unarmed Strike damage plus falling damage to it. You land on your feet adjacent to the creature, you take no damage from the fall, and the creature remains grabbed or restrained by you."
    traits:
      - monk
  Hex Master:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You embody the link to your patron so completely that you can cast your hexes in rapid succession. You are no longer limited to casting only a single hex each turn. In addition, when you cast *cackle* to sustain a hex, you gain the effects of Sustain for all your active hexes that have a duration of sustained.
    traits:
      - witch
  Hidden Paragon:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 20
      skill: Stealth/legendary
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You successfully use Stealth to Hide and become hidden from all of your current foes, or use Stealth to Sneak and become undetected to all your current foes.%r%rWhen you slip out of sight, you disappear. You become invisible for 1 minute, even if you use a hostile action. Not even *revealing light*, *see the unseen*, or similar effects can reveal you, though creatures can still use the Seek action to locate you as normal."
    traits:
      - rogue
  Hierophant's Power:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have entwined yourself with the natural world, and its full power flows through you. You gain an additional 10th-rank spell slot.
    traits:
      - druid
  Illimitable Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your strikes flow endlessly. Step and attempt a single one-action finisher. This Strike gains the bravado trait, possibly replenishing your panache; if you regain panache, you can immediately attempt another finisher as part of this action, ignoring the restriction of using actions with the attack trait after a finisher.
    traits:
      - finisher
      - flourish
      - swashbuckler
  Immortal Techniques:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat: Master of Many Styles
    shortdesc: You flow from technique to technique, renewing yourself as you embrace each style you have mastered. The first time each round that you use an action that has both the monk and stance traits, you gain 20 temporary Hit Points that last until the start of your next turn.
    traits:
      - monk
  Impossible Striker:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Sly Striker
    shortdesc: Nothing can prevent you from making a sneak attack, even if your opponent can see every blow coming. Instead of dealing the damage from Sly Striker, you can deal your full sneak attack damage to a target even if the target isn't off-guard.
    traits:
      - rogue
  Impossible Technique:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Trigger** An enemy's attack hits you or you fail a saving throw against an enemy's ability.%r%r**Requirements** You are not armored or fatigued.%r%rYou execute a maneuver that defies possibility. If the triggering effect was an enemy's attack hitting you, the enemy rerolls the attack roll and uses the lower result. If the triggering effect was you failing a saving throw, you reroll the saving throw and use the higher result."
    traits:
      - fortune
      - monk
  Inexhaustible Countermoves:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You can react whenever a foe leaves a gap in their defenses. At the start of each enemy's turn, you gain an extra reaction you can use only during that turn to perform an opportune riposte, or an reactive strike if you have that reaction.
    traits:
      - swashbuckler
  Just the Facts:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Thorough Research
    shortdesc: "You fundamentally understand everything to the point where your research can't possibly be wrong. You are permanently quickened and can use the extra action to Recall Knowledge. In addition, you gain the following benefits with Recall Knowledge.%r%rWhen one of your allies Recalls Knowledge and gains false information, you also know that information is inaccurate if they share it with you."
    traits:
      - investigator
    grants:
      feat:
        - Quickened
  Legendary Shot:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Far Shot
      skill: Perception/legendary
    shortdesc: You focus on your hunted prey, perceiving angles, air resistance, and every variable that would affect your ranged attack. If you have master proficiency with your ranged weapon, you can ignore the penalty for attacking up to five range increments away when attacking your hunted prey.
    traits:
      - ranger
  Ley Line Conduit:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Frequency** once per minute%r%rYou can draw magic from the ley lines of the world. If your next action is to Cast a Spell of 5th rank or lower that has no duration, you don't expend the prepared spell as you cast it."
    traits:
      - concentrate
      - druid
      - manipulate
      - spellshape
  Lightning Qi:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Frequency** Once per 10 minutes%r%rQi flows freely from within you. If your next action is to cast a qi spell that takes at least two actions to cast, reduce the number of actions to cast it by 1 (minimum 1 action)."
    traits:
      - monk
  Maker of Miracles:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You are a conduit for truly deific power. You gain an additional 10th-rank spell slot.
    traits:
      - cleric
  Mega Bomb:
    assoc_charclass:
      - Alchemist
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You can add a highly explosive additive to an alchemical bomb to turn it into a mega bomb. Throwing this bomb takes a 2-action activity instead of a Strike. This isn't a Strike, and you don't make an attack roll. The mega bomb explodes in a 30-ft burst within 60 feet. It deals damage as if each creature were the primary target, with a basic Reflex save. On a failed save, a creature also takes any extra effects that affect a primary target (such as off-guard from bottled lightning). Though all targets in the area take splash damage as primary targets, there is no further splash beyond that area.
    traits:
      - additive
      - alchemist
      - manipulate
  Mystery Conduit:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: The power of your mystery enables you access to myriad magic. If your next action is to Cast a Spell of 5th rank or lower that has no duration, you do not expend a spell slot.
    traits:
      - cursebound
      - oracle
      - spellshape
  Oracular Providence:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your mystery grants you access to deep reserves of truly miraculous divine power. You gain an additional 10th-rank spell slot.
    traits:
      - oracle
  Panache Paragon:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You find opportunities to perform stylish feats in the moments between others' heartbeats and eye blinks. You are permanently quickened. You can use the extra action only to perform a bravado action.
    traits:
      - swashbuckler
  Paradoxical Mystery:
    assoc_charclass:
      - Oracle
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Greater Revelation
    shortdesc: The truest depths of your divine mystery are fathomless and contradictory, granting you changing powers that even you can barely begin to fathom. Each day during your daily preparations, choose one basic or advanced domain spell from any domain from *Player Core*, one of the domains granted by your mystery, another domain to which you have access, or any initial or advanced revelation spell from another mystery. You gain that spell as a revelation spell until your next daily preparations.
    traits:
      - oracle
    init_magic: true
  Patron's Truth:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have mastered the greatest secrets of your patron's magic and learned a fundamental truth about your patron, even if their identity still remains a mystery. You gain an additional 10th-rank spell slot.
    traits:
      - witch
  Perfect Encore:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You develop another incredible creation. You gain an additional 10th-rank spell slot.
    traits:
      - bard
  Pied Piping:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You learn the *pied piping* composition spell, which enables you to control the actions of weak-minded individuals.
    traits:
      - bard
    init_magic: true
  Quaking Stomp:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "**Frequency** once per 10 minutes%r%rYou stomp the ground with such force that it creates a minor earthquake, with the effects of the *earthquake* spell using your class DC."
    traits:
      - barbarian
      - manipulate
      - rage
  Reactive Distraction:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Perfect Distraction
      skill: Deception/legendary
    shortdesc: "**Trigger** You would be hit by an attack or targeted by an effect, or you are within an effect's area.%r%r**Requirements** You have Perfect Distraction ready to use.%r%rYou reactively switch with your decoy to foil your foe. You use Perfect Distraction, even if you were observed, as long as you end the movement of your Sneak while concealed or in a location with cover or greater cover. Your decoy is targeted by the attack or effect instead of you. In the case of an area effect, if your Sneak doesn't move you out of the area, both you and the decoy are targeted by the effect."
    traits:
      - concentrate
      - manipulate
      - rogue
  Sacred Defender:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You are a great warrior that can stand strong against the fiercest opponents to your cause. You gain resistance 5 to bludgeoning, piercing, and slashing damage.%r%rIf you're holy, this resistance increases to 10 against unholy creatures, and if you're unholy it increases to 10 against holy creatures.%r%rIn addition, creatures and effects that roll a natural 20 on an attack roll against you don't improve their result by one degree of success."
    traits:
      - champion
  Shield Paragon:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - blessed shield
    shortdesc: "Your shield is a vessel of divine protection. When you're wielding your chosen shield, it is always raised, even without you using the Raise a Shield action.%r%rIf the shield would be destroyed, it vanishes to your deity's realm instead, where a servitor of your deity repairs it. During your next daily preparations, the shield returns to you fully repaired. While the shield is gone, you can spend 1 minute to infuse a different shield with your blessed shield benefit until your true shield returns"
    traits:
      - champion
  Spell Combination:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You can merge spells, producing multiple effects with a single casting. One slot of each rank of spell you can cast, except 2nd rank and 1st rank, becomes a spell combination slot (this doesn't apply to cantrips). When you prepare your spells, you can fill a combination slot with a combination of two spells. Each spell in the combination must be 2 or more spell ranks below the slot's rank, and both must target only one creature or object or have the option to target only one creature or object. Each spell in the combination must also have the same means of determining whether it has an effect—both spells must require a ranged spell attack, require the same type of saving throw, or automatically affect the target.%r%rWhen you cast a combined spell, it affects only one target, even if the component spells normally affect more than one. If any spell in the combination has further restrictions (such as targeting only living creatures), you must abide by all restrictions. The combined spell uses the shorter of the component spells' ranges. Resolve a combined spell as if were a single spell, but apply the effects of both component spells. For example, if the spell's target succeeded at the save against a combined spell, it would apply the success effect of each spell, and if it critically failed, it would apply the critical failure effect of both spells."
    traits:
      - wizard
  Spell Mastery:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have mastered a handful of spells to such a degree that you can cast them even if you haven't prepared them in advance. Select any four spells of 9th rank or lower that are in your spellbook; each spell you select must be of a different rank. These spells are automatically prepared when you make your daily preparations, and you gain an extra spell slot for each spell. You can select a different combination of spells by spending 1 week of downtime studying your spellbook and retraining your mastered spells.
    traits:
      - wizard
  Spellshape Channel:
    assoc_charclass:
      - Cleric
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Deep understanding of divine revelations into the nature of vital essence allows you to freely manipulate the energy of life and death. Use one spellshape action you can perform that normally takes 1 action and can be applied to the *harm* or *heal* spell. If you use it in this way, its effects apply only to a *harm* or *heal* spell.
    traits:
      - cleric
      - concentrate
  Spellshape Mastery:
    assoc_charclass:
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Altering your spells doesn't take any longer than casting them normally. You can use spellshape single actions as free actions.
    traits:
      - sorcerer
      - wizard
  Swift Paragon:
    assoc_charclass:
      - Champion
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - blessed swiftness
    shortdesc: "The movement of you and your allies is swift and decisive as the judgment of your deity. If your ally starts a move action in your champion's aura, their movement during that action doesn't trigger reactions.%r%rIn addition, you're permanently quickened. You can use your extra action only to Step or Stride. If you have a fly Speed, add Fly to this list. If you have an animal companion and are mounted on it at the start of your turn, you can have your mount be quickened that turn instead of you."
    traits:
      - champion
  Symphony of the Muse:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Harmonize
    shortdesc: You have learned how to weave countless performances together into a solo symphony with multitudinous effects. You are no longer limited to a single composition each turn or a single composition at a time; when you use a new composition, all previous compositions' effects continue for their remaining duration.
    traits:
      - bard
  To the Ends of the Earth:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
      skill: Survival/legendary
    shortdesc: Your ability to track your prey has surpassed explanation, allowing you to trace your prey's movements and predict its location with ease. When you use Hunt Prey on a creature within 100 feet, you can follow that creature's movements, allowing you to know the creature's exact location no matter how far away it becomes, as long as it remains your prey. You must be legendary in Nature to track your prey's location across teleportation or planar travel. This feat gains the detection and primal traits if you're legendary in Nature.
    traits:
      - ranger
  Triple Threat:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Shared Prey
    shortdesc: You can divide your attention three ways when hunting. When you use Hunt Prey, you can designate three creatures as prey, designate two creatures as prey and share the effect with one ally (as Shared Prey), or designate one creature as prey and share the effect with two allies.
    traits:
      - ranger
  True Shapeshifter:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Dragon Shape
        - Untamed Form
    shortdesc: You transcend the limitations of form. Once per day you can cast *nature incarnate*, even if you don't have it prepared, to transform into a kaiju. If you have Plant Shape, you can choose to transform into a green man instead. You also gain the True Shapeshift activity.
    traits:
      - concentrate
      - druid
    grants:
      feat:
        - True Shapeshift
  Ultimate Flexibility:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "Your experience keeps you on your toes, helping you adopt complex strategies on the fly and face the most dangerous challenges. When you gain a fighter feat using combat flexibility, you gain three fighter feats instead of two. While the first feat must still be 8th level or lower, the second feat can be up to 14th level, and the third feat can be up to 18th level.%r%rYou can use the first feat to meet the prerequisites of the second or third feats and the second feat to meet the prerequisites of the third feat. You must meet all three feats' other prerequisites normally.%r%rIn addition, you can adapt to the battlefield's challenges by spending 1 hour to train. If you do, you can reselect the feats chosen with combat flexibility as if you had made your daily preparations. You can't trade out limited-use abilities that you've already used, such as Determination."
    traits:
      - fighter
  Ultimate Polymath:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
      specialize: polymath
    shortdesc: You can flexibly cast all of your spells, granting a dizzying array of possible options. All of the spells in your repertoire are signature spells for you.
    traits:
      - bard
  Ultimate Skirmisher:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You are so skilled at navigating the wild, your movement is completely unaffected by terrain. You ignore the effects of all difficult terrain, greater difficult terrain, and hazardous terrain, and you don't trigger traps and hazards that are triggered by moving into an area (such as trip wires and pressure plates), unless you want to.
    traits:
      - ranger
  Unstoppable Juggernaut:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "You have become a brutal, unstoppable force of nature, able to shrug off mortal wounds with ease. You gain resistance equal to 3 + your Constitution modifier to all damage, and your resistance from raging increases to 8 + your Constitution modifier.%r%rIn addition, if you are reduced to 0 Hit Points while raging, you can end your rage as a reaction to stay at 1 Hit Point. If you do, you become wounded 2 (or increase your wounded condition by 2 if you are already wounded)."
    traits:
      - barbarian
  Weapon Supremacy:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your skill with weapons bends the laws of reality, allowing you to continuously attack with speed that would normally require magical assistance. You're permanently quickened. You can use your extra action only to Strike.
    traits:
      - fighter
  Witch's Hut:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: "Your home is an animated structure that obeys your commands. By performing a rite that takes 1 day, you create an animated object from a hut, small house, covered wagon, tent, or similar construction of up to Huge size.%r%rThe hut uses your AC, saving throw modifiers, and Perception modifier and has 150 HP and Hardness 10. It has the construct armor ability, meaning once it's reduced to less than half its Hit Points, or immediately upon being damaged by a critical hit, its AC is reduced by 4 until it is repaired.%r%rThe hut can't attack or attempt skill checks. You can give the hut a command as a single action, which has the auditory and concentrate traits; after 1 round of reconfiguring itself, the hut then follows that command until you give it a different command.%r%rYou can have only one witch's hut at a time. If you animate a new hut, your previous hut immediately reverts to its original, mundane form. If you die, the hut continues following the last order you gave it indefinitely."
    traits:
      - witch