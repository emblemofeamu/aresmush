  Overwhelming Breath:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Qi Spells
    shortdesc: You control your breathing and align it with your qi, exhaling with controlled force in order to overcome your opponent's resistance. If you use your next action to Cast a Spell that has the monk trait and no duration, the spell and any Strikes you make as a result of casting it ignore an amount of the target's resistance to physical damage equal to your level.
    traits:
      - concentrate
      - monk
      - spellshape
  Predator's Pounce:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: animal
    shortdesc: "**Requirements** You are unarmored or wearing light armor%r%rYou close the distance to your prey in a blur, pouncing on the creature before it can react. You Stride up to your Speed and make a Strike at the end of your movement."
    traits:
      - barbarian
      - flourish
      - rage
  Preparation:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You survey the battlefield, calculating the possibilities. You gain one additional reaction, which you can use before the beginning of your next turn for any rogue reaction.
    traits:
      - flourish
      - rogue
  Primal Focus:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your connection to nature is particularly strong, and the spirits of nature flock around you, helping you replenish your focus. Whenever you Refocus, completely refill your focus pool.
    traits:
      - druid
    init_magic: true
  Primal Summons:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Call of the Wild
    shortdesc: Whenever you summon an ally, you can empower it with the elemental power of air, earth, fire, or water. You gain the *primal summons* order spell.
    traits:
      - druid
  Reactive Interference:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** An adjacent enemy begins to use a reaction.%r%r**Rogue** Grabbing a sleeve, swiping with your weapon, or creating another obstruction, you reflexively foil an enemy's response. If the triggering creature's level is equal to or lower than yours, you disrupt the triggering reaction. If the triggering creature's level is higher than yours, you must make an attack roll against its AC. On a success, you disrupt the reaction."
    traits:
      - rogue
  Reason Rapidly:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: Your mind works through clues at an unbelievable speed. You instantly use up to five Recall Knowledge actions. If you have any special abilities or free actions that would normally be triggered when you Recall Knowledge, you can't use them for these actions.
    traits:
      - investigator
  Reflexive Stance:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** You roll initiative%r%rYou enter a stance without a thought. Use an action that has the stance trait."
    traits:
      - monk
  Reverberate:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "**Trigger** A creature or hazard would deal sonic damage to you.%r%rYou can manipulate the acoustics around you to deflect sonic damage back at its source. Attempt a Performance check against the Will DC of the creature or Fortitude DC of a hazard. If the damage came from a spell, use the creature's spell DC if it's lower.%r%r**Critical Success** You reduce the triggering damage by an amount up to four times your level. The creature takes sonic damage equal to the amount of damage you reduced in this way.%r**Success** As critical success, but you reduce the triggering damage by an amount up to twice your level."
    traits:
      - bard
  Ricochet Feint:
    assoc_charclass:
      - Rogue
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Ricochet Stance
    shortdesc: While in Ricochet Stance, you can bounce a thrown weapon off a foe to distract them. You can attempt a Feint against a creature within the first range increment of a thrown weapon you are wielding, rather than only creatures within your melee reach.
