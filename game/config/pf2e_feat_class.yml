      - fortune
      - investigator
  Keen Magical Detection:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: You sense magical dangers. When using the Detect Magic exploration activity, you can roll initiative twice and use the better result so long as at least one opponent has a magical effect or magic item and is in range of your *detect magic*.
