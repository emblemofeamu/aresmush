    shortdesc: You can merge spells, producing multiple effects with a single casting. One slot of each level of spell you can cast, except 2nd level and 1st level, becomes a spell combination slot (this doesn't apply to cantrips). When you prepare your spells, you can fill a combination slot with a combination of two spells. Each spell in the combination must be 2 or more spell levels below the slot's level, and both must target only one creature or object or have the option to target only one creature or object. Each spell in the combination must also have the same means of determining whether it has an effect—both spells must require a ranged spell attack roll, require the same type of saving throw, or automatically affect the target.%r%rWhen you cast a combined spell, it affects only one target, even if the component spells normally affect more than one. If any spell in the combination has further restrictions (such as targeting only living creatures), you must abide by all restrictions. The combined spell uses the shorter of the component spells' ranges. Resolve a combined spell as if were a single spell, but apply the effects of both component spells. For example, if the spell's target succeeded at the save against a combined spell, it would apply the success effect of each spell, and if it critically failed, it would apply the critical failure effect of both spells.
    traits: []
  Spell Mastery:
    assoc_charclass:
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have mastered a handful of spells to such a degree that you can cast them even if you haven't prepared them in advance. Select any four spells of 9th level or lower that you have access to; each spell you select must be of a different level. These spells are automatically prepared when you make your daily preparations, and they have their own spell slots. You can select a different array of spells by spending 1 week of downtime retraining your mastered spells.
    traits: []
  Symphony of the Muse:
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Harmonize
    shortdesc: You are able to weave countless performances together into a solo symphony. You are no longer limited to a single composition each turn or a single composition at a time; when you use a new composition, all previous compositions' effects continue for their remaining duration.
    traits: []
  To the Ends of the Earth:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
      skill: Survival/legendary
    shortdesc: Your ability to track your prey has surpassed explanation, allowing you to trace your prey's movements and predict its location with ease. When you use Hunt Prey on a creature within 100 feet, you can follow that creature's movements, allowing you to know the creature's exact location no matter how far away it becomes, as long as it remains your prey. You must be legendary in Nature to track your prey's location across teleportation or planar travel. This feat gains the detection, divination, and primal traits if you're legendary in Nature.
    traits: []
  Triple Threat:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat: 
        - Shared Prey
    shortdesc: You can divide your attention three ways when hunting. When you use Hunt Prey, you can designate three creatures as prey, designate two creatures as prey and share the effect with one ally (as Shared Prey), or designate one creature as prey and share the effect with two allies.
    traits: []
  True Shapeshifter:
    assoc_charclass:
      - Druid
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Dragon Shape 
        - Wild Shape
    shortdesc: You transcend the limitations of form. While under the effects of wild shape, you can change into any other form on your wild shape list; if the durations of the forms would vary, use the shorter of the two durations.%r%rOnce per day, you can transform into a kaiju, with the effects of nature incarnate; if you have Plant Shape, you can instead transform into a green man.
    traits:
      - concentrate
  Ultimate Flexibility:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 20
      feat:
        - Improved Flexibility
    shortdesc: Your experience keeps you on your toes, making you adaptable to even the most dangerous challenges. When you gain a fighter feat using combat flexibility, you gain three fighter feats instead of two. While the first feat must still be 8th level or lower, the second feat can be up to 14th level, and the third feat can be up to 18th level. You can use the first feat to meet the prerequisites of the second or third feats and the second feat to meet the prerequisites of the third feat. You must meet all feats' prerequisites. In addition, you can adapt to the battlefield's challenges by spending 1 hour to train. If you do, you can reselect the feats chosen with combat flexibility as if you had made your daily preparations. You can't trade out limited-use abilities that you've already used, such as Determination.
    traits: []
  Ultimate Polymath: # Magic
    assoc_charclass:
      - Bard
    feat_type:
      - Charclass
    prereq:
      level: 20
      specialize: polymath
    shortdesc: You can flexibly cast all of your spells, granting a dizzying array of possible options. All of the spells in your repertoire are signature spells for you.
    traits: []
  Ultimate Skirmisher:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You are so skilled at navigating the wild, your movement is completely unaffected by terrain. You ignore the effects of all difficult terrain, greater difficult terrain, and hazardous terrain, and you don't trigger traps and hazards that are triggered by moving into an area (such as trip wires and pressure plates), unless you want to.
    traits: []
  Unstoppable Juggernaut:
    assoc_charclass:
      - Barbarian
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: You have become a brutal, unstoppable force of nature, able to shrug off mortal wounds with ease. You gain resistance equal to 3 + your Constitution modifier to all damage, and your resistance from raging increases to 8 + your Constitution modifier.%r%rIn addition, if you are reduced to 0 Hit Points while raging, you can end your rage as a reaction to stay at 1 Hit Point. If you do, you become wounded 2 (or increase your wounded condition by 2 if you are already wounded).
    traits: []
  Weapon Supremacy:
    assoc_charclass:
      - Fighter
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your skill with weapons lets you attack swiftly at all times. You're permanently quickened. You can use your extra action only to Strike.
    traits: []
  Witch's Hut:
    assoc_charclass:
      - Witch
    feat_type:
      - Charclass
    prereq:
      level: 20
    shortdesc: Your home is an animated structure that obeys your commands. By performing a rite that takes 1 day, you create an animated object from a hut, small house, covered wagon, tent, or similar construction of up to Huge size.%r%rThe hut uses your AC, saving throw modifiers, and Perception modifier and has 150 HP and Hardness 10. It has the construct armor ability, meaning once it's reduced to less than half its Hit Points, or immediately upon being damaged by a critical hit, its AC is reduced by 4 until it is repaired.%r%rThe hut can't attack or attempt skill checks. You can give the hut a command as a single action, which has the auditory and concentrate traits; after 1 round of reconfiguring itself, the hut then follows that command until you give it a different command.%r**Guard** The hut watches for trespassers within 120 feet using your Perception modifier and screams if it spots any.%r**Lock** Each entrance to the hut is sealed with a lock spell.%r**Move** The hut gains a Speed of 60 feet, growing giant bird or bone legs, if necessary, and follows an extremely basic movement command you give it, such as 'follow me' or 'move that direction.' While perfectly suitable for overland travel, the hut's broad movements and 1-round delay on response time are too imprecise to predictably direct in a combat encounter or other situation where seconds and precise locations count.%r**Hide** The hut appears to be a normal, mundane object of its type. This is a 10th-level illusion effect.%r%rYou can have only one hut at a time. If you animate a new hut, your previous hut immediately reverts to its original, mundane form. If you die, the hut continues following the last order you gave it indefinitely.
    traits: []