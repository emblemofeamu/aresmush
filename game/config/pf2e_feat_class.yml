    traits:
      - divination
  Favored Terrain:
    assoc_charclass:
      - Ranger
    feat_type:
      - Charclass
    prereq:
      level: 2
    shortdesc: You have studied a specific terrain to overcome its challenges. Choose aquatic, arctic, desert, forest, mountain, plains, sky, swamp, or underground as your favored terrain. When in that terrain, you can ignore the effects of non-magical diffcult terrain. If you have the wild stride class feature, you gain a second benefit while in your favored terrain, depending on your choice.%r%r**Aquatic** You gain a swim Speed equal to your Speed. If you already had a swim Speed, you gain a +10-foot status bonus to your swim Speed.%r%r**Arctic** You need to eat and drink only one-tenth as much as usual, you aren't affected by severe or extreme cold, and you can walk across ice and snow at full Speed without needing to Balance.%r%r**Desert** You need to eat and drink only one-tenth as much as usual, you aren't affected by severe or extreme heat, and you can walk along sand at full Speed without needing to Balance.%r%r**Forest, Mountain, or Underground** You gain a climb Speed equal to your Speed. If you already had a climb Speed, you gain a +10-foot status bonus to your climb Speed.%r%r**Plains** You gain a +10-foot status bonus to your land Speed.%r%r**Sky** You gain a +10-foot status bonus to your fly Speed, if you have one.%r%r**Swamp** You can move across bogs at full Speed, even if they are deep enough to be greater difficult terrain or to normally require you to Swim.
