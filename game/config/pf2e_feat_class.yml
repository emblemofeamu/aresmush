        - Lunge
        - Reactive Strike
    shortdesc: "**Requirements** You are wielding a melee weapon.%r%rYour body coiled to strike, you can lash out at distant enemies. While you are in this stance, you can use Reactive Strike against a creature that is outside your reach but within the reach you would have with a Lunge. If you do, you increase your range with the Strike by 5 feet."
    traits:
      - fighter
      - stance
  Magic Sense:
    assoc_charclass:
      - Oracle
      - Sorcerer
      - Wizard
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "You have a literal sixth sense for ambient magic in your vicinity. You can sense the presence of magic auras as though you were always using a 1st-rank *detect magic* spell. This detects magic in your field of vision only. When you Seek, you gain the benefits of a 3rd-rank *detect magic* spell on things you see (in addition to the normal benefits of Seeking). You can turn this sense off and on with a free action at the start or the end of your turn.%r%r**Special** This feat has the trait corresponding to the tradition of spells you cast (arcane, divine, primal, or occult)."
    traits:
      - detection
      - oracle
      - sorcerer
      - wizard
  Make 'Em Sweat:
    assoc_charclass:
      - Investigator
    feat_type:
      - Charclass
    prereq:
      level: 12
      specialize: interrogation
    shortdesc: Your line of questioning lets a suspect know you can see right through them, shaking them to the core. When you succeed at using Pointed Question, the target is also frightened 1 (or frightened 2 on a critical success). This added effect is an emotion and fear effect, but the other effects of Pointed Question still apply even if the target is immune to fear.
    traits:
      - investigator
  Meditative Focus:
    assoc_charclass:
      - Monk
    feat_type:
      - Charclass
    prereq:
      level: 12
      feat:
        - Qi Spells
    shortdesc: Your meditation is so effective that you can achieve a deep focus with the world around you. When you Refocus, you regain all your Focus Points instead of 1.
    traits:
      - monk
    init_magic: true
  Mobile Finisher:
    assoc_charclass:
      - Swashbuckler
    feat_type:
      - Charclass
    prereq:
      level: 12
    shortdesc: "You attack in motion. Stride and then Strike.%r%rYou can use Mobile Finisher while Burrowing, Climbing, Flying, or Swimming instead of Striding if you have the corresponding movement type."
