    trigger: A creature within range is hit by an attack from an enemy
    effect: "The target appears to fall down dead, though it actually turns invisible. Its illusory corpse remains where it fell, complete with a believable fatal wound. This illusion looks and feels like a dead body. If the target's death seems absurd—for instance, a barbarian at full health appears to be slain by 2 damage—the GM can grant the attacker an immediate Perception check to disbelieve the illusion. If the target uses hostile actions, the spell ends. This ends the entire spell, so the illusory corpse disappears too."
    heighten: "**7th:** The spell doesn't end if the target uses a hostile action."
  Dull Ambition:
    base_level: 4
    traits:
      - concentrate
      - curse
      - manipulate
      - mental
      - misfortune
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    range: 120 feet
    target: 1 creature
    duration: varies
    effect: "You curse the target to fail in all avenues of its life that require drive and ambition, as it inadvertently undermines its own goals at every turn. The effect is based on the target's Will save.%r%r**Critical Success** The target is unaffected.%r**Success** For 1 hour, the target rolls twice and uses the lower result on initiative rolls.%r**Failure** For 1 day, the target rolls twice and uses the lower result on initiative rolls and any check to determine the success of a downtime activity.%r**Critical Failure** As failure, but the duration is unlimited."
  Duplicate Foe:
    base_level: 7
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 3
    range: 30 feet
    target: 1 enemy of level 15 or lower
    duration: 1 minute
    effect: "You create a temporary duplicate of an enemy to fight on your behalf. The target can attempt a Fortitude save to disrupt the spell. The duplicate appears in an unoccupied space adjacent to the target and has the target's attack modifier, AC, saving throw modifiers, Perception, and skill modifiers, but it has only 70 Hit Points and lacks the target's special abilities, including immunities, resistances, and weaknesses. It has no magic items except weapon potency runes.%r%rThe duplicate gains the minion trait, and it can only Stride and Strike. Its Strikes deal the target's normal damage but don't apply added effects, since it doesn't have special abilities. The spell automatically ends if the duplicate's Hit Points drop to 0.%r%rThe duplicate attacks your enemies to the best of its abilities. You can also try to give it additional instructions; when you Sustain the spell, you can also Command a Minion as part of your action, but the GM determines whether the duplicate follows your command.%r%rThe duplicate is unstable, so each turn after it takes its actions, it loses 4d6 Hit Points. It's not a living creature, and it can never regain its lost Hit Points in any way.%r%r**Critical Success** You fail to create a duplicate.%r**Success** The duplicate deals half damage with its Strikes and the duration is reduced to a maximum of 2 rounds.%r**Failure** The duplicate works as described."
    heighten: "**+1:** The level of creature you can target increases by 2. The duplicate has 10 more HP."
  Déjà Vu:
    base_level: 1
    traits:
      - concentrate
      - incapacitation
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 100 feet
    target: 1 creature
    duration: 2 rounds
    effect: "You loop a thought process in the target's mind, forcing it to repeat a moment's worth of actions. The target must attempt a Will save. If the target fails, whatever actions the target uses on its next turn, it must repeat on its following turn. The actions must be repeated in the same order and as close to the same specifics as possible. For example, if the target makes an attack, it must repeat the attack against the same creature, if possible, and if the target moves, it must move the same distance and direction, if possible, on its next turn.%r%rIf the target can't repeat an action, such as Casting a Spell that has been exhausted or needing to target a creature that has died, it can act as it chooses for that action but becomes stupefied 1 until the end of its turn."
  Earthbind:
    base_level: 3
    traits:
      - concentrate
      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    range: 120 feet
    target: 1 flying creature
    duration: varies
    effect: "Using the weight of earth, you hamper a target's flight, with effects based on its Fortitude save. If the creature reaches the ground safely, it doesn't take falling damage.%r%r**Critical Success** The target is unaffected.%r**Success** The target falls safely up to 120 feet.%r**Failure** The target falls safely up to 120 feet. If it hits the ground, it can't Fly, levitate, or otherwise leave the ground for 1 round.%r**Critical Failure** The target falls safely up to 120 feet. If it hits the ground, it can't Fly, levitate, or otherwise leave the ground for 1 minute."
  Earthquake:
