    effect: You specify a trigger and a message up to 25 words long. When the specified trigger occurs within 30 feet of the target, illusory text of your message circles the target accompanied by a disembodied voice. You can choose a language you know for the text and speech, and can choose what the voice sounds like. Once the message is completed, the spell ends.
    heighten: "**4th:** You can add a simple sensory component to emphasize the message, such as an odor, visual effect, or physical sensation. This addition is obviously illusory and part of the message, lasting only while the message is being read.%r**6th:** As 4th rank, but you can choose how many times the spell repeats the message before it ends; there is no limit to the number of repetitions."
  Embrace Nothingness:
    base_level: 9
    traits:
      - concentrate
      - focus
      - manipulate
      - monk
      - uncommon
    actions: 2
    duration: 1 minute
    effect: You empty your body of substance, becoming one with nothingness. You gain resistance to physical damage equal to your level. You move at half your normal Speed, but can move in any direction (including up and down). While moving, you have concealment. When it is not your turn and during your turn until you take an action with the move trait, you are invisible. You can pass through solid inanimate objects as long as they are no more than 2 feet thick
  Embrace the Pit:
