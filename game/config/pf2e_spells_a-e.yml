    target: 1 creature
    effect: With a flick of your wrist, you fling a chunk of your elemental matter at your foe. Make a ranged spell attack roll, dealing 1d8 damage on a success and double damage on a critical success. This spell deals damage according to your elemental influence (for instance, slashing for air or fire for fire) and has your element's trait.
    heighten: "**+1:** The damage increases by 1d8."
  Embed Message:
    base_level: 2
    traits:
      - concentrate
