    actions: 2
    duration: 1 minute
    effect: "You call upon the power of the planes to transform into a Medium elemental battle form. When you Cast this Spell, choose a listed element. While in this form, you gain the corresponding trait and the elemental trait. You have hands in this battle form and can take manipulate actions. You can Dismiss the spell.%r%rYou gain the following statistics and abilities regardless of which battle form you choose:%r%rYou also gain specific abilities based on the type of elemental you choose:"
