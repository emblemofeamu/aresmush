    effect: You call upon your element to propel you, improving your Speed depending on your element. This spell has your element's trait.
    heighten: "**6th:** You also gain a +10-foot status bonus to your Speeds.%r**9th:** The status bonus increases to +20 feet."
  Elemental Toss:
