      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    area: 60-foot burst
    range: 500 feet
    duration: 1 round
    effect: You shake the ground, topple creatures into fissures, and collapse structures. The GM might add additional effects in certain areas. Cliffs might collapse, causing creatures to fall, or a lake might drain as fissures open up below its surface, leaving a morass of quicksand.
    heighten: "**10th:** You create a massive earthquake that can devastate a settlement. The range increases to half a mile and the area to a quarter-mile burst."
  Earthworks:
