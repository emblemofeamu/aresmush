  Armor Proficiency:
    feat_type:
      - General
    shortdesc: "You become trained in light armor. If you already were trained in light armor, you gain training in medium armor. If you were trained in both, you become trained in heavy armor. If you are at least 13th level, you become an expert in this armor type.%r%r**Special** You can select this feat more than once. Each time, you become trained in the next type of armor, as detailed above."
    prereq:
      level: 1
  Breath Control:
    feat_type:
      - General
    shortdesc: You can breathe even in hazardous or sparse air. You can hold your breath for 25 times as long as usual before suffocating. You gain a +1 circumstance bonus to saving throws against inhaled threats, such as inhaled poisons, and if you roll a success on such a saving throw, you get a critical success instead.
    prereq:
      level: 1
  Canny Acumen:
    feat_type:
      - General
    grants:
      misc: 
      - Fortitude/expert
      - Reflex/expert
      - Will/expert
      - Perception/expert
    shortdesc: Your avoidance or observation is beyond the ken of most in your profession. Choose Fortitude saves, Reflex saves, Will saves, or Perception. You become an expert in your choice. At 17th level, you become a master in your choice.
    prereq:
      level: 1
  Diehard:
    feat_type:
      - General
    shortdesc: It takes more to kill you than most. You die from the dying condition at dying 5, rather than dying 4.
    prereq:
      level: 1
  Fast Recovery:
    feat_type:
      - General
    shortdesc: Your body quickly bounces back from afflictions. You regain twice as many Hit Points from resting. Each time you succeed at a Fortitude save against an ongoing disease or poison, you reduce its stage by 2, or by 1 against a virulent disease or poison. Each critical success you achieve against an ongoing disease or poison reduces its stage by 3, or by 2 against a virulent disease or poison. In addition, you reduce the severity of your drained condition by 2 when you rest for a night instead of by 1.
    prereq:
      level: 1
      ability:
        - Constitution/14
  Feather Step:
    feat_type:
      - General
    shortdesc: You step carefully and quickly. You can Step into difficult terrain.
    prereq:
      level: 1
      ability:
        - Dexterity/14
  Fleet:
    feat_type:
      - General
    shortdesc: You move more quickly on foot. Your Speed increases by 5 feet.
    prereq:
      level: 1
  Incredible Initiative:
    feat_type:
      - General
    shortdesc: You react more quickly than others can. You gain a +2 circumstance bonus to initiative rolls.
    prereq:
      level: 1
  Pet:
    feat_type:
      - General
    shortdesc: "You have a pet—a Tiny animal of a type you choose, such as a cat, bird, or rodent. It has the minion trait, meaning it gains 2 actions during your turn if you use the Command an Animal action to command it; this replaces the usual effects of Command an Animal, and you don't need to attempt a Nature check. A pet can't take attack actions except to Escape or Force Open.%r%r**Level** Your pet's level is equal to yours.%r%r**Modifiers and AC** Your pet's save modifiers and AC are equal to yours before applying circumstance or status bonuses or penalties. It uses 3 + your level as its modifier for Perception, Acrobatics, and Stealth, and just your level as its modifier for other skill checks. It doesn't have or use its own attribute modifiers and can never benefit from item bonuses.%r%r**Hit Points** Your pet has 5 Hit Points per level.%r%r**Senses** Your pet has low-light vision and can gain additional senses from pet abilities.%r%r**Speed** Your pet has a Speed of 25 feet. You can choose to instead have an aquatic pet, which breathes in water instead of air and has the aquatic trait, no land Speed, and a swim Speed of 25 feet.%r%r**Pet Abilities** When you gain your pet, choose two of the following abilities. If your pet is an animal that naturally has one of these abilities (for instance, an owl has a fly Speed), you must select that ability. Your pet can't be an animal that naturally has more pet abilities than the maximum. In some cases, the GM might add some familiar abilities to the pet abilities you can choose.%r%r**Special** You can gain a new pet by retraining this feat, releasing any previous pet you have. If you later gain a familiar or other companion that uses the Pet feat, you can immediately retrain this feat."
    prereq:
      level: 1
  Ride:
    feat_type:
      - General
    shortdesc: When you Command an Animal you're mounted on to take a move action (such as Stride), you automatically succeed instead of needing to attempt a check. Any animal you're mounted on acts on your turn, like a minion. If you Mount an animal in the middle of an encounter, it skips its next turn and then acts on your next turn.
    prereq:
      level: 1
  Shield Block:
    feat_type:
      - General
    shortdesc: "**Trigger** While you have your shield raised, you would take physical damage (bludgeoning, piercing, or slashing) from an attack.%r%rYou snap your shield in place to ward off a blow. Your shield prevents you from taking an amount of damage up to the shield's Hardness. You and the shield each take any remaining damage, possibly breaking or destroying the shield."
    prereq:
      level: 1
  Toughness:
    feat_type:
      - General
    shortdesc: Your body can withstand more punishment than most before succumbing. Increase your maximum Hit Points by your level. You reduce the DC of recovery checks by 1.
    prereq:
      level: 1
  Weapon Proficiency:
    feat_type:
      - General
    shortdesc: "You become trained in all martial weapons. If you were already trained in all martial weapons, you become trained in one advanced weapon of your choice. If you are at least 11th level, you also become an expert in these weapons.%r%r**Special** You can select this feat more than once. Each time you do, you become trained in an advanced weapon."
    prereq:
      level: 1
  # Level 3 General Feats
  Ancestral Paragon:
    feat_type:
      - General
    grants:
      gated_feat: Ancestral Paragon
    shortdesc: Whether through instinct, study, or magic, you feel a deeper connection to your ancestry. You gain a 1st-level ancestry feat.
    prereq:
      level: 3
  Improvised Repair:
    feat_type:
      - General
    shortdesc: You can hastily patch damaged equipment together, but the temporary fix lacks the full care required for lasting repairs. You patch together a broken item possessed by you or an adjacent willing creature. Until the item takes damage again, it still functions as a shoddy item of its type. If it's a magic item or another item with activations, it can't be activated while patched together, but can be used for normal functions (such as Striking with a weapon or using Shield Block with a shield). This activity restores no Hit Points, so the item is easy to destroy. Once the item is Repaired normally such that it is no longer broken, it is also no longer shoddy.
    prereq:
      level: 3
  Keen Follower:
    feat_type:
      - General
    shortdesc: "Your keen observation of your allies has made you better at following their lead. When using the Follow the Expert activity in exploration mode, you gain a +3 circumstance bonus if the ally you are following is an expert and a +4 circumstance bonus if your ally is a master.%r%rYou can share your observations with others to help further coordinate the group. If the ally you are following has Quiet Allies or another skill feat that allows the group to roll a single skill check for an exploration activity and use the lowest modifier, they can instead use your modifier, even if it's not the lowest."
    prereq:
      level: 3
  Pick up the Pace:
    feat_type:
      - General
    shortdesc: You lead by example and can help others push themselves beyond their normal limits. When Hustling in a group during exploration mode, your group can Hustle for as long as the member who could Hustle longest on their own.
    prereq:
      level: 3
      ability:
        - Constitution/14
  Prescient Planner:
    feat_type:
      - General
    shortdesc: "**Cost** the Price of the chosen item%r%r**Requirements** You haven't used this ability since the last time you were able to purchase goods.%r%rYou regularly create convoluted plans and contingencies, using your resources to enact them. You take 1 minute to remove your backpack, then carefully remove an item you hadn't previously declared that you purchased—you intuited that you would come to need the item and purchased it at the latest opportunity. The item must be a piece of adventuring gear, and can't be a weapon, armor, alchemical item, magic item, or other treasure. It must be common with a level no higher than half your level, and its Bulk must be low enough that carrying it wouldn't have made you encumbered."
    prereq:
      level: 3
  Robust Health:
    feat_type:
      - General
    shortdesc: Your physiology responds well to first aid. You gain a circumstance bonus to the number of Hit Points you regain equal to your level from a successful attempt to Treat your Wounds or use Battle Medicine on you. After you or an ally use Battle Medicine on you, you become temporarily immune to that Battle Medicine for only 1 hour, instead of 1 day.
    prereq:
      level: 3
  Skitter:
    feat_type:
      - General
    shortdesc: You can scoot swiftly across the ground. You can Crawl up to half your Speed.
    prereq:
      level: 3
      feat:
        - Fleet
      ability:
        - Dexterity/16
  Thorough Search:
    feat_type:
      - General
    shortdesc: You take your time searching to ensure you find everything. When Searching, you can take twice as long to search. Normally this means you Search at up to one quarter of your Speed, to a maximum of 150 feet per minute to check everything, or 75 feet per minute to check everything before you walk into an area. If you do and the GM rolls your secret check to Seek to notice something, you gain a +2 circumstance bonus to that Perception check and if you succeed, you get a critical success instead.
    prereq:
      level: 3
      skill: Perception/expert
  Untrained Improvisation:
    feat_type:
      - General
    shortdesc: You've learned how to handle situations when you're out of your depth. Your proficiency bonus to untrained skill checks is equal to your level –2. This improves to your level –1 at 5th level and your full level at 7th level. This doesn't allow you to use the skill's trained actions.
    prereq:
      level: 3
  # Level 7 General Feats
  Expeditious Search:
    feat_type:
      - General
    shortdesc: You have a system that lets you search at great speed, finding details and secrets twice as quickly as others can. When Searching, you take half as long as usual to Search a given area. This means that while exploring, you double the Speed you can move while ensuring you've Searched an area before walking into it (up to half your Speed). If you're legendary in Perception, you instead Search areas four times as quickly.
    prereq:
      level: 7
      skill: Perception/master
  Numb to Death:
    feat_type:
      - General
    shortdesc: "**Frequency** once per day%r%rYour past has left you numb to death's call. The first time each day that you regain Hit Points while you are dying, you gain a circumstance bonus to the number of Hit Points you regain equal to your level, and you neither gain the wounded condition nor increase the value of this condition."
    prereq:
      level: 7
      feat:
        - Diehard
        - You have died at least once
  Prescient Consumable:
    feat_type:
      - General
    shortdesc: You can predict which consumables you might need in advance. When using Prescient Planner, you can procure a consumable item from your backpack, instead of a piece of adventuring gear. The consumable item must still be common with a level no higher than half your level, and its Bulk must be low enough that carrying it wouldn't have made you encumbered.
    prereq:
      level: 7
      feat:
        - Prescient Planner
  Supertaster:
    feat_type:
      - General
    shortdesc: "You have refined your palate and have a discerning sense of taste that can detect abnormalities in the flavor and texture of food and beverages. When eating food or drinking a beverage, you automatically attempt to identify the ingredients, which might alert you to the presence of alterations or additives, such as poisons. The GM rolls a secret Perception check against a DC determined by the poison's level; if the food or drink is poisoned, on a success, you learn that the food or drink was poisoned, but not the specific poison used. If you successfully detect that the food or drink was poisoned, you can spit out the food or drink in time to not be exposed to that instance of the poison (unless you resume eating or drinking the poisoned food or beverage).%r%rIf you lick or taste something while Investigating or attempting to Recall Knowledge to identify something, and if the taste would provide relevant additional information (at the GM's discretion), you gain a +2 circumstance bonus to your check."
    prereq:
      level: 7
      combat_stats: Perception/master
  # Level 11 General Feats
  A Home in Every Port:
    feat_type:
      - General
    traits:
      - Downtime
    shortdesc: "You have a reputation in towns and villages you've visited, and residents are always willing to open their doors to you.%r%rWhen in a town or village, during downtime, you can spend 8 hours to locate a resident willing to provide lodging for you and up to six allies for up to 24 hours at no charge. The standard of living within the acquired lodging is comfortable, and square meals are provided at no cost.%r%rAfter 24 hours, you must pay standard prices for further lodging and meals or use this feat again to find a new resident willing to host you."
    prereq:
      level: 11
      ability:
        - Charisma/16
  Caravan Leader:
    feat_type:
      - General
    shortdesc: You know how to get the most effort out of your allies on the road. Your group can Hustle for an additional 20 minutes beyond the length of time that the member who could Hustle longest on their own.
    prereq:
      level: 11
      feat:
        - Pick Up the Pace
  Incredible Investiture:
    feat_type:
      - General
    shortdesc: You have an incredible ability to invest more magic items. Increase your limit on invested items from 10 to 12.
    prereq:
      level: 11
      ability:
        - Charisma/16
  Incredible Scout:
    feat_type:
      - General
    traits:
      - Exploration
    shortdesc: When you scout, you are particularly alert for danger, granting your allies precious moments to prepare to fight. When using the Scout exploration activity, you grant your allies a +2 circumstance bonus to their initiative rolls instead of a +1 circumstance bonus.
    prereq:
      level: 11
      skill: Perception/master
  # Level 19 General Feats
  True Perception:
    feat_type:
      - General
    traits:
      - Revelation
    shortdesc: Your perceptive abilities and ability to process sensory information are so far beyond the pale that you notice minute discrepancies in all sorts of illusions and physical transformations. You are constantly under the effects of a 6th-rank *truesight* spell, using your Perception modifier for the counteract check.
    prereq:
      level: 19
      skill: Perception/legendary