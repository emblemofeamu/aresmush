pf2e_feats:
  # Level 1 General Feats
  Adopted Ancestry (Arvek):
    feat_type:
      - General
    grants:
      assign:
        feat:
          - Arvek
    shortdesc: You're fully immersed in another ancestry's culture and traditions, whether born into them, earned through rite of passage, or bonded through a deep friendship or romance. Choose a common ancestry or another ancestry to which you have access. You can select ancestry feats from the ancestry you chose, in addition to your character's own ancestry, as long as the ancestry feats don't require any physiological feature that you lack, as determined by the GM.
    prereq:
      level: 1
