---
pf2e_magicitem:
  # Level 1 Magic Items
  Everlight Crystal:
    traits:
      - light
      - magical
    level: 1
    price: 1500
    bulk: 0.1
    shortdesc: "An *everlight* crystal is one of the most common applications of permanent magic. This stone or gem sheds magical bright light constantly in a 20-foot radius (and dim light for the next 20 feet). The light requires no oxygen, generates no heat, and can't be extinguished, though the crystal can be covered."
  Magical Hearing Aid:
    traits:
      - magical
    level: 1
    price: 500
    bulk: 0
    shortdesc: "These curved hearing aids hook over the top and sit behind your ear, with a receiver that fits into the ear opening. The external part of the device detects sound waves and, using magic, transfers them down the receiver and into your ear. You can wear one or two depending on your hearing loss, and you can turn your hearing aids on or off using an Interact action."
  Predictable Silver Piece:
    traits:
      - magical
    level: 1
    price: 300
    bulk: 0
    shortdesc: "This seemingly unremarkable, weathered silver coin bears the bust of an unnamed monarch on the face and a majestic bird on the tail. You can toss the coin without activating it, in which case it follows the normal laws of probability.%r%r**Activate--Cheat Fate** 1 action (manipulate); **Effect** You rub your thumb on one side of the coin with the intent of slightly tweaking the strands of fate, then flip the coin into the air in a coin toss. No matter how the toss is resolved- letting the coin fall to the ground, slapping it down on the back of your hand, or catching it on your open palm-it always lands with the side you rubbed face up."
  Shining Ammunition:
    traits:
      - consumable
      - light
      - magical
    level: 1
    price: 300
    bulk: 0
    shortdesc: "*Shining ammunition* gives off a faint glow. When shot, it sheds bright light in a 20-foot radius (and dim light to the next 20 feet) for 10 minutes. If it hits a target, it sticks, causing the target to shed light in the same radius. A creature can remove the ammunition with an Interact action, but the ammunition itself continues to glow for the rest of the duration or until destroyed."
  Walking Cauldron:
    traits:
      - invested
      - magical
    level: 1
    price: 1200
    bulk: 4
    shortdesc: "This iron cauldron stands upon sturdy iron crow's feet. A *walking cauldron* has a land Speed of 25 feet and can be used as a suitable tool to *Craft* potions, oils, or other liquids.%r%rAs a single action, which has the *auditory* and *concentrate* traits, you can command the cauldron to either follow you or to stand in place. When following you, the cauldron does its best to remain within 30 feet of you, but its ungainly movements are too imprecise to predictably direct in a combat encounter or other situation where seconds and precise locations count. It can carry up to 2 Bulk of ingredients for potions or other liquids inside of itself while following you, but if overloaded or if you put anything else inside it, it stands in place and refuses to move until 10 minutes after you remove the excess."
  # Level 2 Magic Items
  Antler Arrow:
    traits:
      - consumable
      - magical
    level: 2
    price: 700
    bulk: 0
    shortdesc: "**Activate** A (manipulate)%r%rCreation of these arrows was inspired by an encounter with a horned archon scout who sought to peacefully restrain their foes. When an activated *antler arrow* hits a target, bone antlers extend to pin it down. The target must succeed at a DC 16 Reflex save or become stuck to the surface, taking the critical specialization effects of a bow.%r%rIf the hit with the *antler arrow* is a critical hit and you have access to the bow critical specialization effect, the DC of the Athletics check increases to 15."
  Masquerade Scarf:
    traits:
      - invested
      - magical
    level: 2
    price: 3000
    bulk: 0
    shortdesc: "This delicately embroidered scarf matches with every outfit and can even complete a costume or disguise with illusions.%r%r**Activate--Masquerade** 1 minute (manipulate); **Frequency** once per day; **Effect** You arrange the scarf over your lower face, and it casts a 1st-rank *illusory disguise* spell on you, which ends immediately if the scarf is removed. You can alter the scarf's appearance or make it invisible as part of the *illusory disguise*, but it can still be felt if touched."
  Wayfinder:
    traits:
      - uncommon
      - invested
      - magical
    level: 2
    price: 2800
    bulk: 0
    shortdesc: "This compact compass repurposes ancient technology to draw fantastic powers from the mysterious magical items called *aeon stones*. A *wayfinder* functions as a compass.%r%rAn indentation in the middle of the *wayfinder* can hold a single *aeon stone*. Placing an *aeon stone* in this indentation provides you all the benefits of having the *aeon stone* orbiting your head, but it protects the stone from being noticed or stolen as easily. You invest a *wayfinder* and the *aeon stone* within it simultaneously, and they count as only one item toward your investiture limit. An invested *aeon stone* slotted in a *wayfinder* also grants its resonant power.%r%rIf you have more than one *wayfinder* with an invested *aeon stone* on your person at a given time, destructive interference from their resonance prevents you from gaining benefits from any of them. You can still benefit from additional *aeon stones* orbiting your head, just not in *wayfinders*.%r%r**Activate--Light** A (concentrate); **Effect** The *wayfinder* is targeted by a 1st-rank *light* spell."
  # Level 3 Magic Items
  Beacon Shot:
    traits:
      - consumable
      - magical
    level: 3
    price: 1000
    bulk: 0
    shortdesc: "**Ammunition** arrow, bolt%r%r**Activate** A (manipulate)%r%rThe shaft of a *beacon shot* is studded with tiny flecks of glimmering gemstones. When an activated *beacon shot* hits a target, it embeds itself into that target and spews sparks for 1 minute. If the target is invisible, it becomes merely hidden to creatures who would otherwise be unable to see it. The sparks also negate the concealed condition if the target was otherwise concealed.%r%rA creature can remove the arrow or bolt by using an Interact basic action and succeeding at a DC 20 Athletics check."
  Bracelet of Dashing:
    traits:
      - invested
      - magical
    level: 3
    price: 5800
    bulk: 0.1
    bonus:
      Acrobatics: 1
    shortdesc: "This jangling, silvery bracelet makes you lighter on your feet, giving you a +1 item bonus to Acrobatics checks.%r%r**Activate--Jangling Dash** A (concentrate); **Frequency** once per day; **Effect** You gain a +10-foot status bonus to Speed for 1 minute."
  Bracers of Missile Deflection:
    traits:
      - invested
      - magical
    level: 3
    price: 5200
    bulk: 0.1
    shortdesc: "These bracers are made from plates of durable dawnsilver and gleam like the summer sun.%r%r**Activate** Reaction (manipulate)%r%r**Effect** The bracers send the missile off-course. You gain a +2 circumstance bonus to AC against the triggering attack. If this would cause the attack to be a failure, the attack misses you."
  Channel Protection Amulet:
    traits:
      - uncommon
      - invested
      - magical
    level: 3
    price: 5600
    bulk: 0
    shortdesc: "This nugget of polished tektite is trapped in a cage of braided wire and hangs from a silken cord. When wearing this amulet, you gain resistance 5 against damage from *harm* spells if you're living, or against *heal* spells if you're undead."
  Charlatan's Gloves:
    traits:
      - invested
      - magical
    level: 3
    price: 5000
    bulk: 0.1
    bonus:
      Thievery: 1
    shortdesc: "Tiny silver hooks decorate these fine silk gloves. They grant a +1 item bonus to Thievery and allow you to cast *telekinetic hand* as an innate occult spell."
  Coyote Cloak:
    traits:
      - invested
      - magical
    level: 3
    price: 6000
    bulk: 0
    bonus:
      Survival: 1
    shortdesc: "This dusty coat is made of mangy brown-and-gray coyote fur. You gain a +1 item bonus to Survival checks. If you critically succeed at your Survival check to Subsist, you can feed twice as many additional creatures."
  Crafter's Eyepiece:
    traits:
      - invested
      - magical
    level: 3
    price: 6000
    bulk: 0
    bonus:
      Crafting: 1
    shortdesc: "This rugged metal eyepiece etched with square patterns is designed to be worn over a single eye. Twisting the lens reveals a faint three-dimensional outline of an item you plan to build or repair, with helpful labels on the component parts.%r%rYou gain a +1 item bonus to Crafting checks. When you Repair an item, increase the Hit Points restored to 10 + 10 per proficiency rank on a success or 15 + 15 per proficiency rank on a critical success."
  Dancing Scarf:
    traits:
      - invested
      - magical
      - visual
    level: 3
    price: 6000
    bulk: 0
    bonus:
      Performance: 1
    shortdesc: "This long and billowing scarf is typically woven of silk or sheer fabric and adorned with bells or other jangling bits of shiny metal. It grants a +1 item bonus to Performance checks to dance.%r%r**Activate--Swirling Scarf** A (manipulate); **Requirements** On your most recent action, you succeeded at a Performance check to dance; **Effect** You become concealed until the beginning of your next turn."
  Doubling Rings:
    traits:
      - invested
      - magical
    level: 3
    price: 5000
    bulk: 0
    shortdesc: "This item consists of two magically linked rings: an intricate, gleaming golden ring with a square-cut ruby, and a thick, plain iron ring. When you wield a melee weapon in the hand wearing the golden ring, the weapon's fundamental runes are replicated onto any melee weapon you wield in the hand wearing the iron ring. (The fundamental runes are *weapon potency* and *striking*, which add an item bonus to attack rolls and extra weapon damage dice, respectively.) Any fundamental runes on the weapon in the hand wearing the iron ring are suppressed.%r%rThe replication functions only if you wear both rings, and it ends as soon as you cease wielding a melee weapon in one of your hands. Consequently, the benefit doesn't apply to thrown attacks or if you're holding a weapon but not wielding it (such as holding in one hand a weapon that requires two hands to wield)."
  Maestro's Instrument (Lesser):
    traits:
      - magical
    level: 3
    price: 6000
    bulk: 1
    shortdesc: "A *maestro's instrument* can be crafted in the form of any variety of handheld musical instruments. A *maestro's instrument* grants you a +1 item bonus to Performance checks while playing music with the instrument.%r%r**Activate--Charming Performance** 2 actions (manipulate); **Frequency** once per day; **Effect** You play the instrument, causing it to cast a DC 17 *charm* spell.%r%r**Craft Requirements** You must supply a casting of *charm* of the appropriate rank."
  Persona Mask:
    traits:
      - fortune
      - invested
      - magical
    level: 3
    price: 5000
    bulk: 0
    shortdesc: "Despite covering the entire face, this alabaster mask does not hinder vision or other senses. Wearing the mask grants a +1 item bonus to Performance checks while acting, orating, performing comedy, or singing.%r%r**Activate--Assume Role** A (concentrate); **Effect** You change the mask's appearance into an artistic rendition of a dramatic character of your choice."
  Slumber Arrow:
    traits:
      - consumable
      - magical
      - mental
      - sleep
    level: 3
    price: 1100
    bulk: 0
    shortdesc: "**Activate** A (manipulate)%r%rSleep arrows often have shafts of deep blue or black, and their fletching is exceptionally soft and downy. An activated sleep arrow deals no damage, but a living creature hit by it grows lethargic and must attempt a DC 17 Will saving throw. On a failure, it takes a -5-foot status penalty to its Speeds for 1 round, and is also slowed 1 for 1 round on a critical failure.%r%r**Craft Requirements** Supply one casting of *sleep*."
  Spellstrike Ammunition (Type I):
    traits:
      - consumable
      - magical
    level: 3
    price: 1200
    bulk: 0
    shortdesc: "**Ammunition** any%r%r**Activate** 2 actions Cast a Spell%r%rMystic patterns create a magic reservoir within this ammunition. You activate *spellstrike ammunition* by Casting a Spell into the ammunition. The spell must be of a spell rank the ammunition can hold, and the spell must be able to target a creature other than the caster. A creature hit by activated *spellstrike ammunition* is targeted by the spell. If the creature isn't a valid target for the spell, the spell is lost.%r%rThe ammunition affects only the target hit, even if the spell would normally affect more than one target. If the spell requires a spell attack roll, use the result of your ranged attack roll with the ammunition to determine the degree of success of the spell. If the spell requires a saving throw, the target attempts the save against your spell DC. Combine the Strike and spell's damage for the purpose of resistances and weaknesses.%r%rThe maximum rank of spell the ammunition can hold determines its item level and Price.%r%rMaximum Spell Rank 1st"
  Tracker's Goggles:
    traits:
      - invested
      - magical
    level: 3
    price: 6000
    bulk: 0
    shortdesc: "These lenses of forest-green glass are bound in rough leather stitched with crude twine.%r%rWhile wearing these goggles, you gain a +1 bonus to Survival checks to Sense Direction and Track.%r%rIf you fail a check to Track, you can try again after 30 minutes rather than an hour."
  Twisting Twine (Lesser):
    traits:
      - magical
    level: 3
    price: 4500
    bulk: 0.1
    shortdesc: "This ball of hempen twine resists efforts to unravel it by hand.%r%r**Activate--Unravel Twine** 1 action (manipulate); **Frequency** once per day; **Effect** You toss the ball of twine into a square within 20 feet. The twine then unravels and animates, attempting to Disarm or Trip (your choice) a creature in the square with a total of +9 to the Athletics check. At the end of your turn, the twine winds itself back into a ball and returns to your hand; if you don't have a free hand, it returns to your space instead."
  Ventriloquist's Ring:
    traits:
      - invested
      - magical
    level: 3
    price: 6000
    bulk: 0
    bonus:
      Deception: 1
    shortdesc: "This elegant copper ring has miniature images of songbirds engraved around its circumference. You gain a +1 item bonus to Deception checks.%r%r**Activate--Throw Voice** 2 actions (manipulate); **Frequency** once per day; **Effect** Twisting the ring around your finger allows you to magically throw your voice, with the effects of a *ventriloquism* spell (DC 19 Perception)."
  Vine Arrow:
    traits:
      - consumable
      - magical
    level: 3
    price: 1000
    bulk: 0
    shortdesc: "**Activate** A (concentrate)%r%rLeafy stalks protrude from the shaft of this rustic arrow. When an activated *vine arrow* hits a target, the arrow's shaft splits and grows, wrapping the target in vines.%r%rThe target takes a -10-foot circumstance penalty to its Speeds for 2d4 rounds, or until it Escapes against a DC of 19. On a critical hit, the target is also immobilized until it Escapes."
  # Level 4 Magic Items
  Alchemist Goggles:
    traits:
      - invested
      - magical
    level: 4
    price: 10000
    bulk: 0
    shortdesc: "These brass goggles are engraved with flame patterns and have thick, heavy lenses.%r%rWhile worn, they give you a +1 item bonus to Crafting checks to Craft alchemical items. When making Strikes with alchemical bombs, you ignore lesser cover.%r%rIf your Strike with an alchemical bomb fails (but doesn't critically fail), you gain a +1 item bonus to the splash damage the target of the Strike takes."
  Climbing Bolt:
    traits:
      - consumable
      - magical
    level: 4
    price: 1500
    bulk: 0
    shortdesc: "The shaft of this bolt is wrapped with fine twine. When the bolt strikes a solid surface, the twine unwinds and enlarges into a 50-foot-long rope, securely fastened to the surface the bolt struck. The rope can be pulled free with an Interact action and a successful DC 20 Athletics check."
  Demon Mask:
    traits:
      - invested
      - magical
    level: 4
    price: 8500
    bulk: 0.1
    bonus:
      Intimidation: 1
    shortdesc: "This terrifying mask is crafted in the visage of a leering demon and grants a +1 item bonus to Intimidation checks.%r%r**Activate--Leering Mask** 2 actions (manipulate); **Frequency** once per day; **Effect** The mask casts a *fear* spell with a DC of 20."
  Healer's Gloves:
    traits:
      - invested
      - magical
    level: 4
    price: 8000
    bulk: 0.1
    bonus:
      Medicine: 1
    shortdesc: "These clean, white gloves never show signs of blood, even when used to stitch up wounds or treat other ailments. They give you a +1 item bonus to Medicine checks.%r%r**Activate--Healer's Touch** A (manipulate); **Frequency** once per day; **Effect** You can soothe the wounds of a willing, living, adjacent creature, restoring 2d6+7 Hit Points to that creature. This is a healing vitality effect. You can't harm undead with this healing."
  Lifting Belt:
    traits:
      - invested
      - magical
    level: 4
    price: 8000
    bulk: 0.1
    bonus:
      Athletics: 1
    shortdesc: "This wide leather belt grants you a +1 item bonus to Athletics checks and increases the amount you can easily carry. You can carry Bulk equal to 6 + your Strength modifier before becoming encumbered, and you can hold and carry a total Bulk up to 11 + your Strength modifier.%r%r**Activate--Assisted Lift** 2 actions (manipulate); **Effect** You lift an object of up to 8 Bulk as though it were weightless. This requires two hands, and if the object is locked or otherwise held in place, you can attempt to Force it Open using Athletics as part of this activation. The object still has its full weight and Bulk for all other purposes-you just ignore that weight. The effect lasts until the end of your next turn."
  Viper Arrow:
    traits:
      - consumable
      - magical
    level: 4
    price: 1700
    bulk: 0
    shortdesc: "**Activate** A (manipulate)%r%rThe shaft of this arrow is covered in fine green scales, and its iron head comes to a pair of points almost like fangs.%r%rAfter an activated viper arrow hits a target, the arrow transforms into a viper. The target is affected by the viper's poison, as if it had been bitten. The viper then lands in an open space adjacent to the target.%r%rThe viper has the summoned trait and acts at the end of your turn, even though you didn't use the Sustain a Spell action. It is under the GM's control, but it generally attacks the creature the arrow struck. The viper vanishes after 1 minute or when slain.%r%r**Craft Requirements** Supply one casting of *summon animal*"
  Wand of Widening (1st-Rank Spell):
    traits:
      - magical
      - wand
    level: 4
    price: 10000
    bulk: 0.1
    shortdesc: "The end of this wand is forked with a peridot setting.%r%r**Activate** Cast a Spell; The activation takes 2 actions if the spell normally takes 1 action to cast, or 3 actions if the spell normally take 2 actions%r%r**Effect** You Cast the Spell, and increase its area. Add 5 feet to the radius of a burst that normally has a radius of at least 10 feet; add 5 feet to the length of a cone or line that is normally 15 feet long or smaller; or add 10 feet to the length of a larger cone or line.%r%r**Craft Requirements** Supply a casting of a spell of the appropriate rank. The spell must have a casting time of 1 action or 2 actions , can't have a duration, and must have an area of burst (10 feet or more), cone, or line."
  # Level 5 Magic Items
  Aeon Stone (Preserving):
    traits:
      - uncommon
      - invested
      - magical
    level: 5
    price: 15000
    bulk: 0
    shortdesc: "Over millennia, these mysterious, intricately cut gemstones have been hoarded by mystics and fanatics hoping to discover their secrets. Despite their myriad forms and functions, these stones are purportedly all fragments of crystal tools used by otherworldly entities to construct the universe in primeval times.%r%rWhen you invest one of these precisely shaped crystals, the stone orbits your head instead of being worn on your body. You can stow an *aeon stone* with an Interact action, and an orbiting stone can be snatched out of the air with a successful Disarm action against you. A stowed or removed stone remains invested, but its effects are suppressed until you return it to orbit your head again.%r%rThere are various types of *aeon stones*, each with a different appearance and magical effect. Each *aeon stone* also gains a resonant power when slotted into a special magical item called a *wayfinder*.%r%rThis red crystalline star covers you in a faint aura when you are subject to lingering wounds. You gain resistance 3 to persistent damage. At the end of any turn where the persistent damage can't overcome this resistance, end that condition.%r%rThe resonant power allows you to cast *stabilize* as a primal innate cantrip."
  Diplomat's Badge:
    traits:
      - invested
      - magical
    level: 5
    price: 12500
    bulk: 0
    bonus:
      Diplomacy: 1
    shortdesc: "When displayed prominently, this brass badge makes creatures find you more agreeable. You gain a +1 item bonus to Diplomacy checks.%r%r**Activate--Diplomat's Bearing** A (concentrate); **Frequency** once per day; **Effect** Attempt a DC 20 check to Recall Knowledge about people of a human ethnicity, a non-human ancestry, or some other type of creature. (The GM determines what your options are.) If you succeed, the badge's bonus increases to +2 for Diplomacy checks with creatures of that group for the rest of the day."
  Eternal Eruption:
    traits:
      - fire
      - magical
    level: 5
    price: 16000
    bulk: 0.1
    shortdesc: "Resembling *frozen lava*, an eternal eruption is made with the same type of time magic, but is built to loop through time, reforming itself after it's used. Determining the difference between the two requires a close examination to see a faint, repeating pattern of red runes.%r%r**Activate--Lava Bomb** 2 actions (concentrate, manipulate); **Effect** You fling the *eternal eruption*, with the effect of **frozen lava**. After 2d4 hours, the *eternal eruption* reforms itself in a container on your person, typically the one you most recently stored it in.%r%r*Eternal Eruption* deals 5d6 fire damage on a DC 21 basic Reflex save."
  Freezing Ammunition:
    traits:
      - cold
      - consumable
      - magical
    level: 5
    price: 2500
    bulk: 0
    shortdesc: "**Activate** 1 action (manipulate)%r%rThis chilly ammunition is dark blue and cold to the touch. When activated *freezing ammunition* hits a target, the target must succeed at a DC 19 Fortitude save or be slowed 1 for 1 round by the intense cold (slowed 1 for 1 minute on a critical failure)."
  Obsidian Goggles:
    traits:
      - invested
      - magical
    level: 5
    price: 15000
    bulk: 0
    shortdesc: "The sleek, black lenses of these goggles somehow make everything seem more brightly lit. While wearing the goggles, you gain a +1 item bonus to Perception checks involving sight.%r%r**Activate--Darkvision** 1 action (manipulate); **Frequency** once per day; **Effect** Adjusting your goggles, you gain darkvision for 1 hour."
  Pocket Stage:
    traits:
      - magical
      - structure
    level: 5
    price: 13800
    bulk: 0.1
    shortdesc: "This item appears to be a miniature replica of a theater. It includes a small pocket full of minute set dressing and costumed paper dolls.%r%r**Activate--Play with Dolls** (1 minute) (concentrate, manipulate); **Effect** You place the miniature theater on the ground, filling it with any set dressing and up to six figures you choose. Then, you tap a rhythm on the miniature, causing it to grow into a modest stage 20 feet wide and 15 feet deep. It's dressed with the decorations you selected, and simple mannequins wear the costumes you chose. A wooden proscenium arch frames the stage, and simple curtains along the sides conceal the wings. As a magical structure, the stage has the structure trait.%r%rAll the stage's set dressing is illusory and disappears if taken more than 20 feet from the stage. The costumes are physical but with illusory embellishments that fade at the same range, revealing only plain, white smocks."
  Skeleton Key:
    traits:
      - magical
    level: 5
    price: 12500
    bulk: 0
    shortdesc: "A grinning skull tops the bow of this macabre key. This key can be used in place of thieves' toolkit when attempting to Pick a Lock, and it grants a +1 item bonus to the Thievery check.%r%rIf the *skeleton key* becomes broken due to a critical failure on the check, it works as normal thieves' toolkit and loses its benefits until repaired.%r%r**Activate--Loosen Lock** Free Action (manipulate); **Frequency** once per day; **Trigger** You attempt to Pick a Lock but haven't rolled yet; **Effect** The key casts *knock* on the lock you're trying to pick."
  Spellstrike Ammunition (Type II):
    traits:
      - consumable
      - magical
    level: 5
    price: 3000
    bulk: 0
    shortdesc: "**Ammunition** any%r%r**Activate** 2 actions Cast a Spell%r%rMystic patterns create a magic reservoir within this ammunition. You activate *spellstrike ammunition* by Casting a Spell into the ammunition. The spell must be of a spell rank the ammunition can hold, and the spell must be able to target a creature other than the caster. A creature hit by activated *spellstrike ammunition* is targeted by the spell. If the creature isn't a valid target for the spell, the spell is lost.%r%rThe ammunition affects only the target hit, even if the spell would normally affect more than one target. If the spell requires a spell attack roll, use the result of your ranged attack roll with the ammunition to determine the degree of success of the spell. If the spell requires a saving throw, the target attempts the save against your spell DC. Combine the Strike and spell's damage for the purpose of resistances and weaknesses.%r%rThe maximum rank of spell the ammunition can hold determines its item level and Price.%r%rMaximum Spell Rank 2nd"
  Twisting Twine (Moderate):
    traits:
      - magical
    level: 5
    price: 12500
    bulk: 0.1
    shortdesc: "This ball of hempen twine resists efforts to unravel it by hand.%r%r**Activate--Unravel Twine** 1 action (manipulate); **Frequency** once per hour; **Effect** You toss the ball of twine into a square within 20 feet. The twine then unravels and animates, attempting to Disarm or Trip (your choice) a creature in the square with a total of +12 to the Athletics check. At the end of your turn, the twine winds itself back into a ball and returns to your hand; if you don't have a free hand, it returns to your space instead."
  Wand of Continuation (1st-Rank Spell):
    traits:
      - magical
      - wand
    level: 5
    price: 16000
    bulk: 0.1
    shortdesc: "This wand increases a spell's duration. Yellow embers spiral over its surface until the spell ends.%r%r**Activate** Cast a Spell; The activation takes 2 actions if the spell normally takes 1 action to cast, or 3 actions if the spell normally takes 2 actions%r%r**Effect** You Cast the Spell, and its duration is increased by half.%r%r**Craft Requirements** Supply a casting of a spell of the appropriate rank. The spell must have a casting time of 1 action or 2 actions and a duration no less than 10 minutes and no greater than 1 hour."
  # Level 6 Magic Items
  Aeon Stone (Sprouting):
    traits:
      - uncommon
      - invested
      - magical
    level: 6
    price: 22000
    bulk: 0
    shortdesc: "Over millennia, these mysterious, intricately cut gemstones have been hoarded by mystics and fanatics hoping to discover their secrets. Despite their myriad forms and functions, these stones are purportedly all fragments of crystal tools used by otherworldly entities to construct the universe in primeval times.%r%rWhen you invest one of these precisely shaped crystals, the stone orbits your head instead of being worn on your body. You can stow an *aeon stone* with an Interact action, and an orbiting stone can be snatched out of the air with a successful Disarm action against you. A stowed or removed stone remains invested, but its effects are suppressed until you return it to orbit your head again.%r%rThere are various types of *aeon stones*, each with a different appearance and magical effect. Each *aeon stone* also gains a resonant power when slotted into a special magical item called a *wayfinder*.%r%rEncouraging the natural growth of life, this green ovoid can often be found surrounded by new seedlings. Its resonant power allows you to cast *tangle vine* as a primal innate cantrip.%r%r**Activate--Flow of Life** Reaction (concentrate, vitality); **Frequency** once per hour; **Trigger** You are healed by a vitality effect or took void damage; **Effect** You gain 8 temporary Hit Points that last for 1 minute."
  Charm of Resistance:
    traits:
      - invested
      - magical
    level: 6
    price: 24500
    bulk: 0
    shortdesc: "This charm, normally hung from the belt or worn around the neck, grants you resistance 5 against one type of energy damage: acid, cold, electricity, fire, or sonic. Each charm is crafted to protect against a particular type of energy damage, and its design usually embodies the type of energy it protects the wearer from in some way. For instance, a *charm of cold resistance* could be carved in the shape of a yeti, whereas a *charm of fire resistance* would be made from volcanic glass."
  Choker of Elocution:
    traits:
      - invested
      - magical
    level: 6
    price: 20000
