    target: 1 enemy
    duration: 1 minute
    effect: A long, jagged needle jabs into the target foe's psyche whenever it tries to attack a creature your patron holds in special regard. Name yourself or one of your allies. The target takes 2 mental damage any time it uses a hostile action against the named creature, with a basic Will save.
    heighten: "**+1:** Increase the damage by 2."
  Never Mind:
    base_level: 6
    bloodline:
      - aberrant
    mystery:
      - lore
    traits:
      - concentrate
      - curse
      - incapacitation
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: varies
    effect: "You drastically reduce the target's mental faculties. The target must attempt a Will save. The effects of this curse can be removed only through effects that target curses.%r%r**Critical Success** The target is unaffected.%r**Success** The target is stupefied 2 for 1 round.%r**Failure** The target is stupefied 4 with an unlimited duration.%r**Critical Failure** The target's intellect is permanently reduced below that of an animal, and it treats its Charisma, Intelligence, and Wisdom modifiers as –5. It loses all class abilities that require mental faculties, including all spellcasting. If the target is a PC, they become an NPC under the GM's control."
  Nightmare:
    base_level: 4
    traits:
      - concentrate
      - illusion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 10 minutes
    range: planetary
    target: 1 creature you know by name
    duration: 1 day
    effect: "You send disturbing nightmares to your target. The next time the target falls asleep, it must attempt a Will save. If you know the target only by name and have never met them, the target gets a +4 circumstance bonus to the Will save.%r%r**Critical Success** The target suffers no adverse effects and is temporarily immune for 1 week.%r**Success** The target experiences the nightmares but suffers no adverse effects other than unpleasant memories.%r**Failure** The target experiences the nightmares and awakens fatigued.%r**Critical Failure** The target experiences the nightmares, awakens Fatigued, and is drained 2 until it is no longer Fatigued."
  Noise Blast:
    base_level: 2
    traits:
      - concentrate
      - manipulate
      - sonic
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    area: 10-foot burst
    range: 30 feet
    effect: "A cacophonous noise blasts out, dealing 2d10 sonic damage. Each creature must attempt a Fortitude save.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes half damage.%r**Failure** The creature takes full damage and is deafened for 1 round.%r**Critical Failure** The creature takes double damage, is deafened for 1 minute, and is stunned 1."
    heighten: "**+1:** The damage increases by 1d10."
  Noxious Vapors:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - poison
    tradition:
      - arcane
      - primal
    actions: 2
    area: 10-foot emanation
    duration: 1 round
    effect: You emit a cloud of toxic smoke that temporarily obscures you from sight. Each creature except you in the area when you Cast the Spell takes 1d6 poison damage (basic Fortitude save). A creature that critically fails the saving throw also becomes sickened 1. All creatures in the area become concealed, and all creatures outside the smoke become concealed to creatures within it. This smoke can be dispersed by a strong wind.
    heighten: "**+1:** The damage increases by 1d6"
  Nudge Fate:
    base_level: 1
    traits:
      - cantrip
      - concentrate
      - hex
      - witch
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "The barest spin of your patron's spool is enough to alter fate. When the target fails an attack roll, skill check, or saving throw and a +1 status bonus would turn a critical failure into a failure, or failure into a success, you grant the target a +1 status bonus to the check retroactively, changing the outcome appropriately. The spell then ends.%r%rIf you cast nudge fate while a previous casting of this hex is still in effect, the previous effect ends"
  Oaken Resilience:
    base_level: 2
    traits:
      - concentrate
      - manipulate
      - plant
      - wood
    tradition:
      - arcane
      - primal
    actions: 2
    range: touch
    target: 1 willing creature
    duration: 10 minutes
    effect: The target's skin becomes tough, with a consistency like bark or wood. The target gains resistance 2 to bludgeoning and piercing damage and weakness 3 to fire. After the target takes fire damage, it can Dismiss the spell as a free action triggered by taking the damage; doing so doesn't reduce the fire damage the target was dealt.
    heighten: "**+2:** The resistances increase by 2, and the weakness increases by 3."
  Object Reading:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - occult
    actions: 2
    range: touch
    target: 1 object
    effect: You place a hand on an object to learn a piece of information about an emotional event that occurred involving the object within the past week, determined by the GM. If you cast *object reading* on the same item multiple times, you can either concentrate on a single event to gain additional pieces of information about that event, or you can gain a piece of information about another emotional event in the applicable time frame.
    heighten: "**2nd:** You can learn about an event that occurred within the last month.%r**4th:** You can learn about an event that occurred within the last year.%r**6th:** You can learn about an event that occurred within the last decade.%r**8th:** You can learn about an event that occurred within the last century.%r**9th:** You can learn about an event that occurred within the entirety of the object's history."
  Ode to Ouroboros:
    base_level: 5
    traits:
      - bard
      - composition
      - concentrate
      - focus
      - uncommon
    actions: reaction
    range: 60 feet
    target: the triggering creature
    trigger: A creature's dying condition would reach the value at which they would die
    effect: "Your ode staves off death. The target's dying condition remains 1 below the value at which it dies. This doesn't help prevent death from effects that kill the target without increasing its dying condition, such as *disintegrate* and death effects."
  One with Plants:
    base_level: 2
    traits:
      - concentrate
      - manipulate
      - plant
      - polymorph
      - wood
    tradition:
      - primal
    actions: 2
    duration: 10 minutes or 8 hours
    effect: You can either transform into a plant or merge with plant matter. While transformed, you can't move or affect anything outside the plant, but you can cast spells as long as they don't require line of effect beyond the plant. You can Dismiss this spell.
  One with Stone:
    base_level: 3
    traits:
      - concentrate
      - earth
      - manipulate
      - polymorph
    tradition:
      - arcane
      - primal
    actions: 2
    duration: 10 minutes or 8 hours
    effect: You can either transform into a stone or merge with stone. While transformed, you can't move or affect anything outside the stone, but you can cast spells as long as they don't require line of effect beyond the stone. You can Dismiss this spell.
  Outcast's Curse:
    base_level: 4
    bloodline:
      - hag
    traits:
      - concentrate
      - curse
      - manipulate
      - mental
      - misfortune
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    range: touch
    target: 1 creature
    effect: "You afflict the target with a curse that makes its presence abrasive and off-putting. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** For 10 minutes, the target must roll twice and use the worse result whenever attempting a Deception, Diplomacy, Intimidation, or Performance check, and creatures they encounter have an initial attitude toward them of one step worse (for instance, unfriendly instead of indifferent).%r%r**Failure** As success, but the effect is permanent.%r%r**Critical Failure** As failure, and creatures that the target encounters have an initial attitude toward them of two steps worse."
  Overstuff:
    base_level: 1
    traits:
      - cleric
      - concentrate
      - focus
      - manipulate
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 living creature
    effect: "Huge amounts of food and drink fill the target. It receives a full meal's worth of nourishment and must attempt a Fortitude save. A target sickened by this spell takes a –10-foot status penalty to its Speed until it's no longer Sickened.%r%r**Critical Success** The target is unaffected.%r**Success** The target is sickened 1, but if it spends an action to end the condition, it succeeds automatically.%r**Failure** The target is sickened 1.%r**Critical Failure** The target is sickened 2."
  Overwhelming Presence:
    base_level: 9
    bloodline:
      - draconic
    traits:
      - auditory
      - concentrate
      - incapacitation
      - manipulate
      - mental
      - visual
    tradition:
      - divine
      - occult
    actions: 2
    area: 40-foot burst
    target: any number of creatures
    duration: until full tribute is paid
    effect: "You surround yourself with supernatural splendor, appearing to be a god or similarly majestic being, with an appearance, regalia, and iconography of your choice. Targets must attempt a Will save. Regardless of the outcome, the target is then temporarily immune for 1 minute.%r%r**Critical Success** The target is unaffected.%r**Success** The target must pay tribute to you two times. Paying tribute requires that the target spend a single action, which has either the move trait (as they bow) or manipulate trait (as they offer up a token in their hands). They must pay tribute at least once on each of their turns, if possible. While affected, the target is Fascinated by you and can't use hostile actions against you.%r**Failure** As success, but the target must pay tribute a total of six times.%r**Critical Failure** As failure, but the target must spend all its actions paying tribute, and they cannot take other actions until the tribute is fully paid."
