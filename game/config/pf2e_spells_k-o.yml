---
pf2e_spells:
  Knock:
    base_level: 2
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 door, lock, or container
    duration: 1 minute
    effect: "You make the target easier to open. Knock grants a +4 status bonus to any creature that tries to open the target door, lock, or container with an Athletics or a Thievery check. You can attempt a Thievery check to open the target as part of casting knock, and you add your level even if you're untrained.%r%r*Knock* counteracts *lock*."
  Know the Enemy:
    base_level: 4
    traits:
      - cleric
      - focus
      - fortune
      - manipulate
      - uncommon
    actions: reaction
    trigger: You roll initiative and can see a creature, you succeed at an attack roll against a creature, or a creature fails a saving throw against one of your spells
    effect: "You quickly remind yourself of useful information. Use a Recall Knowledge action, rolling the appropriate skill check to identify the triggering creature's abilities. You can roll your check twice and use the better result."
  Know the Way:
    base_level: 1
    traits:
      - cantrip
      - concentrate
      - detection
      - manipulate
    tradition:
      - divine
      - occult
      - primal
    actions: 2
    effect: In your mind's eye, you magically reorient yourself. You immediately know which direction is north (if it exists at your current location), and you can choose a location you were at within the last 24 hours and learn what direction it lies.
    heighten: "**3rd:** You can choose a location you were at within the last week.%r**7th:** You can choose a location you were at regardless of how long ago you were there."
  Laughing Fit:
    base_level: 2
    bloodline:
      - fey
    traits:
      - concentrate
      - emotion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 living creature
    effect: "The target is overtaken with uncontrollable laughter. It must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target is plagued with uncontrollable laughter. It can't use reactions.%r**Failure** The target is slowed 1 and can't use reactions.%r**Critical Failure** The target falls prone and can't use actions or reactions for 1 round. It then takes the effects of a failure."
  Lay on Hands:
    base_level: 1
    traits:
      - champion
      - focus
      - healing
      - manipulate
      - vitality
      - uncommon
    actions: 1
    range: touch
    target: 1 willing living creature or 1 undead creature
    effect: Your hands become infused with powerful vitality, capable of healing a living creature or damaging an undead creature with a touch.
    heighten: "**+1:** The amount of healing increases by 6, and the damage to an undead target increases by 1d6."
  Leaden Steps:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - metal
      - morph
    tradition:
      - arcane
      - primal
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You partially transform a foe's feet into unwieldy slabs of metal, slowing their steps. The target attempts a Fortitude saving throw.%r%r**Critical Success** The target is unaffected.%r**Success** The target is encumbered and has weakness 2 to electricity until the end of your next turn. The spell can't be sustained.%r**Failure** The target is encumbered and has weakness 2 to electricity.%r**Critical Failure** The target is encumbered and has weakness 3 to electricity."
    heighten: "**+1:** The weakness increases by 1."
  Levitate:
    base_level: 3
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 2
    range: touch
    target: 1 unattended object or willing creature
    duration: 5 minutes
    effect: You defy gravity and levitate the target 5 feet off the ground. You can Sustain the spell to move the target up or down 10 feet. A creature floating in the air from levitate takes a –2 circumstance penalty to attack rolls. A floating creature can spend an Interact action to stabilize itself and negate this penalty for the remainder of its turn. If the target is adjacent to a fixed object or terrain of suitable stability, it can move across the surface by climbing (if the surface is vertical, like a wall) or crawling (if the surface is horizontal, such as a ceiling). The GM determines which surfaces can be climbed or crawled across.
  Life Boost:
    base_level: 1
    traits:
      - focus
      - healing
      - hex
      - manipulate
      - vitality
      - witch
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 creature
    duration: 4 rounds
    effect: Life force from your patron floods into the target, ensuring they can continue doing your patron's will for just a little longer. The target gains fast healing 2.
    heighten: "**+1:** The fast healing increases by 2."
  Life Link:
    base_level: 1
    mystery:
      - life
    traits:
      - focus
      - healing
      - manipulate
      - oracle
      - vitality
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 creature other than you
    duration: 1 minute
    effect: "You forge a connection of life energy between you and your target, distributing harm between both of you. When you first Cast the Spell, the target recovers 1d4 Hit Points.%r%rThe first time each round that the target takes damage, reduce the damage it takes by 3 (to a minimum of 0 damage). You lose 3 Hit Points each time, or the total damage dealt, if less than 3; this damage ignores any immunities or resistances you have and can't otherwise be mitigated in any way.%r%rThe spell ends immediately if you fall unconscious. You can Dismiss the spell."
    heighten: "**3rd:** You can target 2 creatures other than you. The initial healing increases to 3d4 Hit Points and the maximum damage reduced and Hit Points lost increases to 5.%r**6th:** You can target 3 creatures other than you. The initial healing increases to 6d4 Hit Points and the maximum damage reduced and Hit Points lost increases to 10.%r**9th:** You can target 4 creatures other than you. The initial healing increases to 9d4 Hit Points and the maximum damage reduced and Hit Points lost increases to 15."
  Life-Giving Form:
    base_level: 6
    mystery:
      - life
    traits:
      - concentrate
      - focus
      - healing
      - light
      - manipulate
      - oracle
      - vitality
      - uncommon
    actions: 2
    duration: 1 minute
    effect: You transcend your physical form, becoming a beacon of healing energy. Your body exudes bright light like a torch. You gain resistance 5 to precision damage and weakness 5 to void damage, and your unarmed Strikes deal an extra 1d4 vitality damage. You can touch a living creature with an Interact action to restore 6d8 Hit Points to it, and when a creature touches you with an Interact action you can allow it to gain the same healing; either way, the creature becomes temporarily immune to life-giving form's healing for 1 minute. This is a vitality healing effect. You can't heal yourself with life-giving form. A creature harmed by vitality damage (such as an undead) that touches you or damages you with an unarmed attack or non-reach melee weapon instead takes 3d4 vitality damage, and it doesn't become temporarily immune. You can Dismiss this spell.
    heighten: "**+1:** The Hit Points restored with an Interact action increases by 1d8, the vitality damage increases by 1, and the resistance and weakness increases by 1."
  Lifewood Cage:
    base_level: 7
    traits:
      - concentrate
      - manipulate
      - vitality
      - wood
    tradition:
      - arcane
      - primal
    actions: 3
    area: 20-foot cube
    range: 30 feet; 1 cube 20 feet on each side
    duration: 1 minute
    effect: "You create an immobile, invisible prison of hardened wood suffused with vital energy from the Forge of Creation. The cage is a 20-foot cube made of wooden branches, each a half inch thick and a half inch apart. Each creature in the area where you create the cage must attempt a Reflex save. If such a creature fails, it becomes trapped inside the cage. If it succeeds, it's pushed outside the cage into a space of its choice. If a creature in the area is too big to fit inside the prison, the spell automatically fails.%r%rThe cage has AC 10, Hardness 20, and 40 Hit Points, and it's immune to critical hits and precision damage, though it has weakness 5 to void damage. A creature capable of passing through the space between the bars (typically a Tiny creature) can leave; all others are confined within. The vitality energy suffusing the wood prevents incorporeal undead creatures from passing through the beams. Attacks with a weapon too large to fit between the bars can't pass through the cage, and the bars provide standard cover even against attacks that can pass through the gaps. Spells and most area effects (such as dragon breath) can pass through the cage uninhibited."
  Light:
    base_level: 1
    bloodline:
      - angelic
    mystery:
      - cosmos
    traits:
      - cantrip
      - concentrate
      - light
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: 120 feet
    duration: until your next daily preparations
    effect: "You create an orb of light that sheds bright light in a 20-foot radius (and dim light for the next 20 feet) in a color you choose. If you create the light in the same space as a willing creature, you can attach the light to the creature, causing it to float near that creature as it moves. You can Sustain the spell to move the light up to 60 feet; you can attach or detach it from a creature as part of this movement.%r%rYou can Dismiss the spell. If you Cast the Spell while you already have four *light* spells active, you must choose one of the existing spells to end."
    heighten: "**4th:** The orb sheds light in a 60-foot radius (and dim light for the next 60 feet)."
  Lightning Bolt:
    base_level: 3
    traits:
      - concentrate
      - electricity
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    area: 120-foot line
    effect: A bolt of lightning strikes outward from your hand, dealing 4d12 electricity damage.
    heighten: "**+1:** The damage increases by 1d12."
  Lightning Storm:
    base_level: 5
    traits:
      - concentrate
      - electricity
      - manipulate
    tradition:
      - primal
    actions: 3
    area: 20-foot burst
    range: 120 feet
    duration: 1 minute
    effect: You create a black, rumbling storm cloud and call down one lightning bolt within the spell's area. The bolt is a vertical line from the top of the storm cloud to the ground below, dealing 4d12 electricity damage to creatures in the line (basic Reflex save). On subsequent rounds, the first time you Sustain the Spell each round, you can call another lightning bolt within the area. If you Cast this Spell outdoors, you can create two non-overlapping clouds instead of one, though you can still call down only one bolt per turn.
    heighten: "**+2:** The damage of each bolt increases by 1d12."
  Liminal Doorway:
    base_level: 4
    traits:
      - concentrate
      - extradimensional
      - manipulate
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 10 minutes
    range: touch
    duration: 8 hours
    effect: "You draw a chalk doorway on an unbroken surface, which opens into an extradimensional space. Any creature treating the drawing as an actual door can Interact to touch the doorknob and pass through. The warped, chalk-drawn room beyond the door is 20 feet in width, depth, and height. The space is unadorned and empty, with chalk lines indicating the corners of the walls.%r%rIf the drawing is scrubbed away, the underlying surface is broken, or a creature attempts to enter the space that would put it over capacity, the space begins to collapse. The space ejects one creature at random each round, depositing it on the nearest open ground, until all creatures are returned outside."
  Lingering Composition:
    base_level: 1
    traits:
      - bard
      - concentrate
      - focus
      - spellshape
      - uncommon
    actions: free
    effect: "You add a flourish to your composition to extend its benefits. If your next action is to cast a cantrip composition with a duration of 1 round, attempt a Performance check. The DC is usually a standard-difficulty DC of a level equal to the highest-level target of your composition, but the GM can assign a different DC based on the circumstances. The effect depends on the result of your check.%r%r**Critical Success** The composition lasts 4 rounds.%r**Success** The composition lasts 3 rounds.%r**Failure** The composition lasts 1 round, but you don't spend the Focus Point for casting this spell."
  Live Wire:
    base_level: 1
    traits:
      - attack
      - cantrip
      - concentrate
      - electricity
      - manipulate
      - metal
    tradition:
      - arcane
      - primal
    actions: 2
    range: 30 feet
    target: 1 creature
    effect: "You conjure up a length of sharp copper filament humming with electrical current that strikes out at your foe. The wire deals 1d4 slashing damage and 1d4 electricity damage, depending on your spell attack roll against the target's AC.%r%r**Critical Success** The target takes double damage and 1d4 persistent electricity damage.%r**Success** The target takes full damage.%r**Failure** The target takes the electricity damage, but not the slashing damage.%r**Critical Failure** The target is unaffected."
    heighten: "**+2:** The slashing damage, initial electricity damage, and persistent electricity damage on a critical hit each increase by 1d4."
  Localized Quake:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - earth
      - focus
      - manipulate
      - uncommon
    actions: 2
    effect: You shake the earth, toppling nearby creatures. Choose whether the spell's area is a 15-foot emanation or a 15-foot cone when you cast it. Each creature in the area standing on solid ground takes 4d6 bludgeoning damage with a basic Reflex saving throw. A creature that fails its save also falls prone.
    heighten: "**+1:** Increase the damage by 2d6."
  Locate:
    base_level: 3
    traits:
      - concentrate
      - detection
      - manipulate
      - uncommon
    tradition:
      - arcane
      - divine
      - occult
    actions: 10 minutes
    range: 500 feet
    target: 1 specific object or type of object
    effect: You learn the direction to the target (if you picked a specific object, such as "my mother's sword") or the nearest target (if you picked a type of object, such as "swords"). If the target is a specific object, you must have observed it directly with your own senses. If it's a type of object, you still need to have an accurate mental image of the type of object. If there's lead or running water between you and the target, this spell can't locate the object. This means you might find a type of object farther away if the nearest one is behind lead or running water.
    heighten: "**5th:** You can target a specific creature or ancestry instead of an object, but you must have met or seen up close the creature or ancestry you want to target."
  Lock:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    range: touch
    target: 1 lock, or a door or container with a latch
    duration: until your next daily preparations
    effect: The target's latch mechanism clinks shut, held fast by unseen magical wards. When you magically lock a target, you set an Athletics and Thievery DC to open it equal to your spell DC or the base lock DC with a +4 status bonus, whichever is higher. Any key or combination that once opened a lock affected by this spell does not do so for the duration of the spell, though the key or combination does grant a +4 circumstance bonus to checks to open the door. If the target is opened, the spell ends. Assuming the target is not barred or locked in some additional way, you can unlock and open it with an Interact action during which you touch the target. This does not end the spell. You can Dismiss this spell at any time and from any distance.
    heighten: "**2nd:** The duration is unlimited, but you must expend 6 gp worth of precious metals as an additional cost."
  Loremaster's Etude:
    base_level: 1
    traits:
      - bard
      - composition
      - focus
      - fortune
      - manipulate
      - uncommon
    actions: free
    range: 30 feet
    target: you or the triggering ally
    trigger: You or an ally within range attempts a skill check to Recall Knowledge
    effect: "You call upon your muse's deep mysteries, granting the target a greater ability to think and recall information. Roll the triggering Recall Knowledge skill check twice and use the higher result."
  Lucky Break:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - focus
      - fortune
      - uncommon
    actions: reaction
    trigger: You fail, but don't critically fail, a saving throw
    effect: "Reroll the saving throw and use the better result. You then become temporarily immune for 10 minutes."
  Mad Monkeys:
    base_level: 3
    traits:
      - concentrate
      - manipulate
    tradition:
      - primal
    actions: 2
    area: 5-foot burst
    range: 30 feet
    duration: 1 minute
    effect: "Magical monkey spirits fill the area as they pile and climb on top of one another. Because the monkeys are magical spirits, they can't be attacked or hurt. Casting *calm* or a similar effect over the monkeys makes them docile, causing them to cease making mischief for the duration of *mad monkeys*.%r%rChoose the kind of mischief your monkeys make when you Cast the Spell. They produce the effect listed for that mischief when you Cast the Spell and the first time each round when you Sustain the Spell. The first time each round when you Sustain the Spell, you can move the area of the monkeys by 5 feet.%r%r**Flagrant Burglary** The monkeys try to Steal any one item from one creature in the area. Use your spell DC - 10 as the monkeys' Thievery modifier. Their attempt relies more on distraction than subtlety, so the victim knows what item the monkeys were trying to take and whether it was taken. Getting a stolen item from the monkeys-even for the caster-requires Stealing it from them or Disarming them, using your spell DC. When the spell ends, any stolen items fall to the ground in any square of the spell's area you choose.%r%r**Raucous Din** The monkeys screech loudly, potentially deafening creatures in the spell's area. Each creature in the spell's area must attempt a Fortitude save.%r%r**Critical Success** The creature is unaffected and is temporarily immune for 10 minutes.%r**Success** The creature is unaffected.%r**Failure** The creature is deafened for 1 round.%r**Critical Failure** The creature is Deafened for 1 minute.%r%r**Tumultuous Gymnastics** The monkeys jump and climb all over creatures in the spell's area, interfering with complex movements. Each creature in the spell's area must attempt a Reflex save.%r%r**Critical Success** The creature is unaffected and is temporarily immune for 10 minutes.%r**Success** The creature is unaffected.%r**Failure** For 1 round, the creature must succeed at a DC 5 flat check whenever it attempts a manipulate action. If it fails this check, the creature loses that action.%r**Critical Failure** As failure, but the monkeys cling to the creature tenaciously, and the effect lasts until the spell ends, even if the creature leaves the spell's area."
  Magic Hide:
    base_level: 1
    traits:
      - focus
      - manipulate
      - ranger
      - uncommon
    actions: 1
    range: 30 feet
    target: your animal companion
    duration: 1 minute
    effect: Your animal companion grows a thicker hide, matted fur, or a harder shell, granting it a +1 status bonus to AC.
  Magic Passage:
    base_level: 5
    traits:
      - concentrate
      - earth
      - manipulate
      - uncommon
    tradition:
      - arcane
      - primal
    actions: 2
    range: touch
    duration: 1 hour
    effect: You create a visible tunnel through the wall in the chosen area, replacing the area with empty space. If the wall is thicker than 10 feet, the tunnel ends 10 feet in. Even a small layer of metal in the wall prevents this spell from functioning. This spell doesn't reduce the integrity of the structure. When the spell ends, anyone inside the tunnel is shunted to the nearest exit.
    heighten: "**7th:** The tunnel can be up to 20 feet deep. The areas of the wall that contain your tunnel's entrance appear completely normal (unless viewed with truesight or a similar effect), despite the tunnel's existence. The tunnel's entrance functions as a solid wall, but you can specify a password or a trigger, allowing creatures to enter freely."
  Magic's Vessel:
    base_level: 1
    traits:
      - cleric
      - focus
      - manipulate
      - uncommon
    actions: 1
    range: touch
    target: 1 creature
    duration: 1 minute
    effect: A creature becomes a divine receptacle for pure magical energy. The target gains a +1 status bonus to saving throws. Each time you Cast a Spell from your spell slots, you automatically Sustain this spell and grant its target resistance to damage from spells equal to the spell's rank, until the start of your next turn.
  Malicious Shadow:
    base_level: 3
    traits:
      - attack
      - concentrate
      - focus
      - hex
      - manipulate
      - shadow
      - witch
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "Your patron warps the target's shadow into a deadly form, such as strangling hands, a dangerous weapon, harrying runes, or the like. The shadow moves along with the target, always remaining within reach. When you Cast the Spell, and each time you Sustain it, the shadow Strikes the target. The shadow's Strikes are melee spell attacks that deal 2d10 damage. You choose the type of damage (bludgeoning, piercing, or slashing) when you Cast the Spell. The shadow uses and contributes to your multiple attack penalty. The shadow doesn't take up space, grant flanking, or have any other attributes a creature would. The shadow can't make any attacks other than its Strike.%r%rThe shadow vanishes if the target ceases to cast a shadow (usually if it moves into complete darkness or light). If another effect is controlling the target's shadow when you cast *malicious shadow*, you can attempt to counteract that effect to temporarily take control of the shadow for *malicious shadow*'s duration."
    heighten: "**+2:** The Strike damage increases by 1d10."
  Malignant Sustenance:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - focus
      - manipulate
      - void
      - uncommon
    actions: 2
    range: touch
    target: 1 willing undead creature
    duration: 1 minute
    effect: You embed a seed of void energy in an undead creature, restoring its unnatural vigor. The target gains fast healing 7.
    heighten: "**+1:** The fast healing increases by 2."
  Manifestation:
    base_level: 10
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 3
    effect: You spin secrets from the fundaments of magic, shaping them into a power with nearly unlimited potential. You duplicate a spell of 9th rank or lower of the tradition from which you cast *manifestation*, or a spell of 7th rank or lower from any tradition. Though you can normally choose only spells that are common or to which you have access, the GM might allow broader options.
  Mariner's Curse:
    base_level: 5
    bloodline:
      - hag
    traits:
      - concentrate
      - curse
      - manipulate
    tradition:
      - arcane
      - occult
      - primal
    actions: 2
    range: touch
    target: 1 creature
    effect: "You afflict the target with the curse of the roiling, unforgiving sea. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target becomes sickened 1. Reducing its sickened condition to 0 ends the curse.%r**Failure** The target becomes sickened 1 and can't reduce its sickened condition below 1 while the curse remains. The curse can be lifted by 4th-rank *cleanse affliction* or similar magic. Whenever the target is sickened and on the water at least a mile from shore, it is also slowed 1.%r**Critical Failure** As failure, but the target becomes sickened 2."
  Marvelous Mount:
    base_level: 2
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 10 minutes
    range: 30 feet
    target: one creature
    duration: 8 hours
    effect: You conjure a Large fantastical creature to serve as a mount for the target. The mount is the target's minion, has a Speed of 40 feet, and can bear the target with any carried possessions. It can't carry any other creature. The mount uses the target's AC and saves, but it's destroyed if it takes more than 10 damage at one time, ending the spell.
    heighten: "**3rd:** The mount can walk on water, but it must end its turn on solid ground or sink.%r**4th:** The mount has a Speed of 60 feet and can walk on water.%r**5th:** The mount has a Speed of 60 feet and can walk on water. It also has a fly Speed of 60 feet, but it must end its turn on a surface or fall.%r**6th:** The mount has a Speed and fly Speed of 80 feet."
  Mask of Terror:
    base_level: 7
    bloodline:
      - draconic
    traits:
      - concentrate
      - emotion
      - fear
      - illusion
      - manipulate
      - mental
      - visual
    tradition:
      - arcane
      - occult
      - primal
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "The target appears to be a gruesome and terrifying creature. The effect is unique to each observer, so a human viewing the target might see a demon with bloody fangs, but a demon observing the target might see a glowing angelic visage.%r%rWhen any creature attempts a hostile action against the target, the creature must attempt a Will save. It is then temporarily immune until the end of its next turn.%r%r**Success** The creature is unaffected.%r**Failure** The creature becomes frightened 2 before using its action.%r**Critical Failure** The creature becomes frightened 2, and its action fails and is wasted."
    heighten: "**8th:** You can target up to 5 creatures. If a creature uses a hostile action or reaction that affects multiple targets simultaneously, it needs to attempt only one save against *mask of terror*."
  Massacre:
    base_level: 9
    traits:
      - concentrate
      - death
      - manipulate
      - void
    tradition:
      - arcane
      - divine
      - primal
    actions: 2
    area: 60-foot line
    effect: "You unleash a wave of death to snuff out the life force of those in its path. Each living creature of 17th level or lower in the line must attempt a Fortitude save. If the damage from *massacre* reduces a creature to 0 Hit Points, that creature dies instantly. If *massacre* doesn't kill even a single creature, the void energy hungrily turns backward toward you, dealing an additional 30 void damage to every living creature in the line (even those above 17th level) and 30 void damage to you.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes 9d6 void damage.%r**Failure** The creature takes 100 void damage.%r**Critical Failure** The creature dies."
    heighten: "**10th:** The spell can affect living creatures up to 19th level. Increase the damage to 10d6 on a success, and to 115 on a failure."
  Medusa's Wrath:
    base_level: 8
    traits:
      - concentrate
      - focus
      - manipulate
      - monk
      - uncommon
    actions: 2
    effect: "You make an attack filled with a medusa's petrifying power. Make an unarmed Strike with the following additional effects.%r%r**Critical Success** The target is slowed 2 and must attempt a Fortitude save at the end of each of its turns; this ongoing save has the incapacitation trait. On a failed save, the slowed condition increases by 1 (2 on a critical failure). A successful save reduces the slowed condition by 1. When a creature is unable to act due to the slowed condition from medusa's wrath, it is petrified permanently. The spell ends if the creature is petrified or the slowed condition is removed.%r**Success** As critical success, but the target is initially slowed 1"
  Mending:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 10 minutes
    range: touch
    target: non-magical object of light Bulk or less
    effect: You repair the target item. You restore 5 Hit Points per spell rank to the target, potentially removing the broken condition if this repairs it past the item's Broken Threshold. You can't replace lost pieces or repair an object that's been completely destroyed.
    heighten: "**2nd:** You can target a non-magical object of 1 Bulk or less.%r**3rd:** You can target a non-magical object of 2 Bulk or less, or a magical object of 1 Bulk or less."
  Message:
    base_level: 1
    traits:
      - auditory
      - cantrip
      - concentrate
      - illusion
      - linguistic
      - mental
      - subtle
    tradition:
      - arcane
      - divine
      - occult
    actions: 1
    range: 120 feet
    target: 1 creature
    duration: see below
    effect: You mouth words quietly, but instead of coming out of your mouth, they're transferred directly to the ears of the target. While others can't hear your words any better than if you normally mouthed them, the target can hear your words as if they were standing next to you. The target can give a brief response as a reaction, or as a free action on their next turn if they wish, but they must be able to see you and be within range to do so. If they respond, their response is delivered directly to your ear, just like the original message.
    heighten: "**3rd:** The spell's range increases to 500 feet."
  Metamorphosis:
    base_level: 9
    bloodline:
      - fey
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - arcane
      - primal
    actions: 2
    duration: 1 minute
    effect: "Harnessing your mastery of transformative magic, you hide forms within forms. You transform yourself into any form you could choose with a polymorph spell in your spell repertoire or that you could prepare of 8th-rank or lower (including any 8th-rank or lower heightened versions of spells you know). You gain 40 temporary Hit Points rather than the amount normally granted by the form.%r%rYou can Sustain the spell to enter a new form you haven't used during this *metamorphosis*. This replenishes your temporary Hit Points from this spell."
  Migration:
    base_level: 8
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - primal
    actions: 10 minutes
    range: 20 feet
    target: you and up to 5 willing creatures
    duration: 8 hours
    effect: "The targets naturally take on animal forms most fitting their movement and environment. Each target gains a land, burrow, climb, fly, and swim Speed of 40 feet, and can transform into a Tiny or Small animal most appropriate for a given movement and environment. It also gains immunity to mild, severe, and extreme cold and heat, along with any other immunities common to the local wildlife, at the GM's discretion. In exploration mode, a target can move much faster, at a travel Speed of 20 miles per hour.%r%rA target can't Strike, cast spells, or use most manipulate actions in animal form, but it can resume its normal shape by Sustaining the spell. It can Sustain the spell again to resume animal form."
  Mind Probe:
    base_level: 5
    traits:
      - concentrate
      - linguistic
      - manipulate
      - mental
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 1 minute
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You cast your thoughts through a creature's mind, sifting for information. You access the target's memories and knowledge unless it fends you off with a Will save.%r%r**Success** The target is unaffected.%r**Failure** Each round of the spell's duration, you can Sustain the spell to ask a different question and attempt to uncover the answer. For each question, the target can attempt a Deception check against your spell DC; if the target succeeds, you don't learn the answer, and on a critical success, the target gives you a false answer that you believe is truthful Once you've asked the target a given question, asking it again, even with a separate casting of mind probe, produces the same result.%r**Critical Failure** As failure, and the target takes a –4 circumstance penalty to Deception checks against your questions."
  Mind Reading:
    base_level: 3
    traits:
      - concentrate
      - detection
      - manipulate
      - mental
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 round or sustained up to 1 minute
    effect: "With a cursory mental touch, you attempt to read the target's mind. It must attempt a Will save. The target then becomes temporarily immune to your mind reading for 1 hour.%r%r**Critical Success** The target perceives vague surface thoughts from you when you Cast the Spell.%r**Success** You find out whether the target's Intelligence modifier is higher than, equal to, or lower than yours.%r**Failure** You perceive vague surface thoughts from the target when you Cast the Spell, and you find out whether its Intelligence is higher than, equal to, or lower than yours.%r**Critical Failure** As failure, and for the duration of the spell, you can Sustain the spell to detect the target's surface thoughts again. The target doesn't receive any additional saves."
  Mindlink:
    base_level: 1
    mystery:
      - lore
    traits:
      - concentrate
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: touch
    target: 1 willing creature
    effect: You link your mind to the target's mind and mentally impart to that target an amount of information in an instant that could otherwise be communicated in 10 minutes.
  Mirage:
    base_level: 4
    traits:
      - concentrate
      - illusion
      - manipulate
      - uncommon
    tradition:
      - arcane
      - occult
      - primal
    actions: 10 minutes
    area: 50-foot burst
    range: 500 feet
    duration: until your next daily preparations
    effect: "You create an illusion that causes natural terrain to look, sound, feel, and smell like a different kind of terrain. This doesn't disguise any structures or creatures in the area.%r%rAny creature that touches the illusion or uses the Seek action to examine it can attempt to disbelieve your illusion."
    heighten: "**5th:** Your image can also disguise structures or create illusory structures (but still doesn't disguise creatures)."
  Mislead:
    base_level: 6
    bloodline:
      - fey
    traits:
      - concentrate
      - illusion
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 2
    duration: 1 minute
    effect: "You turn yourself invisible and create an illusory duplicate of yourself. When you Sustain the spell, you can mentally dictate a course of action for your duplicate to follow that round. Your duplicate acts as though it had your full number of actions, though it can't actually affect anything in the environment. Both the duplicate and your invisibility persist for the spell's duration. Performing a hostile action doesn't end *mislead*'s invisibility, just like a 4th-rank *invisibility* spell. A creature that determines the duplicate is an illusion doesn't necessarily know you're invisible, and one that can see your invisible form doesn't necessarily know your duplicate is an illusion.%r%rIf you Cast a Spell, attack, or otherwise interact with another creature, as a part of that action you can attempt a Deception check against observers' Perception DCs to convince them your duplicate used that action. This doesn't fool anyone who's aware your duplicate is an illusion, nor does it work if the attack obviously couldn't have come from the duplicate. For instance, if you fired a ray, you could make it look like it came from the duplicate as long as the duplicate was positioned appropriately, but if you attacked with a sword and your duplicate was across the room from the target, your Deception check would automatically fail."
  Mist:
    base_level: 2
    traits:
      - concentrate
      - manipulate
      - water
    tradition:
      - arcane
      - primal
    actions: 3
    area: 20-foot burst
    range: 120 feet
    duration: 1 minute
    effect: You call forth a cloud of mist. All creatures within the mist become concealed, and all creatures outside the mist become concealed to creatures within it. You can Dismiss the cloud.
  Moment of Renewal:
    base_level: 8
    bloodline:
      - angelic
    traits:
      - concentrate
      - healing
      - manipulate
    tradition:
      - divine
      - primal
    actions: 2
    range: touch
    target: up to 6 creatures
    effect: The targets experience a day's worth of recovery in an instant. Any detrimental effects that would be gone after 24 hours end, though this doesn't shorten the duration of any active spells affecting the targets. The targets regain Hit Points and recover from conditions as if they had taken 24 hours of rest, but they do not make their daily preparations again or gain any benefits of rest other than healing. The targets are then temporarily immune for 1 day.
  Monstrosity Form:
    base_level: 8
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - arcane
      - primal
    actions: 2
    duration: 1 minute
    effect: "You transform into the shape of a legendary monster, assuming a Huge battle form. You must have enough space to expand into or the spell is lost. When you cast this spell, choose phoenix, cave worm, or sea serpent. While in this form, you gain the beast trait (for phoenix) or the animal trait (for cave worm or sea serpent). You can Dismiss the spell.%r%rYou gain the following statistics and abilities regardless of which battle form you choose:%r%rYou also gain specific abilities based on the type of monster you choose:%r%r**Cave Worm**%r%r**Phoenix**%r%r**Sea Serpent**"
    heighten: "**9th:** You instead gain AC = 22 + your level, 25 temporary HP, attack modifier +31, increase damage by one damage die, and Athletics +33."
  Moon Frenzy:
    base_level: 5
    mystery:
      - cosmos
    traits:
      - concentrate
      - manipulate
      - morph
    tradition:
      - primal
    actions: 2
    range: 30 feet
    target: up to 5 willing creatures
    duration: 1 minute
    effect: "A feral aspect overcomes the targets, filling them with strength and ferocity. Targets gain 5 temporary Hit Points, a +10-foot status bonus to their Speeds, and weakness 5 to silver. They also grow vicious fangs and claws, which are unarmed attacks. The fangs deal 2d8 piercing damage; the claws deal 2d6 slashing damage and have the agile and finesse traits. The targets use their highest weapon or unarmed attack proficiency with these attacks, and if they have weapon specialization or greater weapon specialization, they add this damage as well. On a critical hit with one of these unarmed attacks, the creature struck takes 1d4 persistent bleed damage.%r%rThe targets can't use concentrate actions unless those actions also have the rage trait, with the exception of Seek. A creature can attempt to end the spell's effect on itself by using a single action, which has the rage trait, to attempt a Will save against your spell DC; on a success, it ends the spell's effect on itself.%r%rIf a target is in the light of a full moon, it also grows by one size if it were Medium or smaller. This increases the reach of a Medium or Tiny creature by 5 feet."
    heighten: "**6th:** The temporary Hit Points increase to 10, the silver weakness to 10, and the damage dealt by the attacks to three dice.%r**10th:** The temporary Hit Points increase to 20, the silver weakness to 20, and the damage dealt by the attacks to four dice."
  Moonbeam:
    base_level: 1
    traits:
      - attack
      - cleric
      - concentrate
      - fire
      - focus
      - light
      - manipulate
      - uncommon
    actions: 2
    range: 120 feet
    target: 1 creature
    effect: "You shine a ray of moonlight. Make a spell attack roll. The beam of light deals 2d6 fire damage. This is silver damage for the purposes of weaknesses, resistances, and the like.%r%r**Critical Success** The beam deals double damage, and the target is dazzled for 1 minute.%r**Success** The beam deals full damage, and the target is Dazzled for 1 round."
    heighten: "**+1:** The ray's damage increases by 1d6."
  Moonlight Bridge:
    base_level: 6
    traits:
      - concentrate
      - focus
      - light
      - manipulate
      - oracle
      - uncommon
    actions: 2
    range: 30 feet
    duration: 10 minutes
    effect: "You summon a bridge of radiant, shimmering moonlight.%r%rThe 10-foot-wide span must start at the ground on a point within range, and it extends as a horizontal plane, either in a straight line or at any angle up to 45 degrees upward or downward, for up to 120 feet.%r%rThis bridge has AC 10, Hardness 30, and 60 Hit Points, and it's immune to all damage (except force, spirit, and damage from Strikes with the *ghost touch* property rune). You and your allies can cross the bridge normally, but other creatures simply pass through it if they try to do so. The bridge blocks physical, ethereal, and incorporeal attacks from crossing, whether from above or below.%r%rYou can Dismiss the spell."
    heighten: "**+1:** The length of the bridge increases by 20 feet, and its Hit Points increase by 20, and you can increase the width of the span by up to an additional 5 feet."
  Mountain Resilience:
    base_level: 4
    traits:
      - concentrate
      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    range: touch
    target: 1 creature
    duration: 20 minutes
    effect: The target's skin hardens like the stone of a mountain face. It gains resistance 5 to physical damage, except adamantine. Each time the target is hit by a bludgeoning, piercing, or slashing attack, *mountain resilience*'s duration decreases by 1 minute.
    heighten: "**6th:** The resistance increases to 10.%r**8th:** The resistance increases to 15.%r**10th:** The resistance increases to 20."
  Mud Pit:
    base_level: 1
    traits:
      - concentrate
      - earth
      - manipulate
      - water
    tradition:
      - arcane
      - primal
    actions: 3
    area: 15-foot burst
    range: 60 feet
    duration: 1 minute
    effect: Thick, clinging mud covers the ground, 1 foot deep. The mud is difficult terrain.
  Mystic Armor:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    duration: until your next daily preparations
    effect: You ward yourself with shimmering magical energy, gaining a +1 item bonus to AC and a maximum Dexterity modifier of +5. While wearing *mystic armor*, you use your unarmored proficiency to calculate your AC.
    heighten: "**4th:** You gain a +1 item bonus to saving throws.%r**6th:** The item bonus to AC increases to +2, and you gain a +1 item bonus to saving throws.%r**8th:** The item bonus to AC increases to +2, and you gain a +2 item bonus to saving throws.%r**10th:** The item bonus to AC increases to +3, and you gain a +3 item bonus to saving throws."
  Mystic Beacon:
    base_level: 4
    traits:
      - cleric
      - focus
      - manipulate
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 willing creature
    duration: until the start of your next turn
    effect: The next damaging or healing spell the target casts before the start of your next turn deals damage or restores Hit Points as if the spell were heightened 1 rank higher than its actual rank. This applies only to initial healing or damage when the spell is cast, not any ongoing effects. The spell otherwise functions at its actual rank. Once the target casts the spell, *mystic beacon* ends.
  Nature Incarnate:
    base_level: 10
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - primal
    actions: 2
    duration: 1 minute
    effect: "The primal power of the world flows through you. You transform into an incarnation of nature, either a green man or a kaiju. Your battle form is Medium for a green man or Gargantuan (30-foot-by-30-foot space) for a kaiju. While in this form, you gain the plant trait (for a green man) or the beast trait (for a kaiju). You can Dismiss the spell. You gain the following statistics and abilities regardless of which battle form you choose:%r%rYou gain specific abilities based on the incarnation you choose:"
  Nature's Bounty:
    base_level: 4
    traits:
      - cleric
      - focus
      - manipulate
      - plant
      - vitality
      - uncommon
    actions: 1
    effect: A palm-sized raw fruit or vegetable of your choice appears in your open hand. A creature can consume the food with an Interact action to regain 3d10+12 Hit Points and be nourished as if it had eaten a meal. If uneaten, the food crumbles to dust after 1 minute.
    heighten: "**+1:** The Hit Points restored increase by 6."
  Nature's Enmity:
    base_level: 9
    traits:
      - concentrate
      - manipulate
      - plant
      - wood
    tradition:
      - primal
    actions: 2
    area: 500-foot burst
    range: 120 feet
    target: up to 5 creatures
    duration: 10 minutes
    effect: "Animals, plants, and fungi in the area turn against the targets. Each target suffers from the following effects as long as it remains in the area.%r%rThe target loses any connection to nature or natural creatures. The target must succeed at a DC 5 flat check when casting any primal spell or the spell fails. Furthermore, animal, fungus, and plant creatures become hostile to it, even one with a strong bond to the target, such as an animal companion.%r%rThe GM might decide that you can't subject some creatures, such as an emissary of a nature deity, to the ire of nature."
  Nature's Pathway:
    base_level: 5
    traits:
      - concentrate
      - manipulate
      - mental
      - plant
      - teleportation
      - uncommon
    tradition:
      - primal
    actions: 1 minute
    effect: You step into a living tree with a trunk big enough for you to fit inside it and instantly teleport to any tree within 5 miles that also has a sufficiently large trunk. Once you enter the first tree, you instantly know the rough locations of other sufficiently large trees within range and can exit from the original tree, if you prefer. You can't carry extradimensional spaces with you; if you attempt to do so, the spell fails.
    heighten: "**6th:** The tree you exit can be up to 50 miles away.%r**8th:** The tree you exit can be up to 500 miles away.%r**9th:** The tree you exit can be anywhere on the same planet."
  Needle of Vengeance:
    base_level: 1
    traits:
      - focus
      - hex
      - manipulate
      - mental
      - witch
      - uncommon
    actions: 1
