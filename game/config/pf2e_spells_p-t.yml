---
pf2e_spells:
  Paralyze:
    base_level: 3
    traits:
      - concentrate
      - incapacitation
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: varies
    effect: "You block the target's motor impulses before they can leave its mind, threatening to freeze the target in place. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target is stunned 1.%r**Failure** The target is paralyzed for 1 round.%r**Critical Failure** The target is Paralyzed for 4 rounds. At the end of each of its turns, it can attempt a new Will save to reduce the remaining duration by 1 round, or end it entirely on a critical success."
    heighten: "**7th:** You can target up to 10 creatures."
  Paranoia:
    base_level: 2
    traits:
      - concentrate
      - illusion
      - manipulate
      - mental
    tradition:
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You cause the target to see all other creatures as dire threats. The target is stricken by intense paranoia toward all creatures around it and must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target believes everyone it sees is a potential threat. It becomes unfriendly to all creatures to which it wasn't already hostile, even those that were previously allies. It treats no one as an ally. The spell ends after 1 round.%r**Failure** As success, but the effect lasts 1 minute.%r**Critical Failure** As failure, except the target believes that everyone it sees is a mortal enemy. It uses its reactions and free actions against everyone, regardless of whether they were previously its allies, as determined by the GM. It otherwise acts as rationally as it normally does and likely prefers to attack creatures that are actively attacking or hindering it over those leaving it alone."
    heighten: "**6th:** You can target up to 5 creatures."
  Patron's Puppet:
    base_level: 1
    traits:
      - focus
      - hex
      - witch
      - uncommon
    actions: free
    trigger: Your turn begins
    effect: "At your unspoken plea, your patron temporarily assumes control over your familiar. You Command your familiar, allowing it to take its normal actions this turn. Your Command does not have the auditory or concentrate traits; your patron simply moves its agent directly."
  Peaceful Bubble:
    base_level: 4
    traits:
      - concentrate
      - manipulate
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 10 minutes
    area: 100-foot burst
    range: touch
    duration: 24 hours
    effect: "An opaque shell of drifting, iridescent runes covers the area, creating a bubble. You can choose to make the burst smaller, in 10-foot increments. The runes don't block travel, but those inside the bubble can't perceive those outside it and vice versa. Detection and scrying effects are likewise blocked.%r%rCreatures sleeping within the bubble are immune to dreams sent by spells. Those sleeping 8 hours reduce their doomed condition by 2 instead of 1."
  Peaceful Rest:
    base_level: 2
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: touch
    target: 1 corpse
    duration: until the next time you make your daily preparations
    effect: The targeted corpse doesn't decay, nor can it be transformed into an undead. If the corpse is subject to a spell that requires the corpse to have died within a certain amount of time (for example, *raise dead*), do not count the duration of *peaceful rest* against that time. This spell also prevents ordinary bugs and pests (such as maggots) from consuming the body.
    heighten: "**5th:** The spell's duration is unlimited, but the spell takes one more action to cast and requires a cost (embalming fluid worth 6 gp)."
  Perfected Body:
    base_level: 4
    traits:
      - cleric
      - focus
      - manipulate
      - uncommon
    actions: reaction
    trigger: You fail or critically fail a saving throw against an effect that has the morph, poison, or polymorph trait, or that would make you clumsy, doomed, enfeebled, petrified, or sickened
    effect: "Your body's perfection keeps you just a little bit healthier than most. You get a failure if you rolled a critical failure or a success if you rolled a failure."
  Perfected Mind:
    base_level: 1
    traits:
      - cleric
      - concentrate
      - focus
      - uncommon
    actions: 1
    effect: You meditate upon perfection to remove all distractions from your mind. Attempt a new Will save against one mental effect currently affecting you that required a Will save. Use the result of this new save to determine the outcome of the mental effect, unless the new save would have a worse result than the original save, in which case nothing happens. You can use *perfected mind* against a given effect only once.
  Personal Blizzard:
    base_level: 3
    traits:
      - cold
      - focus
      - hex
      - witch
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "Your patron's breath becomes blizzard of obscuring, scouring ice that follows your target. The target attempts a Fortitude save.%r%r**Critical Success** The target is unaffected.%r**Success** The target takes 1d6 cold damage, and the spell ends.%r**Failure** The target takes 1d6 cold damage and 1d6 persistent cold damage. The persistent damage automatically ends when the spell ends. It is concealed to other creatures, and other creatures are concealed to it.%r**Critical Failure** As failure, but both the cold damage and the persistent cold damage increase to 2d6."
    heighten: "**+1:** The cold damage and persistent cold damage increase by 1 (2 on a critical failure)."
  Pest Form:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - arcane
      - primal
    actions: 2
    duration: 10 minutes
    effect: "You transform into the battle form of a Tiny animal, such as a cat, insect, lizard, or rat. You can decide the specific type of animal (such as a rat or praying mantis), but this has no effect on the form's Size or statistics. While in this form, you gain the animal trait and you can't make Strikes. You can Dismiss the spell.%r%rYou gain the following statistics and abilities:"
    heighten: "**4th:** You can turn into a flying creature, such as a bird, which grants you a fly Speed of 20 feet."
  Pet Cache:
    base_level: 1
    traits:
      - extradimensional
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 1
    range: touch
    target: 1 willing creature that is your companion
    duration: 8 hours
    effect: "You open your cloak or create a gap with your hands, drawing the target into a pocket dimension just large enough for its basic comfort. No other creature can enter this extradimensional space, and the target can bring along objects only if they were designed to be worn by a creature of its kind. The space has enough air, food, and water to sustain the target for the duration.%r%rYou can Dismiss the spell. The spell also ends if you die or enter an extradimensional space. When the spell ends, the target reappears in the nearest unoccupied space (outside of any extradimensional space you may have entered)."
  Petrify:
    base_level: 6
    traits:
      - concentrate
      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    range: 120 feet
    target: 1 creature made of organic material
    duration: varies
    effect: "The target's body slowly turns into a stone statue. The target must attempt a Fortitude save.%r%r**Critical Success** The target is unaffected.%r**Success** The target is slowed 1 for 1 round as stone begins to form on their body.%r**Failure** The target is slowed 1 and must attempt a Fortitude save at the end of each of its turns; this ongoing save has the incapacitation trait. On a failed save, the slowed condition increases by 1 (or 2 on a critical failure) as stone growths creep across their body. A successful save reduces the slowed condition by 1. When a creature becomes fully unable to act due to the slowed condition from *petrify*, the spell then ends in a flash of gray light, leaving the target petrified permanently as they become a statue. The spell also ends if the slowed condition is removed, which causes the stone to break off harmlessly.%r**Critical Failure** As failure, but the target is initially slowed 2."
  Phantasmagoria:
    base_level: 9
    bloodline:
      - hag
    traits:
      - concentrate
      - death
      - illusion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 120 feet
    target: any number of creatures
    effect: "You fill the targets' minds with endless images, like countless dreams and lives colliding with each other. The onrushing information deals 16d6 mental damage to each target, depending on its Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target takes half damage and can't use reactions until the start of your next turn.%r**Failure** The target takes full damage and is confused until the start of your next turn.%r**Critical Failure** The target takes double damage and is confused for 1 minute."
  Phantasmal Calamity:
    base_level: 6
    traits:
      - concentrate
      - illusion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    area: 30-foot burst
    range: 500 feet
    effect: A vision of apocalyptic destruction fills the mind of each creature in the area. The vision deals 11d6 mental damage (basic Will save). On a critical failure, the creature must also succeed at a Reflex save or believe it's trapped (stuck in a fissure, adrift at sea, or some other fate in keeping with its vision). If it fails the second save, it's also stunned for 1 minute. It can attempt a new Will save at the end of each of its turns, and on a success, it disbelieves the illusion and recovers from the stunned condition.
    heighten: "**+1:** The damage increases by 2d6."
  Phantasmal Minion:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - summon
    tradition:
      - arcane
      - occult
    actions: 3
    range: 60 feet
    effect: You summon a phantasmal minion. (See Archives of Nethys for the phantasmal minion statblock.) The minion is roughly the shape of a humanoid. You can choose to have it be invisible or have an ephemeral appearance, but it's obviously a magical effect, not a real creature.
  Phantasmal Treasure:
    base_level: 2
    traits:
      - concentrate
      - emotion
      - illusion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 60 feet
    target: 1 living creature
    duration: varies
    effect: "A phantasmal image of the most precious thing imaginable to the target appears in a location of your choice within the spell's range. Only the spell's target can see the treasure, though you can see the vague shape of the treasure-be it a pile of items, a deific avatar, or a cherished loved one or hero. The target's response to the treasure is based on the outcome of the target's Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target becomes Fascinated with the treasure, and the duration is until the end of its turn. The target can also try to disbelieve the illusion if it touches the treasure, Seeks to examine it, or speaks to it if the illusion appears to be a person or the like. If the target disbelieves the illusion, the spell ends.%r**Failure** As success, but the duration is 1 minute.%r**Critical Failure** As success, but the duration is 1 minute. The target finds the treasure so appealing that until the spell ends, it must spend each action focused on it. This can include moving toward the treasure if the target isn't next to it, and Interacting with the treasure if the target is next to it. (If the illusion appears to be a person or the like, the target can also Interact to converse with it.)"
  Phantom Pain:
    base_level: 1
    bloodline:
      - aberrant
    traits:
      - concentrate
      - illusion
      - manipulate
      - mental
      - nonlethal
    tradition:
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "Illusory pain wracks the target, dealing 2d4 mental damage and 1d4 persistent mental damage. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target takes full initial damage but no persistent damage, and the spell ends immediately.%r**Failure** The target takes full initial and persistent damage, and the target is sickened 1. If the target recovers from being Sickened, the persistent damage ends and the spell ends.%r**Critical Failure** As failure, but the target is sickened 2."
    heighten: "**+1:** The damage increases by 2d4 and the persistent damage by 1d4."
  Phase Familiar:
    base_level: 1
    traits:
      - focus
      - hex
      - manipulate
      - witch
      - uncommon
    actions: reaction
    range: 60 feet
    target: your familiar
    trigger: Your familiar would take damage
    effect: "Your patron momentarily recalls your familiar to the ether, shifting it from its solid, physical form into a ghostly version of itself. Against the triggering damage, your familiar gains resistance 5 to all damage and is immune to precision damage."
    heighten: "**+1:** Increase the resistance by 2."
  Pied Piping:
    base_level: 10
    traits:
      - bard
      - composition
      - concentrate
      - focus
      - incapacitation
      - mental
      - sonic
      - uncommon
    actions: 2
    duration: 1 minute
    effect: "Your performance enraptures listeners, compelling them to follow you. Each creature within the emanation must attempt a Will save when you Cast the Spell or the first time they enter the area, after which they become temporarily immune for 1 day. Once per turn, you can Sustain the composition to increase the emanation's radius by 5 feet. You can Dismiss the spell.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature is Fascinated with you.%r**Failure** The creature is fascinated by you and uses all its actions to move toward you and compliment your performance. This effect ends if a hostile action is used against the affected creature.%r**Critical Failure** The target gains the minion trait and is controlled by you. This effect ends if a hostile action is used against the affected creature, or if you direct the creature to use any action that causes it harm."
  Pinpoint:
    base_level: 8
    traits:
      - concentrate
      - detection
      - manipulate
      - uncommon
    tradition:
      - arcane
      - divine
      - occult
    actions: 10 minutes
    range: unlimited
    target: 1 creature or object
    effect: You learn the name of the target's exact location (including the building, community, and country) and plane of existence. You can target a creature only if you've seen it in person, have one of its significant belongings, or have a piece of its body, such as a lock of hair. To target an object, you must have touched it or have a fragment of it. *Pinpoint* automatically overcomes protections against detection of lower rank than this spell, even if they would normally have a chance to block it.
  Planar Palace:
    base_level: 7
    traits:
      - concentrate
      - extradimensional
      - manipulate
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 1 minute
    range: 30 feet
    duration: until the next time you make your daily preparations
    effect: "You grow an extradimensional demiplane consisting of a spacious dwelling with a single entrance. The entrance connects to the plane where you Cast the Spell, appearing anywhere within the spell's range as a faint, shimmering, vertical rectangle 5 feet wide and 10 feet high. You designate who can enter when you Cast the Spell. Once inside, you can shut the entrance, making it invisible. You and the creatures you designated can reopen the door at will.%r%rInside, the demiplane appears to be a mansion featuring a magnificent foyer and numerous opulent chambers. The mansion can have any floor plan you imagine as you Cast the Spell, provided it fits within a space 40 feet wide, 40 feet deep, and 30 feet tall. While the entrance to the mansion is closed, effects from outside the mansion fail to penetrate it, and vice versa, except for *interplanar teleport*, which can be used to enter the mansion. You can use scrying magic and similar effects to observe the outside only if they're capable of crossing planes.%r%rA staff of up to 24 servants attends to anyone within the mansion. These are like the servant created by the *phantasmal minion* spell, though they're visible, with an appearance you determine during casting. The mansion is stocked with enough food to serve a nine-course banquet to 150 people."
  Planar Seal:
    base_level: 7
    traits:
      - concentrate
      - manipulate
      - uncommon
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    area: 60-foot burst
    range: 120 feet
    duration: until your next daily preparations
    effect: You create a visible magical barrier that attempts to counteract teleportation effects and planar travel into or out of the area, including items that allow access to extradimensional spaces. *Planar seal* tries to counteract any attempt to summon a creature into the area but doesn't stop the creature from departing when the summoning ends.
  Planar Tether:
    base_level: 4
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: varies
    effect: "You stitch the target to its current plane. While the target is affected by *planar tether*, the spell attempts to counteract any teleportation effect that would move the target, or any effect that would transport it to a different plane. *Planar tether*'s duration is determined by the target's Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The effect's duration is 1 minute.%r**Failure** The effect's duration is 10 minutes.%r**Critical Failure** The effect's duration is 1 hour."
  Plant Form:
    base_level: 5
    traits:
      - concentrate
      - manipulate
      - plant
      - polymorph
      - wood
    tradition:
      - primal
    actions: 2
    duration: 1 minute
    effect: "Taking inspiration from verdant creatures, you transform into a Large plant battle form. When you Cast this Spell, choose a listed battle form. You can substitute a similar specific plant to turn into (such as a pitcher plant instead of a flytrap), but this has no effect on the form's Size or statistics. While in this form, you gain the plant trait. You can Dismiss the spell.%r%rYou gain the following statistics and abilities regardless of which battle form you choose:%r%rYou also gain specific abilities based on the type of plant you choose:"
    heighten: "**6th:** Your battle form is Huge, and the reach of your attacks increases by 5 feet. You instead gain AC = 22 + your level, 24 temporary HP, attack modifier +21, damage bonus +16, and Athletics +22."
  Possession:
    base_level: 7
    traits:
      - concentrate
      - incapacitation
      - manipulate
      - mental
      - possession
      - uncommon
    tradition:
      - occult
    actions: 2
    range: 30 feet
    target: 1 living creature
    duration: 1 minute
    effect: "You send your mind and soul into the target's body, attempting to take control. The target must attempt a Will save. If you want to exert less control over the target, you can choose to use the effects of any degree of success more favorable to the target.%r%rWhile you're possessing a target, your own body is unconscious and can't wake up normally. You can sense everything the possessed target does. You can Dismiss this spell. If the possessed body dies, the spell ends and you must succeed at a Fortitude save against your spell DC or be paralyzed for 1 hour, or 24 hours on a critical failure. If the spell ends during an encounter, you act just before the possessed creature's initiative.%r%r**Critical Success** The target is unaffected.%r**Success** You possess the target but can't control it. You ride along in the body while the spell lasts.%r**Failure** You possess the target and take partial control of it. You no longer have a separate turn; instead, you might control the target. At the start of each of the target's turns, it attempts another Will save. If it fails, it's controlled by you on that turn; if it succeeds, it chooses its own actions; and if it critically succeeds, it forces you out and the spell ends.%r**Critical Failure** You possess the target fully, and it can only watch as you manipulate it like a puppet. The target is controlled by you."
    heighten: "**9th:** The duration is 10 minutes, and you can physically enter the creature's body, protecting your physical body while the spell lasts."
  Precious Metals:
    base_level: 4
    traits:
      - cleric
      - focus
      - manipulate
      - metal
      - uncommon
    actions: 1
    range: touch
    target: 1 metal shield or weapon, 1 suit of metal armor, or up to 1 Bulk of metal material (such as coins or metal-tipped ammunition)
    duration: 1 minute
    effect: "Your deity blesses base metals to transform them into precious materials. The metal in the target transforms from its normal metal into cold iron, copper, gold, iron, silver, or steel. If the spell's rank is 8th or higher, add adamantine and dawnsilver to the options. If you transform an object into copper, gold, or silver, its Hardness is reduced to 1. Otherwise, its Hardness is increased to 10 if it was lower. An item transmuted in this way deals damage according to its new material. For example, a steel sword transmuted to cold iron would deal additional damage to a creature with a weakness to cold iron. It can have other effects of the new material at the GM's discretion.%r%rThis change is clearly magical and temporary, so the item's monetary value doesn't change; you couldn't transmute copper coins to gold and use them to purchase something."
    heighten: "**+1:** If you increase the Hardness of the object, the new Hardness is 2 higher."
  Prestidigitation:
    base_level: 1
    traits:
      - cantrip
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: 10 feet
    target: 1 object (cook, lift, or tidy only)
    effect: "The simplest magic does your bidding. You can perform simple magical effects for as long as you Sustain the spell. Each time you Sustain the spell, you can choose one of four options.%r%r*Prestidigitation* can't deal damage or cause adverse conditions. Any actual change to an object (beyond what is noted above) persists only as long as you Sustain the spell."
  Primal Herd:
    base_level: 10
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - primal
    actions: 2
    range: 30 feet
    target: you and up to 5 willing targets
    duration: 1 minute
    effect: "Summoning the power of the natural world, you transform the targets into a herd of mammoths, and they each assume a Huge battle form. Each target must have enough space to expand into or the spell fails for that target. Each target gains the animal trait. Each target can Dismiss the spell's effects on itself. Each target gains the following while transformed.%r%rAC = 22 + the target's level. Ignore any armor check penalty and Speed reduction.%r%r20 temporary Hit Points.%r%rSpeed 40 feet.%r%rLow-light vision.%r%rThe following unarmed melee attacks, which are the only attacks the target can use to Strike. When Striking with these attacks, the target uses their attack modifier with the proficiency and item bonuses of their most favorable weapon or unarmed Strike, and the damage is listed for each attack. These attacks are Strength based (for the purpose of the enfeebled condition, for example).%r%rAthletics modifier of +30, unless the target's own modifier is higher.%r%rEach target can use the Trample action."
  Primal Summons:
    base_level: 6
    traits:
      - concentrate
      - druid
      - focus
      - uncommon
    actions: free
    effect: You enhance a summoned creature with the power of the elements. If your next action is to cast either *summon animal* or *summon plant or fungus*, choose air, earth, fire, metal, water or wood; the creature you summon gains the corresponding abilities.
  Project Image:
    base_level: 7
    traits:
      - concentrate
      - illusion
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    duration: 1 minute
    effect: You project an illusory image of yourself. You must stay within range of the image, and if at any point you can't see the image, the spell ends. Whenever you Cast a Spell other than one whose area is an emanation, you can cause the spell effect to originate from either yourself or the image. Because the image is an illusion, it can't benefit from spells, though visual manifestations of the spell appear. The image has the same AC and saves as you. If it is hit by an attack or fails a save, the spell ends.
    heighten: "**+2:** The maximum duration you can Sustain the spell increases to 10 minutes."
  Protection:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - divine
      - occult
    actions: 2
    range: touch
    target: 1 willing creature
    duration: 1 minute
    effect: You ward a creature against harm. The target gains a +1 status bonus to Armor Class and saving throws.
    heighten: "**3rd:** You can choose to have the benefits also affect all your allies in a 10-ft emanation around the target."
  Protective Wards:
    base_level: 1
    traits:
      - aura
      - focus
      - manipulate
      - wizard
      - uncommon
    actions: 1
    area: 5-foot emanation
    duration: 1 minute
    effect: You expand a ring of glyphs that shields your allies. You and any allies in the area gain a +1 status bonus to AC. Each time you Sustain the spell, the emanation's radius increases by 5 feet, to a maximum of 30 feet.
  Protector Tree:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - plant
      - wood
    tradition:
      - primal
    actions: 2
    range: 30 feet
    duration: 1 minute
    effect: A Medium tree suddenly grows in an unoccupied square within range. The tree has AC 10 and 10 Hit Points. Whenever an ally adjacent to the tree is hit by a Strike, the tree interposes its branches and takes the damage first. Any additional damage beyond what it takes to reduce the tree to 0 Hit Points is dealt to the original target. The tree isn't large enough to impede movement through its square. If the tree is in soil and survives to the end of the spell's duration, it remains as an ordinary, non-magical tree and continues to grow and thrive. The GM might determine that the tree disappears immediately in certain inhospitable situations.
    heighten: "**+1:** The tree has an additional 10 Hit Points."
  Protector's Sacrifice:
    base_level: 1
    traits:
      - cleric
      - focus
      - manipulate
      - uncommon
    actions: reaction
    range: 30 feet
    trigger: An ally within 30 feet takes damage
    effect: "You protect your ally by suffering in their stead. Reduce the damage the triggering ally would take by 3. You redirect this damage to yourself, but your immunities, weaknesses, resistances and so on do not apply.%r%rYou aren't subject to any conditions or other effects of whatever damaged your ally (such as poison from a venomous bite). Your ally is still subject to those effects even if you redirect all of the triggering damage to yourself."
    heighten: "**+1:** The damage you redirect increases by 3."
  Protector's Sphere:
    base_level: 4
    traits:
      - aura
      - cleric
      - concentrate
      - focus
      - manipulate
      - uncommon
    actions: 2
    area: 15-foot emanation
    duration: 1 minute
    effect: A protective aura emanates out from you, safeguarding you and your allies. You gain resistance 3 to all damage. Your allies also gain this resistance while in the area.
    heighten: "**+1:** The resistance increases by 1."
  Puff of Poison:
    base_level: 1
    traits:
      - cantrip
      - concentrate
      - manipulate
      - poison
    tradition:
      - arcane
      - primal
    actions: 2
    range: 10 feet
    target: 1 creature
    effect: "You exhale a shimmering cloud of toxic breath at an enemy's face. The target takes 1d4 poison damage and 1d4 persistent poison damage, depending on its Fortitude save.%r%r**Critical Success** The creature is unaffected.%r**Success** The target takes half initial damage and no persistent damage.%r**Failure** The target takes full initial and persistent damage.%r**Critical Failure** The target takes double initial and persistent damage."
    heighten: "**+2:** The initial poison damage increases by 1d4, and the persistent poison damage increases by 1d4."
  Pulse of Civilization:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - focus
      - manipulate
      - scrying
      - uncommon
    actions: 2
    range: 25 miles
    duration: 8 hours
    effect: You tap into the zeitgeist of any settlements in range. You learn the names of the settlements. On all Lore checks to Recall Knowledge about those settlements or to Gather Information in or about those settlements, you gain a +2 status bonus and use your level as your proficiency bonus even if you're untrained. When you Cast the Spell, you can immediately Recall Knowledge about one of the settlements using its Lore skill (such as Absalom Lore), which benefits from the bonus. If you cast pulse of civilization again, any previous casting ends.
    heighten: "**5th:** The range is 100 miles.%r**7th:** The range is 500 miles and the bonus is +3"
  Pummeling Rubble:
    base_level: 1
    traits:
      - concentrate
      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    area: 15-foot cone
    effect: "A spray of heavy rocks flies through the air in front of you. The rubble deals 2d4 bludgeoning damage to each creature in the area. Each creature must attempt a Reflex save.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes half damage.%r**Failure** The creature takes full damage and is pushed 5 feet away from you.%r**Critical Failure** The creature takes double damage and is pushed 10 feet away from you."
    heighten: "**+1:** Increase the damage by 2d4."
  Punishing Winds:
    base_level: 8
    traits:
      - air
      - concentrate
      - manipulate
    tradition:
      - primal
    actions: 3
    area: 30-foot cylinder
    range: 100 feet
    duration: 1 minute
    effect: "**Area** (continued) 30-foot-radius, 100-foot-tall cylinder%r%rViolent winds and a powerful downdraft fill the area, forming a cyclone. All flying creatures in the area descend 40 feet. The entire area is greater difficult terrain for Flying creatures, and difficult terrain for creatures on the ground or Climbing. Any creature that ends its turn Flying within the area descends 20 feet. Any creature pushed into a surface by this spell's winds takes bludgeoning damage as though it had fallen.%r%rThe squares at the outside vertical edges of the cylinder prevent creatures from leaving. These squares are greater difficult terrain, and a creature attempting to push through must succeed at an Athletics check or Acrobatics check to Maneuver in Flight against your spell DC to get through. A creature that fails ends its current action but can try again."
  Pushing Gust:
    base_level: 1
    traits:
      - air
      - cleric
      - concentrate
      - focus
      - manipulate
      - uncommon
    actions: 2
    range: 500 feet
    target: 1 creature
    effect: "Giving the air a push, you buffet the target with a powerful gust of wind; it must attempt a Fortitude save.%r%r**Critical Success** The target is unaffected.%r**Success** The target is pushed 5 feet away from you.%r**Failure** The target is pushed 10 feet away from you.%r**Critical Failure** The target is pushed 10 feet away from you and knocked prone."
  Qi Blast:
    base_level: 3
    traits:
      - concentrate
      - focus
      - force
      - manipulate
      - monk
      - uncommon
    actions: 1 to 3
    area: 15-foot cone
    effect: "You unleash your qi as a powerful blast that deals 2d6 force damage. If you use 2 actions to cast *qi blast*, increase the size of the cone to 30 feet and the damage to 3d6. If you use 3 actions to cast *qi blast*, increase the cone to 60 feet and the damage to 4d6. Each creature in the area must attempt a Fortitude save.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes half damage.%r**Failure** The creature takes full damage and is pushed 5 feet.%r**Critical Failure** The creature takes double damage and is pushed 10 feet."
    heighten: "**+1:** The damage increases by 1d6, or by 2d6 if you use 2 or 3 actions."
  Qi Form:
    base_level: 9
    traits:
      - concentrate
      - focus
      - monk
      - polymorph
      - uncommon
    actions: 1
    duration: 1 minute
    effect: "Drawing from deep wells of spiritual power, you take on a special qi form. In your qi form, your hair, feathers, skin, or scales change color and begin to glow.%r%rIn this form, you gain a fly Speed equal to your land Speed. Choose force, spirit, vitality, or void damage. All your Strikes deal 1d6 additional damage of the chosen type.%r%rYour entire body is also surrounded by a glowing corona of the same color as your inner qi; this is a light effect. Your corona is an aura in a 5-foot emanation that deals 2d6 damage of the chosen type to creatures who start their turn within the emanation. If the emanation overlaps with a darkness effect, the corona's glow attempts to counteract the darkness. Regardless of the outcome, the corona can't attempt to counteract that effect again for 1 day. You can Sustain to flare your corona out to become a 30-foot emanation or return the corona to a 5-foot emanation.%r%rIn your qi form, your emotions surge to the forefront, and it's difficult to moderate your attacks. Your weapons and unarmed attacks lose the nonlethal trait. You take a –2 status penalty to saves against emotion effects but gain a +2 status bonus to saves against all other mental effects."
  Qi Rush:
    base_level: 1
    traits:
      - concentrate
      - focus
      - monk
      - uncommon
    actions: 1
    effect: "Accelerated by your qi, you move with such speed you become a blur. Move two times: two Strides, two Steps, or one Stride and one Step (in either order).%r%rYou gain the concealed condition during this movement and until the start of your next turn."
  Quandary:
    base_level: 8
    bloodline:
      - hag
      - imperial
    traits:
      - concentrate
      - extradimensional
      - manipulate
      - teleportation
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    effect: "You transport the target into an extraplanar puzzle room of mysterious origin, locking them there. Once each turn as a single action, the target can attempt an Occultism check, Perception check, or Thievery check against your spell DC to solve the puzzle. Teleportation effects can't carry the target outside the puzzle room unless they can also traverse the planes, such as *interplanar teleport*. When the spell ends, the target returns to the space it occupied when it was banished, or to the nearest space if the original is now filled.%r%r**Critical Success** The target solves the puzzle and escapes.%r**Success** The target is on the right path to the solution. If it was already on the right path, it solves the puzzle and escapes.%r**Failure** The target makes no progress toward a solution.%r**Critical Failure** The target makes no progress and, if it was on the right path, it no longer is."
  Raise Dead:
    base_level: 6
    traits:
      - concentrate
      - healing
      - manipulate
      - uncommon
    tradition:
      - divine
    actions: 10 minutes
    range: 10 feet
    target: 1 dead creature of 13th level or lower
    effect: "You attempt to call forth the dead creature's soul, requiring the creature's body to be present and relatively intact. The creature must have died within the past 3 days. If Pharasma has decided that the creature's time has come (at the GM's discretion), or if the creature doesn't wish to return to life, this spell automatically fails, but the cost isn't consumed in the casting.%r%rIf the spell is successful, the creature returns to life with 1 Hit Point, no spells prepared or spell slots available, no points in any pools or any other daily resources, and still with any long-term debilitations of the old body. The time spent in the Boneyard leaves the target temporarily debilitated, making it clumsy 2, drained 2, and enfeebled 2 for 1 week; these conditions can't be removed or reduced by any means until the week has passed. The creature is also permanently changed by its time in the afterlife, such as a slight personality shift, a streak of white in the hair, or a strange new birthmark."
    heighten: "**7th:** The maximum level of the target increases to 15. The cost increases to the target's level (minimum 1) × 400 gp.%r**8th:** The maximum level of the target increases to 17. The cost increases to the target's level (minimum 1) × 800 gp.%r**9th:** The maximum level of the target increases to 19. The cost increases to the target's level (minimum 1) × 1,600 gp.%r**10th:** The maximum level of the target increases to 21. The cost increases to the target's level (minimum 1) × 3,200 gp."
  Rallying Anthem:
    base_level: 2
    traits:
      - bard
      - cantrip
      - composition
      - concentrate
      - emotion
      - mental
      - uncommon
    actions: 1
    area: 60-foot emanation
    duration: 1 round
    effect: Your song moves allies to protect themselves more effectively. You and all allies in the area gain a +1 status bonus to AC and saving throws, as well as resistance equal to half the spell's rank to physical damage.
  Ranger's Bramble:
    base_level: 3
    traits:
      - concentrate
      - focus
      - manipulate
      - plant
      - ranger
      - uncommon
    actions: 2
    area: 5-foot burst
    range: 100 feet
    duration: 1 minute
    effect: You cause plants in the area to entangle your foes, with the effects of *entangling flora*. A creature that critically fails the save takes 2d4 persistent bleed damage in addition to being immobilized. Escaping your bramble doesn't end the bleed damage.
    heighten: "**+1:** The bleed damage on a critical failure increases by 1d4."
  Read Aura:
    base_level: 1
    mystery:
      - lore
    traits:
      - cantrip
      - concentrate
      - detection
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 1 minute
    range: 30 feet
    target: 1 object
    effect: You focus on the target object, opening your mind to perceive magical auras. When the casting is complete, you know whether that item is magical. You or anyone you advise about the aura gains a +2 circumstance bonus to Identify Magic on the item. If the object is illusory, you detect this only if the effect's rank is lower than the rank of your *read aura* spell.
    heighten: "**3rd:** You can target up to 10 objects.%r**6th:** You can target any number of objects."
  Read Fate:
    base_level: 1
    traits:
      - cleric
      - concentrate
      - focus
      - manipulate
      - prediction
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 creature other than you
    effect: "You attempt to learn more about the target's fate in the short term, usually within the next day for most prosaic creatures, or the next hour or less for someone likely to have multiple rapid experiences, such as someone actively adventuring.%r%rYou learn a single enigmatic word connected to the creature's fate in that time frame. Fate is notoriously inscrutable, and the word isn't necessarily meant to be taken at face value, so the meaning is often clear only in hindsight. The GM rolls a secret DC 6 flat check. If the creature's fate is too uncertain, or on a failed flat check, the spell yields the word 'inconclusive.' Either way, the creature is then temporarily immune for 24 hours."
  Read Omens:
    base_level: 4
    traits:
      - concentrate
      - manipulate
      - prediction
      - uncommon
    tradition:
      - divine
      - occult
    actions: 10 minutes
    effect: You peek into the future. Choose a particular goal or activity you plan to engage in within 1 week, or an event you expect might happen within 1 week. You learn a cryptic clue or piece of advice that could help with the chosen event, often in the form of a rhyme or omen.
  Reaper's Lantern:
    base_level: 2
    traits:
      - aura
      - concentrate
      - death
      - light
      - manipulate
    tradition:
      - divine
      - occult
      - primal
    actions: 2
    area: 5-foot emanation
    duration: 1 minute
    effect: "You call forth a ghostly lantern that guides the living toward death and the undead toward true death. It sheds bright light in the spell's area and dim light to twice that area. The lantern is insubstantial and floats near you, suspended from an ephemeral, skeletal hand. Living creatures and undead in the area when you Cast the Spell, or that enter the area later, must attempt Fortitude saves. Living creatures that fail their Fortitude saves gain only half the normal benefit from healing effects while within the area. Undead targets that fail their Fortitude saves become enfeebled 1 while within the area. Once a creature attempts a save against reaper's lantern, it uses the same outcome if it leaves the area and enters it again.%r%rOnce per turn, starting on the round after you cast reaper's lantern, you can Sustain the spell to increase the emanation's radius by 5 feet. When you do so, you force creatures in the area that haven't yet attempted a save against reaper's lantern to attempt one."
  Rebuke Death:
    base_level: 4
    traits:
      - cleric
      - focus
      - healing
      - manipulate
      - vitality
      - uncommon
    actions: 1 to 3
    area: 20-foot emanation
    target: 1 living creature per action spent to Cast this Spell
    effect: You snatch creatures from the jaws of death, restoring them without the straing of a typical close call. You can spend 1 to 3 actions Casting this Spell, and you can target a number of creatures equal to the actions spent. Each target regains 3d6 Hit Points. If the target had the dying condition, coming back from Dying due to this healing doesn't increase its wounded condition.
    heighten: "**+1:** Increase the healing by 1d6."
  Regenerate:
    base_level: 7
    traits:
      - concentrate
      - healing
      - manipulate
      - vitality
    tradition:
      - divine
      - primal
    actions: 2
    range: touch
    target: 1 willing living creature
    duration: 1 minute
    effect: "An infusion of vital energy grants a creature continuous healing. The target temporarily gains regeneration 15, which restores 15 Hit Points to it at the start of each of its turns. While it has regeneration, the target can't die from taking Hit Point damage and its dying condition can't increase to a value that would kill it (this stops most creatures' dying condition at dying 3), though if its wounded value becomes 4 or higher, it stays unconscious until its wounds are treated. If the target takes acid or fire damage, its regeneration deactivates until after the end of its next turn.%r%rEach time the creature regains Hit Points from regeneration, it also regrows one damaged or ruined organ (if any). During the spell's duration, the creature can also reattach severed body parts by spending an Interact action to hold the body part to the area it was severed from."
    heighten: "**9th:** The regeneration increases to 20."
  Remake:
    base_level: 10
    traits:
      - concentrate
      - manipulate
      - uncommon
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 1 hour
    range: 5 feet
    effect: "You fully re-create an object from nothing, even if the object was destroyed. To do so, you must be able to picture the object in your mind. Additionally, the material component must be a remnant of the item, no matter how small or insignificant (even a speck of dust that remains from *disintegrate* is enough). The spell fails if your imagination relied on too much guesswork; if the object would be too large to fit in a 5-foot cube; if the object still exists and you were simply not aware of it; or if the object is an artifact, has a level over 20, or has similar vast magical power.%r%rThe item reassembles in perfect condition. Even if your mental image was of a damaged or weathered object, the new one is in this perfected form. If the object was magical, this spell typically restores its constant magical properties, but not any temporary ones, such as charges or one-time uses. An item with charges or uses per day has all of its uses expended when remade, but it replenishes them normally thereafter."
  Repulsion:
    base_level: 6
    traits:
      - aura
      - concentrate
      - manipulate
      - mental
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    range: emanation up to 40-feet
    duration: 1 minute
    effect: "You manifest an aura that prevents creatures from approaching you. When casting the spell, you can make the area any radius you choose, up to 40 feet. A creature must attempt a Will save if it's within the area when you Cast the Spell or as soon as it enters the area while the spell is in effect. Once a creature has attempted the save, it uses the same result for that casting of *repulsion*. Any restrictions on a creature's movement apply only if it voluntarily moves toward you. For example, if you move closer to a creature, it doesn't then need to move away.%r%r**Critical Success** The creature's movement is not restricted.%r**Success** The creature treats each square in the area as difficult terrain when moving closer to you.%r**Failure** The creature can't move closer to you within the area."
  Resist Energy:
    base_level: 2
    bloodline:
      - elemental
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: touch
    target: 1 creature
    duration: 10 minutes
    effect: A shield of elemental energy protects a creature against one type of energy damage. Choose acid, cold, electricity, fire, or sonic damage. The target and its gear gain resistance 5 against the damage type you chose.
    heighten: "**4th:** The resistance increases to 10, and you can target up to two creatures.%r**7th:** The resistance increases to 15, and you can target up to five creatures."
  Resplendent Mansion:
    base_level: 9
    traits:
      - concentrate
      - manipulate
      - structure
    tradition:
      - arcane
      - occult
    actions: 1 minute
    range: 500 feet
    duration: until the next time you make your daily preparations
    effect: "You conjure a towering mansion up to four stories tall and up to 300 feet on a side. While Casting the Spell, you hold an image of the mansion and its desired appearance in your mind. The mansion can contain as many or as few rooms as you desire, and it's decorated as you imagine it. You can imagine a purpose for each room of the mansion, and the proper accouterments appear within. Any furniture or other mundane fixtures function normally for anyone inside the mansion, but they cease to exist if taken beyond its walls. No fixture created with this spell can create magical effects, but magical devices brought into the mansion function normally.%r%rYour mansion contains the same types and quantities of foodstuffs and servants as created by the *planar palace* spell.%r%rEach of the mansion's exterior doorways and windows are protected by *alarm* spells. You choose whether each alarm is audible or mental as you Cast the Spell, and each has a different sound (for an audible alarm) or sensation (for a mental one), allowing you to instantly determine which portal has been used."
  Restorative Moment:
    base_level: 5
    traits:
      - concentrate
      - focus
      - hex
      - manipulate
      - witch
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 creature
    effect: Your patron weaves the threads of time around the target, giving them some of the benefits of a day's passage. The target decreases the values of any doomed and drained conditions it has by 1 and can immediately attempt one saving throw against each affliction it has with a stage length of 1 day or less. The target is then temporarily immune for 1 day.
  Retributive Pain:
    base_level: 4
    traits:
      - cleric
      - focus
      - manipulate
      - mental
      - nonlethal
      - uncommon
    actions: reaction
    range: 30 feet
    target: the triggering creature
    trigger: A creature in range damages you
    effect: "You vengefully reflect your pain upon your tormentor. The target takes mental damage equal to half the triggering damage."
  Retrocognition:
    base_level: 7
    bloodline:
      - imperial
    traits:
      - concentrate
      - manipulate
    tradition:
      - occult
    actions: 1 minute
    effect: Opening your mind to mental echoes, you gain impressions from past events that occurred in your current location. *Retrocognition* reveals psychic impressions from events that occurred over the course of the last day throughout the first minute of the duration, followed by impressions from the next day back the next minute, and so on. These echoes don't play out like a vision but instead reveal impressions of emotions and metaphors that provide cryptic clues and details of the past. If you witness a traumatic or turbulent event through an impression, the spell ends unless you succeed at a Will save with a DC of at least 30 and possibly as much as 50, depending on the severity of the event. The GM determines whether an event is traumatic and chooses the DC.
    heighten: "**8th:** You gain impressions of events that occurred over the previous year for each minute you concentrate, instead of the previous day, though the details diminish, making it harder to distinguish impressions from all but the most major events.%r**9th:** You gain impressions of events that occurred over the previous century for each minute you concentrate, instead of the previous day, though the details diminish, making it almost impossible to distinguish impressions from all but the most major events."
  Revealing Light:
    base_level: 2
    traits:
      - concentrate
      - light
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    area: 10-foot burst
    range: 120 feet
    duration: varies
    effect: "A wave of magical light washes over the area. You choose the appearance of the light, such as colorful, heatless flames or sparkling motes. A creature affected by *revealing light* is dazzled. If the creature was invisible, it becomes concealed instead. If the creature was already concealed for any other reason, it is no longer concealed.%r%r**Critical Success** The target is unaffected.%r**Success** The light affects the creature for 2 rounds.%r**Failure** The light affects the creature for 1 minute.%r**Critical Failure** The light affects the creature for 10 minutes."
  Revel in Retribution:
    base_level: 6
    mystery:
      - battle
    traits:
      - concentrate
      - focus
      - manipulate
      - mental
      - oracle
      - uncommon
    actions: 1
    duration: 1 minute
    effect: "Time seems to slow for you, allowing you to strike your opponents mid-move. You gain the Reactive Strike ability, and you immediately gain a second reaction that you can use only to use Reactive Strike. At the start of each of your subsequent turns when you regain your actions, you gain an additional reaction that can be used only to attempt a Reactive Strike.%r%rLashing out at a defenseless enemy invigorates you with the thrill of combat, granting you 5 temporary Hit Points whenever you successfully hit with a Reactive Strike. The temporary Hit Points last for the spell's duration."
    heighten: "**+1:** The temporary Hit Points you gain from a successful Reactive Strike increase by 1."
  Revival:
    base_level: 10
    traits:
      - concentrate
      - healing
      - manipulate
      - vitality
    tradition:
      - divine
      - primal
    actions: 2
    range: 30 feet
    target: dead creatures and living creatures of your choice within range
    duration: 1 minute
    effect: "A burst of healing energy soothes living creatures and temporarily rouses those recently slain. All living targets regain 10d8+40 Hit Points.%r%rIn addition, you return any number of dead targets to life temporarily, with the same effects and limitations as *raise dead*. The raised creatures have a number of temporary Hit Points equal to the Hit Points you gave living creatures, but no normal Hit Points. The raised creatures can't regain Hit Points or gain temporary Hit Points in other ways, and once *revival*'s duration ends, they lose all temporary Hit Points and die.%r%r*Revival* can't resurrect creatures killed by *disintegrate* or a death effect. It has no effect on undead."
  Rewrite Memory:
    base_level: 4
    traits:
      - concentrate
      - manipulate
      - mental
      - uncommon
    tradition:
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: unlimited
    effect: "You alter the target's memories by erasing a memory, enhancing a memory's clarity, altering a memory, or adding a false memory. The target can attempt a Will save to resist the spell.%r%r**Critical Success** The target is unaffected and realizes you tried to alter its memory.%r**Success** The target is unaffected but thinks your spell was something harmless instead of *rewrite memory*, unless it identifies the spell.%r**Failure** During the first 5 minutes of the spell's duration, you can Sustain the spell to modify a memory once each round. When you do, you imagine up to 6 seconds of memory to modify, to a maximum of 5 continuous minutes of memory.%r%rAny memories you've altered remain changed as long as the spell is active. If the target moves out of range before the 5 minutes is up, you can't alter any further memories."
    heighten: "**6th:** You can Cast the Spell on a willing target to suppress all memory of a particular topic, detailed in 50 words or fewer. The effect is permanent, and it patches these omissions with an indistinct haze."
  Ring of Truth:
    base_level: 3
    traits:
      - concentrate
      - detection
      - manipulate
      - mental
      - uncommon
    tradition:
      - divine
      - occult
    actions: 2
    area: 20-foot burst
    range: 30 feet
    duration: 10 minutes
    effect: "You designate an area in which lies are revealed. Creatures in the area also take a –2 status penalty to Deception checks. Each time a creature in the area speaks a true statement, the soft ring of a bell sounds in the area. Creatures are aware of the magic; therefore, they can avoid answering questions to which they would normally respond with a lie, or they can be evasive as long as they remain within the boundaries of the truth. If a creature is in the area when the spell is cast or later enters the area, that creature attempts a Will save. It uses the results of this initial save if it leaves and reenters the area.%r%r**Critical Success** The target is so convincing that the bell rings even if they lie.%r**Success** If the target lies and succeeds at their Deception check against all targets, the bell still rings.%r**Failure** The bell accurately sees through their deception and will never ring if they lie."
  Rouse Skeletons:
    base_level: 3
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    area: 10-foot burst
    range: 60 feet
    duration: 1 minute
    effect: "Misshapen skeletal forms erupt from a solid surface, such as a stone floor, and fill the burst. The area they fill is difficult terrain. Their grasping claws deal 2d6 slashing damage to creatures on the ground in the area when the skeletons first appear with a basic Reflex save.%r%rOn subsequent rounds, the first time you Sustain the Spell each round, you can move the area of skeletons up to 20 feet within the range of the spell and deal 2d6 slashing damage with a basic Reflex save to each creature in the new area.%r%rDamaging or destroying the skeletons is irrelevant, as new bones pull forth from the ground to repair and replace any that are obliterated."
    heighten: "**+2:** The damage increases by 1d6."
  Rune of Observation:
    base_level: 4
    traits:
      - concentrate
      - focus
      - wizard
      - uncommon
    actions: 1
    range: 500 feet
    duration: 1 hour
    effect: "You inscribe an invisible eye-shaped rune in the air, creating a sensor as *clairvoyance*. When created, this eye must be in your line of sight.%r%rEach time the spell's duration ends, you can spend 1 Focus Point as a free action to extend the duration for another hour, though as normal, it ends immediately during your next daily preparations."
  Runic Body:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: touch
    target: 1 willing creature
    duration: 1 minute
    effect: Glowing runes appear on the target's body. All its unarmed attacks become *+1 striking* unarmed attacks, gaining a +1 item bonus to attack rolls and increasing the number of damage dice to two.
    heighten: "**6th:** The unarmed attacks are *+2 greater striking*.%r**9th:** The unarmed attacks are *+3 major striking*."
  Runic Weapon:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    range: touch
    target: 1 weapon that is unattended or wielded by a willing creature
    duration: 1 minute
    effect: The weapon glimmers with magic as temporary runes carve down its length. The target becomes a *+1 striking weapon*, gaining a +1 item bonus to attack rolls and increasing the number of weapon damage dice to two.
    heighten: "**6th:** The weapon is *+2 greater striking*.%r**9th:** The weapon is *+3 major striking*."
  Sacred Form:
    base_level: 6
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - divine
    actions: 2
    duration: 1 minute
    effect: You focus all your divine energy and transform yourself into a battle form, similar to your normal form and of the same size as you, but wielding powerful divine armaments. While in this form, you gain the statistics and abilities listed below. You have hands in this battle form and can use manipulate actions. You can Dismiss the spell. You gain the following statistics and abilities.
    heighten: "**8th:** You instead gain AC = 21 + your level, 15 temporary Hit Points, resistance 4 against physical damage, attack modifier +28, damage bonus +15 (+12 for a ranged attack), and Athletics +29. If you're Medium or smaller, your battle form is Large, and your attacks also have 10-foot reach, or 15-foot reach if you're using a favored weapon with reach."
  Safe Passage:
    base_level: 3
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - primal
    actions: 3
    range: touch
    duration: 1 minute
    effect: "**Area** 10-foot-wide, 10-foot-tall, 60-foot-long section of terrain%r%rYou make passage through the area safe for a brief amount of time. Anyone passing through the area gains the following benefits against harmful effects of the terrain and environment, including environmental damage, hazardous terrain, and hazards in the area. The spell grants a +2 status bonus to AC and saves against such effects, and resistance 5 to all damage from such effects. Furthermore, the spell prevents anything in the area that's prone to collapse, such as a rickety bridge or an unstable ceiling, from collapsing, except under extreme strain that would collapse a normal structure of its type.%r%r*Safe passage* protects only against harm, not inconvenience, and it doesn't reduce difficult terrain, remove the concealed condition caused by precipitation, or the like, nor does it protect against creatures within the spell's area."
    heighten: "**5th:** The granted resistance increases to 10, and the area can be 120 feet long.%r**8th:** The granted resistance increases to 15, and the area can be 500 feet long."
  Safeguard Secret:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - focus
      - manipulate
      - mental
      - uncommon
    actions: 2
    range: 30 feet
    target: you and any number of willing allies
    duration: 1 hour
    effect: "You ensure a secret remains safe from prying spies. Choose one piece of information that at least some of the targets know, such as 'the location of the stolen treasure' or 'the password to enter the guild house.' The spell grants those who know the piece of knowledge you have chosen a +4 status bonus to skill checks (typically Deception checks) to conceal this knowledge, and to saving throws against spells that specifically attempt to obtain this knowledge from them, and to effects that would force them to reveal it.%r%rIf you Cast this Spell again, any previous *safeguard secret* you had cast ends."
  Sanctuary:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - divine
      - occult
    actions: 2
    range: touch
    target: 1 creature
    duration: 1 minute
