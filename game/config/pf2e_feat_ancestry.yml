---
pf2e_feats:
  Accursed Claws:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: Your claws carry your mother's hag magic. When you critically hit with a claw Strike, the target takes an additional 1d4 persistent mental damage.
    prereq:
      level: 9
  Adapted Cantrip:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "Through study of multiple magical traditions, you've altered a spell to suit your spellcasting style. Choose one cantrip from a magical tradition other than your own. If you prepare spells, you can choose this spell when you prepare your cantrips, in addition to your other options. If you have a spell repertoire, replace one of your cantrips known with the chosen spell. You can cast this cantrip as a spell of your class's tradition.%r%rIf you swap or retrain this cantrip later, you can choose its replacement from the same alternate tradition or a different one."
    prereq:
      level: 1
  Adaptive Adept:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: You've continued adapting your magic to blend your class's tradition with your adapted tradition. Choose a cantrip or 1st-rank spell from the same magical tradition as your cantrip from Adapted Cantrip. You gain that spell, adding it to your spell options just like the cantrip from Adapted Cantrip. You can cast this spell as a spell of your class's magical tradition. If you choose a 1st-rank spell, you don't gain access to the heightened versions of that spell, meaning you can't prepare them if you prepare spells and you can't learn them or select the spell as a signature spell if you have a spell repertoire.
    prereq:
      level: 5
      feat:
        - Adapted Cantrip
  Advanced General Training:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "Over the long course of your adventuring life, your adaptability has let you pick up numerous useful abilities. You gain a general feat of 7th level or lower. You must meet the feat's prerequisites.%r%r**Special** You can select this feat multiple times, choosing a different feat each time."
    prereq:
      level: 13
  Ageless Patience:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "You work at a pace born from longevity that enhances your thoroughness. You can voluntarily spend twice as much time as normal on a Perception check or skill check that takes 1 action or longer. If you do, you gain a +2 circumstance bonus to the check and don't automatically reduce your degree of success on a natural 1 (you get a critical failure only if your result is 10 lower than the DC). For example, you could get these benefits if you spent 2 actions to Seek, which normally takes 1 action. You can get these benefits during exploration by taking twice as long exploring as normal, or in downtime by spending twice as much downtime.%r%rThe GM might determine a situation doesn't grant you a benefit if a delay would be directly counterproductive to your success, such as a tense negotiation with an impatient creature."
    prereq:
      level: 5
  Agonizing Rebuke:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: When you terrorize your enemies, you also cause them painful mental distress. When you successfully Demoralize an enemy, that enemy takes 1d4 mental damage at the start of each of its turns. This effect ends if the creature loses the frightened condition, if it is more than 30 feet away from you, or if 1 minute passes, whichever comes first. If you have master proficiency in Intimidation, the damage increases to 2d4, and if you have legendary proficiency, the damage increases to 3d4.
    prereq:
      level: 5
  Alchemical Scholar:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    grants:
      feat:
        - Alchemical Crafting
    shortdesc: You gain the Alchemical Crafting feat. If you would automatically gain that feat (from your background or the alchemist class, for example), you instead gain a different 1st-level Crafting skill feat. Add an additional common 1st-level alchemical formula to your formula book when you take this feat. Each time you gain a level beyond 1st, add one common alchemical formula of that level to your formula book.
    prereq:
      level: 1
  Ancestral Longevity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: You have accumulated a vast array of lived knowledge over the years. During your daily preparations, you can reflect upon your life experiences to gain the trained proficiency rank in one skill of your choice. This proficiency lasts until you prepare again. Since this proficiency is temporary, you can't use it as a prerequisite for a skill increase or a permanent character option like a feat.
    prereq:
      level: 1
  Ancestral Suspicion:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: Long-lived sildanyari have seen civilizations rise and fall, often at the hands of outside forces. As a result, they have developed a wariness of others who might seek to influence or control them. You've been trained to resist such manipulation, gaining a +2 circumstance bonus to saving throws against effects that would make you controlled, such as *dominate*, and to Perception checks to Sense Motive when trying to determine if a creature is under the influence of such an effect. When you roll a success on a saving throw against such an effect, you get a critical success instead.
    prereq:
      level: 5
  Angelkin:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Aesa
    traits:
      - lineage
      - aesa
    grants:
      feat:
        - Multilingual
      skill:
        - Society
    shortdesc: You descend from an angel, a winged messenger from the City of Bells or one of the other light planes. You gain the trained proficiency rank in Society. If you would automatically become trained in Society (from your background or class, for example), you instead become trained in a skill of your choice. You know the Aesyian language, and you gain the Multilingual skill feat.
    prereq:
      level: 1
  Animal Accomplice:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    grants:
      feat:
        - Pet
    shortdesc: You build a rapport with an animal, which becomes magically bonded to you. You gain a familiar. The type of animal is up to you, but most gnomes choose animals with a burrow Speed.
    prereq:
      level: 1
  Animal Elocutionist:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: You hear animal sounds as conversations instead of unintelligent noise, and you can respond in turn. You can ask questions of, receive answers from, and use the Diplomacy skill with animals. In most cases, wild animals will give you time to make your case. You gain a +1 circumstance bonus to Make an Impression on animals.
    prereq:
      level: 1
  Arvek Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    grants:
      feat:
        - Additional Lore
      skill:
        - Athletics
        - Crafting
    shortdesc: "You've studied traditional arvek exercises and fieldcraft, all of which have a militaristic bent. You gain the trained proficiency rank in Athletics and Crafting. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou gain the Additional Lore general feat for Arvek Lore."
    prereq:
      level: 1
  Arvek Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: "You gain access to all uncommon weapons with the arvek trait. You have familiarity with weapons with the arvek trait plus the composite longbow, composite shortbow, glaive, longbow, longsword, and shortbow—for the purpose of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Ashen One Lore:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    grants:
      feat:
        - Additional Lore
      skill:
        - Medicine
        - Religion
    shortdesc: "You either found another Ashen One who taught you the secrets of your kind, or you managed to research your unusual heritage. You gain the trained proficiency rank in Medicine and Religion. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Gray Halls Lore."
    prereq:
      level: 1
  Ashen One Magic:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    magic_stats:
      innate_spell:
        level: 2
        name: 
          - Augury
          - Peaceful Rest
        tradition: divine
        cast_stat: Charisma
    shortdesc: Your connection to psychopomps gives you the power to glimpse the near future and protect corpses from the ravages of undeath. You can cast *augury* and *peaceful rest* each once per day as 2nd-rank divine innate spells.
    prereq:
      level: 9
  Ashen One Weapon Familiarity:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: "You have familiarity with the bo staff, longbow, composite longbow, scythe, and staff—for the purpose of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Athletic Might:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Surviving in hostile terrain has given you a great talent for mobility. Whenever you roll a success on an Athletics check to Climb or Swim, you get a critical success instead.
    prereq:
      level: 5
  Avenge Ally:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
      - fortune
    shortdesc: "**Frequency** once every 10 minutes%r%r**Requirements** You are within 30 feet of an ally with the dying condition.%r%rThough you know that you will eventually outlive your companions, seeing them at death's door brings clarity to your attacks. Make a Strike. Roll twice on the attack roll and use the higher result."
    prereq:
      level: 13
    actions: 1
    frequency: once every 10 minutes
  Bassin Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    grants:
      skill:
        - Acrobatics
        - Stealth
    shortdesc: "You've dutifully learned how to keep your balance and how to stick to the shadows where it's safe, important skills passed down through generations of bassin tradition. You gain the trained proficiency rank in Acrobatics and Stealth. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Bassin Lore."
    prereq:
      level: 1
  Bassin Luck:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - fortune
      - bassin
    shortdesc: "**Frequency** once per day%r%r**Trigger** You fail a skill check or saving throw.%r%rYour happy-go-lucky nature makes it seem like misfortune avoids you, and to an extent, that might even be true. You can reroll the triggering check, but you must use the new result, even if it's worse."
    prereq:
      level: 1
    actions: free
    frequency: once per day
  Bassin Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: "You favor traditional bassin weapons, so you've learned how to use them more effectively. You gain access to all uncommon weapons with the bassin trait. You have familiarity with weapons with the bassin trait plus the sling and shortsword—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Beast Trainer:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    grants:
      skill:
        - Nature
      orfeat:
        - Pet
        - Train Animal
    shortdesc: You have an impressive innate ability to tame and command ferocious beasts. You become trained in the Nature skill and gain your choice of the Pet general feat or the Train Animal skill feat.
    prereq:
      level: 1
  Bestial Manifestation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    shortdesc: "Part of your body has an animalistic influence from a planar creature. Your hands end in claws, you have hooves instead of feet, sharp teeth fill your mouth, or a tail extends from your spine. You gain your choice of one of the following unarmed attacks. The attack is in the brawling group and has the listed damage die and traits.%r%r* **Claw** 1d4 slashing (agile, finesse, unarmed, versatile piercing)%r%r* **Hoof** 1d6 bludgeoning (finesse, unarmed)%r%r* **Jaws** 1d6 piercing (finesse, unarmed)%r%r**Tail** 1d4 bludgeoning (agile, finesse, unarmed)%r%r**Special** You can select this feat only at 1st level, and you can't retrain into or out of this feat, nor can you change the type of attack you gained."
    prereq:
      level: 1
  Big Mouth:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: Instead of storing up to four items of Light Bulk in your cheek pouches, you can store up to 1 Bulk worth of items. The maximum size of a given item is unchanged.
    prereq:
      level: 9
      feat:
        - Cheek Pouches
  Blessed Blood (Aesa):
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
    traits:
      - aesa
    shortdesc: Your spilled blood is sanctified, with effects similar to those of Holy Water. Whenever a fiend, undead, or creature with a weakness to holy drinks your blood or deals piercing or slashing damage to you with jaws, fangs, or a similar attack, that creature takes 1d6 spirit damage with the holy trait. You gain a +4 circumstance bonus to Crafting checks to Craft *holy water* using your blood as one of the ingredients.
    prereq:
      level: 5
  Bloodletting Fangs:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: You emulate your vampiric parent's techniques for drawing blood from a victim. Your fangs Strikes deal an additional 1d4 persistent bleed damage on a critical hit.
    prereq:
      level: 9
  Bloody Blows:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Your lethal unarmed attacks leave bloody gouges or cause severe internal bleeding. When you critically hit with a Strike using an unarmed attack that isn't nonlethal, the target takes 1d4 persistent bleed damage. This can be because you're taking the penalty to use a fist for a lethal attack or because you have an unarmed attack without the nonlethal trait due to Tusks or a similar ability.
    prereq:
      level: 5
  Bone Investiture:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: You encase yourself in spiritual dinosaur bones to become a Huge dinosaur. You can cast Dinosaur Form on yourself as a 5th-rank innate spell once per day.
    prereq:
      level: 13
      feat:
        - Bone Magic
  Bone Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "Your connection to your ciith ancestors manifests as a simple primal spell that you cast using a fragment of an ancestor's bones. Choose one cantrip from either the occult spell list or the primal spell list. You can cast this cantrip as an innate spell at will, and it's heightened to a spell rank equal to half your level rounded up.%r%r**Special** Choose when you gain this feat whether your innate spells are primal or occult; this choice applies to all innate spells you gain from ciith ancestry feats that have Bone Magic as a prerequisite."
    prereq:
      level: 1
  Boulder Roll:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: "Your khazadi build allows you to push foes around, just like a mighty boulder tumbles through a subterranean cavern. Take a Step into the square of a foe that is your size or smaller, and the foe must move into the empty space directly behind it. The foe must move even if doing so places it in harm's way. The foe can attempt a Fortitude saving throw against your Athletics DC to block your Step. If the foe attempts this saving throw, it takes bludgeoning damage equal to your level plus your Strength modifier unless it critically succeeds.%r%rIf the foe can't move into an empty space (if it is surrounded by solid objects or other creatures, for example), your Boulder Roll has no effect."
    prereq:
      level: 5
      feat:
        - Rock Runner
    actions: 2
  Bounce Back:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "**Frequency** once per day%r%r**Trigger** You lose the dying condition.%r%rYou recover from near-death experiences with astounding resilience. Don't increase the value of your wounded condition due to losing the dying condition."
    prereq:
      level: 13
    actions: free
    frequency: once per day
  Brine May:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
      - lineage
    shortdesc: Your mother was a sea hag, granting you one sea-green or blue eye. You find comfort both in the sea and on the shore. Whenever you roll a success on an Athletics check to Swim, you get a critical success instead. If you end your turn in water without having succeeded at a Swim action that round, you don't sink (but you might still be moved by the current).
    prereq:
      level: 1
  Burn It!:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: Fire fascinates you. Your spells and alchemical items that deal fire damage gain a status bonus to damage equal to half the spell's rank or one-quarter the item's level (minimum bonus +1). You also gain a +1 status bonus to any persistent fire damage you deal.
    prereq:
      level: 1
  Call the Swarm:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: "**Frequency** once per day%r%rYou give a shrill whistle and point, and a massive swarm of rats pours forth from the surrounding terrain to fill a 30-ft burst within 120 feet. The rats scurry over the ground and climb up walls and surfaces, biting and clawing as they deal 6d8 piercing damage to all enemies in the area. The rats continue to swarm in the area for the next minute, dealing 3d8 piercing damage to any enemy that ends its turn in the area and transforming the area into difficult terrain (though the rats allow you and your allies to pass normally). You can Dismiss the effect."
    prereq:
      level: 17
      feat:
        - Ratspeak
    actions: 3
    frequency: once per day
  Called:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: You've heard the Call, and by resisting it, you've developed a bulwark against effects that target your mind. You gain a +1 circumstance bonus to Will saving throws against mental effects. If you roll a success on your saving throw against a mental effect that would make you controlled, you get a critical success instead.
    prereq:
      level: 5
  Callow May:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
      - lineage
    grants:
      feat:
        - Charming Liar
    shortdesc: You are among the most common of changelings—those born to sweet hags—and a vibrant green eye signifies that parentage. Your mother's manipulative nature and versatile voice gives you an edge when deceiving others. You gain the Charming Liar skill feat. If you roll Deception for initiative, foes in that combat encounter that haven't acted yet are off-guard against you.
    prereq:
      level: 1
  Can't Fall Here:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - auditory
      - arvek
      - manipulate
    shortdesc: "**Frequency** once per day%r%r**Trigger** An adjacent and willing ally would be reduced to 0 HP but not killed.%r%rYou physically help an ally remain standing and encourage them to push through their pain against dire odds. Your ally doesn't fall unconscious and remains at 1 Hit Point. The ally also gains a number of temporary Hit Points equal to your level that last for 1 minute. Fighting onward with such an injury isn't without consequence; your ally's wounded condition increases by 1."
    prereq:
      level: 13
    actions: reaction
    frequency: once per day
  Cantorian Reinforcement:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: The life energy that helped create the first arvek is particularly potent in you, protecting you from ongoing maladies. If you roll a success on a saving throw against a disease or poison, you get a critical success instead. If you have a different ability that would improve the save in this way (such as the Battle Hardened fighter class feature), if you roll a critical failure on the save you get a failure instead.
    prereq:
      level: 1
  Cantorian Rejuvenation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - healing
      - arvek
      - vitality
    shortdesc: "**Frequency** once per day%r%rThe life-giving energy that flows in your blood revitalizes you. You recover 4d6 Hit Points and gain 10 temporary Hit Points for 1 minute. At 15th level, you instead recover 6d6 HP and gain 15 temporary HP."
    prereq:
      level: 9
    actions: 2
    frequency: once per day
  Cantorian Restoration:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - healing
      - arvek
      - vitality
    shortdesc: "**Frequency** once per day%r%r**Trigger** A living creature within 60 feet would die.%r%rThe energy that flows in your blood can save a life in the direst of times. You prevent the creature from dying and restore 6d8 + your Constitution modifier Hit Points to it. You can't use Cantorian Restoration if the triggering effect was a death effect or an effect that leaves no remains, such as *disintegrate*."
    prereq:
      level: 17
    actions: reaction
    frequency: once per day
  Cautious Curiosity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: You've learned a few magical techniques for getting yourself both into and out of trouble unnoticed. You gain *disguise magic* and *silence* as 2nd-rank arcane or occult innate spells. The tradition of these spells must match the tradition you use for your gnome ancestry options. You can cast each spell once per day and can target only yourself.
    prereq:
      level: 9
      innate_tradition:
        - arcane
        - occult
  Cave Climber:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: After years of clambering through caverns, you can climb easily anywhere you go. You gain a climb Speed of 10 feet.
    prereq:
      level: 9
  Ceaseless Shadows:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You excel at going unnoticed, especially among a crowd. You no longer need to have cover or be concealed to Hide or Sneak. If you would have lesser cover from a creature, you gain standard cover instead and can Take Cover; if you would have standard cover from a creature, you gain greater cover instead.
    prereq:
      level: 13
      feat:
        - Distracting Shadows
  Celestial Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
    traits:
      - aesa
    shortdesc: "You possess celestial magic. Choose two of the following spells: *clear mind*, *everlight*, *humanoid form*, *revealing light*, *share life*, or *sure footing*. You can use each of the chosen spells once per day as 2nd-rank divine innate spells.%r%rAngelkin typically take *clear mind* and *humanoid form*, lawbringers typically have *everlight* and *share life*, and musetouched typically have *revealing light* and *sure footing*."
    prereq:
      level: 9
      orfeat:
        - Angelkin
        - Lawbringer
        - Musetouched
  Celestial Mercy:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
    traits:
      - aesa
    magic_stats:
      innate_spell:
        level: 4
        name:
          - Cleanse Affliction
        tradition: primal
        cast_stat: Charisma
    shortdesc: Your celestial powers allow you to remove lesser afflictions with ease. You can cast *cleanse affliction* twice per day as a 4th-rank divine innate spell.
    prereq:
      level: 13
      orfeat:
        - Angelkin
        - Lawbringer
        - Musetouched
  Changeling Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    grants:
      feat:
        - Additional Lore
      skill:
        - Deception
        - Occultism
    shortdesc: "All too aware of your true nature, you've studied hags and their powers. You gain the trained proficiency rank in Deception and Occultism. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Hag Lore."
    prereq:
      level: 1
  Cheek Pouches:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: Your cheeks are stretchy, and you can store up to four items of light Bulk or less in these cheek pouches. None of these items can have a dimension longer than 1 foot. As long as you have at least one item in your cheek pouches, your speech is noticeably difficult to understand. Placing an item in your cheek pouch or retrieving one is an Interact action. You can empty your mouth with a single action, causing everything you had stored in your cheek pouches to fall to the ground in your square.
    prereq:
      level: 1
  Ciith Armaments:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "Your weapons are those you were born with. Choose one of the following options:%r%rAt 5th level, whenever you get a critical hit with one of the unarmed attacks you have gained or improved with this feat, you get its critical specialization effect.%r%r**Special** You can take this feat multiple times, choosing a different unarmed attack option each time."
    prereq:
      level: 1
  Ciith Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    grants:
      feat:
        - Additional Lore
      skill:
        - Nature
        - Survival
    shortdesc: "You listened carefully to the tales passed down among your community. You gain the trained proficiency rank in Survival and either Nature or Occultism. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for either Astrology Lore or Ciith Lore."
    prereq:
      level: 1
  Ciith Spirit Strike:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: Your ciith unarmed attacks channel the spiritual energy of your ancestors. Any unarmed attacks you acquire from the ciith ancestry, ciith heritages, or ciith ancestry feats gain the effects of a *ghost touch* property rune.
    prereq:
      level: 13
  City Scavenger:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "You know that the greatest treasures often look like refuse. You gain a +1 circumstance bonus to checks to Subsist, and you can use Society or Survival when you Subsist in a settlement.%r%r**Special** If you have the irongut goblin heritage, increase the bonuses to +2."
    prereq:
      level: 1
  Clever Improviser:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    grants:
      feat:
        - Untrained Improvisation
    shortdesc: You've learned how to handle situations when you're out of your depth. You gain the Untrained Improvisation general feat. In addition, you can attempt skill actions that normally require you to be trained, even if you are untrained.
    prereq:
      level: 5
  Cling:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "**Requirements** Your last action was a successful Strike and you have a free hand.%r%rYou hang onto a foe to harry them into submission. If your target moves while you're hanging onto it, you can choose to move with the target. The target is released if you choose not to move with it, at the start of your next turn, or if the target Escapes. Attempts to Escape from a Cling are made against your Acrobatics DC, but they end the Cling instead of the conditions normally ended by the Escape action.%r%r**Special** You can use this action without a free hand if your preceding Strike was made with your jaws or a similar unarmed attack you could use to hang on. The GM determines which unarmed attacks apply. Hanging on in this way prevents you from using that unarmed attack."
    prereq:
      level: 9
    actions: 1
  Cooperative Nature:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: The short human life span lends perspective and has taught you from a young age to set aside differences and work with others to achieve greatness. You gain a +4 circumstance bonus on checks to Aid.
    prereq:
      level: 1
  Cooperative Soul:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: You have developed a soul-deep bond with your comrades and maintain an even greater degree of cooperation with them. If you are at least an expert in the skill you are Aiding, when you roll a failure or critical failure to Aid a skill check, you get a success instead.
    prereq:
      level: 9
  Cornered Fury:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: If a foe of a larger size than you critically hits and damages you, that foe is off-guard to you for 1 round.
    prereq:
      level: 5
  Cultural Adaptability:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    grants:
      feat:
        - Adopted Ancestry
    shortdesc: During your adventures, you've honed your ability to adapt to the culture of the predominant ancestry around you. You gain the Adopted Ancestry general feat, and you also gain one 1st-level ancestry feat from the ancestry you chose for the Adopted Ancestry feat.
    prereq:
      level: 5
  Dance Underfoot:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You dart under the legs of your enemies in combat. You can end a successful Tumble Through action in a Large or larger enemy's space. Also, when using the Step Lively feat, you can Step into the triggering enemy's space. The enemy must have limbs or otherwise leave you enough room for this maneuver, as determined by the GM. For instance, you could share space with a giant or dragon, but not an ooze.
    prereq:
      level: 9
      feat:
        - Step Lively
  Dangle:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: You can hang by your tail from any suitable anchor point, such as a tree branch, balcony, or rocky outcropping (subject to the GM's discretion), typically while climbing. While hanging, you have free use of all your other limbs, so you can perform tasks that require both hands, such as firing a bow or swinging a greatsword.
    prereq:
      level: 9
  Defy Death:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: You're exceptionally difficult to kill. The DC of your recovery checks is equal to 9 + your dying value, or 8 + your dying value if you have the Toughness general feat. In addition, whenever someone returns you to life using magic that would normally leave you debilitated for a week (such as *raise dead* or the resurrect ritual), you don't suffer that condition.
    prereq:
      level: 5
      feat:
        - Oruch Ferocity
  Defy the Darkness:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: Using ancient khazadi methods developed to fight enemies wielding magical darkness, you've honed your darkvision and sworn not to use such magic yourself. You gain greater darkvision, enabling you to see through magical darkness even if it normally hampers darkvision (such as the darkness created by a 4th-rank *darkness* spell). You can't cast spells with the darkness trait, use item activations with the darkness trait, or use any other ability with the darkness trait.
    prereq:
      level: 5
      special: Darkvision
  Deliberate Death:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: "**Frequency** once per day%r%r**Trigger** You are about to gain the dying condition as a result of another creature's attack or ability, and that creature is within your melee reach.%r%rOnce, you died because someone—murderer, monster, or soldier—chose to strike you down. Just before losing consciousness, make a melee Strike against the triggering creature.%r%r**Special** You can select this feat only at 1st level, and you can't retrain into or out of this feat."
    prereq:
      level: 1
    actions: reaction
    frequency: once per day
  Distracting Shadows:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You have learned to remain hidden by using larger folk as a distraction to avoid drawing attention to yourself. You can use creatures that are at least one size larger than you (usually Medium or larger) as cover for the Hide and Sneak actions, though you still can't use such creatures as cover for other uses, such as the Take Cover action.
    prereq:
      level: 1
  Divine Countermeasures:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: You've studied your extraplanar heritage with the intent of better defending yourself, whether against creatures aligned with or opposed to your extraplanar lineage, and you've found that your techniques are equally powerful against celestials, fiends, and other divine entities. You gain a +1 circumstance bonus to all saving throws against divine effects.
    prereq:
      level: 9
  Divine Declaration:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    magic_stats:
      innate_spell:
        level: 7
        name: Divine Decree
        tradition: divine
        cast_stat: Charisma
    shortdesc: You can call forth a holy or unholy word from the realms beyond to punish your foes. Once per day, you can cast *divine decree* as a 7th-rank divine innate spell.
    prereq:
      level: 17
  Divine Wings:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - divine
      - morph
      - aesa
      - niasa
    shortdesc: "**Frequency** once per day%r%rWith effort, you can call forth magical wings from your back, similar in appearance to those of your extraplanar forebear, whether they be elegantly feathered wings or ominous bat wings. These wings remain for 10 minutes. You gain a fly Speed equal to your Speed while you've manifested your wings."
    prereq:
      level: 9
    actions: 2
    frequency: once per day
  Dream May:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
      - lineage
    shortdesc: "You are the child of a cuckoo hag, making one of your eyes violet or even black. Your mother's powers over sleep and dreams have given you a degree of resistance to those effects, granting you a +2 circumstance bonus to all saving throws against sleep effects and effects that cause or alter dreams.%r%rIn addition, sleep is more restorative for you. You regain HP equal to your Constitution modifier × double your level (instead of just × your level), and you reduce any drained and doomed conditions you have by 2 instead of by 1."
    prereq:
      level: 1
  Earned Glory:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Silyara
    traits:
      - silyara
    grants:
      feat:
        - Impressive Performance
      skill:
        - Performance
    shortdesc: "Sildanyari often struggle with underestimating silyara, and you are experienced at telling stories of your accomplishments to gain their respect. You are trained in Performance. If you would automatically become trained in Performance (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou gain the Impressive Performance feat. When you attempt a Performance check to Make an Impression on an sildanyar, if you roll a critical failure, you get a failure instead."
    prereq:
      level: 1
  Eat Fortune:
    feat_type:
      - Ancestry
    traits:
      - concentrate
      - divine
      - egalrin
    shortdesc: "**Frequency** once per day%r%r**Trigger** A creature within 60 feet uses a fortune or misfortune effect.%r%rAs someone tries to twist fate, you consume the interference. The triggering effect is disrupted. If it's a misfortune effect, Eat Fortune gains the fortune trait; if it's a fortune effect, Eat Fortune gains the misfortune trait. This fortune or misfortune applies to the same roll the triggering effect would have, so you couldn't negate a fortune effect with Eat Fortune and then apply a misfortune effect to the same roll."
    prereq:
      level: 5
    actions: reaction
    frequency: once per day
  Echoes in Stone:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - concentrate
      - khazad
    shortdesc: "**Requirements** You are standing on a stone or earthen surface.%r%rYou pause a moment to attune your senses to the stone around you. Until the start of your next turn, you gain imprecise tremorsense with a range of 20 feet."
    prereq:
      level: 9
    actions: 1
  Egalrin Feather Fan:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    grants:
      feat:
        - Egalrin Feather Fan
    shortdesc: "You've learned to bind some of your feathers together into a fan to focus your ancestral magic. You gain a *egalrin feather fan*: a magic item of light Bulk with a level equal to your level and the primal trait. You (and only you) can cast egalrin magic with the Wave Fan activation. If your fan is lost or destroyed, you can create a replacement during your daily preparations; if you do so, your previous fan falls apart into mundane feathers.%r%rYour *egalrin feather fan* contains a 1st-rank *gust of wind* spell. Further feats might add more spells and grant you additional activations of your egalrin feather fan, but you can never have more than three activations per day, no matter how many such feats you have.%r%r**Activate—Wave Fan** (manipulate)%r%r**Frequency** once per day%r%r**Effect** You cast your choice of one spell contained in your *egalrin feather fan*. You can instead cast a cantrip you've gained from a heritage or an ancestry feat; this doesn't use up one of the fan's daily activations. This activation takes the spell's normal number of actions. The spell's DC is your class DC or spell DC, whichever is higher."
    prereq:
      level: 5
  Egalrin Lore:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    grants:
      feat:
        - Additional Lore
      skill:
        - Society
        - Survival
    shortdesc: "You learned skills for surviving in the place where your people were dispersed. You gain the trained proficiency rank in Society and Survival. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Egalrin Lore."
    prereq:
      level: 1
  Egalrin Weapon Familiarity:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: "You gain access to all uncommon weapons with the egalrin trait plus the katana, khakkara, temple sword, and wakizashi. You have familiarity with these weapons—for the purpose of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rDuring your daily preparations, you can practice with a weapon from the sword group that's in your possession. You gain familiarity with that weapon as well. This lasts until you practice with a different sword in the same way.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Energized Font:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: "**Frequency** once per day%r%rYou can focus your mind more quickly thanks to the magic that flows within you. You regain 1 Focus Point, up to your usual maximum."
    prereq:
      level: 5
    actions: 1
    frequency: once per day
  Enthralling Allure:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    magic_stats:
      innate_spell:
        level: 4
        name: Charm
        tradition: divine
        cast_stat: Charisma
    shortdesc: The powers of domination employed by your progenitors have manifested in you as well. You can cast *charm* as a divine innate spell once per day. Its spell rank is equal to half your level rounded up, but it doesn't increase its duration or number of targets at 4th and 8th rank.
    prereq:
      level: 5
  Envenom Fangs:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "**Frequency** once per hour%r%rYou envenom your fangs. If the next fangs Strike you make before the end of your next turn hits and deals damage, the Strike deals an additional 1d6 persistent poison damage. The poison becomes inert after you hit, or at the end of your next turn, whichever comes first."
    prereq:
      level: 5
      feat:
        - Ciith Armaments
    actions: 1
    frequency: once per hour
  Eternal Wings:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: Your wings are now a permanent part of your body. You gain the effects of Divine Wings at all times, rather than just once per day for 10 minutes.
    prereq:
      level: 17
      feat:
        - Divine Wings
  Expert Drill Sergeant:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: While exploring, when you are leading and allies are Following the Expert, instead of granting a +2 circumstance bonus in the applicable skill, you grant a +3 circumstance bonus if you're an expert and a +4 circumstance bonus if you're a master.
    prereq:
      level: 5
  Expert Longevity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "You've continued to refine the knowledge and skills you've gained through your life. When you choose a skill in which to become trained with Ancestral Longevity, you can also choose a skill in which you are already trained and become an expert in that skill. This lasts until your Ancestral Longevity expires.%r%rWhen the effects of Ancestral Longevity and Expert Longevity expire, you can retrain one of your skill increases. The skill increase you gain from this retraining must either make you trained in the skill you chose with Ancestral Longevity or make you an expert in the skill you chose with Expert Longevity."
    prereq:
      level: 9
      feat:
        - Ancestral Longevity
  Extraplanar Supplication:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: You call upon divine power to place a benediction upon your allies or a malediction upon your foes. Choose either *bless* or *bane*. You can cast the chosen spell once per day as a 1st-rank divine innate spell.
    prereq:
      level: 5
  Eyes of Night:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: "You can see in the darkness as easily as a true vampire. You gain darkvision.%r%r**Special** You can select this feat only at 1st level, and you can't retrain into or out of this feat."
    prereq:
      level: 1
      special: Low-light Vision
  Fangs:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: "Your incisors have grown into true fangs: long, sharp, and well-suited to drawing blood. You gain a fangs unarmed attack that deals 1d6 piercing damage. Your fangs are in the brawling group and have the grapple and unarmed traits."
    prereq:
      level: 1
  Fell Rider:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You have trained with your animal companion to become a terrifying juggernaut on the battlefield. Your animal companion becomes trained in Intimidation. If your animal companion uses Support while serving as your mount, it grants you the effects of the Aid reaction on your first Intimidation check to Demoralize on the same turn, even though it can't take reactions.
    prereq:
      level: 9
      feat:
        - animal companion
  Ferocious Beasts:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Since ancient times, the mightiest oruch beast tamers would draw out the true fighting spirit of their companion beasts by feeding the creatures a draft incorporating the orc's own blood. All animal companions, pets, familiars, and bonded animals you have gain the Oruch Ferocity feat, and gain one reaction per round they can use only for Oruch Ferocity. If you have the Undying Ferocity ancestry feat, all animal companions, pets, familiars, and bonded animals you have also gain the benefits of that feat when using the Oruch Ferocity reaction.
    prereq:
      level: 13
      feat:
        - animal companion, Pet, or Bonded Animal
        - Oruch Ferocity
  Fey Fellowship:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: "Your enhanced fey connection (either through your blood or via prolonged contact with their kind) affords you a warmer reception from creatures of the First World as well as tools to foil their tricks or withstand their magic. You gain a +2 circumstance bonus to both Perception checks and saving throws against fey.%r%rIn addition, whenever you meet a fey creature in a social situation, you can immediately attempt a Diplomacy check to Make an Impression on that creature rather than needing to converse for 1 minute. You take a –5 penalty to the check. If you fail, you can engage in 1 minute of conversation and attempt a new check at the end of that time rather than accepting the failure or critical failure result."
    prereq:
      level: 1
  Fiendish Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    shortdesc: "You possess fiendish magic. Choose two of the following spells: *disguise magic*, *false vitality*, *invisibility*, *see the unseen*, *shatter*, or *paranoia*. You can use each of the chosen spells once per day as 2nd-rank divine innate spells.%r%rGrimspawn typically take *false vitality* and *see the unseen*, pitborn typically take *paranoia* and *shatter*, and hellspawn typically take *invisibility* and *disguise magic*."
    prereq:
      level: 9
      orfeat:
        - Grimspawn
        - Pitborn
        - Hellspawn
  Flexible Tail:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: You can perform simple Interact actions with your tail, such as opening an unlocked door. Your tail can't perform actions that require fingers or significant manual dexterity, including any action that would require a check to accomplish, and you can't use it to hold items.
    prereq:
      level: 5
  Folksy Patter:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You are adept at disguising coded messages as folksy idioms. Using slang, jokes, bassin loanwords, and the like, you convey a simple message consisting of three basic words (such as 'Danger assassin flee' or 'Meet me moonrise'). Your intended listener can attempt a Perception check (DC 20) check to discern the message. This DC is reduced by 5 if the listener is a bassin or has Folksy Patter, or by 10 if both apply. Eavesdroppers can also attempt a Perception check against your Deception DC to discern your meaning. Any bonuses or penalties to Perception checks to Sense Motive apply to checks to understand Folksy Patter.
    prereq:
      level: 1
  Forlorn:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: Watching your friends age and die fills you with moroseness that protects you against harmful emotions. You gain a +1 circumstance bonus to saving throws against emotion effects. If you roll a success on a saving throw against an emotion effect, you get a critical success instead.
    prereq:
      level: 1
  Form of the Bat:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - concentrate
      - dar
      - divine
      - polymorph
    shortdesc: "**Frequency** once per hour%r%rYou can transform into a harmless bat. You gain the effects of a 4th-rank *pest form*, except you always transform into a bat."
    prereq:
      level: 13
    actions: 1
    frequency: once per hour
  Fossil Rider:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: Using your ancestors' bones, you manifest their spirits around you in a fossilized form. You can cast *mask of terror* on yourself as an innate spell once per day. When you do, you appear as a skeletal ciith ancestor, twisted in a way that inspires the deepest fears of those who observe you.
    prereq:
      level: 17
      feat:
        - Bone Magic
  Gecko's Grip:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    grants:
      feat:
        - Combat Climber
    shortdesc: "You cling to walls with a preternatural grip. You gain the Combat Climber feat as a bonus feat, and if you roll a success on an Athletics check to climb, you get a critical success instead.%r%r**Special** If you have the pantli ciith heritage, you instead gain a climb Speed of 15 feet."
    prereq:
      level: 5
  General Training:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "Your adaptability manifests in your mastery of a range of useful abilities. You gain a 1st-level general feat. You must meet the feat's prerequisites, but if you select this feat during character creation, you can select the feat later in the process in order to determine which prerequisites you meet.%r%r**Special** You can select this feat multiple times, choosing a different feat each time."
    prereq:
      level: 1
  Ghost Hunter:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: Your connection to the Gray Halls ensures that your blows strike true against spectral beings. Your weapon and unarmed Strikes against incorporeal creatures become magical. If they are already magical, they instead gain the effects of a *ghost touch* property rune.
    prereq:
      level: 1
  Gnome Obsession:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    grants:
      feat:
        - Additional Lore
        - Assurance
    shortdesc: You might have a flighty nature, but when a topic captures your attention, you dive into it headfirst. You gain the Additional Lore feat and the Assurance feat for the chosen Lore. As gnome obsessions can come and go quickly, you can retrain Gnome Obsession to a different Lore subcategory in 1 day of downtime.
    prereq:
      level: 1
  Gnome Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: "You favor unusual weapons tied to your people, such as blades with curved and peculiar shapes. You gain access to kukris and all uncommon weapons with the gnome trait. You have familiarity with weapons with the gnome trait plus the glaive and kukri—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Goblin Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    grants:
      feat:
        - Additional Lore
      skill:
        - Nature
        - Stealth
    shortdesc: "You've picked up skills and tales from your goblin community. You gain the trained proficiency rank in Nature and Stealth. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Goblin Lore."
    prereq:
      level: 1
  Goblin Scuttle:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "**Trigger** An ally ends a move action adjacent to you.%r%rYou take advantage of your ally's movement to adjust your position. You Step."
    prereq:
      level: 1
    actions: reaction
  Goblin Song:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "You sing annoying goblin songs, distracting your foes with silly and repetitive lyrics. Attempt a Performance check against the Will DC of a single enemy within 30 feet. This has all the usual traits and restrictions of a Performance check to sing.%r%rYou can affect up to two targets within range if you have expert proficiency in Performance, four if you have master proficiency, and eight if you have legendary proficiency.%r%r**Critical Success** The target takes a –1 status penalty to Perception checks and Will saves for 1 minute.%r%r**Success** The target takes a –1 status penalty to Perception checks and Will saves for 1 round.%r%r**Critical Failure** The target is temporarily immune to Goblin Song for 1 hour."
    prereq:
      level: 1
    actions: 1
  Goblin Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "Others might look upon them with disdain, but you know that the weapons of your people are as effective as they are sharp. You gain access to all uncommon weapons with the goblin trait. You have familiarity with weapons with the goblin trait—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Gravesight:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: "You can see in the darkness as easily as a psychopomp. You gain darkvision.%r%r**Special** You can select this feat only at 1st level, and you can't retrain into or out of this feat."
    prereq:
      level: 1
      special: Low-light Vision
  Gray Halls's Call:
    feat_type:
      - Ancestry
    traits:
      - ashen one
      - uncommon
    magic_stats:
      innate_spell:
        level: 7
        name: Interplanar Teleport
        tradition: divine
        cast_stat: Charisma
    shortdesc: You have a powerful connection to the Gray Halls and its courts, granting you the ability to travel to and from the Gray Halls. You can cast *interplanar teleport* as a divine innate spell twice per week. This can be used only to travel to the Gray Halls or from the Gray Halls to the Universe. Due to your unique connection to the Gray Halls, your body serves as the locus, and you don't require a planar key.
    prereq:
      level: 17
  Great Egalrin Form:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You take on the imposing form of a large, winged spirit. Once per day, as part of using Long-Nosed Form, you also gain the benefits of 4th-rank *enlarge* and *fly*. This lasts for 5 minutes or until you shift out of your Long-Nosed Form, whichever happens first.
    prereq:
      level: 17
      feat:
        - Long-Nosed Form
  Greater than the Sum:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    magic_stats:
      innate_spell:
        level: 6
        name: Enlarge
        tradition: primal
        cast_stat: Charisma
    shortdesc: You call upon the familial bonds you share with your allies and other kailli to become an overwhelming force in battle. You can cast *enlarge* as a 6th-rank primal innate spell once per day.
    prereq:
      level: 17
  Grimspawn:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Niasa
    traits:
      - lineage
      - niasa
    grants:
      feat:
        - Diehard
    shortdesc: Your lineage traces back to a daemon, one of the manifestations of horrific forms of death that devour souls within their foul home of Abaddon. As a result, you cling tenaciously to the last shreds of your own life force. You gain the Diehard general feat.
    prereq:
      level: 1
  Group Aid:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "Your upbringing emphasized teamwork, and helping your allies comes naturally to you. After you Aid an ally at a skill check that doesn't have the attack trait, you can also Aid any other ally who attempts the same skill check for the same purpose that round. You do so as a free action rather than a reaction.%r%rThe preparation you did to help must still apply to the other allies, and you can Aid each ally only once. For example, if you helped lift up an ally to Aid them on an Athletics check to scale a wall, you could keep the same posture to give a boost to other allies attempting to scale the wall in the same round."
    prereq:
      level: 9
  Guiding Luck:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: "Your luck guides you to look the right way and aim your blows unerringly. You can use Bassin Luck twice per day: once in response to its normal trigger, and once when you fail a Perception check or attack roll instead of the normal trigger."
    prereq:
      level: 9
      feat:
        - Bassin Luck
  Hag Claws:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: "When you came of age, your fingernails grew long and sharp. You gain a claw unarmed attack that deals 1d4 slashing damage. Your claws are in the brawling group and have the agile, finesse, and unarmed traits.%r%r**Special** Hag claws can develop at any point in a changeling's life. You can select this feat anytime you would gain an ancestry feat, but you can't retrain out of it."
    prereq:
      level: 1
  Hag Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: "Through your heritage, you can replicate a hag's magic. Choose one common spell of 4th rank or lower from those available to a coven, including the spells contributed to a coven by a hag of your mother's type. You can cast this spell once per day as a 4th-rank occult innate spell.%r%rSpells available to all covens are *augury*, *charm*, *clairaudience*, *clairvoyance*, *dream message*, and *illusory disguise*. The eligible spells granted by the most prominent types of hag are:%r%r**Cuckoo Hag** *nightmare*, *spellwrack*%r%r**Iron Hag** *earthbind*, *spellwrack*%r%r**Sea Hag** *humanoid form*, *mariner's curse*, *water walk*%r%r**Sweet Hag** *charm*, *honeyed words*, *outcast's curse*"
    prereq:
      level: 13
  Hag's Sight:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: You've nurtured the supernatural abilities gifted by your hag mother, particularly your sight. You gain darkvision.
    prereq:
      level: 1
  Halo:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    shortdesc: You have a halo of light and goodness that sheds light with the effects of a divine *light* cantrip. A cantrip is heightened to a spell rank equal to half your level rounded up. You can Sustain to suppress or reestablish the halo.
    prereq:
      level: 1
  Harbinger's Caw:
    feat_type:
      - Ancestry
    traits:
      - auditory
      - divine
      - misfortune
      - egalrin
    shortdesc: "**Frequency** once per day%r%r**Trigger** A creature within 60 feet is about to attempt an attack roll or skill check.%r%rYou caw ominously, cursing the creature with misfortune. The target creature must roll the triggering check twice and take the lower result."
    prereq:
      level: 13
    actions: reaction
    frequency: once per day
  Hardy Traveler:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: There's no journey too far or burden too heavy when you have friends at your side or hope within your heart. Increase your maximum and encumbered Bulk limits by 1. In addition, you gain a +10-foot circumstance bonus to your Speed during overland travel.
    prereq:
      level: 9
  Haughty Obstinacy:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: Your powerful ego makes it harder for others to order you around. If you roll a success on a saving throw against a mental effect that attempts to directly control your actions, you critically succeed instead. If a creature rolls a failure on a check to Coerce you using Intimidation, it gets a critical failure instead (so it can't try to Coerce you again for 1 week).
    prereq:
      level: 1
  Hellspawn:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Niasa
    traits:
      - lineage
      - niasa
    grants:
      feat:
        - Lie to Me
      skill:
        - Deception
    shortdesc: Your lineage descends from devils, conniving schemers of Hell. You're as skilled at noticing lies and twisted wordings as you are at constructing them. You are trained in Deception and Legal Lore. If you were already trained in Deception (from your background or class, for example), you instead become trained in a skill of your choice. You also gain the Lie to Me skill feat.
    prereq:
      level: 1
  Heroic Presence:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - emotion
      - human
      - mental
    shortdesc: "**Frequency** once per day%r%rThe blood of heroes courses through your veins, and you inspire your allies to dig deep and find a new level of resolve. You grant up to 10 willing creatures within 30 feet the effects of a 6th-rank *zealous conviction*, though the effect automatically ends on a target if you give that target a command they would normally find repugnant. This action has the auditory trait or visual trait, depending on how you inspire your allies."
    prereq:
      level: 17
    actions: 1
    frequency: once per day
  Hold Mark:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    grants:
      skill:
        - Diplomacy
        - Intimidation
        - Religion
        - Survival
    shortdesc: "You bear scars or tattoos enhanced by the mark of your community's prowess. When you select this feat, choose one of the options from the below table. You are trained in the listed skill and gain a +1 status bonus to saves against spells from the listed tradition. You gain a large brand or tattoo in the shape of the chosen emblem or a similar concept (for example, the Burning Sun could be a torch, sun, volcano, or other fiery symbol, while the Empty Hand could be a fist or claw).%r%rFor more information, see the wiki."
    prereq:
      level: 1
  Homeward Bound:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
      - uncommon
    magic_stats:
      innate_spell:
        level: 7
        name: Interplanar Teleport
        tradition: primal
        cast_stat: Charisma
    shortdesc: "**Frequency** twice per week%r%rThe connection between you and Quelynos resonates within your body stronger than it does for most gnomes, allowing you to cross the threshold between the material plane and Quelynos. You gain *interplanar teleport* as a primal innate spell. You can cast it twice per week. This can be used only to travel back and forth between Quelynos and the material plane. Due to your body's natural resonance, you can act as a locus for the spell, and you don't require a specially attuned planar key."
    prereq:
      level: 17
  Hone Claws:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "**Frequency** once per hour%r%rYou grind or gnaw a particularly wicked edge onto your claws. The next claws Strike you hit and deal damage with deals an additional 1d6 bleed damage. You cannot have more than one instance of Hone Claws active at a time."
    prereq:
      level: 9
      feat:
        - Ciith Armaments
    actions: 1
    frequency: once per hour
  Illusion Sense:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: "Your ancestors spent their days cloaked and cradled in illusions, and as a result, sensing illusion magic is second nature to you. You gain a +1 circumstance bonus to both Perception checks and Will saves against illusions.%r%rWhen you come within 10 feet of an illusion that can be disbelieved, the GM rolls a secret check for you to disbelieve it, even if you didn't spend an action to Interact with the illusion."
    prereq:
      level: 1
  Incredible Ferocity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Given time to collect yourself after a near-death scrape, you can rebuild your ferocity and withstand additional finishing blows. You can use Oruch Ferocity with a frequency of once per hour, rather than once per day.
    prereq:
      level: 13
      feat:
        - Oruch Ferocity
  Incredible Improvisation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "**Frequency** once per day%r%r**Trigger** You attempt a check using a skill you're untrained in.%r%rA stroke of brilliance gives you a major advantage with a skill despite your inexperience. Gain a +4 circumstance bonus to the triggering skill check."
    prereq:
      level: 9
      feat:
        - Clever Improviser
    actions: free
    frequency: once per day
  Inspire Imitation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Silyara
    traits:
      - silyara
    shortdesc: Your actions inspire your allies to great achievements. Whenever you critically succeed at a skill check, you automatically qualify to use the Aid reaction when attempting to help an ally using the same skill, even without spending an action to prepare to do so.
    prereq:
      level: 5
  Instinctive Obfuscation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
      - illusion
      - visual
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You are attacked by a foe, but they haven't rolled yet.%r%rThe magic within you manifests as a natural reaction to threats. An illusory double of you appears in your space for a brief moment. The triggering attacker must roll a DC 10 flat check; on a success, the attack targets you normally; if they fail, the attack targets the double and destroys it. The tradition of this action matches the tradition of your gnome ancestry options."
    prereq:
      level: 13
      innate_tradition:
        - arcane
        - occult
    actions: reaction
    frequency: once per hour
  Iron Fists:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Your fists have been forged by battle, your naturally tough skin and dense bone further hardened by conflict. Your fist unarmed attacks no longer have the nonlethal trait and gain the shove weapon trait.
    prereq:
      level: 1
  Irrepressible (Bassin):
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You are easily able to ward off attempts to play on your fears and emotions. When you roll a success on a saving throw against an emotion effect, you get a critical success instead. If your heritage is gutsy bassin, when you roll a critical failure on a saving throw against an emotion effect, you get a failure instead.
    prereq:
      level: 9
  Jinx Glutton:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You can Eat Fortune once per hour, rather than once per day.
    prereq:
      level: 13
      feat:
        - Eat Fortune
  Kailli Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    grants:
      feat:
        - Additional Lore
      skill:
        - Acrobatics
        - Stealth
    shortdesc: "Years of experience among kailli communities have made you nimble, and you've learned to run and hide when enemies threaten. You gain the trained proficiency rank in Acrobatics and Stealth. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Kailli Lore."
    prereq:
      level: 1
  Kailli Roll:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - move
      - kailli
    shortdesc: You roll up into a ball and move up to four times your Speed in a straight line down an incline. If you reach the bottom of the incline or hit an obstacle during this first turn of movement, you stop rolling safely. Otherwise, you automatically keep rolling at this Speed during subsequent turns until you hit the bottom of the incline or an obstacle ends this movement (which can happen in the middle of your turn). You're slowed 2 each turn after the first that you keep rolling, and if you hit an obstacle on a turn after the first, you and the obstacle both take 4d6 bludgeoning damage and you stop rolling.
    prereq:
      level: 5
    actions: 2
  Khazadi Doughtiness:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: You are naturally calm and collected in the face of imminent danger. At the end of your turn, reduce your frightened condition by 2 instead of 1.
    prereq:
      level: 1
  Khazadi Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    grants:
      feat:
        - Additional Lore
      skill:
        - Crafting
        - Religion
    shortdesc: "You eagerly absorbed the old stories and traditions of your ancestors, your gods, and your people, studying subjects and techniques passed down for generation upon generation. You gain the trained proficiency rank in Crafting and Religion. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Khazad Lore."
    prereq:
      level: 1
  Khazadi Reinforcement:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: You can use your knowledge of engineering and metalwork to temporarily strengthen thick objects and structures. By spending 1 hour working on an item, you can give it a +1 circumstance bonus to its Hardness for 24 hours. If you're a master in Crafting, the bonus is +2, and if you're legendary, the bonus is +3. You can reinforce a portion of a structure, though 1 hour usually reinforces only a door, a few windows, or another section that fits within a 10-foot cube.
    prereq:
      level: 5
      skill: Crafting/expert
  Khazadi Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: "Your kin have instilled in you an affinity for hard-hitting weapons, and you prefer these to more elegant arms. You gain access to all uncommon weapons with the khazad trait. You have familiarity with weapons with the khazad trait plus the battle axe, pick, and warhammer—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Kneecap:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: You deliver a punishing blow to an enemy's knee, shin, or other vulnerable anatomy within your reach. Make a melee Strike with a melee weapon or melee unarmed attack. This attack doesn't deal damage. On a hit, the target takes a –10-foot status penalty to its Speed (or a –15-foot status penalty on a critical hit). The penalty lasts for 1 round. This penalty applies only if the target has a land Speed and depends on legs or other targetable appendages to use its land Speed. As with all penalties to Speed, this can't reduce a creature's Speed below 5 feet.
    prereq:
      level: 5
  Lab Rat:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You've spent more than your share of time in an alchemy lab. You have been exposed to a wide variety of alchemical poisons and harmful substances, leaving you with an increased tolerance of their effects. You have a +1 circumstance bonus to saves against poisons and diseases. If you roll a success on your saving throw against a poison or disease, you get a critical success instead.
    prereq:
      level: 5
  Lawbringer:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Aesa
    traits:
      - lineage
      - aesa
    shortdesc: You trace your lineage to archons, guardians of the seven-tiered mountain of Heaven and nurturers of law and virtue within mortals. You gain a +1 circumstance bonus to saves against emotion effects, and if you roll a success on a save against an emotion effect, you get a critical success instead.
    prereq:
      level: 1
  Leech-Clip:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You are trained to capture deserters, or 'leeches.' Make a melee Strike with weapon from the flail group. On a hit, the target takes a –10-foot status penalty to its Speed (or a –15-foot status penalty on a critical hit). The penalty lasts for 1 round. It applies only if the target has a land Speed and depends on legs or other targetable appendages to use its land Speed. As with all penalties to Speed, this can't reduce a creature's Speed below 5 feet.
    prereq:
      level: 1
    actions: 2
  Life Leap:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
      - move
      - teleportation
    shortdesc: "**Requirements** You must be adjacent to a living creature.%r%rYou phase through a space that a living creature occupies in a flash, spontaneously appearing on the opposite side of it in a vibrant display of colorful light. You move from your current location to another location that's still adjacent to the same living creature, but on the opposite side or corner of the creature's space. To determine whether a position is valid, use the same rules as for flanking: a line through the center of the two spaces must pass through opposite sides or corners of the creature's space.%r%rYou pass through the creature's life force, appearing in the selected location; this doesn't trigger reactions based on movement. You must be able to see your destination, and you can't move farther than your Speed would allow."
    prereq:
      level: 9
    actions: 1
  Lifesense:
    feat_type:
      - Ancestry
    traits:
      - divine
      - ashen one
    shortdesc: You have a limited ability to sense life force, like your psychopomp forebears. You gain lifesense as an imprecise sense with a range of 10 feet. This allows you to sense the life force of living and undead creatures within the listed range. The sense can distinguish between the vitality energy animating living creatures and the void energy animating undead creatures, much as sight distinguishes colors.
    prereq:
      level: 5
  Long-Nosed Form:
    feat_type:
      - Ancestry
    traits:
      - concentrate
      - polymorph
      - primal
      - egalrin
    shortdesc: "You transform into a specific, curious-looking human form. This human form is the same age and body type as your egalrin form and has roughly analogous physical traits, such as height, though your nose remains as long as your beak and your complexion has red undertones, no matter the skin color of your human form. Using Long-Nosed Form counts as creating a disguise for the Impersonate use of Deception. Due to your imperfect transformation, your transformation doesn't automatically defeat Perception DCs to determine whether you are human, though you may be able to explain away or hide your egalrin traits.%r%rYou lose your beak unarmed Strike in your human form, as well as any other unarmed Strikes you gained from a egalrin heritage or ancestry feat. You remain in your human form indefinitely, until you Dismiss this effect."
    prereq:
      level: 5
    actions: 1
  Loud Singer:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "Staying on pitch, proper breath control, and remembering the words are all less important than the real measure of a good singer: volume! The range of your Goblin Song is increased to 60 feet, and you can target one additional enemy when you use it."
    prereq:
      level: 5
      feat:
        - Goblin Song
  Magic Rider:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: Your people used powerful magic to travel between distant worlds in the distant past, and the remnants of that magic make such transportation easier for you. When you are the target of a teleportation spell that transports more than one person, it can affect an additional person beyond the normal limit, chosen by the caster. Additionally, when you're the target of a *teleport* spell, you and the other targets arrive no farther than 1 mile off target, regardless of distance traveled.
    prereq:
      level: 17
  Magpie Snatch:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You move quickly, snatching a shiny item that catches your eye. Stride twice, and you can Interact to pick up an unattended object at any point during your movement.
    prereq:
      level: 5
    actions: 2
  March the Mines:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: You march through the earth and lead an ally along. You gain a burrow Speed of 15 feet when you use this activity (if you don't have a higher one), and then you either Stride twice or Burrow twice. You can choose one willing ally adjacent to you at the start of your movement to move with you. That ally ends its movement one square behind you.
    prereq:
      level: 13
    actions: 2
  Mariner's Fire:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    magic_stats:
      innate_spell:
        level: 1
        name: Ignition
        tradition: primal
        cast_stat: Charisma
    shortdesc: You conjure uncanny orbs of spiritual flame that float above or below the water's surface. You can cast the *ignition* cantrip as a primal innate spell at will, heightened to a spell rank equal to half your level rounded up. Your ignition spell takes the form of orbs of fire, and you can cast it underwater.
    prereq:
      level: 1
  Marsh Runner:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: When you use the Step action, you can ignore difficult terrain caused by flooding, swamps, or quicksand. In addition, when you use the Acrobatics skill to Balance on narrow surfaces or uneven marshy ground, you aren't off-guard, and if you roll a success on the Acrobatics check, you get a critical success instead.
    prereq:
      level: 1
      feat:
        - You have a swim Speed
  Mist Child:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: You blend in with unnatural subtlety. When you are concealed or hidden, increase the DC of the flat check to target you to 6 if you're concealed or 12 if you're hidden.
    prereq:
      level: 5
  Monstrous Peacemaker:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ghaluch
    traits:
      - ghaluch
    shortdesc: Your dual nature has given you a unique perspective, allowing you to bridge the gap between sentient humanoids and the many intelligent creatures in the world that others consider monsters. You gain a +1 circumstance bonus to Diplomacy checks against non-humanoid intelligent creatures and against humanoids that are marginalized in human society (at the GM's discretion, but typically at least including giants, goblins, kobolds, and oruch). You also gain this bonus on Perception checks to Sense the Motives of such creatures.
    prereq:
      level: 1
  Mountain's Stoutness:
    feat_type:
      - Ancestry
    traits:
      - dwarf
    shortdesc: "Your hardiness lets you withstand more punishment than most. Increase your maximum Hit Points by your level. When you have the dying 1 condition, the DC of your recovery checks is equal to 9 + your dying value (instead of 10 + your dying value).%r%rIf you also have the Toughness feat, the Hit Points gained from it and this feat are cumulative, and the DC of your recovery checks is equal to 6 + your dying value."
    prereq:
      level: 9
  Multitalented:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "You've learned to split your focus between multiple classes with ease. You gain a 2nd-level multiclass dedication feat, even if you normally couldn't take another dedication feat until you take more feats from your current archetype.%r%rIf you have the silyara heritage, you don't need to meet the feat's attribute modifier prerequisites."
    prereq:
      level: 9
  Musetouched:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Aesa
    traits:
      - lineage
      - aesa
    shortdesc: Your blood sings with the liberating power of the azatas, living embodiments of freedom from the wild realm of Elysium. You gain a +1 circumstance bonus to Escape. When you roll a critical failure on a check to Escape, you get a failure instead, and when you roll a success, you get a critical success instead.
    prereq:
      level: 1
  Natural Ambition:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: You were raised to be ambitious and always reach for the stars, leading you to progress quickly in your chosen field. You gain a 1st-level class feat for your class. You must meet the prerequisites, but you can select the feat later in the character creation process in order to determine which prerequisites you meet.
    prereq:
      level: 1
  Natural Skill:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    grants:
      assign:
        - skill
        - skill
    shortdesc: Your ingenuity allows you to learn a wide variety of skills. You gain the trained proficiency rank in two skills of your choice.
    prereq:
      level: 1
  Necromantic Physiology:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: Your unusual physiology has developed in a way that makes it difficult for parasites and other infestations to prey upon you. You gain a +2 circumstance bonus to saving throws against diseases. If you roll a success on a saving throw against a disease, you get a critical success instead. If you have a different ability that would improve the save in this way (such as the battle hardened fighter class feature), if you roll a critical failure on the save you get a failure instead.
    prereq:
      level: 5
  Nephilim Eyes:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: Your eyes can see through darkness with visual acuity akin to that possessed by most extraplanar beings. You gain darkvision.
    prereq:
      level: 1
      special: Low-light Vision
  Nephilim Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    grants:
      feat:
        - Additional Lore
      skill:
        - Religion
      orskill:
        - Diplomacy
        - Intimidation
    shortdesc: "You know the secrets of the light and shadow planes. You gain the trained proficiency rank in either Diplomacy or Intimidation, and Religion. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for a Lore subcategory of a plane to which you trace your lineage."
    prereq:
      level: 1
  Nephilim Resistance:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: "You resist energy like your extraplanar predecessors. Choose one of the following energy damage types: acid, cold, electricity, fire, or sonic. You gain resistance 5 to that damage type.%r%rThe damage type typically matches an extraplanar entity associated with your bloodline. For instance, an angelkin might choose resistance to cold, while a hellspawn might choose resistance to fire."
    prereq:
      level: 5
  Night Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    magic_stats:
      innate_spell:
        level: 2
        name:
          - Animal Form
          - Mist
        tradition: divine
        cast_stat: Charisma
    shortdesc: You can tap into the magic that runs through your blood. You gain *animal form* (wolf only, using the statistics for a canine) and *mist* as 2nd-rank divine innate spells. You can cast each of these spells once per day.
    prereq:
      level: 9
  Nimble Hooves:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    shortdesc: "You possess hooves, ankle wings, or some other feature that hastens your movement. Your Speed increases by 5 feet.%r%r**Special** The Speed increase from this feat isn't cumulative with any Speed increase from other ancestry feats."
    prereq:
      level: 1
  Nimble Sil:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: Your muscles are tightly honed. Your Speed increases by 5 feet.
    prereq:
      level: 1
  Occult Resistance:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
    shortdesc: Your study of occult practices has shown you how to best defend against them. You gain a +1 circumstance bonus to all saving throws against occult effects.
    prereq:
      level: 9
      skill: Occultism/expert
  One-Toed Hop:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: Assuming a peculiar stance, you make a short hop on each toe. You make a vertical Leap without triggering reactions that can be triggered by move actions or upon leaving or entering a square.
    prereq:
      level: 1
    actions: 1
  Oruch Ferocity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: "**Frequency** once per day%r%r**Trigger** You would be reduced to 0 Hit Points but not immediately killed.%r%rFierceness in battle runs through your blood, and you refuse to fall from your injuries no matter how terrible they may be. You avoid being knocked out and remain at 1 Hit Point, and your wounded condition increases by 1."
    prereq:
      level: 1
    actions: reaction
    frequency: once per day
  Oruch Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    grants:
      feat:
        - Additional Lore
      skill:
        - Athletics
        - Survival
    shortdesc: "The hold elders taught you your people's histories, told tales of great athletic feats, and shared with you the hardships your ancestors endured so that you can pass this wisdom down to future generations. You become trained in Athletics and Survival. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Oruch Lore."
    prereq:
      level: 1
  Oruch Sight:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ghaluch
    traits:
      - ghaluch
    shortdesc: "Your oruch blood grants you the keen vision of your forebears. You gain darkvision, allowing you to see in darkness and dim light just as well as you can in bright light. However, in darkness, you see in black and white only.%r%r**Special** You can take this feat only at 1st level, and you can't retrain out of this feat or into this feat."
    prereq:
      level: 1
      special: Low-light Vision
  Oruch Superstition:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - concentrate
      - oruch
    shortdesc: "**Trigger** You attempt a saving throw against a spell or magical effect, and have not yet rolled.%r%rYou defend yourself against magic by relying on techniques derived from oruch cultural superstitions. You gain a +1 circumstance bonus to your saving throw against the triggering spell or magical effect."
    prereq:
      level: 1
    actions: reaction
  Oruch Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: "In combat, you favor the brutal weapons that are traditional for your oruch ancestors. You gain access to all uncommon weapons with the oruch trait. You have familiarity with weapons with the oruch trait plus the falchion and greataxe—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Otherworldly Acumen:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "The arcane magic you possess grows in power and complexity. Choose one common 2nd-rank spell from the same tradition as an innate spell you previously gained from another sildanyar ancestry feat (from the arcane list if you have Otherworldly Magic, for example). You can cast that spell as an innate spell once per day, using the same tradition as the list you chose the spell from.%r%rYour magic is adaptable. By spending 1 day of downtime, you can change the spell you chose to a different common 2nd-rank spell from the same tradition."
    prereq:
      level: 9
      innate_tradition:
        - arcane
        - divine
        - primal
        - occult
  Otherworldly Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    magic_stats:
      innate_spell:
        level: 1
        name: open
        tradition: arcane
        cast_stat: Intelligence
    shortdesc: Your sildanyari magic manifests as a simple arcane spell, even if you aren't formally trained in magic. Choose one cantrip from the arcane spell list. You can cast this cantrip as an arcane innate spell at will. A cantrip is heightened to a spell rank equal to half your level rounded up.
    prereq:
      level: 1
  Overcrowd:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: As long as you are Small, you can end your movement in the same square as a Small ally. Only two creatures total can share the same space when using this ability or a similar one.
    prereq:
      level: 9
  Pack Rat:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You've learned how to cram vast quantities into small spaces. You can fit an additional 50% of the listed Bulk capacity into mundane storage containers or vehicles. For example, you can fit 6 Bulk in a backpack, or 12 Bulk in a chest. This doesn't alter the items' Bulk, nor does it change how much you can store in a magical or extradimensional storage space, such as a *spacious pouch*.
    prereq:
      level: 1
  Parthenogenic Hatchling:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "You were hatched from an unfertilized egg during hard times for your people, and are a biological copy of your mother. You gain a +1 circumstance bonus to saving throws against diseases. If you roll a success on a saving throw against a disease, you get a critical success instead. If you have a different ability that would improve the save in this way (such as the battle hardened fighter class feature), if you roll a critical failure on the save you get a failure instead.%r%rYou take damage only every 2 hours from thirst and every 2 days from starvation, rather than every hour and every day.%r%r**Special** You can select this feat only at 1st level."
    prereq:
      level: 1
  Pervasive Superstition:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: You steep yourself in superstition and practice ancient oruch mental exercises for shrugging off the effects of magic. You gain a +1 circumstance bonus to saving throws against spells and magical effects at all times.
    prereq:
      level: 9
      feat:
        - Oruch Superstition
  Pitborn:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Niasa
    traits:
      - lineage
      - niasa
    grants:
      skill:
        - Athletics
      assign:
        feat:
          - skill feat
    shortdesc: "Your blood bears the mark of a demon, a living embodiment of sin from the fetid depths of the shadow planes. Demonic power pulses through your veins and manifests in a different way for each pitborn, whether you have webbed fingers and thrive in the water, large hands capable of wrestling larger foes, or some other manifestation. You are trained in Athletics. If you were already trained in Athletics (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain any one common 1st-level skill feat with a prerequisite of trained in Athletics, as reflects the manifestation of your fiendish blood."
    prereq:
      level: 1
  Prairie Rider:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    grants:
      skill:
        - Nature
    shortdesc: You grew up riding your clan's shaggy ponies and riding dogs. You become trained in Nature. If you would automatically become trained in Nature (from your background or class, for example), you instead become trained in a skill of your choice. You also get a +1 circumstance bonus to Command an Animal if the target is a traditional bassin mount, such as a pony or riding dog.
    prereq:
      level: 1
  Pride in Arms:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - auditory
      - arvek
    shortdesc: "**Trigger** An ally within 30 feet brings an enemy to 0 Hit Points.%r%rWith a shout of triumph, you grant inspiration to an ally fight on. The triggering ally gains temporary Hit Points equal to their Constitution modifier until the end of their next turn."
    prereq:
      level: 9
    actions: reaction
  Primal Rampage:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    magic_stats:
      innate_spell:
        level: 4
        name:
          - Unfettered Movement
          - Mountain Resilience
        tradition: primal
        cast_stat: Charisma
    shortdesc: You gain *unfettered movement* and *mountain resilience* as 4th-rank primal innate spells that you can cast once per day. As a 3-action activity, you can Cast a Spell twice to cast both of these innate spells, as long as they are both still available for the day.
    prereq:
      level: 13
  Project Persona:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - concentrate
      - gnome
      - illusion
      - primal
      - visual
    shortdesc: Where others etch their armor to serve as a conduit for their imaginations, your vivid mind and bold personality allow you to project a more fitting persona over your lackluster armor. You change the shape and appearance of your armor to appear as ordinary or fine clothes of your imagining. The armor's statistics don't change. This effect lasts as long as you remain conscious and are wearing the armor. A creature can disbelieve the illusion by Seeking or touching your armor. The DC equals your Will DC.
    prereq:
      level: 5
    actions: 1
  Quelynos Adept:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    magic_stats:
      innate_spell:
        level: 2
        name:
          - Invisibility
          - Revealing Light
        tradition: primal
        cast_stat: Charisma
    shortdesc: Over time your fey magic has grown stronger. You gain *invisibility* and *revealing light* as 2nd-rank primal innate spells. You can cast each of these primal innate spells once per day.
    prereq:
      level: 9
      innate_tradition: primal
  Quelynos Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    magic_stats:
      innate_spell:
        level: cantrip
        name: open
        tradition: primal
        cast_stat: Charisma
    shortdesc: Your connection to Quelynos grants you a primal innate spell, much like those of the fey. Choose one cantrip from the primal spell list. You can cast this spell as a primal innate spell at will. A cantrip is heightened to a spell rank equal to half your level rounded up.
    prereq:
      level: 1
  Quick Stow (Kailli):
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: "**Frequency** once per round%r%rYou Interact to store one item you're holding in your cheek pouches (provided it fits)."
    prereq:
      level: 5
      feat:
        - Cheek Pouches
    actions: free
    frequency: once per round
  Quietus Strikes:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: Your connection to the Gray Halls empowers you to bring death to all forms of life and unlife, exploiting their weaknesses. All your weapon and unarmed Strikes are magical and deal 1 additional void damage to living creatures and 1 additional vitality damage to undead. The extra damage increases to 2 if the Strike has a *+3 potency rune*.
    prereq:
      level: 9
  Rallying Cry:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - auditory
      - arvek
    shortdesc: "**Frequency** once per day%r%rYou call out to your allies and push them to give their all in combat. All allies in a 30-ft emanation that can hear you gain a number of temporary Hit Points equal to your level. In addition, these allies become Quickened for 1 minute but can use the extra action only to Step, Stride, or Strike."
    prereq:
      level: 17
    actions: 2
    frequency: once per day
  Rampaging Ferocity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: "**Trigger** You use Oruch Ferocity.%r%rYou lash out viciously even as you fend off death. Make a single melee Strike. If this Strike brings a foe to 0 Hit Points, this activation of Oruch Ferocity doesn't count against its frequency."
    prereq:
      level: 17
      feat:
        - Oruch Ferocity
    actions: free
  Rat Familiar:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You have a pet rat that has become magically bonded to you. You gain a familiar, and this familiar must be a rat. It still gets the benefits of familiar abilities, but its base form remains a rat.
    prereq:
      level: 1
  Rat Form:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - concentrate
      - polymorph
      - primal
      - kailli
    shortdesc: You can transform into an innocuous-looking rat. You gain the effects of a 1st-rank *pest form* spell, but you must assume the battle form of a Tiny rat.
    prereq:
      level: 9
    actions: 1
  Rat Magic:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    magic_stats:
      innate_spell:
        level: 1
        name: Animal Messenger
        tradition: primal
        cast_stat: Charisma
    shortdesc: There always seems to be a little rat around to carry messages for you. You can cast *Animal Messenger* once per day as a primal innate spell. When you do, the animal that responds is always a rat. If there are no rats within range, the spell is lost.
    prereq:
      level: 5
  Ratspeak:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You can ask questions of, receive answers from, and use the Diplomacy skill with rodents, including beavers, mice, porcupines, rats, and squirrels, but not with other mammals, such as dogs or bats. The GM determines which animals count as rodents.
    prereq:
      level: 1
  Razzle-Dazzle:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You blind or dazzle a creature.%r%rYou've spent considerable time practicing the manipulation of light, weaponizing your blade's reflection or bolstering the luminosity of magical displays to unconventional heights. Extend the duration of the blinded or dazzled condition you give the target by 1 round."
    prereq:
      level: 1
    actions: free
    frequency: once per hour
  Reckless Abandon:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - fortune
      - goblin
    shortdesc: "**Frequency** once per day%r%rDespite a lifetime filled with questionable decisions, you've managed to survive, as though you have uncanny luck that lets you avoid the consequences of your own actions. For the remainder of your turn, if you roll a failure or critical failure on a saving throw against a harmful effect, you get a success instead. Further, if you would take damage from an enemy or hazard this turn you take the minimum possible damage.%r%rThese benefits apply only to harmful effects incurred entirely during your turn in which you activate Reckless Abandon, such as running through a *wall of fire*. Persistent damage and conditions that were applied prior to your turn proceed normally, and as soon as your turn ends you are subject to the full consequences of any dangers still threatening you."
    prereq:
      level: 17
    actions: free
    frequency: once per day
  Recognize Ambush:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: "**Trigger** You roll initiative.%r%rYour combat training has honed you to be ready for an attack at all times. You Interact to draw a weapon."
    prereq:
      level: 5
    actions: free
  Remorseless Lash:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You're skilled at beating an enemy when their morale is already breaking. When you succeed at a melee weapon Strike against a Frightened enemy, that enemy can't reduce their frightened condition below 1 until the beginning of your next turn.
    prereq:
      level: 1
  Reptile Speaker:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: You hear the sounds of reptiles as language. You can ask questions of, receive answers from, and use the Diplomacy skill with animals that are reptiles (the GM determines which animals count as reptiles).
    prereq:
      level: 1
  Resist Ruin:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    magic_stats:
      innate_spell:
        level: 5
        name: False Vitality
        tradition: divine
        cast_stat: Charisma
    shortdesc: Your Ashen One heritage allows you to extend protection against void energy. You gain resistance 5 to void, and once per day, you can cast *false vitality* as a 5th-rank divine innate spell.
    prereq:
      level: 13
  Rock Runner:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: Your innate connection to stone makes you adept at moving across uneven surfaces. You can ignore difficult terrain caused by stone (such as rubble or gravel) and uneven ground made of stone and earth. In addition, when you use the Acrobatics skill to Balance on narrow surfaces or uneven ground made of stone or earth, you aren't off-guard, and when you roll a success at one of these Acrobatics checks, you get a critical success instead.
    prereq:
      level: 1
  Rough Rider:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    grants:
      feat:
        - Ride
    shortdesc: "You are especially good at riding traditional goblin mounts. You gain the Ride feat, even if you don't meet the prerequisites. You gain a +1 circumstance bonus to Nature checks to use Command an Animal on a goblin dog or wolf mount.%r%rIf you gain a wolf as an animal companion, it gains the mount special ability (and if you gain an ability that grants you an animal companion with the mount special ability, you can choose a wolf)."
    prereq:
      level: 1
  Runtsage:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    grants:
      feat:
        - Adopted Ancestry
    shortdesc: Unlike most of your kind, who dismiss goblins as embarrassments or expendable annoyances, you have studied the methodology behind their irresponsible and incomprehensible actions. You gain the Adopted Ancestry general feat and must select goblin as the feat's chosen ancestry. You also gain one 1st-level goblin ancestry feat.
    prereq:
      level: 5
  Scar-Thick Skin:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: Glorious, storied scars cover and protect much of your body, girding you in fleshly armor that resists any wound weaker than those you have already survived. Your DC on flat checks to end persistent bleed damage is reduced from 15 to 10, or from 10 to a 5 after receiving especially appropriate assistance.
    prereq:
      level: 5
  Scavenger's Search:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You're always on the lookout for supplies and valuables. You gain a +2 circumstance bonus to locate objects (including secret doors and hazards) you search for within 30 feet with a Seek action.
    prereq:
      level: 1
  Scion Transformation:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
      - primal
    grants:
      feat:
        - Clumsy
    shortdesc: You go into hibernation for twenty-four hours and perform a ritual dedicated to your ancestors, undergoing a one-time metamorphosis. You permanently gain the effects of *enlarge*, and your maximum Hit Points increase by your level. The ritual transforms most of your gear to the appropriate size for your new body (though powerful items like artifacts or items strongly tied to their original size may not transform, at the GM's discretion).
    prereq:
      level: 17
  Scion of Many Planes:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: The long and complicated history of your bloodline manifests in your ability to draw power from more planar sources than most other nephilim. Choose one aesa or niasa lineage feat that you do not already possess; you gain that feat and all of its benefits, even if you already took a lineage feat at 1st level.
    prereq:
      level: 5
  Sense Allies:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: Like many humans raised in a close-knit community, you have always been strongly attuned to the presence of others. Willing allies that you are aware of within 60 feet that would otherwise be undetected by you are instead hidden from you. The flat check for you to target willing allies within 60 feet that are hidden from you is 5 instead of 11.
    prereq:
      level: 5
  Shadow Self:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: "**Frequency** once per hour%r%r**Trigger** You successfully use Stealth to Hide and become hidden from all your current foes, or use Stealth to Sneak and become undetected to all your current foes.%r%rYou slip from your adversaries' notice and appear to be somewhere else. You become invisible for 1 minute or until you take a hostile action, whichever comes first. Choose a location within 10 feet of you. Until your invisibility ends, you appear to be hidden in that location to anyone trying to find you. If the searcher gets clear evidence that you're not there, they no longer think you're hidden there, but they don't discover your actual location."
    prereq:
      level: 17
      skill: Stealth/legendary
    frequency: once per hour
  Shed Tail:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "**Trigger** You become grabbed.%r%r**Requirements** You have a fully grown tail.%r%rYou can shed a portion of your tail to escape. You cease being grabbed, then Stride without triggering any reactions from the creature that grabbed you. It takes 1 day for your tail to fully grow back. Until it does, you can't use your tail unarmed attack, and you take a –2 circumstance penalty on checks to Balance."
    prereq:
      level: 5
      feat:
        - Ciith Armaments (Tail)
    actions: reaction
  Shinstabber:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: As long as you're Small or smaller, you can end your movement in the same square as an ally of any size. Only two creatures total can share the same space when using this ability or a similar one.
    prereq:
      level: 13
      feat:
        - Overcrowd
  Sil Atavism:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Silyara
    traits:
      - silyara
    shortdesc: "Your sildanyari blood runs particularly strong, granting you features far more sildanyari than those of a typical silyara. You may also have been raised among sildanyari, steeped in your sildanyari ancestors' heritage. You gain the benefits of the sildanyar heritage of your sildanyari parent or ancestors. You typically can't select a heritage that depends on or improves an sildanyari feature you don't have.%r%r**Special** You can take this feat only at 1st level, and you can't retrain out of this feat or into this feat."
    prereq:
      level: 1
  Sildanyar Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    grants:
      feat:
        - Additional Lore
      skill:
        - Arcana
        - Nature
    shortdesc: "You've studied traditional sildanyari arts, learning about arcane magic and the world around you. You gain the trained proficiency rank in Arcana and Nature. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Sildanyar Lore."
    prereq:
      level: 1
  Sildanyar Step:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: You move in a graceful dance, and even your steps are broad. You Step 5 feet twice.
    prereq:
      level: 9
    actions: 1
  Sildanyari Weapon Familiarity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "You favor bows and other elegant weapons. You gain access to all uncommon weapons with the sildanyar trait. You have familiarity with weapons with the sildanyar trait plus longbows, composite longbows, rapiers, shortbows, and composite shortbows—for the purposes of proficiency, you treat any of these that are martial weapons as simple weapons and any that are advanced weapons as martial weapons.%r%rAt 5th level, whenever you get a critical hit with one of these weapons, you get its critical specialization effect."
    prereq:
      level: 1
  Skillful Tail:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    shortdesc: You've always had a tail, but with practice, you've learned to use it for more than signaling your mood. You can perform simple Interact actions with your tail, such as opening an unlocked door. Your tail can't perform actions that require fingers or significant manual dexterity, including any action that would require a check to accomplish, and you can't use it to hold items.
    prereq:
      level: 5
  Skittering Scuttle:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: You can scuttle farther and faster when maneuvering alongside allies. When you use Goblin Scuttle, you can Stride up to half your Speed instead of Stepping.
    prereq:
      level: 9
      feat:
        - Goblin Scuttle
  Skittering Sneak:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You squish, slink, and skitter from cover to cover with great speed and stealth. You can move up to your full Speed when you Sneak.
    prereq:
      level: 13
  Slag May:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Changeling
    traits:
      - changeling
      - lineage
    shortdesc: Your mother was an iron hag known for physical prowess, and you have one violet or steel-gray eye. You have thick, sturdy claws made of cold iron that grow naturally from your body. You gain a claw unarmed attack that deals 1d6 slashing damage. Your claws are in the brawling group, have the unarmed and grapple traits, and are cold iron.
    prereq:
      level: 1
  Slip Sideways:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Niasa
    traits:
      - niasa
    magic_stats:
      innate_spell:
        level: 5
        name: Translocate
        tradition: divine
        cast_stat: Charisma
    shortdesc: Like many fiends, you have the supernatural ability to teleport yourself to safety. Once per day, you can cast *translocate* as a 5th-rank divine innate spell.
    prereq:
      level: 13
      orfeat:
        - Grimspawn
        - Pitborn
        - Hellspawn
  Sneaky:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: "Stealth is an important tool in your arsenal. You can move 5 feet farther when you take the Sneak action, up to your Speed.%r%rIn addition, as long as you continue to use Sneak actions and succeed at your Stealth check, you don't become observed if you don't have cover or greater cover and aren't Concealed at the end of the Sneak action, as long as you have cover or greater cover or are concealed at the end of your turn."
    prereq:
      level: 1
  Soaring Flight:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: "**Frequency** once per round%r%rYou Fly. If you don't normally have a fly Speed, you gain a fly Speed of 20 feet for this movement. If you aren't on solid ground at the end of this movement, you fall."
    prereq:
      level: 5
      heritage: Skyborn Egalrin
    actions: 1
    frequency: once per round
  Soaring Form:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You have a fly Speed of 20 feet at all times.
    prereq:
      level: 9
      feat:
        - Soaring Flight
  Spell Devourer:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: You don't just resist magic; you devour it. Whenever you succeed at a saving throw against a spell or magical effect, you gain temporary Hit Points equal to double the spell's rank, or equal to the level if the magical effect isn't a spell. These temporary Hit Points last until the end of your next turn.
    prereq:
      level: 13
      feat:
        - Pervasive Superstition
  Spirit Soother:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: You are attuned to the minute sounds and sensations of restless spirits. Even if you aren't Searching, you can attempt a check to find haunts that normally require you to be Searching. You still need to meet any other requirements to find the haunt. You gain a +1 circumstance bonus to checks to disable haunts.
    prereq:
      level: 5
  Squad Tactics:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You are adept at working with your allies to surround an enemy. If an enemy is within reach of you and at least two of your allies, that enemy is Off-Guard to you.
    prereq:
      level: 9
  Squawk!:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: "**Trigger** You critically fail a Deception, Diplomacy, or Intimidation check against a creature that doesn't have the egalrin trait.%r%rYou let out an awkward squawk, ruffle your feathers, or fake some other birdlike tic to cover up a social misstep or faux pas. You get a failure on the triggering check, rather than a critical failure. All creatures that witnessed you Squawk are temporarily immune for 24 hours."
    prereq:
      level: 1
    actions: reaction
  Step Lively:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: "**Trigger** A Large or larger enemy ends a move action adjacent to you.%r%rYou are an expert at avoiding the lumbering footsteps of larger creatures. You Step to another space adjacent to the enemy."
    prereq:
      level: 5
    actions: reaction
  Stone Bones:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: "**Trigger** You are struck by a critical hit that deals physical damage.%r%rYour intractable nature can help you shrug off even the most grievous injuries. Attempt a DC 17 flat check. If you are successful, the attack becomes a normal hit."
    prereq:
      level: 9
    actions: reaction
  Stone Face:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You've mastered the art of composure, even in the face of fear. You gain a +1 circumstance bonus to saves against effects with the fear trait and a +2 circumstance bonus to your Will DC against Intimidation skill actions, such as Demoralize.
    prereq:
      level: 1
  Stonegate:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
      - uncommon
    magic_stats:
      innate_spell:
        level: 7
        name: Magic Passage
        tradition: divine
        cast_stat: Charisma
    shortdesc: Earthen barriers no longer impede your progress. You gain *magic passage* as a 7th-rank divine innate spell that you can cast once per day. Unlike the spell, however, this ability can be used only to open passages through barriers of earth or stone.
    prereq:
      level: 17
      feat:
        - Stonewalker
  Stonemason's Eye:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    grants:
      feat:
        - Specialty Crafting
      skill:
        - Crafting
    shortdesc: "You understand the intricacies of stonework. You become trained in Crafting. If you're already trained in Crafting, you instead gain the Specialty Crafting skill feat for stonemasonry.%r%rYou also gain a +2 circumstance bonus to Perception checks to notice unusual stonework. This bonus applies to checks to discover mechanical traps made of stone or hidden within stone.%r%rIf you aren't using the Seek action or searching, the GM automatically rolls a secret check for you to notice unusual stonework anyway. This check doesn't gain your normal circumstance bonus."
    prereq:
      level: 1
  Stonewalker:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    magic_stats:
      innate_spell:
        level: 3
        name: One with Stone
        tradition: divine
        cast_stat: Charisma
    shortdesc: "You have a deep reverence for and connection to stone. You can cast *one with stone* as a 3rd-rank divine innate spell once per day.%r%rIf you have the Stonemason's Eye feat, you can attempt to find unusual stonework and stonework traps that require legendary proficiency in Perception. If you have both Stonemason's Eye and legendary proficiency in Perception, when the GM rolls a secret check for you to notice unusual stonework, you keep your bonus from Stonemason's Eye."
    prereq:
      level: 9
  Stonewall:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
      - earth
      - polymorph
    shortdesc: "**Trigger** An enemy or hazard's effect hits you or you fail a Fortitude save against one.%r%rThe strength of stone overcomes you so strongly that it replaces your stout body. You become petrified until the end of the current turn. You don't take any damage from the triggering effect or any other ill effects that couldn't affect stone."
    prereq:
      level: 17
    actions: reaction
    frequency: once per day
  Storm's Lash:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    magic_stats:
      innate_spell:
        level: cantrip
        name: Electric Arc
        tradition: primal
        cast_stat: Charisma
    shortdesc: Wind and lightning have always been friends to you. You can cast the *electric arc* cantrip as a primal innate spell at will. A cantrip is heightened to a spell rank equal to half your level rounded up.
    prereq:
      level: 1
  Straveika:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Dar
    traits:
      - dar
      - lineage
    shortdesc: You descend from one of the truly ancient vampires, a nosferatu cursed to eternal life but not eternal youth. People call you straveika, or ancient-born. The vestiges of your forebear's powers of domination have left you with an understanding of how a creature's intentions change its behaviors. You gain a +1 circumstance bonus to Perception checks to Sense Motive and Perception DCs against attempts to Lie to you.
    prereq:
      level: 1
  Stubborn Persistence:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: Humans are renowned for their ability to persist through the most grueling of trials that would leave others ready to drop. When you would become fatigued, attempt a DC 17 flat check. On a success, you aren't fatigued. If the fatigued condition has an underlying cause that you don't address, such as lack of rest, you must attempt the check again at an interval determined by the GM until you fail the flat check or address the underlying cause.
    prereq:
      level: 13
  Summon Nephilim Kin:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Aesa
      - Niasa
    traits:
      - aesa
      - niasa
    shortdesc: You have a connection to the light or shadow planes, allowing you to summon a divine ally. Choose either *summon celestial* or *summon fiend*. Once per day, you can cast the chosen spell as a 5th-rank divine innate spell, but the creature summoned must be from the same category as your own lineage, such as a creature with the angel trait if you are an angelkin.
    prereq:
      level: 13
      feat:
        - any nephilim lineage feat
  Supernatural Charm:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Silyara
    traits:
      - silyara
    magic_stats:
      innate_spell:
        level: 1
        name: Charm
        tradition: arcane
        cast_stat: Charisma
    shortdesc: The sildanyari magic in your blood manifests as a force you can use to become more appealing or alluring. You can cast 1st-rank *charm* as an arcane innate spell once per day.
    prereq:
      level: 5
  Sure Feet:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: Whether keeping your balance or climbing, your feet easily find purchase. If you roll a success on an Acrobatics check to Balance or an Athletics check to Climb, you get a critical success instead. You're not off-guard when you attempt to Balance or Climb.
    prereq:
      level: 1
  Svetocher:
    feat_type:
      - Ancestry
      - Lineage
    assoc_ancestry:
      - Dar
    traits:
      - dar
      - lineage
    grants:
      skill:
        - Diplomacy
    shortdesc: You were born to a moroi, the most common vampires, and you share their supernatural fortitude and power of persuasion. When you have the drained condition, calculate the penalty to your Fortitude saves and your Hit Point reduction as though the condition value were 1 lower. You're trained in Diplomacy. If you would automatically be trained in it, you instead become trained in a skill of your choice.
    prereq:
      level: 1
  Swift Swimmer:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: "You gain a swim Speed of 15 feet.%r%r**Special** If you have the makar ciith heritage, your swim Speed instead increases to 25 feet."
    prereq:
      level: 5
  Symphony of Blood:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    magic_stats:
      innate_spell:
        level: 7
        name: Vampiric Exsanguination
        tradition: divine
        cast_stat: Charisma
    shortdesc: You call forth the blood of your foes to grant you vigor. You can cast *vampiric exsanguination* as a 7th-rank divine innate spell once per day.
    prereq:
      level: 17
  Telluric Power:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: You channel strength from the earth beneath your feet to pummel your enemies. When making a melee Strike against a target who is standing on the same earth or stone surface as you are, you gain a circumstance bonus to the damage roll equal to the number of weapon damage dice.
    prereq:
      level: 13
  Terrain Advantage:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Ciith
    traits:
      - ciith
    shortdesc: Non-ciith creatures in difficult terrain are off-guard to you. If you have a swim Speed, non-ciith creatures that are in water and lack a swim Speed are also off-guard to you.
    prereq:
      level: 9
  Thunder God's Fan:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: Your fan unleashes the fury of the storm. You can use the Wave Fan activation one additional time per day. Add a 5th-rank *lightning bolt* spell to the spells contained within your fan.
    prereq:
      level: 13
      feat:
        - Egalrin Feather Fan
  Tinkering Fingers:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    grants:
      skill:
        - Crafting
    shortdesc: You're trained in Crafting. If you are trained in Crafting from another source (from your background or class, for example), you instead become trained in a skill of your choice. You can Repair an item without using a repair toolkit without taking the –2 circumstance penalty, improvising tools from whatever you have at hand. You gain a +1 circumstance bonus to Crafting checks to Repair an item when you have a repair toolkit.
    prereq:
      level: 1
  Titan Slinger:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You have learned how to use your sling to fell enormous creatures. When you hit on an attack with a weapon of the sling group against a Large or larger creature, increase the size of the weapon damage die by one step.
    prereq:
      level: 1
  Toppling Dance:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: While sharing a creature's space using Dance Underfoot, your melee weapons and unarmed attacks gain the trip trait, but only against the creature whose space you share. You can be in the same space as a Large or larger prone creature, even if it's not your ally.
    prereq:
      level: 13
      feat:
        - Dance Underfoot
  Tree Climber (Sildanyar):
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: You've spent much of your life among the treetops and have become an expert at quickly and safely climbing them. You gain a Climb Speed of 10 feet.
    prereq:
      level: 9
  Trickster Egalrin:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: You can transform yourself or the bodies of others to express your displeasure. Once per day, you can cast either *aerial form* or *cursed metamorphosis* as a 7th-rank primal innate spell. You must take the form of a bird when casting this aerial form.
    prereq:
      level: 17
  Tusks (Oruch):
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: "You have particularly long, jagged tusks perfect for tearing meat from bone. You gain a tusks unarmed attack that deals 1d6 piercing damage. Your tusks are in the brawling group and have the finesse and unarmed traits.%r%r**Special** You can take this feat only at 1st level, and you can't retrain into this feat. You can retrain out of this feat only through drastic measures, such as breaking, filing, or extracting your tusks."
    prereq:
      level: 1
  Unburdened Iron:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Khazad
    traits:
      - khazad
    shortdesc: "You've learned techniques first devised by your ancestors during their ancient conflicts with the khazad-rukh, allowing you to comfortably wear massive suits of armor. Ignore the reduction to your Speed from any armor you wear.%r%rIn addition, any time you're taking a penalty to your Speed for some other reason (such as from the encumbered condition or from a spell), deduct 5 feet from the penalty. For example, the encumbered condition normally gives a –10-foot penalty to Speed, but this feat would reduce it to a –5-foot penalty. If your Speed is taking multiple penalties, pick only one penalty to reduce."
    prereq:
      level: 1
  Uncanny Agility:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    grants:
      feat:
        - Steady Balance
    shortdesc: You have near-supernatural poise that lets you move swiftly across the most unsteady surfaces. You gain the Steady Balance skill feat. You can Step into difficult terrain caused by uneven ground, such as a rocky field, hilly incline, or rocking ship.
    prereq:
      level: 1
  Uncanny Cheeks:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    grants:
      feat:
        - Prescient Consumable
        - Prescient Planner
    shortdesc: You gain the Prescient Consumable and Prescient Planner feats, except that you always withdraw the objects from your cheek pouches. This means the object you retrieve must fit in your cheek pouches; this is generally an item of negligible Bulk unless you also have the Cheek Pouches feat.
    prereq:
      level: 9
  Unconventional Weaponry:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Human
    traits:
      - human
    shortdesc: "You've familiarized yourself with a particular weapon, potentially from another ancestry or culture. Choose an uncommon simple or martial weapon with a trait corresponding to an ancestry (such as khazad, goblin, or oruch) or that is common in another culture. You gain access to that weapon, and for the purpose of proficiency, you treat it as a simple weapon.%r%rIf you are trained in all martial weapons, you can instead choose an uncommon advanced weapon that has an ancestry's trait or is common in another culture. You gain access to that weapon and have familiarity with that weapon. For the purpose of proficiency, you treat it as a martial weapon."
    prereq:
      level: 1
  Undead Slayer:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: Your knowledge of your own not-quite-living anatomy, combined with your experience in combat, helps you take down undead foes with ease. Against undead creatures, you gain a circumstance bonus to damage with weapon and unarmed Strikes equal to the number of weapon damage dice for the Strike. This bonus increases to double the number of weapon damage dice if your target has the vampire trait.
    prereq:
      level: 5
  Undying Ferocity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Oruch
    traits:
      - oruch
    shortdesc: You resist death's clutches with supernatural vigor, daring death to claim you while promising that any such attempt will surely fail. When you use Oruch Ferocity, you gain temporary Hit Points equal to your level.
    prereq:
      level: 9
      feat:
        - Oruch Ferocity
  Unfettered Bassin:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: You were either pressed into indentured servitude or shackled in a prison, but you've since escaped and have trained to ensure you'll never be caught again. Whenever you roll a success on a check to Escape or a saving throw against an effect that would impose the grabbed, immobilized, or restrained condition on you, you get a critical success instead. Whenever a creature rolls a failure on a check to Grapple you, it gets a critical failure instead.
    prereq:
      level: 1
  Unhampered Passage:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    magic_stats:
      innate_spell:
        level: 4
        name: Unfettered Movement
        tradition: primal
        cast_stat: Charisma
    shortdesc: You won't allow others to restrain you. You can cast *unfettered movement* on yourself as a primal innate spell once per day.
    prereq:
      level: 9
  Universal Longevity:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "**Frequency** once per day%r%rYou've perfected your ability to keep up with all the skills you've learned over your long life, so you're almost never truly untrained at a skill. You reflect on your life experiences, changing the skill you selected with Ancestral Longevity (and the skill you selected with Expert Longevity if you have that feat)."
    prereq:
      level: 13
      feat:
        - Ancestral Longevity
    frequency: once per day
  Unwavering Mien:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Sildanyar
    traits:
      - sildanyar
    shortdesc: "Your mystic control and meditations allow you to resist external influences upon your consciousness. Whenever you are affected by a mental effect that lasts at least 2 rounds, you can reduce the duration by 1 round.%r%rYou still require natural sleep, but you treat your saving throws against effects that would cause you to fall asleep as one degree of success better. This protects only against sleep effects, not against other forms of falling unconscious."
    prereq:
      level: 1
  Vampire Lore:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    grants:
      feat:
        - Additional Lore
      skill:
        - Religion
        - Society
    shortdesc: "You were raised by your vampiric parent, or you've invested substantial time and energy researching the secrets of your undead progenitors. You're trained in Religion and Society. If you would automatically become trained in one of those skills (from your background or class, for example), you instead become trained in a skill of your choice.%r%rYou also gain the Additional Lore general feat for Vampire Lore."
    prereq:
      level: 1
  Vandal:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    grants:
      skill:
        - Thievery
    shortdesc: "You have a knack for breaking and dismantling things. Putting them back together is the boring part, so you largely don't bother with that. You become trained in Thievery. If you would automatically become trained in Thievery (from your background or class, for example), you instead become trained in a skill of your choice.%r%rIn addition, whenever you hit with a Strike against a trap or an unattended object, you ignore the first 5 points of the object's Hardness."
    prereq:
      level: 5
  Very Sneaky:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: "Taller folk rarely pay attention to the shadows at their feet, and you take full advantage of this. You can move 5 feet farther when you take the Sneak action, up to your Speed.%r%rIn addition, as long as you continue to use Sneak actions and succeed at your Stealth check, you don't become observed if you don't have cover or greater cover and aren't concealed at the end of the Sneak action, as long as you have cover or greater cover or are concealed at the end of your turn."
    prereq:
      level: 1
  Very, Very Sneaky:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Goblin
    traits:
      - goblin
    shortdesc: You can move up to your Speed when you use the Sneak action, and you no longer need to have cover or greater cover or be concealed to Hide or Sneak.
    prereq:
      level: 13
      feat:
        - Very Sneaky
  Vicious Incisors:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: Your jaws unarmed attack deals 1d6 piercing damage instead of 1d4, and gains the backstabber trait. You can file down your teeth and regrow them later on, enabling you to select this feat at any level, and to retrain into and out of this feat.
    prereq:
      level: 1
  Vigorous Health:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You can withstand blood loss startlingly well. Whenever you would gain the Drained condition, you can attempt a DC 17 flat check. On a success, you don't gain the drained condition.
    prereq:
      level: 1
  Vivacious Conduit:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Gnome
    traits:
      - gnome
    shortdesc: Your connection to Quelynos has grown, and its vital energy flows into you rapidly. If you rest for 10 minutes, you regain Hit Points equal to your Constitution modifier × half your level. This is a healing vitality effect and is cumulative with any healing you receive from Treat Wounds.
    prereq:
      level: 9
  Voice of the Night:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Dar
    traits:
      - dar
    shortdesc: You hear and understand the words of creatures you share the darkness with. You can ask questions of, receive answers from, and use the Diplomacy skill with bats, rats, and wolves. You also gain a +1 circumstance bonus to Make an Impression on such animals.
    prereq:
      level: 1
  War Conditioning:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Arvek
    traits:
      - arvek
    shortdesc: You have extensive training in remote environments, allowing you to move through these areas easily. When you gain this feat, you can choose to gain either a climb Speed of 20 feet or a swim Speed of 20 feet.
    prereq:
      level: 13
  Ward Against Corruption:
    feat_type:
      - Ancestry
    traits:
      - ashen one
    shortdesc: Your soul is warded against the power of undeath and plague, as well as that of the evil former psychopomps known as sahkils. You gain a +1 circumstance bonus to saving throws against death effects, disease, and all effects from undead or sahkils. This bonus increases to +2 against an undead or sahkil's death effect or disease.
    prereq:
      level: 5
  Warren Digger:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    shortdesc: You've learned to put your sturdy claws to work digging through the earth. You gain a burrow Speed of 15 feet.
    prereq:
      level: 13
  Warren Navigator:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Kailli
    traits:
      - kailli
    grants:
      skill:
        - Survival
    shortdesc: You gain the trained proficiency rank in Survival. If you would automatically become trained in Survival (from your background or class, for example), you become trained in another skill of your choice. When you Sense Direction or attempt a roll against a *quandary* spell, you get a result one degree of success better than you rolled. You don't take a penalty to Sense Direction when you lack a compass.
    prereq:
      level: 1
  Watchful Bassin:
    feat_type:
      - Ancestry
    assoc_ancestry:
      - Bassin
    traits:
      - bassin
    shortdesc: "You pay close attention to the people around you, allowing you to more easily notice when they act out of character. You gain a +2 circumstance bonus to Perception checks when using the Sense Motive basic action to notice enchanted or possessed characters. If you aren't actively using Sense Motive on an enchanted or possessed character, the GM rolls a secret check, without your usual circumstance bonus, for you to potentially notice the enchantment or possession anyway.%r%rIn addition to using it for skill checks, you can use the Aid basic action to grant a bonus to another creature's saving throw or other check to overcome enchantment or possession. As usual for Aid, you need to prepare by using an action on your turn to encourage the creature to fight against the effect."
    prereq:
      level: 1
  Wind God's Fan:
    feat_type:
      - Ancestry
    traits:
      - egalrin
    shortdesc: Your fan can stir up even more powerful winds. You can use the Wave Fan activation one additional time per day. Add a 3rd-rank *wall of wind* spell to the spells contained within your fan.
    prereq:
      level: 9
      feat:
        - Egalrin Feather Fan