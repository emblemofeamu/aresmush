      - Druid
      - Fighter
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Intelligence/14
    shortdesc: You gain the On the Case class feature, which grants you both the Pursue a Lead activity and Clue In reaction. You become trained in Society and another skill of your choice. If you were already trained in Society, you instead become trained in an additional skill of your choice. You also become trained in investigator class DC.
    traits:
      - archetype
      - dedication
      - multiclass
  Monk Dedication:
    assoc_archetype:
      - Monk Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Strength/14
        - Dexterity/14
    shortdesc: You become trained in unarmed attacks and gain the powerful fist class feature. You become trained in your choice of Acrobatics or Athletics; if you are already trained in both of these skills, you become trained in a skill of your choice. You become trained in monk class DC.
    traits:
      - archetype
      - dedication
      - multiclass
  Oracle Dedication:
    assoc_archetype:
      - Oracle Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Charisma/14
    shortdesc: "Choose a mystery.You become trained in Religion and the mystery's skill; if you were already trained, you become trained in a skill of your choice. You gain the curse associated with your mystery, which follows the normal rules for an oracular curse.%r%rYou cast spells like an oracle and gain the Cast a Spell activity. You gain a spell repertoire with two cantrips, either common divine cantrips or other divine cantrips you learn or discover. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for oracle archetype spells is Charisma, and they are divine oracle spells."
    traits:
      - archetype
      - dedication
      - multiclass
  Ranger Dedication:
    assoc_archetype:
      - Ranger Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Dexterity/14
    shortdesc: You become trained in Survival; if you were already trained in Survival, you instead become trained in another skill of your choice. You become trained in ranger class DC. If you gain a warden spell through this archetype, you become trained in spell attacks and spell DCs. Your spellcasting attribute is Wisdom. You can use the Hunt Prey action.
    traits:
      - archetype
      - dedication
      - multiclass
  Rogue Dedication:
    assoc_archetype:
      - Rogue Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Dexterity/14
    shortdesc: You gain a skill feat and the rogue's surprise attack class feature. You become trained in light armor. In addition, you become trained in Stealth or Thievery plus one skill of your choice; if you are already trained in both Stealth and Thievery, you become trained in an additional skill of your choice. You become trained in rogue class DC.
    traits:
      - archetype
      - dedication
      - multiclass
  Sorcerer Dedication:
    assoc_archetype:
      - Sorcerer Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Charisma/14
    shortdesc: "Choose a bloodline. You become trained in the bloodline's two skills; for each of these skills in which you were already trained, you become trained in a skill of your choice.%r%rYou cast spells like a sorcerer. You gain access to the Cast a Spell activity. You gain a spell repertoire with two common cantrips from the spell list associated with your bloodline, from the spells granted by your bloodline, or any other cantrips of that tradition you learn or discover. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for sorcerer archetype spells is Charisma, and they are sorcerer spells of your bloodline's tradition. You don't gain any other abilities from your choice of bloodline."
    traits:
      - archetype
      - dedication
      - multiclass
  Swashbuckler Dedication:
    assoc_archetype:
      - Swashbuckler Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Charisma/14
        - Dexterity/14
    shortdesc: Choose a swashbuckler's style. You gain the panache and stylish combatant class features, and you apply the bravado trait to Tumble Through and any actions indicated in your swashbuckler style, allowing you to gain panache. You become trained in Acrobatics or the skill associated with your style. If you were already trained in both skills, you instead become trained in a skill of your choice. You also become trained in swashbuckler class DC. You don't gain any other effects of your chosen style.
    traits:
      - archetype
      - dedication
      - multiclass
  Witch Dedication:
    assoc_archetype:
      - Witch Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Intelligence/14
    shortdesc: "You cast spells like a witch. Choose a patron; you gain a familiar with two common cantrips of your choice from your chosen patron's tradition, but aside from the tradition, you don't gain any other effects the patron would usually grant. Your familiar gains the normal number of abilities for a familiar instead of those a witch familiar normally gets.%r%rYou gain the Cast a Spell activity. You can prepare one cantrip each day from your familiar. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for witch archetype spells is Intelligence, and they are witch spells of your patron's tradition.%r%rYou become trained in the skill associated with the patron's tradition; if you were already trained in it, you instead become trained in a skill of your choice."
    traits:
      - archetype
      - dedication
      - multiclass
  Wizard Dedication:
    assoc_archetype:
      - Wizard Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Intelligence/14
    shortdesc: You cast spells like a wizard, gaining a spellbook with four common arcane cantrips of your choice. You gain the Cast a Spell activity. You can prepare two cantrips each day from your spellbook. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for wizard archetype spells is Intelligence, and they are arcane wizard spells. You become trained in Arcana; if you were already trained in Arcana, you instead become trained in a skill of your choice. Select a school; you don't gain any abilities from your choice of school, but qualify for feats as a member.
    traits:
      - archetype
      - dedication
      - multiclass
  # Level 4 Archetype Feats
  Advanced Alchemy:
    assoc_archetype:
      - Alchemist Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Alchemist Dedication
    shortdesc: You gain the advanced alchemy benefits, and you can create 4 alchemical consumables during your daily preparations.
    traits:
      - archetype
  Arcane School Spell:
    assoc_archetype:
      - Wizard Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Wizard Dedication
    shortdesc: You gain your school's initial school spell. If you don't already have one, you gain a focus pool of 1 Focus Point, which you can Refocus by studying.
    traits:
      - archetype
  Barbarian Resiliency:
    assoc_archetype:
      - Barbarian Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Barbarian Dedication
        - class granting no more Hit Points per level than 10 + your Constitution modifier
    shortdesc: You gain 3 additional Hit Points for each barbarian archetype class feat you have. As you continue selecting barbarian archetype class feats, you continue to gain additional Hit Points in this way.
    traits:
      - archetype
  Basic Arcana:
    assoc_archetype:
      - Wizard Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Wizard Dedication
    shortdesc: You gain a 1st- or 2nd-level wizard feat of your choice.
    traits:
      - archetype
  Basic Bard Spellcasting:
    assoc_archetype:
      - Bard Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Bard Dedication
    shortdesc: You gain the basic spellcasting benefits. Each time you gain a spell slot of a new rank from the bard archetype, add a common occult spell of the appropriate rank, or another appropriate occult spell you learned or discovered, to your repertoire.
