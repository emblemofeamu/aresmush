  Basic Witchcraft:
    assoc_archetype:
      - Witch Archetype
    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Witch Dedication
    shortdesc: You gain a 1st- or 2nd-level witch feat of your choice. You can select three familiar abilities for your familiar each day, instead of two.
