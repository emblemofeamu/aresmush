      feat:
        - Oracle Dedication
    shortdesc: You gain the basic spellcasting benefits. When you gain a spell slot of a new rank from the oracle archetype, add a common divine spell or another divine spell you have learned or discovered (including the granted spells associated with your mystery) to your repertoire, of that spell rank.
