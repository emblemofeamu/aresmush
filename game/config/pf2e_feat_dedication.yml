    feat_type:
      - Archetype
      - Charclass
    prereq:
      level: 4
      feat:
        - Cleric Dedication
    shortdesc: You gain the basic spellcasting benefits. You can prepare your deity's spells in your spell slots of the appropriate rank from the cleric archetype.
    traits:
      - archetype
  Basic Concoction:
