---
pf2e_feats:
  # Level 2 Dedication Feats
  Alchemist Dedication:
    assoc_archetype:
      - Alchemist Archetype
    assoc_class:
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Intelligence/14
    shortdesc: "You put your alchemical interest into practice. You become trained in alchemical bombs, the alchemist class DC, and Crafting; if you were already trained in Crafting, you instead become trained in a skill of your choice.%r%rYou gain the Quick Alchemy benefits, creating up to 4 versatile vials during your daily preparations. Add the formulas for four additional common alchemical items to your formula book, in addition to those you gain from Alchemical Crafting."
    traits:
      - archetype
      - dedication
      - multiclass
  Barbarian Dedication:
    assoc_archetype:
      - Barbarian Archetype
    assoc_class:
      - Alchemist
      - Bard
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Strength/14
        - Constitution/14
    shortdesc: "You become trained in Athletics; if you were already trained in Athletics, you instead become trained in a skill of your choice. You become trained in barbarian class DC.%r%rYou can use the Rage action. While raging, you take a –1 penalty to AC.%r%rChoose an instinct as you would if you were a barbarian. You have that instinct for all purposes, but you don't gain any of the other abilities it grants. If that instinct has anathema, you're bound by them."
    traits:
      - archetype
      - dedication
      - multiclass
  Bard Dedication:
    assoc_archetype:
      - Bard Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Champion
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Charisma/14
    shortdesc: You cast spells like a bard and gain the Cast a Spell activity. You gain a spell repertoire with two common cantrips from the occult spell list or any other occult cantrips you've learned or discovered. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for bard archetype spells is Charisma, and they are occult bard spells. You become trained in Occultism and Performance; for each of these skills in which you were already trained, you instead become trained in a skill of your choice. Choose a muse as you would if you were a bard. You can take that muse's feats, but you don't gain the starting feat, spell or any other abilities the choice of muse grants.
    traits:
      - archetype
      - dedication
      - multiclass
  Champion Dedication:
    assoc_archetype:
      - Champion Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Cleric
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Strength/14
        - Charisma/14
    shortdesc: "Choose a deity. You are bound by your deity's anathema and gain the champion's aura and sanctification as described in the champion class. Choose a cause as you would if you were a champion, with the same options a champion must abide by. You gain its edicts and anathema but don't gain the other abilities.%r%rYou become trained in Religion and your deity's associated skill; for each of these skills in which you were already trained, you instead become trained in a skill of your choice. You become trained in champion class DC. If you later gain a devotion spell, you become trained in spell attack modifier and spell DC.%r%rYou become trained in light armor and medium armor. If you already were trained in light armor and medium armor, you gain training in heavy armor as well. Whenever you gain a class feature that grants you expert or greater proficiency in any type of armor (but not unarmored defense), you also gain that proficiency in the armor types granted to you by this feat. If you have a class feature that grants you expert proficiency in unarmored defense and you're 13th level or higher, you also become an expert in the armor types granted to you by this feat."
    traits:
      - archetype
      - dedication
      - multiclass
  Cleric Dedication:
    assoc_archetype:
      - Cleric Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Druid
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Wisdom/14
    shortdesc: You cast spells like a cleric. You gain the Cast a Spell activity. You can prepare two common cantrips each day from the divine spell list or any other divine cantrips you have access to. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for cleric archetype spells is Wisdom, and they are divine cleric spells. Choose a deity as you would if you were a cleric. You become bound by that deity's anathema and can receive that deity's divine sanctification. You become trained in Religion and your deity's associated skill; for each of these skills in which you were already trained, you instead become trained in a skill of your choice. You don't gain any other abilities from your choice of deity.
    traits:
      - archetype
      - dedication
      - multiclass
  Druid Dedication:
    assoc_archetype:
      - Druid Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Fighter
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Wisdom/14
    shortdesc: You cast spells like a druid. You gain the Cast a Spell activity. You can prepare two common cantrips each day from the primal spell list or any other primal cantrips you learn or discover. You're trained in the spell attack modifier and spell DC statistics. Your key spellcasting attribute for druid archetype spells is Wisdom, and they are primal druid spells. You learn the Wildsong language, and you are bound by the druid's anathema. Choose a druidic order. You become a member of that order and are also bound by its specific anathema, allowing you to take the order's feats. You become trained in Nature and your order's associated skill; for each of these skills in which you were already trained, you become trained in a skill of your choice. You don't gain any other abilities from your choice of order.
    traits:
      - archetype
      - dedication
      - multiclass
  Fighter Dedication:
    assoc_archetype:
      - Fighter Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
      - Cleric
      - Druid
      - Investigator
      - Monk
      - Oracle
      - Ranger
      - Rogue
      - Sorcerer
      - Swashbuckler
      - Witch
      - Wizard
    feat_type:
      - Dedication
      - Charclass
    prereq:
      level: 2
      ability:
        - Strength/14
        - Dexterity/14
    shortdesc: You become trained in martial weapons. You become trained in your choice of Acrobatics or Athletics; if you are already trained in both of these skills, you instead become trained in a skill of your choice. You become trained in fighter class DC.
    traits:
      - archetype
      - dedication
      - multiclass
  Investigator Dedication:
    assoc_archetype:
      - Investigator Archetype
    assoc_class:
      - Alchemist
      - Barbarian
      - Bard
      - Champion
