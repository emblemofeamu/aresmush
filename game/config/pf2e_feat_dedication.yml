      - Charclass
    prereq:
      level: 4
      feat:
        - Sorcerer Dedication
    shortdesc: You gain your bloodline's initial bloodline spell. If you don't already have one, you also gain a focus pool of 1 Focus Point, which you can Refocus without any special effort.
    traits:
      - archetype
  Basic Cleric Spellcasting:
    assoc_archetype:
