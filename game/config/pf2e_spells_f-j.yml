    duration: 10 minutes
    effect: Tiny clinging hairs sprout across the creature's hands and feet, offering purchase on nearly any surface. The target gains a climb Speed equal to its Speed.
    heighten: "**5th:** The duration increases to 1 hour."
  Gentle Landing:
    base_level: 1
    traits:
      - air
      - concentrate
    tradition:
      - arcane
      - primal
    actions: reaction
    range: 60 feet
    target: 1 falling creature
    duration: 1 minute
