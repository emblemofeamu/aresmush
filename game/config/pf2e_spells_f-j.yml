    effect: "You become living flame, giving you fire immunity, resistance 10 to precision damage, and weakness 5 to cold and to water. Any creature that touches you or damages you with an unarmed attack or non-reach melee weapon takes 3d6 fire damage.%r%rYour unarmed attacks deal an additional 1d4 fire damage, and your fire spells deal one additional die of fire damage (of the same damage die the spell uses). You can cast *ignition* as an innate spell; the casting is reduced from 2 actions to 1.%r%rIn fire form, you have a fly Speed of 40 feet and don't need to breathe."
