    effect: "**Area** 4 40-foot bursts%r%rYou reach into the skies and call down an array of falling stars that explode upon colliding with the ground. Choose for the falling stars to be airbursts (sonic), asteroids (fire), comets (cold), or plasma (electricity). The spell gains the trait of the falling star type you chose. The four stars' central 10-foot bursts can't overlap. Each falling star deals 6d10 bludgeoning damage to each creature in the 10-ft burst at the center of its area of effect before exploding, dealing 14d6 energy damage of the type you chose to each creature in its 40-ft burst. A creature in any of the areas attempts one basic Reflex save against the spell no matter how many overlapping explosions it's caught in and can take each type of damage only once."
    heighten: "**+1:** The bludgeoning damage increases by 1d10, and the energy damage increases by 2d6."
  False Vision:
    base_level: 5
    traits:
      - concentrate
      - illusion
      - manipulate
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 10 minutes
    area: 100-foot burst
    range: touch
    duration: until your next daily preparations
    effect: You create a false image that fools any attempts to scry on an area. Any scrying spell sees, hears, smells, and otherwise detects whatever you wish within the area, rather than what is actually in the area. You can Sustain the spell each round to change the illusion as you desire, including playing out a complex scene. If the scrying spell is of a higher rank than false vision, the scryer can attempt a Perception check to disbelieve the illusion, though even if they're successful, they can't learn what's truly going on in the area.
