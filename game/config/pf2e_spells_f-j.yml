    effect: "You temporarily stop time for everything but yourself, allowing you to use several actions in what appears to others to be no time at all. Immediately after casting *freeze time*, you can use up to 9 actions in 3 sets of up to 3 actions each.%r%rAfter each set of actions, 1 round passes, but for only you, effects specifically targeting or affecting you, and effects that you create during the stoppage. All other creatures and objects are invulnerable to your attacks, and you can't target or affect them with anything.%r%rOnce you have finished your actions, time begins to flow again for the rest of the world. If you created an effect with a duration that extends beyond *freeze time*'s duration, such as *wall of fire*, it immediately affects others again, but it doesn't have any of the effects that happen only when you first Cast the Spell."
