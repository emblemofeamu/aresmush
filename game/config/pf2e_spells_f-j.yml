    effect: You rapidly catalog and collate information relevant to your current situation. You can instantly use up to 6 Recall Knowledge actions as part of Casting this Spell. For these actions, you can't use any special abilities, reactions, or free actions that trigger when you Recall Knowledge.
  Hypnotize:
    base_level: 3
    traits:
      - illusion
      - manipulate
      - subtle
      - visual
    tradition:
      - arcane
      - occult
    actions: 2
    area: 10-foot burst
    range: 120 feet
    duration: 1 minute
    effect: "You create a cloud of mesmerizing patterns and colors that hovers in the air. Creatures are dazzled while inside the cloud. In addition, a creature must attempt a Will saving throw if it is inside the cloud when you cast it, when it enters the cloud, when it ends its turn within the cloud, or if it uses a Seek or Interact action on the cloud. A creature currently Fascinated by hypnotize doesn't attempt new saves.%r%r**Success** The target is unaffected.%r**Failure** The target is fascinated by the cloud.%r**Critical Failure** The target is fascinated by the cloud. While it remains fascinated, it can't use reactions."
  Ice Storm:
    base_level: 4
    traits:
      - cold
      - concentrate
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 3
    area: 20-foot burst
    range: 120 feet
    duration: 1 minute
    effect: You create a gray storm cloud that pelts creatures with an icy deluge. When you Cast the Spell, a burst of magical hail deals 2d8 bludgeoning damage and 2d8 cold damage to each creature in the area below the cloud (basic Reflex save). Snow and sleet continue to rain down in the area for the remainder of the spell's duration, making the area difficult terrain. Any creature that ends its turn in the storm takes 2 cold damage. If you Cast this Spell outdoors, you can create two nonoverlapping clouds instead of one. As normal, if a Large or larger creature is in both clouds, it still only takes the initial damage once and the continuing damage once per turn.
    heighten: "**+2:** The initial bludgeoning damage and cold damage increase by 1d8 each, and the cold damage creatures take at the end of their turns increases by 1."
  Ignite Ambition:
    base_level: 1
    traits:
      - cleric
      - concentrate
      - emotion
      - focus
      - mental
      - subtle
      - uncommon
    actions: reaction
    range: 60 feet
    target: one creature being influenced
    trigger: You or an ally in range attempt to use a mental effect to convince a creature to do something (such as a Coerce, Request, or a *suggestion* spell).
    effect: "You strengthen a target's ambition, increase its resentment of allies, and make its allegiances more susceptible to change. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected and realized you attempted to influence its reaction with magic.%r**Success** The target takes a -1 status penalty to its defenses against the triggering effect. This penalty is -2 if the target is being encouraged to advance its own ambitions.The target doesn't realize you Cast the Spell on it.%r**Failure** As success, but the penalty is -4 if the target is being encouraged to advance its own ambitions.%r**Critical Failure** As success, but the creature automatically follows a suggestion that advances its own ambitions."
  Ignition:
    base_level: 1
    bloodline:
      - diabolic
    mystery:
      - flames
    traits:
      - attack
      - cantrip
      - concentrate
      - fire
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    range: 30 feet
    target: 1 creature
    effect: "You snap your fingers and point at a target, which begins to smolder. Make a spell attack roll against the target's AC, dealing 2d4 fire damage on a hit. If the target is within your melee reach, you can choose to make a melee spell attack with the flame instead of a ranged spell attack, which increases all the spell's damage dice to d6s.%r%r**Critical Success** The target takes double damage and 1d4 persistent fire damage.%r**Success** The target takes full damage."
    heighten: "**+1:** The initial damage increases by 1d4 and the persistent fire damage on a critical hit increases by 1d4."
  Ill Omen:
    base_level: 1
    mystery:
      - ancestors
    traits:
      - concentrate
      - curse
      - manipulate
      - misfortune
    tradition:
      - occult
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 round
    effect: "The target is struck with misfortune, which throws it off balance. The target must attempt a Will save.%r%r**Success** The target is unaffected.%r**Failure** The first time during the duration that the target attempts an attack roll or skill check, it must roll twice and use the worse result.%r**Critical Failure** Every time during the duration that the target attempts an attack roll or skill check, it must roll twice and use the worse result."
  Illusory Creature:
    base_level: 2
    traits:
      - auditory
      - concentrate
      - illusion
      - manipulate
      - olfactory
      - visual
    tradition:
      - arcane
      - occult
    actions: 2
    range: 500 feet
    effect: "You create an illusory image of a Large or smaller creature. It generates the appropriate sounds, smells, and feels believable to the touch. If you and the image are ever farther than 500 feet apart, the spell ends.%r%rThe image can't speak, but you can use your actions to speak through the creature, with the spell disguising your voice as appropriate. You might need to attempt a Deception or Performance check to mimic the creature, as determined by the GM. This is especially likely if you're trying to imitate a specific person and engage with someone that person knows.%r%rIn combat, the illusion can use 2 actions per turn, which it uses when you Sustain the spell. It uses your spell attack modifier for attack rolls and your spell DC for its AC. Its saving throw modifiers are equal to your spell DC – 10. It is substantial enough that it can flank other creatures. If the image is hit by an attack or fails a save, the spell ends.%r%rThe illusion can cause damage by making the target believe the illusion's attacks are real, but it cannot otherwise directly affect the physical world. If the illusory creature hits with a Strike, the target takes 3d4 mental damage. The illusion's Strikes are nonlethal. If the damage doesn't correspond to the image of the monster—for example, if an illusory Large dragon deals only 5 damage—the GM might allow the target to attempt an immediate Perception check to disbelieve the spell. Any relevant resistances and weaknesses apply if the target thinks they do, as judged by the GM. For example, if the illusion wields a warhammer and attacks a creature resistant to bludgeoning damage, the creature would take less mental damage. However, illusory damage does not deactivate regeneration or trigger other effects that require a certain damage type. The GM should track illusory damage dealt by the illusion.%r%rAny creature that touches the image or uses the Seek action to examine it can attempt to disbelieve your illusion. When a creature disbelieves the illusion, it recovers from half the damage it had taken from it (if any) and doesn't take any further damage from it."
    heighten: "**+1:** The damage of the image's Strikes increases by 1d4, and the maximum size of creature you can create increases by one (to a maximum of Gargantuan)."
  Illusory Disguise:
    base_level: 1
    bloodline:
      - hag
    traits:
      - concentrate
      - illusion
      - manipulate
      - visual
    tradition:
      - arcane
      - occult
    actions: 2
    range: 30 feet
    target: 1 willing creature
    duration: 1 hour
    effect: "You create an illusion that causes the target to appear as another creature of the same body shape, and with roughly similar height (within 6 inches) and weight (within 50 pounds). The disguise is typically good enough to hide their identity, but not to impersonate a specific individual. The spell changes their appearance and voice, but not mannerisms. You can change the appearance of its clothing and worn items, such as making its armor look like a dress. Held items are unaffected, and any worn item removed from the creature returns to its true appearance.%r%rCasting *illusory disguise* counts as setting up a disguise for the Impersonate use of Deception; it ignores any circumstance penalties the target might take for disguising itself as a dissimilar creature, gives a +4 status bonus to Deception checks to prevent others from seeing through the disguise, and lets the target add its level to such Deception checks even if untrained. You can Dismiss this spell."
    heighten: "**3rd:** The target can appear as any creature of the same size, even a specific individual. You must have seen an individual to replicate its appearance, and must have heard its voice to replicate its voice.%r**4th:** You can target up to 10 willing creatures. If you target multiple creatures, you can choose a different disguise for each target, but none can impersonate a specific individual. You can Dismiss each disguise individually or all collectively.%r**7th:** As 4th, but you can choose disguises that impersonate specific individuals. You must have seen an individual to replicate its appearance, and must have heard its voice to replicate its voice."
  Illusory Object:
    base_level: 1
    traits:
      - concentrate
      - illusion
      - manipulate
      - visual
    tradition:
      - arcane
      - occult
    actions: 2
    area: 20-foot burst
    range: 500 feet
    duration: 10 minutes
    effect: "You create an illusory visual image of a stationary object. The entire image must fit within the spell's area. The object appears to animate naturally, but it doesn't make sounds or generate smells. For example, water would appear to pour down an illusory waterfall, but it would be silent.%r%rAny creature that touches the image or uses the Seek action to examine it can attempt to disbelieve your illusion."
    heighten: "**2nd:** Your image makes appropriate sounds, generates normal smells, and feels right to the touch. The spell gains the auditory and olfactory traits. The duration increases to 1 hour.%r**5th:** As the 2nd-rank version, but the duration is unlimited."
  Illusory Scene:
    base_level: 5
    traits:
      - auditory
      - concentrate
      - illusion
      - manipulate
      - olfactory
      - visual
    tradition:
      - arcane
      - occult
    actions: 10 minutes
    area: 30-foot burst
    range: 500 feet
    duration: 1 hour
    effect: "You craft an imaginary scene that includes up to 10 discrete creatures or objects of various sizes, all of which must be within the spell's area. These elements generate appropriate sounds and smells, and they feel right to the touch. Elements of an illusory scene are incapable of speech. Unlike with the *illusory creature* spell, creatures in your scene lack combat abilities and statistics. Your scene doesn't include changes to the environment around it, though you can place your scene within the illusory environment of a *mirage* spell.%r%rWhen you create the scene, you can choose to have it be static or follow a program. Though a static scene is stationary, it includes basic natural movement. For example, wind blowing on an illusory piece of paper would rustle it. A program can be up to 1 minute long and repeats when finished. For instance, you could create a scene of two orcs fighting each other, and the fight would go the same way for each repetition. If you create a loop, the two fighters end up in the same place at the start of the scene and at the end of it, but you can smooth the program so it's hard to tell when the loop ends and begins. Anyone observing the scene for more than a few minutes almost always notices it looping. You're unable to alter the program after you create the illusion.%r%rAny creature that touches any part of the image or uses the Seek action to examine it can attempt to disbelieve your illusion. If they interact with a portion of the illusion, they disbelieve only that portion. They disbelieve the entire scene only on a critical success."
    heighten: "**6th:** Creatures or objects in your scene can speak. You must speak the specific lines for each actor when creating your program. The spell disguises your voice for each actor.%r**8th:** As the 6th-rank version, and the duration is unlimited."
  Imaginary Lockbox:
    base_level: 5
    traits:
      - concentrate
      - manipulate
      - mental
    tradition:
      - arcane
      - occult
    actions: 1 minute
    range: touch
    target: 1 container and its contents, totaling 10 Bulk or less
    duration: until the next time you make your daily preparations
    effect: "You turn a container and its contents into an imaginary form stored in your mind that only you can see and interact with. The container's physical properties—the material from which it's made, any locks, or other features—are irrelevant to the casting of this spell, but the container can't contain any creatures. The container has no Bulk, and you can visualize everything inside it.%r%rYou can retrieve an item from the lockbox as an activity that takes 3 actions and has the concentrate and manipulate traits. Putting items back isn't possible. You can Dismiss the spell. When the spell ends, the container returns to its normal state, either appearing in your hands if it can fit there or on the ground adjacent to you if not."
  Impaling Briars:
    base_level: 8
    traits:
      - concentrate
      - druid
      - focus
      - manipulate
      - plant
      - wood
      - uncommon
    actions: 3
    area: 100-foot emanation
    duration: 1 minute
    effect: "The ground within the area transforms into a mass of dangerous briars that assault and impede your foes. When you Cast the Supell and the first time you Sustain it each turn on subsequent rounds, select one of the following effects to occur in the area.%r%rIn addition, once per round you can direct the briars to impale any target in the area (or flying up to 20 feet above the area) that you can see by using a single action, which has the concentrate and manipulate traits. Make a spell attack roll. On a success, the target takes 10d6 piercing damage and takes a –10-foot circumstance penalty to all Speeds for 1 round; on a critical success, the target is Immobilized for 1 round unless it Escapes."
  Impaling Spike:
    base_level: 5
    traits:
      - concentrate
      - manipulate
      - metal
    tradition:
      - arcane
      - primal
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You conjure a spike that thrusts up from the earth beneath a target creature, potentially impaling it. The spike is made of cold iron and deals 8d6 piercing damage. The target must attempt a Reflex save.%r%r**Critical Success** The target dodges the spike and is unaffected.%r**Success** The target is struck by the spike and takes half damage.%r**Failure** The target is impaled through a leg or another nonvital body part. The creature takes full damage and, if it's standing on solid ground, becomes immobilized. It can attempt to Escape (the DC is your spell DC). While it remains impaled, it takes damage from any weakness to cold iron it has at the end of each of its turns.%r**Critical Failure** As failure, but the creature is impaled through a vital organ or its center of mass, taking double damage, and it is off-guard as long as it's impaled."
    heighten: "**+1:** The damage increases by 2d6."
  Implosion:
    base_level: 9
    bloodline:
      - demonic
      - imperial
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 2
    range: 30 feet
    target: 1 corporeal creature
    duration: 1 minute
    effect: You crush the target by causing it to collapse in on itself, dealing 75 damage. The first time each round you Sustain the spell, you must choose a new target to be subject to the same effect; the same creature can never be targeted more than once with a single casting of this spell. You also can't affect more than one creature per turn with implosion. You can't target a creature that's incorporeal, gaseous, or liquid, or otherwise lacking a solid form.
    heighten: "**+1:** The damage increases by 10."
  Imprint Message:
    base_level: 1
    traits:
      - concentrate
      - manipulate
    tradition:
      - occult
    actions: 2
    range: touch
    target: 1 object
    effect: "You project psychic vibrations onto the target object, imprinting it with a short message or emotional theme of your design. This imprinted sensation is revealed to a creature who casts *object reading* on the target object, replacing any emotional events the item was present for. If the object is in the area of a *retrocognition* spell, the imprinted messages appear as major events in the timeline, but they don't interfere with any other visions.%r%rIf the object is targeted with *read aura* of a higher spell rank than *imprint message*, the caster learns that the object has been magically modified. When you Cast a Spell{Cast this Spell}, any prior vibrations placed on an object by previous castings of *imprint message* fade."
  Incendiary Aura:
    base_level: 1
    mystery:
      - flames
    traits:
      - aura
      - concentrate
      - fire
      - focus
      - manipulate
      - oracle
      - uncommon
    actions: 2
    area: 10-foot emanation
    duration: 1 minute
    effect: You surround yourself with a combustible aura. Each time a creature within the emanation takes fire damage, it catches on fire, taking 2d4 persistent fire damage.
    heighten: "**+2:** Increase the persistent damage by 1d4 and the radius of the emanation by 5 feet."
  Indestructibility:
    base_level: 10
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 2
    duration: until the start of your next turn
    effect: You sever yourself from cause and effect. For the duration of the spell, you are immune to any effect or damage that would harm you, excluding effects caused by artifacts, deific power, and similarly powerful sources. You can selectively allow yourself to be affected by anything you're willing to have affect you.
  Infuse Vitality:
    base_level: 1
    traits:
      - concentrate
      - manipulate
      - vitality
    tradition:
      - divine
    actions: 1 to 3
    range: 30 feet
    target: 1 to 3 willing creatures
    duration: 1 minute
    effect: You empower attacks with vital energy. The number of targets is equal to the number of actions you spent casting this spell. Each target's unarmed and weapon Strikes deal an extra 1d4 vitality damage. (This damage typically damages only undead). If you have the holy trait, you can add that trait to this spell and to the Strikes affected by the spell.
    heighten: "**3rd:** The damage increases to 2d4 damage.%r**5th:** The damage increases to 3d4 damage."
  Inner Upheaval:
    base_level: 1
    traits:
      - concentrate
      - focus
      - monk
      - uncommon
    actions: 1
    effect: "You focus your qi into devastating magical attacks. Make an unarmed Strike or Flurry of Blows (this doesn't change the limit on using only one flourish per turn). You gain a +1 status bonus to your attack rolls with the Strikes, and the Strikes deal 1d6 extra damage. This damage can be any of the following types of your choice, chosen each time you Strike: force, spirit, vitality, or void."
    heighten: "**+4:** The extra damage increases by 1d6"
  Insect Form:
    base_level: 3
    traits:
      - concentrate
      - manipulate
      - polymorph
    tradition:
      - primal
      - arcane
    actions: 2
    duration: 1 minute
    effect: "You envision a simple bug and transform into a Medium animal battle form. When you Cast this Spell, choose a listed battle form. You can decide the specific type of animal (such as a ladybug or scarab for beetle), but this has no effect on the form's Size or statistics. While in this form, you gain the animal trait. You can Dismiss this spell.%r%rYou gain the following statistics and abilities regardless of which battle form you choose:%r%rYou also gain specific abilities based on the form you choose:%r%r**{Ant}**%r%r**{Beetle}**%r%r**{Centipede}**%r%r**{Mantis}**%r%r**{Scorpion}**%r%r**{Spider}**"
    heighten: "**4th:** Your battle form is Large, and your attacks have 10-foot reach. You instead gain 15 temporary HP, attack modifier +16, damage bonus +6, and Athletics +16.%r**5th:** Your battle form is Huge, and your attacks have 15-foot reach. You instead gain 20 temporary HP, attack modifier +18, damage bonus +2 and double damage dice (including persistent damage), and Athletics +20."
  Interdisciplinary Incantation:
    base_level: 4
    traits:
      - concentrate
      - focus
      - wizard
      - uncommon
    actions: reaction
    trigger: A creature within 30 feet casts an arcane spell.
    effect: "You gather the embers of another caster's spell, using your understanding of unified magic to pick apart their formulas and incantations well enough to imitate the spell yourself, if only for a short time. Until the end of your next turn, you can Cast the triggering Spell by expending a wizard spell slot of the same rank. That caster's spells can't trigger your *interdisciplinary incantation* again for 24 hours."
  Interplanar Teleport:
    base_level: 7
    traits:
      - concentrate
      - manipulate
      - teleportation
      - uncommon
    tradition:
      - arcane
      - divine
      - occult
      - primal
    actions: 10 minutes
    range: 5 feet
    target: up to 8 willing creatures
    requirements: You have a planar key for the destination plane, used as a locus
    effect: "You and your allies traverse the barriers between planes of existence. The targets move to another plane. You must know the destination plane exists and use a magic planar key created from material from that plane as a locus for the spell. While the planar keys for most prominent planes are uncommon, just like the spell *interplanar teleport*, more obscure planes and demiplanes often have rare or possibly even unique planar keys.%r%rThe spell is highly imprecise, and you appear 1d20×25 miles from the last place one of the targets (of your choice) was located the last time that target traveled to the plane. If it's the first time traveling to a particular plane for all targets, you appear at a random location on the plane. *Interplanar teleport* doesn't provide a means of return travel, though casting *interplanar teleport* again allows you to return to your previous plane unless there are extenuating circumstances."
  Interstellar Void:
    base_level: 3
    mystery:
      - cosmos
    traits:
      - cold
      - concentrate
      - focus
      - manipulate
      - oracle
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You call upon the frigid depths of outer space to bring a terrible chill to your enemy. The target is cloaked in the freezing void, which deals 3d6 cold damage immediately and the first time each round you Sustain the Spell on future turns, with a basic Fortitude save.%r%rThe target is fatigued for as long as the effect persists."
    heighten: "**+1:** The cold damage increases by 1d6."
  Invisibility:
    base_level: 2
    traits:
      - illusion
      - manipulate
      - subtle
    tradition:
      - arcane
      - occult
    actions: 2
    range: touch
    target: 1 creature
    duration: 10 minutes
    effect: Illusions bend light around the target, rendering it invisible. This makes it undetected to all creatures, though the creatures can attempt to find the target, making it hidden to them instead. If the target uses a hostile action, the spell ends after that hostile action is completed.
    heighten: "**4th:** The spell lasts 1 minute, but it doesn't end if the target uses a hostile action."
  Invisibility Cloak:
    base_level: 4
    traits:
      - focus
      - illusion
      - manipulate
      - wizard
      - uncommon
    actions: 2
    duration: 1 minute
    effect: You become invisible, with the same restrictions as the 2nd-rank *invisibility* spell.
    heighten: "**6th:** The duration increases to 10 minutes.%r**8th:** The duration increases to 1 hour."
  Invisible Item:
    base_level: 1
    traits:
      - concentrate
      - illusion
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 2
    range: touch
    target: 1 object
    duration: 1 hour
    effect: You make the object invisible. This makes it undetected to all creatures, though the creatures can attempt to find the target, making it hidden to them instead if they succeed. If the item is used as part of a hostile action, the spell ends after that hostile action is completed. Making a weapon invisible typically doesn't give any advantage to the attack, except that an invisible thrown weapon or piece of ammunition can be used for an attack without necessarily giving information about the attacker's hiding place unless the weapon returns to the attacker.
    heighten: "**3rd:** The duration is until the next time you make your daily preparations.%r**7th:** The duration is unlimited."
  Invoke Spirits:
    base_level: 5
    bloodline:
      - undead
    traits:
      - concentrate
      - emotion
      - fear
      - manipulate
      - mental
      - void
    tradition:
      - arcane
      - divine
      - occult
    actions: 2
    area: 10-foot burst
    range: 120 feet
    duration: 1 minute
    effect: "Ragged apparitions of the dead rise to stalk the living. They deal 2d4 mental damage and 2d4 void damage to each living creature in the area, with a basic Will save. Additionally, creatures that critically fail the save are frightened 2 and are fleeing for 1 round.%r%rOn subsequent rounds, the first time you Sustain the Spell each round, you can move the area up to 30 feet within the range of the spell. Living creatures in the new area must attempt saves with the same effects as above, except that critically failing doesn't make them flee."
    heighten: "**+2:** The mental damage and void damage each increase by 1d4."
  Item Facade:
    base_level: 1
    traits:
      - concentrate
      - illusion
      - manipulate
      - visual
    tradition:
      - arcane
      - occult
    actions: 2
    range: touch
    target: 1 object no more than 10 feet by 10 feet by 10 feet
    duration: 1 hour
    effect: You make the target object look and feel as though it were in much better or worse physical condition. When you cast this spell, decide whether you want to make the object look decrepit or perfect. An item made to look decrepit appears broken and shoddy. An intact item made to look better appears as though it's brand new and highly polished or well maintained. A Broken item appears to be intact and functional. Destroyed items can't be affected by this spell. A creature that Interacts with the item can attempt to disbelieve the illusion.
    heighten: "**2nd:** The duration is 24 hours.%r**3rd:** The duration is unlimited."
  Jealous Hex:
    base_level: 1
    bloodline:
      - hag
    traits:
      - concentrate
      - curse
      - focus
      - sorcerer
      - uncommon
    actions: 1
    range: 30 feet
    target: 1 creature
    duration: 1 minute
    effect: "You draw forth a hag's innate jealousy to deny a target its greatest attribute. The target is cursed with an adverse condition depending on its highest attribute modifier: Strength (enfeebled); Dexterity (clumsy); Constitution (drained); or Intelligence, Wisdom, or Charisma (stupefied). On a tie, the creature decides which of the conditions associated with the tied attributes to take. The target must attempt a Will save. At the start of each of your turns, the target can attempt another Will save, ending the effect on a success.%r%r**Success** The target is unaffected.%r**Failure** The condition's value is 1.%r**Critical Failure** The condition's value is 2"
  Jump:
    base_level: 1
    traits:
      - manipulate
      - move
    tradition:
      - arcane
      - primal
    actions: 1
    effect: Your legs surge with strength, ready to leap high and far. You jump 30 feet in any direction without touching the ground. You must land on a space of solid ground within 30 feet of you, or else you fall after using your next action.
    heighten: "**3rd:** The range becomes touch, the target changes to one touched creature, and the duration becomes 1 minute, allowing the target to jump as described whenever it takes the Leap action."
