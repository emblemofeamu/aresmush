---
pf2e_spells:
  Fabricated Truth:
    base_level: 10
    traits:
      - concentrate
      - incapacitation
      - manipulate
      - mental
    tradition:
      - occult
    actions: 3
    range: 100 feet
    target: up to 5 creatures
    duration: varies
    effect: "Choose a single statement you want the targets to believe. The fact could be narrow, such as 'a dragon is circling overhead and wants to kill me'; wide-reaching, such as 'all humanoids are disguised abominations'; or conceptual, such as 'if I don't live a kinder life, I'll be punished in the afterlife.' The targets' experiences color how they react to this 'truth' and how their behavior changes. If the statement changes what they perceive, they treat the change as a sudden revelation. The effect of the spell depends on the targets' Will saves. If a target is already affected by fabricated truth, your spell tries to counteract it. If the counteract check fails, the outcome of the target's saving throw can't be worse than a success.%r%r**Critical Success** The target doesn't believe the statement, and it knows you tried to trick it.%r**Success** The target doesn't believe the statement or realize you tried to trick it.%r**Failure** The target believes the statement for 1 week.%r**Critical Failure** The target believes the statement with unlimited duration."
  Face in the Crowd:
    base_level: 1
    traits:
      - cleric
      - focus
      - manipulate
      - visual
      - uncommon
    actions: 1
    duration: 1 minute
    effect: While in a crowd of roughly similar creatures, your appearance becomes bland and nondescript. You gain a +2 status bonus to Deception and Stealth checks to go incognito among the crowd, and you ignore difficult terrain caused by the crowd. This counts as setting up a disguise for the Impersonate use of Deception and you add your level even if you're untrained.
