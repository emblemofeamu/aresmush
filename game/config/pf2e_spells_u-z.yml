      - occult
    actions: 2
    area: 10-foot burst
    range: 60 feet
    effect: "You whisper baleful secrets that transcend language and carry magically to the ears of your foes. The words take physical form, weakening the life force of the targets, each of which must attempt a Fortitude save.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes 2d8 persistent void damage.%r**Failure** The creature takes 4d8 persistent void damage and becomes drained 1.%r**Critical Failure** The creature takes 4d8 persistent void damage and becomes drained 2 and doomed 1."
    heighten: "**+2:** The persistent void damage increases by 1d8 on a success, or by 2d8 on a failure or critical failure."
  Wild Winds Stance:
    base_level: 4
