  Wrathful Storm:
    base_level: 9
    bloodline:
      - elemental
    traits:
      - air
      - cold
      - concentrate
      - electricity
      - manipulate
    tradition:
      - primal
    actions: 3
    area: 400-foot burst
    range: 800 feet
    duration: 1 minute
    effect: A massive storm cloud forms in the air above the area, spreading rain and gales. The wind imposes a –4 circumstance penalty to physical ranged attacks. The air in the area is greater difficult terrain for flying creatures. When you Cast this Spell and the first time each round you Sustain it on subsequent rounds, you can choose one of the following storm effects. You can't choose the same effect twice in a row.
    heighten: "**10th:** The range increases to 2,000 feet and the cloud is a 1,000-foot burst."
  You're Mine:
    base_level: 5
    bloodline:
      - hag
    traits:
      - concentrate
      - emotion
      - focus
      - incapacitation
      - manipulate
      - mental
      - sorcerer
      - uncommon
    actions: 2
    range: 30 feet
    target: 1 creature
    duration: 1 round
    effect: "You manipulate the target's emotions, potentially allowing you to control it for a brief instant. The target must attempt a Will save.%r%r**Critical Success** The target is unaffected.%r**Success** The target is stunned 1.%r**Failure** On the target's next turn, it's stunned 1 and you partially control it, causing it to take a single action of your choice. If it has actions left, it can act normally.%r**Critical Failure** The target is controlled for 1 round."
    heighten: "**7th:** On a failure, the target is Controlled for 1 round. On a critical failure, the target is Controlled for up to 1 minute; it receives a new Will save at the end of each of its turns, and on a success, the spell ends."
  Zeal for Battle:
    base_level: 4
    traits:
      - cleric
      - concentrate
      - emotion
      - focus
      - fortune
      - mental
      - uncommon
    actions: reaction
    range: 10 feet
    target: you and the triggering ally
    trigger: You and at least 1 ally are about to roll initiative
    effect: "You stoke the righteous anger within yourself and an ally. You and the target ally each roll a d20 and use the higher result for both your initiative rolls. You each still use your own Perception modifier or other statistic to determine your results."
  Zealous Conviction:
    base_level: 6
    traits:
      - concentrate
      - emotion
      - manipulate
      - mental
    tradition:
      - divine
      - occult
    actions: 2
    range: 30 feet
    target: up to 10 willing creatures
    duration: 10 minutes
    effect: You bypass your targets' rational minds, instilling them with unshakable conviction and zeal. The targets each gain 12 temporary Hit Points and a +2 status bonus to Will saves against mental effects, as their faith overrides the signals from their own bodies and minds. If you tell a target to do something, it must comply with your request, though if it would normally find the task repugnant, it can attempt a Will save at the end of its turn each round due to the cognitive dissonance. On a success, it ends the spell's effects on itself entirely.
    heighten: "**9th:** The temporary Hit Points increase to 18, and the status bonus to Will saves increases to +3."
