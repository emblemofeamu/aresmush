    effect: "You howl a lament of damned souls. Each living enemy in the area takes 8d10 void damage and must attempt a Fortitude save.%r%r**Critical Success** The creature is unaffected.%r**Success** The creature takes full damage.%r**Failure** The creature takes full damage and is drained 1d4.%r**Critical Failure** The creature takes double damage and is drained 4."
  Waking Nightmare:
