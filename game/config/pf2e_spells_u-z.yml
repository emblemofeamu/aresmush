    tradition:
      - arcane
      - primal
    actions: 2
    effect: "**Area** 30-foot cone or 10-foot emanation%r%rYou swing a weapon you're holding, and the weapon magically multiplies into duplicates that swipe at all creatures in either a cone or an emanation. This flurry deals four dice of damage to creatures in the area. This damage has the same type as the weapon and uses the same die size. Determine the die size as if you were attacking with the weapon; for instance, if you were wielding a two-hand weapon in both hands, you'd use its two-hand damage die.%r%r**Critical Success** The creature is unaffected.%r**Success** The target takes half damage.%r**Failure** The target takes full damage.%r**Critical Failure** The target takes double damage and is subject to the weapon's critical specialization effect."
    heighten: "**+1:** Add another damage die."
  Weapon Surge:
    base_level: 1
    traits:
      - cleric
      - focus
      - manipulate
      - sanctified
