    effect: "You utter a liberating word of power that frees a creature. You suppress one of the following conditions of your choice: confused, frightened, grabbed, paralyzed, or restrained. The target isn't affected by the chosen condition, and if you suppress the grabbed or Restrained condition, the target automatically breaks free from the grab or restraint when you Cast the Spell.%r%rIf you don't remove the effect that provided the condition, the condition returns after the spell ends. For example, if a spell was making the target Confused for 1 minute, *word of freedom* would let the target act normally for a round, but the Confused condition would return afterward."
  Word of Truth:
    base_level: 1
