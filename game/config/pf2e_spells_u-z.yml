    effect: "You scramble a creature's mental faculties and sensory input. The target must attempt a Will saving throw. Regardless of the result of that save, the target is then temporarily immune for 10 minutes. Warp mind's effects happen instantly, so *dispel magic* and other effects that counteract spells can't counteract them. However, *wish* rituals and abilities that can remove non-magical effects can still counteract the effects.%r%r**Critical Success** The target is unaffected.%r**Success** The target spends the first action on its next turn with the confused condition.%r**Failure** The target is Confused for 1 minute.%r**Critical Failure** The target is Confused permanently."
  Water Breathing:
