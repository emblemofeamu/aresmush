  Umbral Journey:
    base_level: 5
    traits:
      - concentrate
      - manipulate
      - shadow
      - teleportation
      - uncommon
    tradition:
      - arcane
      - occult
    actions: 1 minute
    range: touch
    target: you and up to 10 willing creatures touched
    duration: 8 hours
    effect: You move partially into the Netherworld, using its warped nature to speed your travels. Each hour, you cover roughly as much ground as you normally would in 3 days. The landmarks are vague and symbolic rather than concrete, leaving you within a mile of your intended destination when you Dismiss the spell or its duration ends.
  Uncontrollable Dance:
    base_level: 8
    bloodline:
      - aberrant
      - fey
