    duration: 1 minute
    effect: "Your patron's majesty—or their displeasure—comes in a growl from your throat, making other creatures reluctant to harm you. The target must attempt a Will save; if the creature is an animal, fungus, or plant, it takes a –1 circumstance penalty to its save.%r%r**Critical Success** The target is unaffected.%r**Success** When the target attempts an attack roll or skill check that would harm you, it takes a -2 status penalty to its roll.%r**Failure** As success, but the target also becomes sickened 1 each time it damages you.%r**Critical Failure** As failure, but the sickened value is 2."
  Wind Jump:
