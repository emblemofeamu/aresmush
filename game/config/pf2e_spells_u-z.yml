    effect: "You put up a united defense. Each ally can use your saving throw modifier instead of its own against the triggering spell. Each ally decides individually which modifier to use."
  Unrelenting Observation:
    base_level: 8
    traits:
      - concentrate
      - manipulate
      - scrying
    tradition:
      - arcane
      - occult
    actions: 2
    area: 20-foot burst
    range: 100 feet
    target: 1 creature or object tracked and up to 5 other willing creatures
    duration: varies
    effect: "This spell grants perfect sight based on scrying, allowing several willing targets to track the exact movements or position of one creature or object. Choose one target creature or object in the area to be tracked. It becomes the sensor for the spell. Up to five willing creatures of your choice in the area can see a ghostly image of this creature or object when it's out of their sight. They can perceive the creature or object perfectly, allowing them to ignore the concealed or invisible condition, though physical barriers still provide cover.%r%rThe tracking creatures can see the tracked creature or object through all barriers other than lead or running water, which block their vision. Distance doesn't matter, though the creature or object might move so far away it becomes too small to perceive. The tracking creatures don't see any of the environment around the target, though they do see any gear a creature is wearing or holding, and they can tell if it removes objects from its person.%r%rIf the target to be tracked is willing, the duration is 1 hour. If you try to track an unwilling creature, the target must attempt a Will save.%r%r**Critical Success** The creature or object is unaffected.%r**Success** As described, and the duration is 1 minute.%r**Failure** As described, and the duration is 1 hour."
  Untamed Form:
    base_level: 1
    traits:
      - concentrate
      - druid
      - focus
      - manipulate
      - polymorph
      - uncommon
    actions: 2
    duration: varies
    effect: "You reach within for a different part of yourself, and you set it free, transforming your body into another form. You can polymorph into any form listed in *pest form*, which lasts 10 minutes. All other *untamed form* shapes last 1 minute. You can add more shapes to your *untamed form* list with druid feats; your feat might grant you some or all of the shapes from a given polymorph spell.%r%rWhen you transform into a shape granted by a spell, you gain all the effects of the shape you chose from a version of the spell heightened to *untamed form*'s rank. *Untamed form* allows you to use your own shapeshifting training more easily than most polymorph spells. When you choose to use your own attack modifier while polymorphed instead of the form's default attack modifier, you gain a +2 status bonus to your attack rolls."
    heighten: "**2nd:** You can transform into shapes listed in *animal form*."
  Untamed Shift:
