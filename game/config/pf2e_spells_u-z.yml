    range: 60 feet
    duration: 1 minute
    effect: "You craft a 20-foot-tall wall of living flesh in a straight line up to 30 feet long. The wall is 3 feet thick, and each 5-foot-long section has AC 10 and 75 Hit Points. If you wish, the wall can be of a smaller length or height. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall can't be Repaired but can be healed by vitality, and healing spells and abilities. When you Cast the Spell, choose one of the following features for your wall.%r%r**Arms** The wall is a mass of grasping arms. Any creature that ends its turn within 5 feet of the wall must attempt a Reflex save.%r%r**Success** The creature is unaffected.%r%r**Failure** The creature is grabbed by the wall for 1 round or until it Escapes against your spell DC, whichever comes first.%r%r**Critical Failure** The creature is restrained by the wall for 1 round or until it Escapes against your spell DC, whichever comes first."
    heighten: "**+2:** The Hit Points of each section of the wall increase by 10, and the piercing damage dealt by the wall's mouths increases by 1d6."
  Wall of Force:
    base_level: 6
    traits:
      - concentrate
      - force
      - manipulate
    tradition:
      - arcane
      - occult
    actions: 3
    range: 30 feet
    duration: 1 minute
    effect: You form an invisible wall of pure magical force up to 50 feet long and up to 20 feet high. The wall has no discernible thickness. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall has AC 10, Hardness 30, and 60 Hit Points, and it's immune to critical hits and precision damage. The wall blocks physical effects from passing through it, and because it's made of force, it blocks incorporeal and ethereal creatures as well. Teleportation effects can pass through the barrier, as can visual effects (since the wall is invisible). Wall of force is immune to counteracting effects of its level or lower, but the wall is automatically destroyed by a *disintegrate* spell of any rank.
