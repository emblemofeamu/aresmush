    actions: 1
    range: touch
    target: 1 weapon you're wielding
    effect: Holding your weapon aloft, you fill it with divine energy. On your next Strike with that weapon before the start of your next turn, you gain a +1 status bonus to the attack roll and the weapon deals an additional 1d6 spirit damage, and the Strike gains the sanctified trait. *Weapon surge* ends once you complete this Strike or the weapon leaves your possession.
    heighten: "**5th:** The attack deals 2d6 additional spirit damage.%r**9th:** The attack deals 3d6 additional spirit damage."
  Weapon Trance:
    base_level: 1
    mystery:
      - battle
    traits:
      - concentrate
      - focus
      - oracle
      - uncommon
    actions: 1
    duration: 1 minute
    effect: The serenity of violence fills your mind, giving you a heightened sense of knowing exactly where your weapons need to be. For the duration, your proficiency with martial weapons is equal to your proficiency with simple weapons.
  Weapon of Judgment:
    base_level: 9
    traits:
      - concentrate
      - manipulate
      - sanctified
      - spirit
    tradition:
      - divine
    actions: 2
    range: 100 feet
    target: 1 creature
    duration: 1 minute
    effect: "An immense weapon of spiritual energy appears, hovering in the air above the target. The weapon has the ghostly visual appearance of your deity's favored weapon. Name war or peace when you cast this spell.%r%rIf you name 'war,' mentally choose one creature. This must be a creature both you and the target can see. The target instinctively knows which creature this is. At the end of each of the target's turns, if the target didn't use a hostile action against the creature you chose during that turn, the weapon Strikes the target.%r%rIf you name 'peace,' mentally choose up to five allies. The target instinctively knows who those allies are. The weapon Strikes the target each time the target uses a hostile action against you or one of the chosen allies. The weapon Strikes only once per action, even if the action targets multiple allies (such as for a *fireball* or a Whirlwind Strike).%r%rStrikes with the weapon are melee weapon attacks, but they use your spell attack modifier. Regardless of its appearance, the weapon deals 4d10 damage. The damage type is the same as the chosen weapon (or any of its types for a versatile weapon). The attack deals spirit damage instead if that would be more detrimental to the creature (as determined by the GM). No other statistics or attributes of the weapon apply, and even a ranged weapon attacks adjacent creatures only. The weapon takes a multiple attack penalty, which increases throughout the target's turn, but its penalty is separate from yours.%r%rA weapon of judgment is a weapon for the purposes of triggers, resistances, and so forth. The weapon doesn't take up space, grant flanking, or have any other attributes a creature would. The weapon can't make any attack other than its Strike, and feats or spells that affect weapons don't apply to this weapon."
    heighten: "**10th:** The damage increases by 1d10."
  Web:
    base_level: 2
    traits:
      - concentrate
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 3
    area: 10-foot burst
    range: 30 feet
    duration: 1 minute
    effect: "You create a sticky web in the area that impedes creatures' movement. Squares filled with the web are difficult terrain. Each time a creature in the web begins to use a move action or enters the web during a move action it's using, it must attempt an Athletics check or Reflex save against your spell DC to avoid taking a circumstance penalty to its Speeds or becoming immobilized. A creature that gets out of the web ceases to take a circumstance penalty to its Speed from the web. Each square can be cleared of the web by a single attack or effect that deals at least 5 slashing damage or 1 fire damage. A square has AC 5, and it automatically fails its saving throws.%r%r**Critical Success** The creature is unaffected, and it doesn't need to attempt further Athletics checks or saving throws against the web this turn. If it used an Athletics check, it clears the web from every square it leaves during its movement.%r**Success** The creature is unaffected during its action. If it used an Athletics check, it clears the web from every square it leaves during its movement.%r**Failure** The creature takes a –10-foot circumstance penalty to its Speeds until the start of its next turn.%r**Critical Failure** The creature is immobilized until the start of its next turn, after which it takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape to remove its immobilized condition."
    heighten: "**4th:** The spell's area increases to a 20-ft burst, and its range increases to 60 feet."
  Whirling Flames:
    base_level: 3
    mystery:
      - flames
    traits:
      - concentrate
      - fire
      - focus
      - manipulate
      - oracle
      - uncommon
