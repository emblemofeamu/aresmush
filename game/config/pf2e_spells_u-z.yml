    range: 120 feet
    duration: 1 minute
    effect: "You sculpt an ice barrier that blocks sight and, once shattered, freezes foes. You create either a 1-foot-thick wall of ice in a straight line up to 60 feet long and 10 feet high (the wall doesn't have to be vertical, but it must be anchored on both sides to a solid surface) or a 1-foot-thick, 10-foot radius hemisphere of ice. The ice that makes up the wall is opaque. If you wish, the wall can be of a smaller length, height, or radius.%r%rYou must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. Each 10-foot-by-10-foot section of the wall has AC 10, Hardness 10, and 40 Hit Points, and it's immune to critical hits, cold damage, and precision damage. A section also has weakness 15 to fire; a section of the wall destroyed by fire melts, evaporating into water and steam. A section destroyed by means other than fire leaves behind a chilling mass of ice that is difficult terrain and deals 2d6 cold damage to any creature passing through it."
    heighten: "**+2:** The Hit Points of each section of the wall increase by 10, and the cold damage dealt to creatures crossing a destroyed section increases by 1d6."
  Wall of Stone:
    base_level: 5
    traits:
      - concentrate
      - earth
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 3
    range: 120 feet
    effect: "You shape a wall of solid stone. You create a 1-inch-thick wall of stone up to 120 feet long, and 20 feet high. You can shape the wall's path, placing each 5 feet of the wall on the border between squares. The wall doesn't need to stand vertically, so you can use it to form a bridge or set of stairs, for example. You must conjure the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost.%r%rEach 10-foot-by-10-foot section of the wall has AC 10, Hardness 14, and 50 Hit Points, and it's immune to critical hits and precision damage. A destroyed section of the wall can be moved through, but the rubble created from it is difficult terrain."
    heighten: "**+2:** The Hit Points of each section of the wall increase by 15."
  Wall of Thorns:
    base_level: 3
    traits:
      - concentrate
      - manipulate
      - plant
      - wood
    tradition:
      - arcane
      - primal
    actions: 3
    range: 60 feet
    duration: 1 minute
    effect: "You grow a wall of thorny brambles from the ground. You create a 5-foot-thick wall of brambles and thorns in a straight line up to 60 feet long and 10 feet high. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall stands vertically. If you wish, the wall can be of a shorter length or height. Everything on each side of the wall has cover from creatures on the opposite side, and the wall's spaces are difficult terrain. For every move action a creature uses to enter at least one of the wall's spaces, that creature takes 3d4 piercing damage.%r%rEach 10-foot-by-10-foot section of the wall has AC 10, Hardness 10, and 20 Hit Points. It's immune to critical hits and precision damage. A destroyed section can be moved through freely."
    heighten: "**+1:** The Hit Points of each section of the wall increase by 5, and the piercing damage increases by 1d4."
  Wall of Wind:
    base_level: 3
    traits:
      - air
      - concentrate
      - manipulate
    tradition:
      - arcane
      - primal
    actions: 3
    range: 120 feet
    duration: 1 minute
    effect: "You create a barrier of gusting winds that hinders anything moving through it. The wall of swirling winds is 5 feet thick, 60 feet long, and 30 feet high. The wall stands vertically, but you can shape its path. Though the wall of wind distorts the air, it does not hamper sight. The wall has the following effects.%r%r**Critical Success** The creature can move through the wall normally this turn.%r**Success** The flying creature can move through the wall this turn, but the wall is difficult terrain.%r**Failure** The wall stops the movement of the flying creature, and any remaining movement from its current action is wasted.%r**Critical Failure** As failure, and the creature is pushed 10 feet away from the wall."
  Wanderer's Guide:
    base_level: 3
    traits:
      - concentrate
      - manipulate
    tradition:
      - divine
      - occult
